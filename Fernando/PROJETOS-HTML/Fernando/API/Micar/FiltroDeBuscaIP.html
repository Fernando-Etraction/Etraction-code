<!-- Notificação de Frete - Para ser inserida em uma página de produto -->
<style>
    /* Mobile - Notification Style */
    .shipping-notification {
        position: fixed;
        top: 20px;
        right: 20px;
        left: 20px;
        max-width: 380px;
        margin: 0 auto;
        background: #111827;
        /* fundo sólido, sem blur */
        border-radius: 20px;
        padding: 20px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow:
            0 8px 32px 0 rgba(15, 23, 42, 0.7),
            inset 0 1px 0 0 rgba(255, 255, 255, 0.06);
        animation: slideDown 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        overflow: hidden;
        z-index: 9999;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* Removeu blur, mas mantive shimmer se quiser */
    .shipping-notification::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(45deg,
                transparent 30%,
                rgba(255, 255, 255, 0.08) 50%,
                transparent 70%);
        animation: shimmer 3s infinite;
    }

    @keyframes shimmer {
        0% {
            transform: translateX(-100%) translateY(-100%) rotate(45deg);
        }

        100% {
            transform: translateX(100%) translateY(100%) rotate(45deg);
        }
    }

    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-40px) scale(0.95);
        }

        to {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }

    .shipping-notification-header {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
    }

    .shipping-notification-icon {
        width: 44px;
        height: 44px;
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        flex-shrink: 0;
    }

    .shipping-notification-icon svg {
        width: 22px;
        height: 22px;
        fill: white;
    }

    .shipping-notification-title {
        position: relative;
        z-index: 1;
        flex: 1;
    }

    .shipping-notification-title h3 {
        color: white;
        font-size: 15px;
        font-weight: 600;
        margin: 0 0 2px 0;
        line-height: 1.3;
    }

    .shipping-notification-title p {
        color: rgba(249, 250, 251, 0.8);
        font-size: 12px;
        font-weight: 400;
        margin: 0;
    }

    .shipping-notification-close {
        position: relative;
        z-index: 1;
        background: rgba(31, 41, 55, 0.9);
        border: none;
        width: 28px;
        height: 28px;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        flex-shrink: 0;
    }

    .shipping-notification-close:hover {
        background: rgba(55, 65, 81, 1);
    }

    .shipping-notification-close svg {
        width: 14px;
        height: 14px;
        fill: #e5e7eb;
    }

    .shipping-notification-content {
        position: relative;
        z-index: 1;
        background: rgba(15, 23, 42, 0.9);
        border-radius: 14px;
        padding: 14px;
        border: 1px solid rgba(55, 65, 81, 1);
    }

    .shipping-offer {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .shipping-offer-icon {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }

    .shipping-offer-icon svg {
        width: 18px;
        height: 18px;
        fill: white;
    }

    .shipping-offer-text {
        flex: 1;
    }

    .shipping-offer-badge {
        color: #10b981;
        background: rgba(16, 185, 129, 0.18);
        font-size: 10px;
        font-weight: 600;
        padding: 3px 8px;
        border-radius: 6px;
        display: inline-block;
        margin-bottom: 4px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .shipping-offer-description {
        color: #f9fafb;
        font-size: 14px;
        font-weight: 600;
        margin: 0;
        line-height: 1.4;
    }

    .shipping-loading {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 10px;
    }

    .shipping-loading-spinner {
        width: 30px;
        height: 30px;
        border: 3px solid rgba(75, 85, 99, 0.6);
        border-top-color: #f9fafb;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 8px;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    .shipping-loading-text {
        color: rgba(249, 250, 251, 0.9);
        font-size: 13px;
        margin: 0;
    }

    /* Desktop - Pop-up Style (sem blur também) */
    @media (min-width: 768px) {
        .shipping-notification {
            top: 40px;
            right: 40px;
            left: auto;
            max-width: 420px;
            background: #ffffff;
            /* fundo sólido claro no desktop */
            border-radius: 24px;
            padding: 24px;
            border: 1px solid #e5e7eb;
            box-shadow:
                0 20px 60px 0 rgba(0, 0, 0, 0.15),
                0 0 0 1px rgba(0, 0, 0, 0.05);
            animation: slideDownDesktop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideDownDesktop {
            from {
                opacity: 0;
                transform: translateY(-30px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .shipping-notification::before {
            display: none;
        }

        .shipping-notification-header {
            margin-bottom: 16px;
        }

        .shipping-notification-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
        }

        .shipping-notification-icon svg {
            width: 24px;
            height: 24px;
        }

        .shipping-notification-title h3 {
            color: #1a1a2e;
            font-size: 17px;
        }

        .shipping-notification-title p {
            color: #6b7280;
            font-size: 13px;
        }

        .shipping-notification-close {
            background: #f3f4f6;
            width: 32px;
            height: 32px;
        }

        .shipping-notification-close:hover {
            background: #e5e7eb;
        }

        .shipping-notification-close svg {
            fill: #6b7280;
        }

        .shipping-notification-content {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            padding: 16px;
            border-radius: 16px;
        }

        .shipping-offer-icon {
            width: 40px;
            height: 40px;
        }

        .shipping-offer-icon svg {
            width: 20px;
            height: 20px;
        }

        .shipping-offer-badge {
            font-size: 11px;
            padding: 4px 10px;
        }

        .shipping-offer-description {
            color: #1a1a2e;
            font-size: 15px;
        }

        .shipping-loading-text {
            color: #6b7280;
        }

        .shipping-loading-spinner {
            border-color: #e5e7eb;
            border-top-color: #10b981;
        }
    }

    .shipping-notification.hidden {
        animation: slideUp 0.4s ease forwards;
    }

    @keyframes slideUp {
        to {
            opacity: 0;
            transform: translateY(-40px) scale(0.95);
        }
    }
</style>

<div class="shipping-notification" id="shippingNotification">
    <div class="shipping-loading" id="shippingLoading">
        <div class="shipping-loading-spinner"></div>
        <p class="shipping-loading-text">Verificando condições de frete...</p>
    </div>

    <div id="shippingContent" style="display: none;">
        <div class="shipping-notification-header">
            <div class="shipping-notification-icon">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M18 18.5c.83 0 1.5-.67 1.5-1.5s-.67-1.5-1.5-1.5-1.5.67-1.5 1.5.67 1.5 1.5 1.5zm1.5-9H17V12h4.46L19.5 9.5zM6 18.5c.83 0 1.5-.67 1.5-1.5s-.67-1.5-1.5-1.5-1.5.67-1.5 1.5.67 1.5 1.5 1.5zM20 8l3 4v5h-2c0 1.66-1.34 3-3 3s-3-1.34-3-3H9c0 1.66-1.34 3-3 3s-3-1.34-3-3H1V6c0-1.1.9-2 2-2h14v4h3zM3 6v9h.76c.55-.61 1.35-1 2.24-1 .89 0 1.69.39 2.24 1H15V6H3z" />
                </svg>
            </div>
            <div class="shipping-notification-title">
                <h3>Condição de frete especial para sua região</h3>
                <p id="regionName">Detectando localização...</p>
            </div>
            <button class="shipping-notification-close" onclick="closeShippingNotification()" aria-label="Fechar">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
                </svg>
            </button>
        </div>

        <div class="shipping-notification-content">
            <div class="shipping-offer">
                <div class="shipping-offer-icon">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" />
                    </svg>
                </div>
                <div class="shipping-offer-text">
                    <span class="shipping-offer-badge" id="offerBadge">Oferta Especial</span>
                    <p class="shipping-offer-description" id="offerDescription">Carregando oferta...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const ESTADOS_BR = {
        'Acre': { uf: 'AC', regiao: 'Norte' },
        'Amapá': { uf: 'AP', regiao: 'Norte' },
        'Amapa': { uf: 'AP', regiao: 'Norte' },
        'Amazonas': { uf: 'AM', regiao: 'Norte' },
        'Pará': { uf: 'PA', regiao: 'Norte' },
        'Para': { uf: 'PA', regiao: 'Norte' },
        'Rondônia': { uf: 'RO', regiao: 'Norte' },
        'Rondonia': { uf: 'RO', regiao: 'Norte' },
        'Roraima': { uf: 'RR', regiao: 'Norte' },
        'Tocantins': { uf: 'TO', regiao: 'Norte' },

        'Alagoas': { uf: 'AL', regiao: 'Nordeste' },
        'Bahia': { uf: 'BA', regiao: 'Nordeste' },
        'Ceará': { uf: 'CE', regiao: 'Nordeste' },
        'Ceara': { uf: 'CE', regiao: 'Nordeste' },
        'Maranhão': { uf: 'MA', regiao: 'Nordeste' },
        'Maranhao': { uf: 'MA', regiao: 'Nordeste' },
        'Paraíba': { uf: 'PB', regiao: 'Nordeste' },
        'Paraiba': { uf: 'PB', regiao: 'Nordeste' },
        'Pernambuco': { uf: 'PE', regiao: 'Nordeste' },
        'Piauí': { uf: 'PI', regiao: 'Nordeste' },
        'Piaui': { uf: 'PI', regiao: 'Nordeste' },
        'Rio Grande do Norte': { uf: 'RN', regiao: 'Nordeste' },
        'Sergipe': { uf: 'SE', regiao: 'Nordeste' },

        'Distrito Federal': { uf: 'DF', regiao: 'Centro-Oeste' },
        'Goiás': { uf: 'GO', regiao: 'Centro-Oeste' },
        'Goias': { uf: 'GO', regiao: 'Centro-Oeste' },
        'Mato Grosso': { uf: 'MT', regiao: 'Centro-Oeste' },
        'Mato Grosso do Sul': { uf: 'MS', regiao: 'Centro-Oeste' },

        'Espírito Santo': { uf: 'ES', regiao: 'Sudeste' },
        'Espirito Santo': { uf: 'ES', regiao: 'Sudeste' },
        'Minas Gerais': { uf: 'MG', regiao: 'Sudeste' },
        'Rio de Janeiro': { uf: 'RJ', regiao: 'Sudeste' },
        'São Paulo': { uf: 'SP', regiao: 'Sudeste' },
        'Sao Paulo': { uf: 'SP', regiao: 'Sudeste' },

        'Paraná': { uf: 'PR', regiao: 'Sul' },
        'Parana': { uf: 'PR', regiao: 'Sul' },
        'Rio Grande do Sul': { uf: 'RS', regiao: 'Sul' },
        'Santa Catarina': { uf: 'SC', regiao: 'Sul' }
    };

    async function detectarFreteEspecial() {
        const token = "1df66eb6c0d0d3";

        try {
            const response = await fetch(`https://ipinfo.io/json?token=${token}`);
            if (!response.ok) {
                console.error("Erro na requisição:", response.status, response.statusText);
                hideShippingNotification();
                return;
            }

            const data = await response.json();
            const { region: estadoNome, country } = data;

            const estadoInfo = ESTADOS_BR[estadoNome];
            if (!estadoInfo) {
                console.warn("Estado não mapeado:", estadoNome);
                hideShippingNotification();
                return;
            }

            const { uf, regiao } = estadoInfo;

            const oferta = determinarOfertaPorEstado(uf, regiao, country);

            setTimeout(() => {
                if (oferta) {
                    document.getElementById('regionName').textContent = `${uf} - ${country}`;
                    document.getElementById('offerBadge').textContent = oferta.badge;
                    document.getElementById('offerDescription').textContent = oferta.description;

                    document.getElementById('shippingLoading').style.display = 'none';
                    document.getElementById('shippingContent').style.display = 'block';
                } else {
                    hideShippingNotification();
                }
            }, 800);
        } catch (error) {
            console.error("Erro ao buscar dados no ipinfo:", error);
            hideShippingNotification();
        }
    }

    function determinarOfertaPorEstado(uf, regiaoMacro, country) {
        if (country !== 'BR') return null;

        const norteUF = ['AC', 'AM', 'AP', 'PA', 'RO', 'RR', 'TO'];
        const nordesteUF = ['AL', 'BA', 'CE', 'MA', 'PB', 'PE', 'PI', 'RN', 'SE'];
        const sulUF = ['PR', 'RS', 'SC'];
        const sudesteUF = ['ES', 'MG', 'RJ', 'SP'];

        // 1) Norte e Nordeste: 10% OFF
        if (norteUF.includes(uf) || nordesteUF.includes(uf)) {
            return {
                badge: '10% OFF',
                description: '10% de desconto no frete para sua região.'
            };
        }

        // 2) Arte de frete por Estado:
        // FRETE GRÁTIS em pedidos acima de R$1.000 - Sul, SP & RJ
        // OU FRETE 50% OFF em pedidos a partir de R$499 para Sul e Sudeste

        const isSul = sulUF.includes(uf);
        const isSudeste = sudesteUF.includes(uf);
        const isSPorRJ = (uf === 'SP' || uf === 'RJ');
        //Minas Gerais
        const isMG = uf === 'MG';

        if (isSul || isSPorRJ) {
            return {
                badge: 'FRETE GRÁTIS',
                description: 'FRETE GRÁTIS em pedidos acima de R$1.000 – OU FRETE 50% OFF em pedidos a partir de R$499.'
            };
        }

        if (isSudeste) {
            return {
                badge: 'FRETE 50% OFF',
                description: 'FRETE 50% OFF em pedidos a partir de R$499.'
            };
        }

        if (isMG) {
            return {
                badge: 'FRETE 50% OFF',
                description: 'FRETE 50% OFF em pedidos a partir de R$499.'
            };
        }

        return null;
    }

    function closeShippingNotification() {
        const notification = document.getElementById('shippingNotification');
        if (!notification) return;
        notification.classList.add('hidden');
        setTimeout(() => {
            notification.style.display = 'none';
        }, 400);
    }

    function hideShippingNotification() {
        setTimeout(closeShippingNotification, 500);
    }

    detectarFreteEspecial();
</script>
