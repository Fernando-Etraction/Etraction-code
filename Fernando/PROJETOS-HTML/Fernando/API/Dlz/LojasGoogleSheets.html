<script>
  (function () {
    const API_BASE = "https://noisy-moon-df3f.fernando-rodrigues.workers.dev/";

    const elEstado = document.getElementById("lp_estado");
    const elCidade = document.getElementById("lp_cidade");
    const elBusca = document.getElementById("lp_busca");
    const elStatus = document.getElementById("lp_status");
    const elResults = document.getElementById("lp_results");
    const btnPrev = document.getElementById("lp_prev");
    const btnNext = document.getElementById("lp_next");
    const elPageInfo = document.getElementById("lp_pageinfo");
    const btnClear = document.getElementById("lp_clear");

    const state = { estado: "", cidade: "", q: "", page: 1, pageSize: 8, pages: 1, total: 0 };

    let debounceT = null;

    // ---- helpers ----
    const norm = (s) => String(s ?? "").trim();
    const lower = (s) => String(s ?? "").trim().toLowerCase();
    const esc = (s) => String(s ?? "")
      .replaceAll("&", "&amp;").replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;").replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");

    function setStatus(msg) { elStatus.textContent = msg; }
    function updatePagination() {
      elPageInfo.textContent = `Página ${state.page} de ${state.pages || 1}`;
      btnPrev.disabled = state.page <= 1;
      btnNext.disabled = state.page >= (state.pages || 1);
    }

    function pick(obj, keys) {
      if (!obj || typeof obj !== "object") return "";
      for (const k of keys) {
        if (obj[k] != null && String(obj[k]).trim() !== "") return obj[k];
      }
      return "";
    }

    function normalizeRow(item) {
      // suporta retorno com chaves antigas
      const nome = norm(pick(item, ["nome", "Nome da loja", "Nome", "loja"]));
      const rua = norm(pick(item, ["rua", "Rua", "logradouro"]));
      const numero = norm(pick(item, ["numero", "Numero", "Número", "num", "Nº"]));
      const bairro = norm(pick(item, ["bairro", "Bairro"]));
      const cidade = norm(pick(item, ["cidade", "Cidade", "Cidades"]));
      const estado = norm(pick(item, ["estado", "Estado", "Estados", "UF", "uf"]));

      const estado_lc = lower(estado);
      const cidade_lc = lower(cidade);

      const hay = lower([nome, rua, numero, bairro, cidade, estado].join(" "));

      return {
        nome, rua, numero, bairro, cidade, estado,
        estado_lc, cidade_lc, hay,
        nome_sort: lower(nome)
      };
    }

    function statusCount() {
      const total = state.total || 0;
      if (!total) return "Nenhuma loja encontrada";
      const start = (state.page - 1) * state.pageSize + 1;
      const end = Math.min(total, start + state.pageSize - 1);
      return `Mostrando ${start}–${end} de ${total}`;
    }

    function render(rows) {
      if (!rows || !rows.length) { elResults.innerHTML = ""; return; }

      elResults.innerHTML = rows.map(item => {
        const line1 = [item.rua, item.numero && `nº ${item.numero}`, item.bairro].filter(Boolean).join(", ");
        const line2 = [item.cidade, item.estado].filter(Boolean).join(" - ");

        return `
        <article class="lp-card">
          <div class="lp-card-header">
            <div class="lp-ico" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <path d="M3 10.5V21h18V10.5" stroke="#111827" stroke-width="1.6" stroke-linecap="round"/>
                <path d="M7 21v-8h10v8" stroke="#111827" stroke-width="1.6" stroke-linecap="round"/>
                <path d="M2 10.5L12 3l10 7.5" stroke="#111827" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
            </div>
            <div class="lp-info">
              <h3 class="lp-name">${esc(item.nome)}</h3>
              <p class="lp-addr">${esc(line1)}</p>
              <p class="lp-addr">${esc(line2)}</p>
            </div>
          </div>
        </article>
      `;
      }).join("");
    }

    // ---- dataset local (1 fetch, depois tudo instantâneo) ----
    const dataset = {
      loaded: false,
      rows: [],
      estados: [],
      cidadesByEstado: new Map(), // estado_lc -> array cidades
    };

    async function fetchAllLojas() {
      // tenta buscar tudo numa tacada
      // se teu endpoint respeitar pageSize alto, traz as 2500 em 1 chamada
      const url = new URL(API_BASE);
      url.searchParams.set("mode", "lojas");
      url.searchParams.set("page", "1");
      url.searchParams.set("pageSize", "3000"); // >= 2500

      const resp = await fetch(url.toString(), { method: "GET" });
      const text = await resp.text();

      let json;
      try { json = JSON.parse(text); }
      catch (e) {
        console.error("Resposta não-JSON:", text.slice(0, 250));
        throw new Error("API retornou HTML/erro (veja console).");
      }
      if (!json.success) throw new Error(json.error || "Erro na API");

      const raw = Array.isArray(json.data) ? json.data : [];
      return raw.map(normalizeRow).filter(r => r.nome || r.rua || r.cidade || r.estado);
    }

    function buildIndex(rows) {
      const estadosSet = new Set();
      const cidadesMap = new Map(); // estado_lc -> Set(cidade)

      rows.forEach(r => {
        if (r.estado_lc) estadosSet.add(r.estado_lc);
        if (r.estado_lc) {
          if (!cidadesMap.has(r.estado_lc)) cidadesMap.set(r.estado_lc, new Set());
          if (r.cidade) cidadesMap.get(r.estado_lc).add(r.cidade);
        }
      });

      dataset.estados = Array.from(estadosSet).sort((a, b) => a.localeCompare(b, "pt-BR"));
      dataset.cidadesByEstado = new Map(
        Array.from(cidadesMap.entries()).map(([uf, set]) => {
          const list = Array.from(set).sort((a, b) => a.localeCompare(b, "pt-BR"));
          return [uf, list];
        })
      );
    }

    function paintEstados() {
      const listUI = dataset.estados.map(s => s.toUpperCase());
      elEstado.innerHTML =
        `<option value="">Selecione o estado</option>` +
        listUI.map(e => `<option value="${esc(e)}">${esc(e)}</option>`).join("");

      setStatus("Selecione um estado para ver as cidades.");
    }

    function paintCidades(estadoUI) {
      const uf = lower(estadoUI);
      const cidades = dataset.cidadesByEstado.get(uf) || [];

      elCidade.innerHTML =
        `<option value="">Selecione a cidade</option>` +
        cidades.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join("");

      elCidade.disabled = false;
    }

    function applyFilters() {
      const uf = lower(state.estado);
      const cid = lower(state.cidade);
      const q = lower(state.q);

      let filtered = dataset.rows;

      if (uf) filtered = filtered.filter(r => r.estado_lc === uf);
      if (cid) filtered = filtered.filter(r => r.cidade_lc === cid);
      if (q) filtered = filtered.filter(r => r.hay.includes(q));

      filtered.sort((a, b) => a.nome_sort.localeCompare(b.nome_sort, "pt-BR"));

      state.total = filtered.length;
      state.pages = Math.max(1, Math.ceil(state.total / state.pageSize));
      state.page = Math.min(state.page, state.pages);

      const start = (state.page - 1) * state.pageSize;
      const paged = filtered.slice(start, start + state.pageSize);

      setStatus(statusCount());
      render(paged);
      updatePagination();
    }

    function resetCidade() {
      elCidade.disabled = true;
      elCidade.innerHTML = `<option value="">Selecione uma cidade</option>`;
      state.cidade = "";
      elCidade.value = "";
    }

    function wire() {
      elEstado.addEventListener("change", () => {
        state.estado = norm(elEstado.value);
        state.page = 1;

        resetCidade();

        if (state.estado) {
          paintCidades(state.estado); // ✅ cidades só do estado
        }

        applyFilters();
      });

      elCidade.addEventListener("change", () => {
        state.cidade = norm(elCidade.value);
        state.page = 1;
        applyFilters();
      });

      elBusca.addEventListener("input", () => {
        clearTimeout(debounceT);
        debounceT = setTimeout(() => {
          state.q = norm(elBusca.value);
          state.page = 1;
          applyFilters();
        }, 250);
      });

      btnPrev.addEventListener("click", () => {
        if (state.page > 1) {
          state.page--;
          applyFilters();
        }
      });

      btnNext.addEventListener("click", () => {
        if (state.page < state.pages) {
          state.page++;
          applyFilters();
        }
      });

      btnClear.addEventListener("click", () => {
        elEstado.value = "";
        elCidade.value = "";
        elBusca.value = "";

        state.estado = "";
        state.cidade = "";
        state.q = "";
        state.page = 1;

        resetCidade();
        applyFilters();
      });
    }

    async function init() {
      try {
        wire();

        setStatus("Carregando dados...");
        elEstado.innerHTML = `<option value="">Carregando...</option>`;
        resetCidade();
        elResults.innerHTML = "";
        updatePagination();

        // ✅ cache do browser (session) pra não buscar de novo ao voltar na página
        const ssKey = "LP_LOJAS_CACHE_V1";
        const cached = sessionStorage.getItem(ssKey);
        if (cached) {
          dataset.rows = JSON.parse(cached);
        } else {
          dataset.rows = await fetchAllLojas();
          sessionStorage.setItem(ssKey, JSON.stringify(dataset.rows));
        }

        buildIndex(dataset.rows);
        paintEstados();

        dataset.loaded = true;
        setStatus("Selecione um estado para começar.");
        applyFilters();

      } catch (err) {
        console.error(err);
        setStatus("Erro: " + (err.message || "ao carregar"));
      }
    }

    if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", init);
    else init();
  })();
</script>
