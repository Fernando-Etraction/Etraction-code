<script>
  (function () {
    function miInitMobileCarousel() {
      if (window.innerWidth > 767) return;

      var $owl = $('.mi-mobile-owl');

      if (!$owl.length) return;
      if ($owl.hasClass('owl-loaded')) return;

      $owl.owlCarousel({
        loop: true,
        margin: 12,
        nav: false,
        dots: true,
        center: true,
        autoWidth: true,
        items: 1,
        stagePadding: 18,
        smartSpeed: 500
      });
    }

    function miBindCouponCopy() {
      $(document).off('click.miCouponCopy').on('click.miCouponCopy', '.mi-coupon-box', function (e) {
        e.preventDefault();
        e.stopPropagation();

        var box = this;
        var couponCode = box.getAttribute('data-coupon');
        var originalText = box.textContent;

        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(couponCode).then(function () {
            box.textContent = 'Copiado!';
            setTimeout(function () {
              box.textContent = originalText;
            }, 2000);
          }).catch(function () {
            box.textContent = 'Copiado!';
            setTimeout(function () {
              box.textContent = originalText;
            }, 2000);
          });
        } else {
          var tempInput = document.createElement('input');
          tempInput.value = couponCode;
          document.body.appendChild(tempInput);
          tempInput.select();
          document.execCommand('copy');
          document.body.removeChild(tempInput);

          box.textContent = 'Copiado!';
          setTimeout(function () {
            box.textContent = originalText;
          }, 2000);
        }
      });
    }

    $(document).ready(function () {
      miInitMobileCarousel();
      miBindCouponCopy();
    });
  })();
</script>
