
  <style>
    :root {
      --yellow: #f3c511;
      --blue: #135b99;
      --dark: #091c2c;
      --blue-bg: #2291f32d;
    }



    .container-principal {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .mi-container {
      display: flex;
      align-items: stretch;
      max-width: 1370px;
      width: 100%;
      overflow: hidden;
      border-radius: 4px;
    }


    .mi-title-container {
      flex: 1;
      padding: 22px 28px;
      display: flex;
      align-items: center;
    }

    .timer-title {
      font-size: 36px;
      font-weight: 700;
      color: var(--dark);
      line-height: 1.3;
    }

    .timer-title span {
      color: var(--blue);
      font-size: 30px;
      font-weight: 900;
    }

    .timer-title span::after {
      content: "";
      display: block;
      width: 90%;
      height: 2px;
      background-color: var(--yellow);
      margin-top: 3px;
    }

    .mi-container-timer {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 24px;
      flex-shrink: 0;
    }

    .timer-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .timer-digit {
      font-size: 48px;
      font-weight: 800;
      color: var(--dark);
      background: #fff;
      border: 1.5px solid #135b9933;
      border-radius: 6px;
      padding: 6px 10px;
      min-width: 64px;
      text-align: center;
      line-height: 1;
      transition: color 0.12s;
    }

    .timer-digit.tick {
      color: var(--blue);
    }

    .timer-unit {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--blue);
    }

    .timer-colon {
      font-size: 32px;
      font-weight: 900;
      color: var(--yellow);
      margin-bottom: 16px;
      animation: blink 1s step-start infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    @media (max-width: 500px) {
      .mi-container {
        flex-direction: column;
      }

      .timer-title {
        font-size: 28px;
      }

      .timer-title span {
        font-size: 22px;
      }
      .mi-container::before {
        width: 100%;
        height: 7px;
      }

      .mi-separator {
        width: 100%;
        height: 2px;
      }

      .mi-title-container {
        padding: 18px 20px 14px;
      }

      .mi-container-timer {
        padding: 14px 20px 18px;
        justify-content: center;
      }

      .timer-digit {
        font-size: 32px;
        min-width: 54px;
        padding: 5px 8px;
      }
    }
  </style>

    <section class="container-principal">
      <div class="mi-container">
        <div class="mi-title-container">
          <div class="timer-title">
            As melhores ofertas do
            <span>MERCADO</span>
          </div>
        </div>

        <div class="mi-separator"></div>

        <div class="mi-container-timer">
          <div class="timer-block">
            <span class="timer-digit timer-horas">00</span>
            <span class="timer-unit">horas</span>
          </div>
          <span class="timer-colon">:</span>
          <div class="timer-block">
            <span class="timer-digit timer-minutos">00</span>
            <span class="timer-unit">min</span>
          </div>
          <span class="timer-colon">:</span>
          <div class="timer-block">
            <span class="timer-digit timer-segundos">00</span>
            <span class="timer-unit">seg</span>
          </div>
        </div>
      </div>
    </section>

    <script>
      function startTimer() {
        const elH = document.querySelector(".timer-horas");
        const elM = document.querySelector(".timer-minutos");
        const elS = document.querySelector(".timer-segundos");

        function pad(n) {
          return n.toString().padStart(2, "0");
        }

        function tick(el, val) {
          if (el.textContent !== val) {
            el.textContent = val;
            el.classList.add("tick");
            setTimeout(() => el.classList.remove("tick"), 150);
          }
        }

        function update() {
          const now = new Date();
          tick(elH, pad(23 - now.getHours()));
          tick(elM, pad(59 - now.getMinutes()));
          tick(elS, pad(59 - now.getSeconds()));
        }

        update();
        setInterval(update, 1000);
      }

      window.addEventListener("load", startTimer);
    </script>
