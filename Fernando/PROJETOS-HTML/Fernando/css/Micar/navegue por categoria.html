<div class="mcr-cat-nav">
    <style>
        .mcr-cat-nav {
            width: 1370px;
            max-width: 100%;
            margin: 40px auto;
            box-sizing: border-box;
        }

        .mcr-cat-nav *,
        .mcr-cat-nav *::before,
        .mcr-cat-nav *::after {
            box-sizing: border-box;
        }

        .mcr-cat-nav .mcr-wrap {
            position: relative;
            padding: 0 56px;
        }

        .mcr-cat-nav .mcr-track {
            overflow: hidden;
        }

        .mcr-cat-nav .mcr-slider {
            display: flex;
            gap: 16px;
            transition: transform 0.4s ease;
        }

        .mcr-cat-nav .mcr-col {
            min-width: calc((100% - 48px) / 4);
            flex: 0 0 calc((100% - 48px) / 4);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .mcr-cat-nav .mcr-item {
            display: flex;
            align-items: center;
            gap: 16px;
            min-height: 86px;
            padding: 14px 18px;
            border: 1px solid #e7e7e7;
            border-radius: 16px;
            background: #ffffff;
            text-decoration: none !important;
            transition: all .25s ease;
        }

        .mcr-cat-nav .mcr-item:hover {
            background: #daebfa;
            border-color: #0F5389;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .05);
        }

        .mcr-cat-nav .mcr-icon {
            width: 56px;
            min-width: 56px;
            height: 56px;
            border-radius: 14px;
            background: #f3f6fc;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .25s ease;
        }

        .mcr-cat-nav .mcr-icon img {
            max-width: 28px;
            max-height: 28px;
            width: auto;
            height: auto;
            display: block;
            transition: filter .25s ease;
        }

        .mcr-cat-nav .mcr-item:hover .mcr-icon {
            background: #0F5389;
        }

        .mcr-cat-nav .mcr-item:hover .mcr-icon img {
            filter: brightness(0) invert(1);
        }

        .mcr-cat-nav .mcr-label {
            font-size: 19px;
            line-height: 1.25;
            font-weight: 600;
            color: #333333;
            transition: color .25s ease;
        }

        .mcr-cat-nav .mcr-item:hover .mcr-label {
            color: #0F5389;
        }

        .mcr-cat-nav .mcr-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: #ffffff;
            border: 1px solid #dddddd;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 3;
            transition: all .25s ease;
            padding: 0;
        }

        .mcr-cat-nav .mcr-arrow:hover {
            background: #0F5389;
            border-color: #0F5389;
        }

        .mcr-cat-nav .mcr-arrow svg {
            width: 18px;
            height: 18px;
            stroke: #1f1f1f;
            transition: stroke .25s ease;
        }

        .mcr-cat-nav .mcr-arrow:hover svg {
            stroke: #ffffff;
        }

        .mcr-cat-nav .mcr-prev {
            left: 0;
        }

        .mcr-cat-nav .mcr-next {
            right: 0;
        }

        .mcr-cat-nav .mcr-dots {
            margin-top: 18px;
            text-align: center;
        }

        .mcr-cat-nav .mcr-dot {
            display: inline-block;
            vertical-align: middle;
            margin: 0 4px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #cfcfcf;
            border: none;
            padding: 0;
            cursor: pointer;
            transition: all .25s ease;
        }

        .mcr-cat-nav .mcr-dot.mcr-active {
            background: #6b6b6b;
            transform: scale(1.15);
        }

        @media (max-width: 1199px) {
            .mcr-cat-nav .mcr-label {
                font-size: 17px;
            }

            .mcr-cat-nav .mcr-col {
                min-width: calc((100% - 32px) / 3);
                flex: 0 0 calc((100% - 32px) / 3);
            }
        }

        @media (max-width: 991px) {
            .mcr-cat-nav .mcr-wrap {
                padding: 0 44px;
            }

            .mcr-cat-nav .mcr-item {
                min-height: 78px;
                padding: 12px 14px;
            }

            .mcr-cat-nav .mcr-icon {
                width: 50px;
                min-width: 50px;
                height: 50px;
            }

            .mcr-cat-nav .mcr-label {
                font-size: 16px;
            }

            .mcr-cat-nav .mcr-arrow {
                width: 40px;
                height: 40px;
            }

            .mcr-cat-nav .mcr-col {
                min-width: calc((100% - 16px) / 2);
                flex: 0 0 calc((100% - 16px) / 2);
            }
        }

        @media (max-width: 767px) {
            .mcr-cat-nav {
                margin: 30px auto;
            }

            .mcr-cat-nav .mcr-wrap {
                padding: 0 44px;
            }

            .mcr-cat-nav .mcr-slider {
                gap: 8px;
            }

            .mcr-cat-nav .mcr-item {
                text-align: center;
                min-height: auto;
                border-radius: 12px;
                gap: 6px;
                padding: 16px 10px;
            }

            .mcr-cat-nav .mcr-icon {
                width: 40px;
                min-width: 40px;
                height: 40px;
                border-radius: 10px;
            }

            .mcr-cat-nav .mcr-icon img {
                max-width: 20px;
                max-height: 20px;
            }

            .mcr-cat-nav .mcr-label {
                font-size: 11px;
                line-height: 1.2;
                overflow: hidden;
                text-overflow: ellipsis;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                word-break: break-word;
            }

            .mcr-cat-nav .mcr-arrow {
                width: 30px;
                height: 30px;
            }

            .mcr-cat-nav .mcr-arrow svg {
                width: 12px;
                height: 12px;
            }

            .mcr-cat-nav .mcr-col {
                min-width: calc((100% - 1px) / 1);
                flex: 0 0 calc((100% - 16px) / 3);
                gap: 8px;
            }
        }
    </style>

        <button class="mcr-arrow mcr-next" type="button" aria-label="Próxima categoria">

        <div class="mcr-dots"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var root = document.querySelector('.mcr-cat-nav');
            if (!root) return;

            var slider = root.querySelector('.mcr-slider');
            var track = root.querySelector('.mcr-track');
            var prevBtn = root.querySelector('.mcr-prev');
            var nextBtn = root.querySelector('.mcr-next');
            var dotsWrap = root.querySelector('.mcr-dots');
            var cols = root.querySelectorAll('.mcr-col');
            var cur = 0;

            function getVis() {
                var w = window.innerWidth;
                if (w >= 1200) return 4;
                if (w >= 992) return 3;
                return 3;
            }

            function maxIdx() {
                return Math.max(0, cols.length - getVis());
            }

            function makeDots() {
                dotsWrap.innerHTML = '';
                var t = maxIdx() + 1;
                if (t <= 1) return;
                for (var i = 0; i < t; i++) {
                    var d = document.createElement('button');
                    d.type = 'button';
                    d.className = 'mcr-dot' + (i === cur ? ' mcr-active' : '');
                    d.setAttribute('aria-label', 'Página ' + (i + 1));
                    d.setAttribute('data-i', i);
                    d.addEventListener('click', function () {
                        goTo(parseInt(this.getAttribute('data-i')));
                    });
                    dotsWrap.appendChild(d);
                }
            }

            function updDots() {
                var ds = dotsWrap.querySelectorAll('.mcr-dot');
                for (var i = 0; i < ds.length; i++) {
                    if (i === cur) {
                        ds[i].classList.add('mcr-active');
                    } else {
                        ds[i].classList.remove('mcr-active');
                    }
                }
            }

            function goTo(idx) {
                var mx = maxIdx();
                if (idx < 0) idx = mx;
                if (idx > mx) idx = 0;
                cur = idx;
                var gap = window.innerWidth <= 767 ? 8 : 16;
                var cw = cols[0].offsetWidth + gap;
                slider.style.transform = 'translateX(-' + (cur * cw) + 'px)';
                updDots();
            }

            prevBtn.addEventListener('click', function (e) {
                e.preventDefault();
                e.stopPropagation();
                goTo(cur - 1);
            });

            nextBtn.addEventListener('click', function (e) {
                e.preventDefault();
                e.stopPropagation();
                goTo(cur + 1);
            });

            var sx = 0, drag = false;
            track.addEventListener('touchstart', function (e) {
                sx = e.touches[0].clientX;
                drag = true;
            }, { passive: true });
            track.addEventListener('touchend', function (e) {
                if (!drag) return;
                drag = false;
                var diff = e.changedTouches[0].clientX - sx;
                if (Math.abs(diff) > 40) goTo(cur + (diff < 0 ? 1 : -1));
            }, { passive: true });

            cur = 0;
            slider.style.transform = 'translateX(0)';
            makeDots();

            var rt;
            window.addEventListener('resize', function () {
                clearTimeout(rt);
                rt = setTimeout(function () {
                    if (cur > maxIdx()) cur = maxIdx();
                    goTo(cur);
                    makeDots();
                }, 150);
            });
        });
    </script>
</div>
