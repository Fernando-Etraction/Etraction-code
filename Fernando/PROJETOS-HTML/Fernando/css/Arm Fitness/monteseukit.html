<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Monte seu Kit | Arm Fitness</title>
    <style>
      :root {
        --kit-green: #2d8b3d;
        --kit-red: #e53935;
        --kit-black: #111111;
        --kit-gray: #6b7280;
        --kit-border: #e5e7eb;
        --kit-soft-green: #f0fdf4;
        --kit-soft-green-border: #bbf7d0;
        --kit-white: #ffffff;
        --kit-shadow: 0 10px 28px rgba(17, 17, 17, 0.08);
        --kit-radius: 12px;
        --kit-font:
          Inter, "DM Sans", system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f7f7f7;
        color: var(--kit-black);
        font-family: var(--kit-font);
      }

      .etraction-kit-builder {
        width: min(100%, 1080px);
        margin: 24px auto;
        padding: 16px;
        background: var(--kit-white);
        border: 1px solid var(--kit-border);
        border-radius: 18px;
        box-shadow: var(--kit-shadow);
      }

      .etraction-flash-offer {
        position: relative;
        overflow: hidden;
        border-radius: 16px;
        background: var(--kit-black);
        color: #fff;
        padding: 14px 14px 11px;
      }

      .etraction-flash-offer__top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .etraction-flash-badge,
      .etraction-discount-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        width: fit-content;
        border-radius: 999px;
        background: var(--kit-red);
        color: #fff;
        font-size: 11px;
        font-weight: 800;
        line-height: 1;
        letter-spacing: 0.04em;
        padding: 8px 10px;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .etraction-countdown {
        min-width: 92px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.06);
        padding: 7px 10px;
        font-variant-numeric: tabular-nums;
        text-align: center;
        font-weight: 800;
        letter-spacing: 0.04em;
      }

      .etraction-flash-offer__price-row {
        display: flex;
        align-items: flex-end;
        gap: 10px;
        flex-wrap: wrap;
      }

      .etraction-flash-price {
        font-size: clamp(30px, 7vw, 48px);
        font-weight: 900;
        letter-spacing: -0.04em;
        line-height: 0.95;
      }

      .etraction-flash-original {
        color: #a3a3a3;
        font-size: 15px;
        font-weight: 700;
        text-decoration: line-through;
        margin-bottom: 4px;
      }

      .etraction-flash-installments {
        margin-top: 8px;
        color: rgba(255, 255, 255, 0.78);
        font-size: 13px;
        font-weight: 500;
      }

      .etraction-flash-progress {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 4px;
        background: rgba(255, 255, 255, 0.12);
      }

      .etraction-flash-progress::before {
        content: "";
        display: block;
        width: 68%;
        height: 100%;
        background: var(--kit-red);
        animation: scarcityPulse 1.4s ease-in-out infinite alternate;
      }

      .etraction-kit-options {
        display: flex;
        gap: 10px;
        margin: 16px 0 14px;
        overflow-x: auto;
        padding: 2px 2px 6px;
        scroll-snap-type: x mandatory;
      }

      .etraction-kit-option {
        position: relative;
        min-width: 168px;
        flex: 1 0 168px;
        border: 1px solid var(--kit-border);
        border-radius: var(--kit-radius);
        background: #fff;
        padding: 16px 12px 12px;
        cursor: pointer;
        text-align: left;
        transition:
          border-color 0.18s ease,
          box-shadow 0.18s ease,
          transform 0.18s ease;
        scroll-snap-align: start;
      }

      .etraction-kit-option:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 18px rgba(17, 17, 17, 0.07);
      }

      .etraction-kit-option[aria-pressed="true"] {
        border: 2px solid var(--kit-black);
        padding: 15px 11px 11px;
      }

      .etraction-kit-option__popular {
        position: absolute;
        top: -10px;
        left: 50%;
        transform: translateX(-50%);
        border-radius: 999px;
        background: var(--kit-black);
        color: #fff;
        padding: 5px 9px;
        font-size: 10px;
        font-weight: 900;
        letter-spacing: 0.04em;
        white-space: nowrap;
      }

      .etraction-kit-option__name {
        display: block;
        font-size: 14px;
        font-weight: 800;
        margin-bottom: 7px;
      }

      .etraction-kit-option__price {
        display: block;
        font-size: 20px;
        font-weight: 900;
        letter-spacing: -0.03em;
      }

      .etraction-kit-option__badge {
        display: inline-flex;
        margin-top: 8px;
        border-radius: 999px;
        background: #fee2e2;
        color: #b91c1c;
        padding: 5px 8px;
        font-size: 11px;
        font-weight: 800;
      }

      .etraction-chips-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        margin: 10px 0 14px;
      }

      .etraction-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .etraction-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        max-width: 100%;
        border: 1px solid var(--kit-border);
        border-radius: 999px;
        background: #fff;
        padding: 6px 9px 6px 6px;
        cursor: pointer;
        transition:
          border-color 0.18s ease,
          box-shadow 0.18s ease;
      }

      .etraction-chip[aria-pressed="true"] {
        border: 2px solid var(--kit-black);
        padding: 5px 8px 5px 5px;
      }

      .etraction-chip__img {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        object-fit: cover;
        background: #f3f4f6;
        border: 1px solid rgba(17, 17, 17, 0.08);
        flex: 0 0 auto;
      }

      .etraction-chip__body {
        display: flex;
        flex-direction: column;
        min-width: 0;
        line-height: 1.08;
      }

      .etraction-chip__color {
        max-width: 132px;
        overflow: hidden;
        color: var(--kit-black);
        font-size: 12px;
        font-weight: 800;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .etraction-chip__size {
        color: var(--kit-gray);
        font-size: 11px;
        font-weight: 600;
      }

      .etraction-chip__check {
        color: #16a34a;
        font-size: 14px;
        font-weight: 900;
      }

      .etraction-kit-saving {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 6px;
        color: #16803a;
        font-size: 14px;
        font-weight: 900;
        white-space: nowrap;
      }

      .etraction-config-card {
        border: 1px solid var(--kit-soft-green-border);
        border-radius: 16px;
        background: var(--kit-soft-green);
        padding: 14px;
        box-shadow: 0 6px 16px rgba(45, 139, 61, 0.06);
      }

      .etraction-config-card__header {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: center;
        margin-bottom: 8px;
      }

      .etraction-config-title {
        display: inline-flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        min-width: 0;
        font-weight: 900;
      }

      .etraction-config-index {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: var(--kit-black);
        color: #fff;
        font-size: 12px;
        font-weight: 900;
      }

      .etraction-ready-badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        background: #dcfce7;
        color: #166534;
        padding: 5px 8px;
        font-size: 12px;
        font-weight: 900;
      }

      .etraction-selected-counter {
        color: var(--kit-gray);
        font-size: 12px;
        font-weight: 800;
      }

      .etraction-config-message {
        margin: 0 0 14px;
        color: #166534;
        font-size: 14px;
        font-weight: 800;
      }

      .etraction-config-body {
        display: grid;
        gap: 14px;
      }

      .etraction-preview {
        overflow: hidden;
        border: 1px solid var(--kit-soft-green-border);
        border-radius: 14px;
        background: #fff;
      }

      .etraction-preview__image {
        display: block;
        width: 100%;
        aspect-ratio: 4 / 5;
        object-fit: cover;
        background:
          radial-gradient(
            circle at 28% 20%,
            rgba(45, 139, 61, 0.1),
            transparent 28%
          ),
          linear-gradient(135deg, #f8fafc, #ecfdf5);
      }

      .etraction-preview__label {
        display: flex;
        justify-content: center;
        gap: 5px;
        padding: 10px 8px;
        border-top: 1px solid #f3f4f6;
        color: var(--kit-gray);
        font-size: 12px;
        font-weight: 800;
        text-align: center;
      }

      .etraction-config-controls {
        display: grid;
        align-content: start;
        gap: 16px;
      }

      .etraction-control-block__label {
        display: block;
        margin-bottom: 8px;
        color: var(--kit-black);
        font-size: 13px;
        font-weight: 900;
      }

      .etraction-swatches {
        display: grid;
        grid-template-columns: repeat(8, minmax(34px, 1fr));
        gap: 8px;
        max-height: 112px;
        overflow: auto;
        padding-right: 2px;
      }

      .etraction-swatch {
        position: relative;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        min-width: 34px;
        aspect-ratio: 1;
        border: 1px solid var(--kit-border);
        border-radius: 999px;
        background: #fff;
        cursor: pointer;
      }

      .etraction-swatch::before {
        content: "";
        width: 22px;
        height: 22px;
        border-radius: 999px;
        background: var(--swatch);
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.1);
      }

      .etraction-swatch[aria-pressed="true"] {
        border: 2px solid var(--kit-black);
      }

      .etraction-swatch[aria-pressed="true"]::after {
        content: "";
        position: absolute;
        inset: -4px;
        border: 1px solid var(--kit-black);
        border-radius: 999px;
      }

      .etraction-selected-product-info {
        min-height: 34px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.72);
        padding: 9px 10px;
        color: var(--kit-gray);
        font-size: 12px;
        line-height: 1.35;
      }

      .etraction-selected-product-info strong {
        color: var(--kit-black);
      }

      .etraction-sizes {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .etraction-size-btn {
        min-width: 48px;
        height: 40px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        background: #fff;
        color: var(--kit-black);
        cursor: pointer;
        font-size: 13px;
        font-weight: 900;
        transition:
          background 0.15s ease,
          color 0.15s ease,
          border-color 0.15s ease;
      }

      .etraction-size-btn[aria-pressed="true"] {
        border-color: var(--kit-black);
        background: var(--kit-black);
        color: #fff;
      }

      .etraction-next-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 48px;
        border: 0;
        border-radius: 12px;
        background: var(--kit-black);
        color: #fff;
        cursor: pointer;
        font-size: 15px;
        font-weight: 900;
      }

      .etraction-next-btn:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .etraction-next-btn.etraction-is-ready {
        animation: subtlePulse 1.1s ease-in-out infinite;
      }

      .etraction-footer-summary {
        display: grid;
        gap: 10px;
        margin-top: 14px;
      }

      .etraction-shipping-line {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #16803a;
        font-size: 14px;
        font-weight: 900;
      }

      .etraction-price-footer {
        display: grid;
        grid-template-columns: 1fr;
        gap: 4px;
        align-items: end;
        border-top: 1px solid var(--kit-border);
        padding-top: 12px;
      }

      .etraction-price-footer__main {
        display: flex;
        align-items: baseline;
        gap: 8px;
        flex-wrap: wrap;
      }

      .etraction-price-footer__original {
        color: var(--kit-gray);
        font-size: 14px;
        font-weight: 700;
        text-decoration: line-through;
      }

      .etraction-price-footer__final {
        color: var(--kit-black);
        font-size: clamp(30px, 6vw, 42px);
        font-weight: 950;
        letter-spacing: -0.05em;
        line-height: 1;
      }

      .etraction-price-footer__installments {
        color: var(--kit-gray);
        font-size: 13px;
        font-weight: 700;
      }

      .etraction-add-cart-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        min-height: 56px;
        border: 0;
        border-radius: 12px;
        background: var(--kit-green);
        color: #fff;
        cursor: pointer;
        font-size: 16px;
        font-weight: 950;
        letter-spacing: -0.01em;
        box-shadow: 0 12px 24px rgba(45, 139, 61, 0.22);
        transition:
          filter 0.16s ease,
          transform 0.16s ease,
          opacity 0.16s ease;
      }

      .etraction-add-cart-btn:not(:disabled):hover {
        filter: brightness(0.96);
        transform: translateY(-1px);
      }

      .etraction-add-cart-btn:disabled {
        cursor: not-allowed;
        opacity: 0.45;
        box-shadow: none;
      }

      .etraction-feedback {
        min-height: 20px;
        color: #166534;
        font-size: 13px;
        font-weight: 800;
        text-align: center;
      }

      .etraction-sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @keyframes scarcityPulse {
        from {
          opacity: 0.75;
          width: 58%;
        }
        to {
          opacity: 1;
          width: 78%;
        }
      }

      @keyframes subtlePulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(17, 17, 17, 0.18);
        }
        50% {
          box-shadow: 0 0 0 8px rgba(17, 17, 17, 0.08);
        }
      }

      @media (min-width: 720px) {
        .etraction-kit-builder {
          padding: 20px;
        }

        .etraction-chips-row {
          grid-template-columns: 1fr auto;
          align-items: center;
        }

        .etraction-config-body {
          grid-template-columns: minmax(190px, 260px) 1fr;
        }

        .etraction-swatches {
          grid-template-columns: repeat(12, 34px);
          max-height: 84px;
        }

        .etraction-price-footer {
          grid-template-columns: 1fr auto;
        }

        .etraction-price-footer__installments {
          text-align: right;
        }
      }

      @media (min-width: 980px) {
        .etraction-kit-options {
          overflow: visible;
        }

        .etraction-kit-option {
          min-width: 0;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="etraction-kit-builder" data-kit-builder>
      <section
        class="etraction-flash-offer"
        aria-label="Oferta relâmpago do kit"
      >
        <div class="etraction-flash-offer__top">
          <span class="etraction-flash-badge" aria-label="Oferta relâmpago"
            >⚡ OFERTA RELÂMPAGO</span
          >
          <span class="etraction-countdown" data-countdown aria-live="polite"
            >00:00:00</span
          >
        </div>

        <div class="etraction-flash-offer__price-row">
          <span class="etraction-discount-badge" data-discount-badge>-0%</span>
          <span class="etraction-flash-price" data-flash-price>R$ 0,00</span>
          <span class="etraction-flash-original" data-flash-original
            >R$ 0,00</span
          >
        </div>

        <div class="etraction-flash-installments" data-flash-installments>
          10x de R$ 0,00 sem juros
        </div>
        <div class="etraction-flash-progress" aria-hidden="true"></div>
      </section>

      <section
        class="etraction-kit-options"
        data-kit-options
        aria-label="Escolha a quantidade de peças do kit"
      ></section>

      <section
        class="etraction-chips-row"
        aria-label="Resumo das peças configuradas"
      >
        <div class="etraction-chips" data-chips></div>
        <div class="etraction-kit-saving" data-kit-saving>
          ★ Economia: R$ 0,00
        </div>
      </section>

      <section
        class="etraction-config-card"
        aria-label="Configurador da peça atual"
      >
        <header class="etraction-config-card__header">
          <div class="etraction-config-title">
            <span class="etraction-config-index" data-current-number>1</span>
            <span data-current-title>Conjunto 1 de 3</span>
            <span class="etraction-ready-badge" data-ready-badge hidden
              >✓ Pronto</span
            >
          </div>
          <span class="etraction-selected-counter" data-selected-counter
            >0/3 selecionadas</span
          >
        </header>

        <p class="etraction-config-message" data-config-message>
          Configure o próximo conjunto
        </p>

        <div class="etraction-config-body">
          <figure class="etraction-preview">
            <img
              class="etraction-preview__image"
              data-preview-image
              alt="Preview do produto selecionado"
            />
            <figcaption class="etraction-preview__label" data-preview-label>
              Cor · Tamanho
            </figcaption>
          </figure>

          <div class="etraction-config-controls">
            <div class="etraction-control-block">
              <label class="etraction-control-block__label" id="color-label"
                >Cor / produto</label
              >
              <div
                class="etraction-swatches"
                data-swatches
                role="group"
                aria-labelledby="color-label"
              ></div>
              <div
                class="etraction-selected-product-info"
                data-selected-product-info
              >
                Selecione uma cor para visualizar o produto.
              </div>
            </div>

            <div class="etraction-control-block">
              <span class="etraction-control-block__label" id="size-label"
                >Tamanho</span
              >
              <div
                class="etraction-sizes"
                data-sizes
                role="group"
                aria-labelledby="size-label"
              ></div>
            </div>

            <button
              type="button"
              class="etraction-next-btn"
              data-next-btn
              aria-label="Avançar para a próxima peça"
            >
              Próximo Conjunto →
            </button>
          </div>
        </div>
      </section>

      <footer class="etraction-footer-summary">
        <div class="etraction-shipping-line">
          🚚 Frete grátis para todo o Brasil
        </div>

        <div class="etraction-price-footer">
          <div class="etraction-price-footer__main">
            <span class="etraction-price-footer__original" data-footer-original
              >R$ 0,00</span
            >
            <span class="etraction-price-footer__final" data-footer-final
              >R$ 0,00</span
            >
          </div>
          <div
            class="etraction-price-footer__installments"
            data-footer-installments
          >
            10x de R$ 0,00 sem juros
          </div>
        </div>

        <button
          type="button"
          class="etraction-add-cart-btn"
          data-add-cart
          disabled
          aria-label="Adicionar kit ao carrinho"
        >
          🛒 Adicionar ao Carrinho
        </button>
        <div
          class="etraction-feedback"
          data-feedback
          role="status"
          aria-live="polite"
        ></div>
      </footer>
    </main>

    <script>
      /**
       * Monte seu Kit — Bundle Builder progressivo
       * Stack: HTML + CSS + JavaScript puro.
       * Dados extraídos da planilha de relacionamento de produtos Arm Fitness.
       *
       * Integração real:
       * - Substitua o conteúdo da função addToCart(payload) pelo endpoint/API da loja.
       * - O payload já traz sku, produto, cor, tamanho, preço e URL de cada peça.
       */

        {

        },
        {
          sku: "1FC7KS149",
          name: "Conjunto Fitness Short PowerSlim + Top Alça Digital Açaí",
          price: 109.0,

      let state = loadState();

      function currency(value) {
        return new Intl.NumberFormat("pt-BR", {
          style: "currency",
          currency: "BRL",
        }).format(value || 0);
      }

      function createEmptyItem(index) {
        return {
          id: `kit-item-${index + 1}`,
          productSku: "",
          tamanho: "",
          completo: false,
        };
      }

      function normalizeItems(items, qty) {
        const next = Array.from({ length: qty }, (_, index) => {
          const existing = items?.[index];
          if (!existing) return createEmptyItem(index);

          return {
            id: existing.id || `kit-item-${index + 1}`,
            productSku: existing.productSku || "",
            tamanho: existing.tamanho || "",
            completo: Boolean(existing.productSku && existing.tamanho),
          };
        });

        return next;
      }

      function loadState() {
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
          if (saved && [1, 2, 3].includes(saved.kitQty)) {
            return {
              kitQty: saved.kitQty,
              activeIndex: Math.min(saved.activeIndex || 0, saved.kitQty - 1),
              items: normalizeItems(saved.items || [], saved.kitQty),
            };
          }
        } catch (error) {
          console.warn(
            "Não foi possível carregar o estado salvo do kit.",
            error,
          );
        }

        return {
          kitQty: 3,
          activeIndex: 0,
          items: normalizeItems([], 3),
        };
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function productBySku(sku) {
        return PRODUCTS.find((product) => product.sku === sku);
      }

      function itemComplete(item) {
        return Boolean(item.productSku && item.tamanho);
      }

      function selectedCount() {
        return state.items.filter(itemComplete).length;
      }

      function allComplete() {
        return state.items.every(itemComplete);
      }

      function getSlotPrice(item) {
        const product = productBySku(item.productSku);
        return product?.price || BASE_UNIT_PRICE;
      }

      function activeKit() {
        return (
          KIT_OPTIONS.find((kit) => kit.qty === state.kitQty) || KIT_OPTIONS[2]
        );
      }

      function priceSummary() {
        const kit = activeKit();
        const original = state.items.reduce(
          (sum, item) => sum + getSlotPrice(item),
          0,
        );
        const discountValue = original * kit.discount;
        const final = original - discountValue;

        return {
          original,
          final,
          discountValue,
          discountPercent: Math.round(kit.discount * 100),
          installments: final / 10,
        };
      }

      function kitOptionPrice(qty, discount) {
        const original = BASE_UNIT_PRICE * qty;
        return original * (1 - discount);
      }

      function getRecommendationAnchorSku() {
        const previous = state.items[state.activeIndex - 1]?.productSku;
        const first = state.items[0]?.productSku;
        const active = state.items[state.activeIndex]?.productSku;
        return previous || first || active || "";
      }

      function getOrderedProducts() {
        const anchor = getRecommendationAnchorSku();
        const related = RELATED_BY_SKU[anchor] || [];
        const relatedSet = new Set(related);

        const relatedProducts = related.map(productBySku).filter(Boolean);

        const remaining = PRODUCTS.filter(
          (product) => !relatedSet.has(product.sku),
        ).sort((a, b) => {
          const scoreA = (a.rating || 0) * 1000 + (a.reviews || 0);
          const scoreB = (b.rating || 0) * 1000 + (b.reviews || 0);
          return scoreB - scoreA;
        });

        return [...relatedProducts, ...remaining];
      }

      function setKitQty(qty) {
        state.kitQty = qty;
        state.items = normalizeItems(state.items, qty);
        state.activeIndex = Math.min(state.activeIndex, qty - 1);
        saveState();
        render();
      }

      function setActiveIndex(index) {
        state.activeIndex = Math.max(0, Math.min(index, state.kitQty - 1));
        saveState();
        render();
      }

      function selectProduct(sku) {
        const item = state.items[state.activeIndex];
        item.productSku = sku;
        item.completo = itemComplete(item);
        saveState();
        render();
      }

      function selectSize(size) {
        const item = state.items[state.activeIndex];
        item.tamanho = size;
        item.completo = itemComplete(item);
        saveState();
        render();
      }

      function goNext() {
        const isLast = state.activeIndex === state.items.length - 1;
        const currentItem = state.items[state.activeIndex];

        if (!itemComplete(currentItem)) return;

        if (isLast) {
          state.activeIndex = state.items.findIndex(
            (item) => !itemComplete(item),
          );
          if (state.activeIndex === -1)
            state.activeIndex = state.items.length - 1;
        } else {
          state.activeIndex += 1;
        }

        saveState();
        render();
      }

      function payload() {
        const summary = priceSummary();

        return {
          kit: {
            quantidade: state.kitQty,
            descontoPercentual: activeKit().discount,
            precoOriginal: summary.original,
            precoFinal: summary.final,
            economia: summary.discountValue,
          },
          itens: state.items.map((item, index) => {
            const product = productBySku(item.productSku);
            return {
              ordem: index + 1,
              sku: product?.sku,
              produto: product?.name,
              cor: product?.color,
              tamanho: item.tamanho,
              precoUnitario: product?.price,
              url: product?.url,
              imagem: product?.image,
            };
          }),
        };
      }

      function addToCart() {
        if (!allComplete()) {
          els.feedback.textContent =
            "Configure cor/produto e tamanho de todas as peças antes de adicionar.";
          return;
        }

        const detail = payload();

        /**
         * Integração recomendada:
         * document.dispatchEvent permite conectar o componente à camada da loja sem acoplar o layout ao checkout.
         * Exemplo Magazord: escute este evento e chame o método/end-point de carrinho com os SKUs derivados.
         */
        document.dispatchEvent(
          new CustomEvent("monteSeuKit:addToCart", { detail }),
        );
        console.log("Payload do kit:", detail);

        els.feedback.textContent =
          "Kit completo. Payload enviado para integração do carrinho.";
      }

      function renderKitOptions() {
        els.kitOptions.innerHTML = KIT_OPTIONS.map(
          (kit) => `
        <button
          type="button"
          class="etraction-kit-option"
          aria-pressed="${state.kitQty === kit.qty}"
          aria-label="Selecionar ${kit.name}"
          data-kit-qty="${kit.qty}"
        >
          ${kit.popular ? '<span class="etraction-kit-option__popular">MAIS POPULAR</span>' : ""}
          <span class="etraction-kit-option__name">${kit.name}</span>
          <span class="etraction-kit-option__price">${currency(kitOptionPrice(kit.qty, kit.discount))}</span>
          ${kit.badge ? `<span class="etraction-kit-option__badge">${kit.badge}</span>` : ""}
        </button>
      `,
        ).join("");

        els.kitOptions.querySelectorAll("[data-kit-qty]").forEach((button) => {
          button.addEventListener("click", () =>
            setKitQty(Number(button.dataset.kitQty)),
          );
        });
      }

      function renderChips() {
        els.chips.innerHTML = state.items
          .map((item, index) => {
            const product = productBySku(item.productSku);
            const complete = itemComplete(item);
            const img = product?.image || "";
            const color = product?.color || `Peça ${index + 1}`;
            const size = item.tamanho
              ? `Tam. ${item.tamanho}`
              : "Tamanho pendente";

            return `
          <button
            type="button"
            class="etraction-chip"
            aria-pressed="${index === state.activeIndex}"
            aria-label="Editar peça ${index + 1}"
            data-chip-index="${index}"
          >
            <img class="etraction-chip__img" src="${img}" alt="" loading="lazy" onerror="this.style.visibility='hidden'" />
            <span class="etraction-chip__body">
              <span class="etraction-chip__color">${color}</span>
              <span class="etraction-chip__size">${size}</span>
            </span>
            <span class="etraction-chip__check" aria-hidden="true">${complete ? "✓" : ""}</span>
          </button>
        `;
          })
          .join("");

        els.chips.querySelectorAll("[data-chip-index]").forEach((button) => {
          button.addEventListener("click", () =>
            setActiveIndex(Number(button.dataset.chipIndex)),
          );
        });
      }

      function renderCurrentConfigurator() {
        const item = state.items[state.activeIndex];
        const product = productBySku(item.productSku);
        const complete = itemComplete(item);
        const count = selectedCount();

        els.currentNumber.textContent = String(state.activeIndex + 1);
        els.currentTitle.textContent = `Conjunto ${state.activeIndex + 1} de ${state.kitQty}`;
        els.readyBadge.hidden = !complete;
        els.selectedCounter.textContent = `${count}/${state.kitQty} selecionadas`;
        els.configMessage.textContent = allComplete()
          ? "✓ Kit completo! Adicione ao carrinho"
          : "Configure o próximo conjunto";

        els.previewImage.src = product?.image || "";
        els.previewImage.alt = product
          ? `Preview de ${product.name}`
          : "Preview do produto selecionado";
        els.previewLabel.textContent = `${product?.color || "Cor"} · ${item.tamanho ? `Tam. ${item.tamanho}` : "Tamanho"}`;

        els.selectedProductInfo.innerHTML = product
          ? `<strong>${product.color}</strong> · ${product.shortName || product.name}<br><span>SKU ${product.sku} · ${currency(product.price)} · ${product.bottom}</span>`
          : "Selecione uma cor para visualizar o produto.";

        const orderedProducts = getOrderedProducts();

        els.swatches.innerHTML = orderedProducts
          .map(
            (option) => `
        <button
          type="button"
          class="etraction-swatch"
          style="--swatch: ${option.colorHex}"
          aria-pressed="${option.sku === item.productSku}"
          aria-label="Selecionar cor ${option.color}: ${option.name}"
          title="${option.color} · ${option.name}"
          data-product-sku="${option.sku}"
        ></button>
      `,
          )
          .join("");

        els.swatches
          .querySelectorAll("[data-product-sku]")
          .forEach((button) => {
            button.addEventListener("click", () =>
              selectProduct(button.dataset.productSku),
            );
          });

        els.sizes.innerHTML = SIZES.map(
          (size) => `
        <button
          type="button"
          class="etraction-size-btn"
          aria-pressed="${size === item.tamanho}"
          aria-label="Selecionar tamanho ${size}"
          data-size="${size}"
        >${size}</button>
      `,
        ).join("");

        els.sizes.querySelectorAll("[data-size]").forEach((button) => {
          button.addEventListener("click", () =>
            selectSize(button.dataset.size),
          );
        });

        const isLast = state.activeIndex === state.items.length - 1;
        els.nextBtn.hidden = allComplete() && isLast;
        els.nextBtn.disabled = !complete;
        els.nextBtn.classList.toggle(
          "etraction-is-ready",
          complete && !allComplete(),
        );
        els.nextBtn.textContent = isLast ? "Concluir" : "Próximo Conjunto →";
        els.nextBtn.setAttribute(
          "aria-label",
          isLast
            ? "Concluir configuração do kit"
            : "Avançar para a próxima peça",
        );
      }

      function renderPrices() {
        const summary = priceSummary();
        const discountLabel =
          summary.discountPercent > 0
            ? `-${summary.discountPercent}%`
            : "OFERTA";

        els.discountBadge.textContent = discountLabel;
        els.flashPrice.textContent = currency(summary.final);
        els.flashOriginal.textContent = currency(summary.original);
        els.flashInstallments.textContent = `10x de ${currency(summary.installments)} sem juros`;
        els.kitSaving.textContent = `★ Economia: -${currency(summary.discountValue)}`;
        els.footerOriginal.textContent = currency(summary.original);
        els.footerFinal.textContent = currency(summary.final);
        els.footerInstallments.textContent = `10x de ${currency(summary.installments)} sem juros`;
        els.addCart.disabled = !allComplete();
      }

      function render() {
        renderKitOptions();
        renderChips();
        renderCurrentConfigurator();
        renderPrices();
      }

      function initTimer() {
        const now = Date.now();
        let deadline = Number(localStorage.getItem(TIMER_KEY));

        if (!deadline || Number.isNaN(deadline) || deadline <= now) {
          deadline = now + OFFER_DURATION_MS;
          localStorage.setItem(TIMER_KEY, String(deadline));
        }

        function tick() {
          const remaining = Math.max(0, deadline - Date.now());
          const hours = Math.floor(remaining / 1000 / 60 / 60);
          const minutes = Math.floor((remaining / 1000 / 60) % 60);
          const seconds = Math.floor((remaining / 1000) % 60);

          els.countdown.textContent = [hours, minutes, seconds]
            .map((unit) => String(unit).padStart(2, "0"))
            .join(":");

          if (remaining <= 0) {
            deadline = Date.now() + OFFER_DURATION_MS;
            localStorage.setItem(TIMER_KEY, String(deadline));
          }
        }

        tick();
        setInterval(tick, 1000);
      }

      els.nextBtn.addEventListener("click", goNext);
      els.addCart.addEventListener("click", addToCart);

      initTimer();
      render();
    </script>
  </body>
</html>
