<style>
  .area-buy-product #button-measure-table {
    display: none !important;
  }

  .etc-sizebay,
  .etc-sizebay * {
    box-sizing: border-box;
  }

  .etc-sizebay {
    --etc-bg: #f7f2ee;
    --etc-white: #ffffff;
    --etc-text: #1d1d1b;
    --etc-muted: #5f5b57;
    --etc-soft: #eef3ea;
    --etc-border: #d9d4ce;
    --etc-green: #627b53;
    --etc-green-dark: #49663d;
    --etc-black: #1d1d1b;
  }

  .etc-sizebay__trigger {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: fit-content;
    min-height: 38px;
    margin: 18px 0;
    padding: 10px 15px;
    background: var(--etc-white);
    color: var(--etc-black);
    border: 1px solid var(--etc-border);
    border-radius: 999px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 800;
    line-height: 1;
    cursor: pointer;
    transition: 0.2s ease;
  }

  .etc-sizebay__trigger:hover {
    border-color: var(--etc-green);
    background: var(--etc-soft);
    color: var(--etc-green-dark);
  }

  .etc-sizebay__trigger svg {
    width: 18px;
    height: 18px;
    display: block;
  }

  .etc-sizebay__dialog {
    width: min(1040px, calc(100vw - 28px));
    max-height: min(850px, calc(100vh - 36px));
    padding: 0;
    border: 0;
    border-radius: 24px;
    background: var(--etc-bg);
    color: var(--etc-text);
    overflow: hidden;
    font-family: inherit;
  }

  .etc-sizebay__dialog::backdrop {
    background: rgba(29, 29, 27, 0.56);
  }

  .etc-sizebay__content {
    position: relative;
    display: grid;
    grid-template-columns: 39% 61%;
    min-height: 650px;
    max-height: min(850px, calc(100vh - 36px));
    overflow: hidden;
    background: var(--etc-bg);
  }

  .etc-sizebay__content.is-without-image {
    grid-template-columns: 1fr;
    min-height: auto;
  }

  .etc-sizebay__content.is-without-image .etc-sizebay__main {
    max-width: 720px;
    margin: 0 auto;
    width: 100%;
  }

  .etc-sizebay__media {
    position: relative;
    width: 100%;
    height: 100%;
    min-height: 650px;
    background: #ebe6df;
    overflow: hidden;
    display: none;
  }

  .etc-sizebay__media.is-visible {
    display: block;
  }

  .etc-sizebay__media img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    object-position: center top;
  }

  .etc-sizebay__media::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.02),
      rgba(73, 102, 61, 0.14)
    );
    pointer-events: none;
  }

  .etc-sizebay__main {
    position: relative;
    padding: 34px 34px 28px;
    overflow-y: auto;
    max-height: min(850px, calc(100vh - 36px));
    background: var(--etc-bg);
  }

  .etc-sizebay__close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 34px;
    height: 34px;
    border: 1px solid var(--etc-border);
    border-radius: 50%;
    background: var(--etc-white);
    color: var(--etc-black);
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    z-index: 4;
  }

  .etc-sizebay__close:hover {
    border-color: var(--etc-green);
    color: var(--etc-green-dark);
  }

  .etc-sizebay__header {
    margin: 0 44px 22px 0;
    text-align: left;
  }

  .etc-sizebay__eyebrow {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
    padding: 6px 12px;
    border: 1px solid rgba(98, 123, 83, 0.25);
    border-radius: 999px;
    background: var(--etc-white);
    color: var(--etc-green-dark);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .etc-sizebay__title {
    display: block;
    margin: 0 0 8px;
    color: var(--etc-green);
    font-size: 31px;
    font-weight: 900;
    line-height: 1.08;
    letter-spacing: -0.02em;
  }

  .etc-sizebay__subtitle {
    display: block;
    max-width: 500px;
    margin: 0;
    color: var(--etc-muted);
    font-size: 13px;
    line-height: 1.5;
  }

  .etc-sizebay__tabs {
    display: flex;
    justify-content: flex-start;
    gap: 8px;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }

  .etc-sizebay__tab {
    min-height: 36px;
    padding: 9px 14px;
    border: 1px solid var(--etc-border);
    border-radius: 999px;
    background: var(--etc-white);
    color: var(--etc-black);
    font-size: 12px;
    font-weight: 900;
    cursor: pointer;
    transition: 0.2s ease;
  }

  .etc-sizebay__tab:hover {
    border-color: var(--etc-green);
    color: var(--etc-green-dark);
  }

  .etc-sizebay__tab.is-active {
    background: var(--etc-green);
    color: var(--etc-white);
    border-color: var(--etc-green);
  }

  .etc-sizebay__panel {
    display: none;
  }

  .etc-sizebay__panel.is-active {
    display: block;
  }

  .etc-sizebay__finder {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    align-items: start;
  }

  .etc-sizebay__card {
    border: 1px solid var(--etc-border);
    border-radius: 20px;
    padding: 18px;
    background: var(--etc-white);
  }

  .etc-sizebay__card-title {
    display: block;
    margin-bottom: 14px;
    color: var(--etc-black);
    font-size: 15px;
    font-weight: 900;
    letter-spacing: -0.01em;
  }

  .etc-sizebay__fields {
    display: grid;
    gap: 10px;
  }

  .etc-sizebay__field {
    display: grid;
    gap: 6px;
  }

  .etc-sizebay__field label {
    color: var(--etc-black);
    font-size: 12px;
    font-weight: 900;
  }

  .etc-sizebay__field input {
    width: 100%;
    min-height: 42px;
    padding: 10px 12px;
    border: 1px solid var(--etc-border);
    border-radius: 12px;
    background: #fbfaf8;
    color: var(--etc-black);
    font-size: 14px;
    outline: none;
  }

  .etc-sizebay__field input:focus {
    border-color: var(--etc-green);
    background: var(--etc-white);
  }

  .etc-sizebay__helper {
    display: block;
    margin-top: 9px;
    color: var(--etc-muted);
    font-size: 11px;
    line-height: 1.45;
  }

  .etc-sizebay__button {
    width: 100%;
    min-height: 44px;
    margin-top: 14px;
    border: 0;
    border-radius: 999px;
    background: var(--etc-green-dark);
    color: var(--etc-white);
    font-size: 14px;
    font-weight: 900;
    cursor: pointer;
    transition: 0.2s ease;
  }

  .etc-sizebay__button:hover {
    background: var(--etc-black);
  }

  .etc-sizebay__result {
    display: grid;
    gap: 12px;
  }

  .etc-sizebay__result-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 220px;
    padding: 18px;
    border: 1px dashed var(--etc-border);
    border-radius: 16px;
    background: #fbfaf8;
    color: var(--etc-muted);
    text-align: center;
    font-size: 13px;
    line-height: 1.5;
  }

  .etc-sizebay__result-box {
    display: none;
    border: 1px solid var(--etc-border);
    border-radius: 20px;
    overflow: hidden;
    background: var(--etc-white);
  }

  .etc-sizebay__result-head {
    padding: 20px 18px;
    background: var(--etc-soft);
    color: var(--etc-black);
    text-align: center;
    border-bottom: 1px solid var(--etc-border);
  }

  .etc-sizebay__result-label {
    display: block;
    color: var(--etc-muted);
    font-size: 12px;
    font-weight: 800;
  }

  .etc-sizebay__result-size {
    display: block;
    margin-top: 4px;
    color: var(--etc-green-dark);
    font-size: 48px;
    font-weight: 900;
    line-height: 1;
  }

  .etc-sizebay__result-body {
    padding: 16px;
  }

  .etc-sizebay__result-text {
    display: block;
    margin-bottom: 12px;
    color: #333;
    font-size: 13px;
    line-height: 1.45;
    text-align: center;
  }

  .etc-sizebay__score-list {
    display: grid;
    gap: 0;
    margin: 0;
    padding: 0;
    list-style: none;
  }

  .etc-sizebay__score-list li {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 9px 0;
    border-top: 1px solid #ece7df;
    color: #444;
    font-size: 12px;
  }

  .etc-sizebay__score-list strong {
    color: var(--etc-green-dark);
  }

  .etc-sizebay__table-wrap {
    width: 100%;
    overflow-x: auto;
    padding: 4px;
    border: 1px solid var(--etc-border);
    border-radius: 20px;
    background: var(--etc-white);
  }

  .etc-sizebay__table {
    width: 100%;
    border-collapse: collapse;
    min-width: 560px;
    font-size: 14px;
  }

  .etc-sizebay__table th,
  .etc-sizebay__table td {
    padding: 13px 10px;
    border: 0;
    border-bottom: 1px solid #ece7df;
    text-align: center;
  }

  .etc-sizebay__table th {
    background: transparent;
    color: var(--etc-black);
    font-weight: 900;
    font-size: 13px;
  }

  .etc-sizebay__table td {
    color: var(--etc-black);
    font-weight: 500;
  }

  .etc-sizebay__table td:first-child {
    font-weight: 900;
  }

  .etc-sizebay__table tbody tr:last-child td {
    border-bottom: 0;
  }

  .etc-sizebay__note {
    display: block;
    margin-top: 12px;
    color: var(--etc-muted);
    font-size: 11px;
    text-align: center;
  }

  .etc-sizebay__models {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .etc-sizebay__model {
    display: flex;
    gap: 12px;
    padding: 14px;
    border: 1px solid var(--etc-border);
    border-radius: 18px;
    background: var(--etc-white);
  }

  .etc-sizebay__model-icon {
    flex: 0 0 38px;
    width: 38px;
    height: 38px;
    border: 1px solid rgba(98, 123, 83, 0.25);
    border-radius: 999px;
    background: var(--etc-soft);
    display: grid;
    place-items: center;
    color: var(--etc-green-dark);
    font-size: 16px;
    font-weight: 900;
  }

  .etc-sizebay__model strong {
    display: block;
    margin-bottom: 4px;
    color: var(--etc-black);
    font-size: 13px;
    line-height: 1.2;
  }

  .etc-sizebay__model span {
    display: block;
    color: var(--etc-muted);
    font-size: 12px;
    line-height: 1.4;
  }

  .etc-sizebay__whatsapp {
    display: block;
    margin-top: 18px;
    padding: 14px;
    border-radius: 18px;
    background: var(--etc-white);
    border: 1px solid var(--etc-border);
    text-align: center;
    color: var(--etc-black);
    font-size: 13px;
    line-height: 1.45;
  }

  .etc-sizebay__whatsapp strong {
    display: block;
    margin-bottom: 3px;
    color: var(--etc-black);
    font-size: 14px;
    font-weight: 900;
  }

  .etc-sizebay__whatsapp span {
    color: var(--etc-green);
    font-weight: 900;
  }

  @media (max-width: 980px) {
    .etc-sizebay__content {
      grid-template-columns: 35% 65%;
    }

    .etc-sizebay__finder {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 768px) {
    .etc-sizebay__dialog {
      width: calc(100vw - 18px);
      border-radius: 18px;
    }

    .etc-sizebay__content {
      display: flex;
      flex-direction: column;
      min-height: 0;
      max-height: min(850px, calc(100vh - 36px));
      overflow-y: auto;
    }

    .etc-sizebay__media {
      width: 100%;
      height: 265px;
      min-height: 265px;
      flex: 0 0 265px;
    }

    .etc-sizebay__media img {
      object-fit: cover;
      object-position: center top;
    }

    .etc-sizebay__main {
      padding: 24px 14px 18px;
      max-height: none;
      overflow: visible;
    }

    .etc-sizebay__header {
      margin: 0 36px 17px 0;
      text-align: left;
    }

    .etc-sizebay__eyebrow {
      font-size: 10px;
      padding: 5px 10px;
    }

    .etc-sizebay__title {
      font-size: 23px;
    }

    .etc-sizebay__subtitle {
      font-size: 12px;
      margin: 0;
    }

    .etc-sizebay__tabs {
      justify-content: flex-start;
      gap: 6px;
      margin-bottom: 16px;
    }

    .etc-sizebay__tab {
      min-height: 34px;
      padding: 8px 11px;
      font-size: 11px;
    }

    .etc-sizebay__finder {
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .etc-sizebay__card {
      padding: 14px;
      border-radius: 16px;
    }

    .etc-sizebay__result-empty {
      min-height: 120px;
    }

    .etc-sizebay__models {
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .etc-sizebay__table {
      font-size: 13px;
    }

    .etc-sizebay__table th,
    .etc-sizebay__table td {
      padding: 10px 8px;
    }
  }
</style>

<script>
  (() => {
    "use strict";

    const ROOT_ID = "etc-sizebay-guide";

    const PRODUCT_IMAGE_SELECTOR =
      "#container-swiper > div > div.relative.flex.items-center.justify-center.px-space-8.group.gallery-main.swiper-container.w-\\[calc\\(100\\%-106px\\)\\] > div.swiper.swiper-initialized.swiper-horizontal.h-full.select-none.\\!overflow-hidden.w-full.swiper-backface-hidden > div.swiper-wrapper > div.swiper-slide.\\!flex.h-auto.items-center.\\!justify-center.overflow-hidden.swiper-slide-active > span > img";

    const SIZE_CHART = [
      { size: "1", height: 82, chest: 50, waist: 50, hip: 52 },
      { size: "2", height: 88, chest: 52, waist: 52, hip: 54 },
      { size: "3", height: 98, chest: 54, waist: 54, hip: 56 },
      { size: "4", height: 105, chest: 56, waist: 56, hip: 61 },
      { size: "6", height: 117, chest: 61, waist: 58, hip: 65 },
      { size: "8", height: 128, chest: 66, waist: 60, hip: 70 },
      { size: "10", height: 137, chest: 70, waist: 62, hip: 76 },
      { size: "12", height: 150, chest: 75, waist: 64, hip: 82 },
      { size: "14", height: 156, chest: 78, waist: 66, hip: 87 },
      { size: "16", height: 160, chest: 81, waist: 68, hip: 93 }
    ];

    const MEASURE_LABELS = {
      height: "Altura",
      chest: "Tórax",
      waist: "Cintura",
      hip: "Quadril"
    };

    const MEASURE_WEIGHTS = {
      height: 1,
      chest: 1.2,
      waist: 1.2,
      hip: 1.3
    };

    const rulerIcon = `
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M15.2169 2.77888L2.7807 15.2151C2.4878 15.508 2.4878 15.9829 2.7807 16.2758L7.72006 21.2151C8.01295 21.508 8.48783 21.508 8.78072 21.2151L21.217 8.7789C21.5099 8.48601 21.5099 8.01114 21.217 7.71824L16.2776 2.77888C15.9847 2.48599 15.5098 2.48599 15.2169 2.77888Z" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="M12.375 5.625L15.375 8.625" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="M9 9L12 12" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="M5.625 12.375L8.625 15.375" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
    `;

    const getProductImageSrc = () => {
      const selectors = [
        PRODUCT_IMAGE_SELECTOR,
        "#container-swiper .swiper-slide-active img",
        "#container-swiper .gallery-main .swiper-slide-active img",
        "#container-swiper img",
        ".gallery-main img",
        ".swiper-slide-active img",
        'meta[property="og:image"]'
      ];

      for (const selector of selectors) {
        const element = document.querySelector(selector);

        if (!element) continue;

        const src =
          element.currentSrc ||
          element.getAttribute("src") ||
          element.getAttribute("data-src") ||
          element.getAttribute("data-lazy") ||
          element.getAttribute("content");

        if (src) return src;
      }

      return "";
    };

    const updateProductImage = (root) => {
      const content = root.querySelector("[data-sizebay-content]");
      const imageBox = root.querySelector("[data-sizebay-product-image-box]");
      const image = root.querySelector("[data-sizebay-product-image]");

      if (!content || !imageBox || !image) return;

      const src = getProductImageSrc();

      if (!src) {
        content.classList.add("is-without-image");
        imageBox.classList.remove("is-visible");
        image.removeAttribute("src");
        return;
      }

      content.classList.remove("is-without-image");
      image.src = src;
      image.alt = "Imagem do produto";
      imageBox.classList.add("is-visible");
    };

    const createMarkup = () => `
      <div class="etc-sizebay" id="${ROOT_ID}">
        <button class="etc-sizebay__trigger" type="button" data-sizebay-open aria-haspopup="dialog" aria-controls="etc-sizebay-dialog">
          ${rulerIcon}
          <span>Descubra o tamanho ideal</span>
        </button>

        <dialog class="etc-sizebay__dialog" id="etc-sizebay-dialog" aria-labelledby="etc-sizebay-title">
          <div class="etc-sizebay__content is-without-image" data-sizebay-content>
            <button class="etc-sizebay__close" type="button" data-sizebay-close aria-label="Fechar">×</button>

            <div class="etc-sizebay__media" data-sizebay-product-image-box>
              <img data-sizebay-product-image alt="">
            </div>

            <div class="etc-sizebay__main">
              <div class="etc-sizebay__header">
                <span class="etc-sizebay__eyebrow">Medidas em centímetros</span>
                <span class="etc-sizebay__title" id="etc-sizebay-title">Medidas Infantil</span>
                <span class="etc-sizebay__subtitle">
                  Adicione as medidas da criança para encontrar o tamanho mais indicado.
                </span>
              </div>

              <div class="etc-sizebay__tabs" role="tablist" aria-label="Guia de tamanho">
                <button class="etc-sizebay__tab is-active" type="button" data-sizebay-tab="finder">Descobrir tamanho</button>
                <button class="etc-sizebay__tab" type="button" data-sizebay-tab="table">Tabela</button>
                <button class="etc-sizebay__tab" type="button" data-sizebay-tab="models">Modelagem</button>
              </div>

              <div class="etc-sizebay__panel is-active" data-sizebay-panel="finder">
                <div class="etc-sizebay__finder">
                  <div class="etc-sizebay__card">
                    <span class="etc-sizebay__card-title">Adicionar medidas</span>

                    <div class="etc-sizebay__fields">
                      <div class="etc-sizebay__field">
                        <label for="etc-sizebay-height">Altura</label>
                        <input id="etc-sizebay-height" type="number" inputmode="decimal" min="40" max="190" placeholder="Ex: 128" data-sizebay-input="height">
                      </div>

                      <div class="etc-sizebay__field">
                        <label for="etc-sizebay-chest">Tórax</label>
                        <input id="etc-sizebay-chest" type="number" inputmode="decimal" min="30" max="130" placeholder="Ex: 66" data-sizebay-input="chest">
                      </div>

                      <div class="etc-sizebay__field">
                        <label for="etc-sizebay-waist">Cintura</label>
                        <input id="etc-sizebay-waist" type="number" inputmode="decimal" min="30" max="130" placeholder="Ex: 60" data-sizebay-input="waist">
                      </div>

                      <div class="etc-sizebay__field">
                        <label for="etc-sizebay-hip">Quadril</label>
                        <input id="etc-sizebay-hip" type="number" inputmode="decimal" min="30" max="140" placeholder="Ex: 70" data-sizebay-input="hip">
                      </div>
                    </div>

                    <span class="etc-sizebay__helper">
                      Se não souber todas as medidas, informe pelo menos altura e mais uma medida corporal.
                    </span>

                    <button class="etc-sizebay__button" type="button" data-sizebay-calculate>
                      Calcular tamanho
                    </button>
                  </div>

                  <div class="etc-sizebay__card etc-sizebay__result">
                    <span class="etc-sizebay__card-title">Resultado</span>

                    <div class="etc-sizebay__result-empty" data-sizebay-empty>
                      Preencha as medidas para ver o tamanho recomendado.
                    </div>

                    <div class="etc-sizebay__result-box" data-sizebay-result>
                      <div class="etc-sizebay__result-head">
                        <span class="etc-sizebay__result-label">Tamanho recomendado</span>
                        <span class="etc-sizebay__result-size" data-sizebay-result-size>-</span>
                      </div>

                      <div class="etc-sizebay__result-body">
                        <span class="etc-sizebay__result-text" data-sizebay-result-text></span>
                        <ul class="etc-sizebay__score-list" data-sizebay-result-details></ul>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="etc-sizebay__panel" data-sizebay-panel="table">
                <div class="etc-sizebay__table-wrap">
                  <table class="etc-sizebay__table">
                    <thead>
                      <tr>
                        <th>Tamanho</th>
                        <th>Altura</th>
                        <th>Tórax</th>
                        <th>Cintura</th>
                        <th>Quadril</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${SIZE_CHART.map((item) => `
                        <tr>
                          <td>${item.size}</td>
                          <td>${item.height}</td>
                          <td>${item.chest}</td>
                          <td>${item.waist}</td>
                          <td>${item.hip}</td>
                        </tr>
                      `).join("")}
                    </tbody>
                  </table>
                </div>

                <span class="etc-sizebay__note">
                  Medidas em centímetros. Margem de tolerância: +/- 1 cm.
                </span>

                <div class="etc-sizebay__whatsapp">
                  <strong>Ficou na dúvida sobre o tamanho?</strong>
                  Chama a gente no WhatsApp, vamos adorar te ajudar! <span>♥</span>
                </div>
              </div>

              <div class="etc-sizebay__panel" data-sizebay-panel="models">
                <div class="etc-sizebay__models">
                  <div class="etc-sizebay__model">
                    <div class="etc-sizebay__model-icon">R</div>
                    <div>
                      <strong>Blusa/Camiseta Regular</strong>
                      <span>Shape tradicional com corte reto.</span>
                    </div>
                  </div>

                  <div class="etc-sizebay__model">
                    <div class="etc-sizebay__model-icon">S</div>
                    <div>
                      <strong>Blusa/Camiseta Slim Fit</strong>
                      <span>Levemente ajustada ao corpo, com comprimento regular.</span>
                    </div>
                  </div>

                  <div class="etc-sizebay__model">
                    <div class="etc-sizebay__model-icon">O</div>
                    <div>
                      <strong>Blusa/Camiseta Oversized</strong>
                      <span>Ombros deslocados e caimento mais largo que a regular.</span>
                    </div>
                  </div>

                  <div class="etc-sizebay__model">
                    <div class="etc-sizebay__model-icon">B</div>
                    <div>
                      <strong>Blusa Box</strong>
                      <span>Corte reto e mais curto que a blusa regular.</span>
                    </div>
                  </div>

                  <div class="etc-sizebay__model">
                    <div class="etc-sizebay__model-icon">R</div>
                    <div>
                      <strong>Bermuda Regular</strong>
                      <span>Modelagem tradicional reta, com comprimento acima dos joelhos.</span>
                    </div>
                  </div>

                  <div class="etc-sizebay__model">
                    <div class="etc-sizebay__model-icon">S</div>
                    <div>
                      <strong>Bermuda Short</strong>
                      <span>Shape reto, mais curto que a bermuda regular.</span>
                    </div>
                  </div>
                </div>

                <div class="etc-sizebay__whatsapp">
                  <strong>Ficou na dúvida sobre o tamanho?</strong>
                  Chama a gente no WhatsApp, vamos adorar te ajudar! <span>♥</span>
                </div>
              </div>
            </div>
          </div>
        </dialog>
      </div>
    `;

    const normalizeNumber = (value) => {
      if (!value) return null;

      const number = Number(String(value).replace(",", "."));

      return Number.isFinite(number) && number > 0 ? number : null;
    };

    const getInputs = (root) => {
      const values = {};

      root.querySelectorAll("[data-sizebay-input]").forEach((input) => {
        const key = input.dataset.sizebayInput;
        const value = normalizeNumber(input.value);

        if (value !== null) {
          values[key] = value;
        }
      });

      return values;
    };

    const calculateBestSize = (values) => {
      const filledKeys = Object.keys(values);

      if (filledKeys.length < 2) {
        return {
          error: "Informe pelo menos 2 medidas para calcular com mais segurança."
        };
      }

      const ranked = SIZE_CHART.map((item) => {
        let total = 0;
        const details = [];

        filledKeys.forEach((key) => {
          const diff = Math.abs(values[key] - item[key]);
          const weightedDiff = diff * (MEASURE_WEIGHTS[key] || 1);

          total += weightedDiff;

          details.push({
            key,
            label: MEASURE_LABELS[key],
            diff
          });
        });

        return {
          ...item,
          score: total,
          details
        };
      }).sort((a, b) => a.score - b.score);

      return {
        best: ranked[0],
        second: ranked[1],
        ranked
      };
    };

    const formatDiff = (diff) => {
      if (diff === 0) return "exata";
      return `diferença de ${diff} cm`;
    };

    const renderResult = (root) => {
      const values = getInputs(root);
      const result = calculateBestSize(values);

      const empty = root.querySelector("[data-sizebay-empty]");
      const box = root.querySelector("[data-sizebay-result]");
      const size = root.querySelector("[data-sizebay-result-size]");
      const text = root.querySelector("[data-sizebay-result-text]");
      const details = root.querySelector("[data-sizebay-result-details]");

      if (!empty || !box || !size || !text || !details) return;

      if (result.error) {
        empty.style.display = "flex";
        empty.textContent = result.error;
        box.style.display = "none";
        return;
      }

      const best = result.best;
      const second = result.second;
      const sizeIndex = SIZE_CHART.findIndex((item) => item.size === best.size);
      const nextSize = SIZE_CHART[sizeIndex + 1];

      empty.style.display = "none";
      box.style.display = "block";

      size.textContent = best.size;

      const closeToNext =
        second &&
        nextSize &&
        second.size === nextSize.size &&
        Math.abs(second.score - best.score) <= 5;

      text.textContent = closeToNext
        ? `O tamanho ${best.size} é o mais próximo das medidas informadas. Para uma peça mais folgada, considere também o tamanho ${nextSize.size}.`
        : `O tamanho ${best.size} é o mais próximo das medidas informadas.`;

      details.innerHTML = best.details
        .map((item) => `
          <li>
            <span>${item.label}</span>
            <strong>${formatDiff(item.diff)}</strong>
          </li>
        `)
        .join("");
    };

    const setActiveTab = (root, tabName) => {
      root.querySelectorAll("[data-sizebay-tab]").forEach((button) => {
        button.classList.toggle("is-active", button.dataset.sizebayTab === tabName);
      });

      root.querySelectorAll("[data-sizebay-panel]").forEach((panel) => {
        panel.classList.toggle("is-active", panel.dataset.sizebayPanel === tabName);
      });
    };

    const openDialog = (dialog, root) => {
      if (!dialog) return;

      updateProductImage(root);

      if (typeof dialog.showModal === "function") {
        dialog.showModal();
        return;
      }

      dialog.setAttribute("open", "");
    };

    const closeDialog = (dialog) => {
      if (!dialog) return;

      if (typeof dialog.close === "function") {
        dialog.close();
        return;
      }

      dialog.removeAttribute("open");
    };

    const injectSizeBayGuide = () => {
      if (document.getElementById(ROOT_ID)) return true;

      const target =
        document.querySelector(".area-derivacoes") ||
        document.querySelector(".derivacoes-produto") ||
        document.querySelector(".area-buy-product");

      if (!target) return false;

      target.insertAdjacentHTML("afterend", createMarkup());

      const root = document.getElementById(ROOT_ID);
      const dialog = root.querySelector("dialog");

      updateProductImage(root);

      root.addEventListener("click", (event) => {
        const openButton = event.target.closest("[data-sizebay-open]");
        const closeButton = event.target.closest("[data-sizebay-close]");
        const tabButton = event.target.closest("[data-sizebay-tab]");
        const calculateButton = event.target.closest("[data-sizebay-calculate]");

        if (openButton) {
          openDialog(dialog, root);
          return;
        }

        if (closeButton) {
          closeDialog(dialog);
          return;
        }

        if (tabButton) {
          setActiveTab(root, tabButton.dataset.sizebayTab);
          return;
        }

        if (calculateButton) {
          renderResult(root);
        }
      });

      root.addEventListener("keydown", (event) => {
        if (event.key !== "Enter") return;

        const input = event.target.closest("[data-sizebay-input]");

        if (input) {
          renderResult(root);
        }
      });

      dialog.addEventListener("click", (event) => {
        const rect = dialog.getBoundingClientRect();

        const clickedOutside =
          event.clientX < rect.left ||
          event.clientX > rect.right ||
          event.clientY < rect.top ||
          event.clientY > rect.bottom;

        if (clickedOutside) {
          closeDialog(dialog);
        }
      });

      const gallery = document.querySelector("#container-swiper");

      if (gallery) {
        const imageObserver = new MutationObserver(() => {
          updateProductImage(root);
        });

        imageObserver.observe(gallery, {
          childList: true,
          subtree: true,
          attributes: true,
          attributeFilter: ["src", "data-src", "class"]
        });
      }

      return true;
    };

    const boot = () => {
      if (injectSizeBayGuide()) return;

      let scheduled = false;

      const observer = new MutationObserver(() => {
        if (scheduled) return;

        scheduled = true;

        requestAnimationFrame(() => {
          scheduled = false;

          if (injectSizeBayGuide()) {
            observer.disconnect();
          }
        });
      });

      observer.observe(document.body, {
        childList: true,
        subtree: true
      });

      setTimeout(() => observer.disconnect(), 12000);
    };

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", boot, { once: true });
    } else {
      boot();
    }
  })();
</script>
