<style>
  .area-buy-product #button-measure-table {
    display: none !important;
  }

  .etc-sizebay,
  .etc-sizebay * {
    box-sizing: border-box;
  }

  .etc-sizebay {
    --bb-white: #ffffff;
    --bb-bg: #f7f2ee;
    --bb-bg-soft: #fbfaf8;
    --bb-green: #627b53;
    --bb-green-dark: #49663d;
    --bb-black: #1d1d1b;
    --bb-muted: rgba(29, 29, 27, 0.64);
    --bb-border: rgba(29, 29, 27, 0.13);
    --bb-shadow: 0 18px 50px rgba(29, 29, 27, 0.16);
    font-family: Roboto, Montserrat, sans-serif;
  }

  .etc-sizebay__trigger {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    width: fit-content;
    min-height: 42px;
    margin: 16px 0;
    padding: 11px 17px;
    background: var(--bb-white);
    color: var(--bb-green-dark);
    border: 1px solid var(--bb-border);
    border-radius: 999px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 800;
    line-height: 1;
    cursor: pointer;
    transition: 0.2s ease;
  }

  .etc-sizebay__trigger:hover {
    background: var(--bb-bg);
    border-color: var(--bb-green);
    transform: translateY(-1px);
  }

  .etc-sizebay__trigger svg {
    width: 18px;
    height: 18px;
    display: block;
  }

  .etc-sizebay__dialog {
    width: min(960px, calc(100vw - 28px));
    max-height: min(820px, calc(100vh - 34px));
    padding: 0;
    border: 0;
    border-radius: 26px;
    background: var(--bb-bg);
    color: var(--bb-black);
    overflow: hidden;
    box-shadow: var(--bb-shadow);
    font-family: inherit;
  }

  .etc-sizebay__dialog::backdrop {
    background: rgba(29, 29, 27, 0.55);
    backdrop-filter: blur(3px);
  }

  .etc-sizebay__content {
    position: relative;
    display: grid;
    grid-template-columns: 36% 64%;
    min-height: 620px;
    max-height: min(820px, calc(100vh - 34px));
    overflow: hidden;
    background: var(--bb-bg);
  }

  .etc-sizebay__content.is-without-image {
    grid-template-columns: 1fr;
    min-height: auto;
  }

  .etc-sizebay__content.is-without-image .etc-sizebay__main {
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
  }

  .etc-sizebay__media {
    position: relative;
    width: 100%;
    height: 100%;
    min-height: 620px;
    display: none;
    overflow: hidden;
    background: #ebe6df;
  }

  .etc-sizebay__media.is-visible {
    display: block;
  }

  .etc-sizebay__media img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    object-position: center top;
  }

  .etc-sizebay__media::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0), rgba(73,102,61,.22));
    pointer-events: none;
  }

  .etc-sizebay__main {
    position: relative;
    padding: 32px;
    max-height: min(820px, calc(100vh - 34px));
    overflow-y: auto;
    background: var(--bb-bg);
  }

  .etc-sizebay__close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 34px;
    height: 34px;
    border: 1px solid var(--bb-border);
    border-radius: 50%;
    background: var(--bb-white);
    color: var(--bb-black);
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    z-index: 5;
  }

  .etc-sizebay__close:hover {
    color: var(--bb-white);
    background: var(--bb-green-dark);
    border-color: var(--bb-green-dark);
  }

  .etc-sizebay__header {
    margin: 0 42px 20px 0;
  }

  .etc-sizebay__eyebrow {
    display: inline-flex;
    align-items: center;
    margin-bottom: 9px;
    padding: 6px 11px;
    border-radius: 999px;
    background: var(--bb-white);
    color: var(--bb-green-dark);
    border: 1px solid rgba(98, 123, 83, 0.22);
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .etc-sizebay__title {
    display: block;
    margin: 0 0 8px;
    color: var(--bb-green);
    font-family: Rubrik, Montserrat, Roboto, sans-serif;
    font-size: 34px;
    font-weight: 900;
    line-height: 1.02;
    letter-spacing: -0.04em;
  }

  .etc-sizebay__subtitle {
    display: block;
    max-width: 520px;
    margin: 0;
    color: var(--bb-muted);
    font-size: 13px;
    line-height: 1.55;
  }

  .etc-sizebay__tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    padding: 5px;
    border: 1px solid var(--bb-border);
    border-radius: 999px;
    background: rgba(255,255,255,.55);
    width: fit-content;
    max-width: 100%;
    flex-wrap: wrap;
  }

  .etc-sizebay__tab {
    min-height: 34px;
    padding: 8px 13px;
    border: 0;
    border-radius: 999px;
    background: transparent;
    color: var(--bb-black);
    font-size: 12px;
    font-weight: 900;
    cursor: pointer;
    transition: 0.2s ease;
  }

  .etc-sizebay__tab:hover {
    color: var(--bb-green-dark);
  }

  .etc-sizebay__tab.is-active {
    background: var(--bb-green);
    color: var(--bb-white);
  }

  .etc-sizebay__panel {
    display: none;
  }

  .etc-sizebay__panel.is-active {
    display: block;
  }

  .etc-sizebay__finder {
    display: grid;
    grid-template-columns: 0.9fr 1.1fr;
    gap: 14px;
    align-items: stretch;
  }

  .etc-sizebay__card {
    padding: 18px;
    border: 1px solid var(--bb-border);
    border-radius: 22px;
    background: var(--bb-white);
  }

  .etc-sizebay__card-title {
    display: block;
    margin-bottom: 14px;
    color: var(--bb-black);
    font-size: 15px;
    font-weight: 900;
    letter-spacing: -0.01em;
  }

  .etc-sizebay__fields {
    display: grid;
    gap: 10px;
  }

  .etc-sizebay__field {
    display: grid;
    gap: 6px;
  }

  .etc-sizebay__field label {
    color: var(--bb-black);
    font-size: 12px;
    font-weight: 900;
  }

  .etc-sizebay__field input {
    width: 100%;
    min-height: 44px;
    padding: 11px 12px;
    border: 1px solid var(--bb-border);
    border-radius: 14px;
    background: var(--bb-bg-soft);
    color: var(--bb-black);
    font-size: 14px;
    outline: none;
    transition: 0.2s ease;
  }

  .etc-sizebay__field input:focus {
    border-color: var(--bb-green);
    background: var(--bb-white);
  }

  .etc-sizebay__helper {
    display: block;
    margin-top: 10px;
    color: var(--bb-muted);
    font-size: 11px;
    line-height: 1.45;
  }

  .etc-sizebay__button {
    width: 100%;
    min-height: 44px;
    margin-top: 14px;
    border: 0;
    border-radius: 999px;
    background: var(--bb-green-dark);
    color: var(--bb-white);
    font-size: 13px;
    font-weight: 900;
    cursor: pointer;
    transition: 0.2s ease;
  }

  .etc-sizebay__button:hover {
    background: var(--bb-black);
    transform: translateY(-1px);
  }

  .etc-sizebay__result-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 244px;
    padding: 20px;
    border: 1px dashed var(--bb-border);
    border-radius: 18px;
    background: var(--bb-bg-soft);
    color: var(--bb-muted);
    text-align: center;
    font-size: 13px;
    line-height: 1.5;
  }

  .etc-sizebay__result-box {
    display: none;
    overflow: hidden;
    border: 1px solid var(--bb-border);
    border-radius: 22px;
    background: var(--bb-white);
  }

  .etc-sizebay__result-head {
    padding: 22px 18px;
    background: #eef3ea;
    color: var(--bb-black);
    text-align: center;
    border-bottom: 1px solid var(--bb-border);
  }

  .etc-sizebay__result-label {
    display: block;
    color: var(--bb-muted);
    font-size: 12px;
    font-weight: 800;
  }

  .etc-sizebay__result-size {
    display: block;
    margin-top: 4px;
    color: var(--bb-green-dark);
    font-family: Rubrik, Montserrat, Roboto, sans-serif;
    font-size: 58px;
    font-weight: 900;
    line-height: 1;
  }

  .etc-sizebay__result-body {
    padding: 16px;
  }

  .etc-sizebay__result-text {
    display: block;
    margin-bottom: 13px;
    color: var(--bb-black);
    font-size: 13px;
    line-height: 1.5;
    text-align: center;
  }

  .etc-sizebay__score-list {
    display: grid;
    gap: 0;
    margin: 0;
    padding: 0;
    list-style: none;
  }

  .etc-sizebay__score-list li {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 0;
    border-top: 1px solid rgba(29,29,27,.09);
    color: var(--bb-muted);
    font-size: 12px;
  }

  .etc-sizebay__score-list strong {
    color: var(--bb-green-dark);
    text-align: right;
  }

  .etc-sizebay__table-wrap {
    width: 100%;
    overflow-x: auto;
    padding: 6px;
    border: 1px solid var(--bb-border);
    border-radius: 22px;
    background: var(--bb-white);
  }

  .etc-sizebay__table {
    width: 100%;
    min-width: 620px;
    border-collapse: collapse;
    font-size: 13px;
  }

  .etc-sizebay__table th,
  .etc-sizebay__table td {
    padding: 13px 10px;
    border-bottom: 1px solid rgba(29,29,27,.08);
    text-align: center;
  }

  .etc-sizebay__table th {
    color: var(--bb-black);
    font-size: 12px;
    font-weight: 900;
  }

  .etc-sizebay__table td {
    color: var(--bb-black);
    font-weight: 500;
  }

  .etc-sizebay__table td:first-child {
    color: var(--bb-green-dark);
    font-weight: 900;
  }

  .etc-sizebay__table tbody tr:last-child td {
    border-bottom: 0;
  }

  .etc-sizebay__note {
    display: block;
    margin-top: 12px;
    color: var(--bb-muted);
    font-size: 11px;
    line-height: 1.45;
    text-align: center;
  }

  .etc-sizebay__catalog {
    display: grid;
    gap: 18px;
  }

  .etc-sizebay__catalog-intro {
    display: block;
    padding: 14px 16px;
    border: 1px solid var(--bb-border);
    border-radius: 18px;
    background: var(--bb-white);
    color: var(--bb-muted);
    font-size: 12px;
    line-height: 1.45;
  }

  .etc-sizebay__catalog-title {
    display: block;
    margin: 0 0 12px;
    color: var(--bb-green);
    font-family: Rubrik, Montserrat, Roboto, sans-serif;
    font-size: 22px;
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -0.03em;
  }


  .etc-sizebay__section-head {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }

  .etc-sizebay__section-subtitle {
    display: block;
    color: var(--bb-muted);
    font-size: 11px;
    font-weight: 700;
    line-height: 1.35;
  }

  .etc-sizebay__compact-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 8px;
  }

  .etc-sizebay__legend-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 8px;
  }

  .etc-sizebay__legend-chip,
  .etc-sizebay__model-chip {
    position: relative;
    display: grid;
    grid-template-columns: 34px 1fr;
    align-items: center;
    gap: 9px;
    min-height: 58px;
    padding: 10px;
    border: 1px solid var(--bb-border);
    border-radius: 14px;
    background: var(--bb-white);
  }

  .etc-sizebay__model-chip {
    min-height: 66px;
  }

  .etc-sizebay__legend-chip .etc-sizebay__bugbee-icon,
  .etc-sizebay__model-chip .etc-sizebay__model-icon {
    flex: 0 0 34px;
    width: 34px;
    height: 34px;
    border-radius: 11px;
  }

  .etc-sizebay__legend-chip .etc-sizebay__bugbee-icon img,
  .etc-sizebay__model-chip .etc-sizebay__model-icon img {
    width: 30px;
    height: 30px;
  }

  .etc-sizebay__legend-chip strong,
  .etc-sizebay__model-chip strong {
    display: block;
    color: var(--bb-black);
    font-size: 11.5px;
    font-weight: 900;
    line-height: 1.1;
  }

  .etc-sizebay__legend-chip .etc-sizebay__code,
  .etc-sizebay__model-chip .etc-sizebay__code {
    margin-top: 5px;
    padding: 3px 6px;
    font-size: 9px !important;
  }

  .etc-sizebay__models-compact {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }

  .etc-sizebay__model-group {
    padding: 14px;
    border: 1px solid var(--bb-border);
    border-radius: 20px;
    background: rgba(255,255,255,.46);
  }

  .etc-sizebay__model-group-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
    color: var(--bb-green-dark);
    font-size: 14px;
    font-weight: 900;
    line-height: 1;
  }

  .etc-sizebay__model-group-title span {
    color: var(--bb-muted);
    font-size: 10px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: .08em;
  }

  .etc-sizebay__benefits-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .etc-sizebay__models-split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .etc-sizebay__models-column {
    display: grid;
    gap: 10px;
  }

  .etc-sizebay__models-column-title {
    display: block;
    margin-bottom: 2px;
    color: var(--bb-green-dark);
    font-size: 15px;
    font-weight: 900;
  }

  .etc-sizebay__benefit-card,
  .etc-sizebay__model-card {
    display: flex;
    gap: 12px;
    padding: 13px;
    border: 1px solid var(--bb-border);
    border-radius: 16px;
    background: var(--bb-white);
  }

  .etc-sizebay__bugbee-icon,
  .etc-sizebay__model-icon {
    flex: 0 0 42px;
    width: 42px;
    height: 42px;
    display: grid;
    place-items: center;
    border-radius: 14px;
    background: #eef3ea;
    color: var(--bb-green-dark);
    overflow: hidden;
  }

  .etc-sizebay__bugbee-icon img,
  .etc-sizebay__model-icon img {
    width: 38px;
    height: 38px;
    display: block;
    object-fit: contain;
    object-position: center;
    opacity: 1 !important;
    visibility: visible !important;
  }

  .etc-sizebay__benefit-card strong,
  .etc-sizebay__model-card strong {
    display: block;
    margin-bottom: 4px;
    color: var(--bb-black);
    font-size: 12.5px;
    font-weight: 900;
    line-height: 1.15;
  }

  .etc-sizebay__benefit-card span:not(.etc-sizebay__bugbee-icon),
  .etc-sizebay__model-card span:not(.etc-sizebay__model-icon) {
    display: block;
    color: var(--bb-muted);
    font-size: 11.5px;
    line-height: 1.35;
  }

  .etc-sizebay__code {
    display: inline-flex !important;
    width: fit-content;
    margin-top: 7px;
    padding: 4px 7px;
    border-radius: 999px;
    background: var(--bb-bg);
    color: var(--bb-green-dark) !important;
    font-size: 10px !important;
    font-weight: 900;
    line-height: 1 !important;
  }

  .etc-sizebay__whatsapp {
    display: block;
    margin-top: 16px;
    padding: 14px;
    border: 1px solid var(--bb-border);
    border-radius: 18px;
    background: var(--bb-white);
    text-align: center;
    color: var(--bb-black);
    font-size: 13px;
    line-height: 1.45;
  }

  .etc-sizebay__whatsapp strong {
    display: block;
    margin-bottom: 3px;
    color: var(--bb-black);
    font-size: 14px;
    font-weight: 900;
  }

  .etc-sizebay__whatsapp span {
    color: var(--bb-green);
    font-weight: 900;
  }


  .etc-sizebay__modelagem-showcase {
    display: grid;
    gap: 18px;
    padding: 18px 18px 20px;
    border: 1px solid var(--bb-border);
    border-radius: 22px;
    background: rgba(255,255,255,.58);
  }

  .etc-sizebay__modelagem-head {
    display: grid;
    gap: 6px;
    justify-items: center;
    text-align: center;
  }

  .etc-sizebay__modelagem-title {
    margin: 0;
    color: #49663d;
    font-family: Rubrik, Montserrat, Roboto, sans-serif;
    font-size: 26px;
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1;
  }

  .etc-sizebay__modelagem-subtitle {
    max-width: 560px;
    color: var(--bb-muted);
    font-size: 12px;
    line-height: 1.45;
  }

  .etc-sizebay__modelagem-section {
    display: grid;
    gap: 12px;
  }

  .etc-sizebay__modelagem-section-label {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: fit-content;
    margin: 0 auto;
    padding: 7px 12px;
    border: 1px solid rgba(98, 123, 83, 0.18);
    border-radius: 999px;
    background: var(--bb-white);
    color: var(--bb-green-dark);
    font-size: 10px;
    font-weight: 900;
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .etc-sizebay__modelagem-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 18px 22px;
  }

  .etc-sizebay__modelagem-item {
    display: grid;
    grid-template-columns: 78px 1fr;
    align-items: start;
    gap: 12px;
  }

  .etc-sizebay__modelagem-figure {
    width: 78px;
    min-width: 78px;
    height: 78px;
    display: grid;
    place-items: center;
  }

  .etc-sizebay__modelagem-figure .etc-sizebay__model-icon {
    width: 72px;
    height: 72px;
    border-radius: 0;
    background: transparent;
  }

  .etc-sizebay__modelagem-figure .etc-sizebay__model-icon img {
    width: 72px;
    height: 72px;
    object-fit: contain;
  }

  .etc-sizebay__modelagem-copy {
    display: grid;
    gap: 4px;
    padding-top: 4px;
  }

  .etc-sizebay__modelagem-copy strong {
    display: block;
    color: var(--bb-black);
    font-size: 13px;
    font-weight: 900;
    line-height: 1.15;
  }

  .etc-sizebay__modelagem-copy span {
    display: block;
    color: var(--bb-muted);
    font-size: 11.5px;
    line-height: 1.35;
  }

  @media (max-width: 980px) {
    .etc-sizebay__content {
      grid-template-columns: 34% 66%;
    }

    .etc-sizebay__finder {
      grid-template-columns: 1fr;
    }

    .etc-sizebay__result-empty {
      min-height: 140px;
    }

    .etc-sizebay__benefits-grid {
      grid-template-columns: repeat(2, 1fr);
    }

    .etc-sizebay__models-split {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 768px) {
    .etc-sizebay__dialog {
      width: calc(100vw - 12px) !important;
      max-height: calc(100dvh - 16px) !important;
      border-radius: 18px !important;
      overflow: hidden !important;
    }

    .etc-sizebay__content {
      display: block !important;
      min-height: 0 !important;
      height: auto !important;
      max-height: calc(100dvh - 16px) !important;
      overflow: hidden !important;
    }

    .etc-sizebay__media,
    .etc-sizebay__media.is-visible {
      display: none !important;
    }

    .etc-sizebay__main {
      max-height: calc(100dvh - 16px) !important;
      overflow-y: auto !important;
      overflow-x: hidden !important;
      padding: 18px 12px 14px !important;
      -webkit-overflow-scrolling: touch !important;
    }

    .etc-sizebay__close {
      top: 10px !important;
      right: 10px !important;
      width: 30px !important;
      height: 30px !important;
      font-size: 18px !important;
    }

    .etc-sizebay__header {
      margin: 0 34px 12px 0 !important;
    }

    .etc-sizebay__eyebrow {
      margin-bottom: 6px !important;
      padding: 4px 8px !important;
      font-size: 9px !important;
    }

    .etc-sizebay__title {
      font-size: 22px !important;
      line-height: 1.05 !important;
      margin-bottom: 5px !important;
      letter-spacing: -0.03em !important;
    }

    .etc-sizebay__subtitle {
      font-size: 11.5px !important;
      line-height: 1.35 !important;
    }

    .etc-sizebay__tabs {
      width: 100% !important;
      margin-bottom: 12px !important;
      padding: 4px !important;
      gap: 4px !important;
      border-radius: 14px !important;
    }

    .etc-sizebay__tab {
      flex: 1 !important;
      min-height: 30px !important;
      padding: 6px 6px !important;
      font-size: 10px !important;
    }

    .etc-sizebay__finder {
      display: grid !important;
      grid-template-columns: 1fr !important;
      gap: 10px !important;
    }

    .etc-sizebay__card {
      padding: 12px !important;
      border-radius: 14px !important;
    }

    .etc-sizebay__card-title {
      margin-bottom: 10px !important;
      font-size: 13px !important;

    const normalizeNumber = (value) => {
      if (!value) return null;
      const number = Number(String(value).replace(",", "."));
      return Number.isFinite(number) && number > 0 ? number : null;
    };

    const formatNumber = (value) => {
      if (Number.isInteger(value)) return String(value);
      return String(value).replace(".", ",");
    };

    const getInputs = (root) => {
      const values = {};

      root.querySelectorAll("[data-sizebay-input]").forEach((input) => {
        const key = input.dataset.sizebayInput;
        const value = normalizeNumber(input.value);

        if (value !== null) values[key] = value;
      });

      return values;
    };

    const getDistanceFromRange = (value, min, max) => {
      if (value < min) return min - value;
      if (value > max) return value - max;
      return 0;
    };

    const calculateBestSize = (values) => {
      if (!values.height || !values.weight) {
        return {
          error: "Informe a altura e o peso da criança para calcular o tamanho."
        };
      }

      const ranked = SIZE_CHART.map((item) => {
        const heightDistance = getDistanceFromRange(values.height, item.heightMin, item.heightMax);
        const weightDistance = getDistanceFromRange(values.weight, item.weightMin, item.weightMax);
        const tableHeightDistance = Math.abs(values.height - item.tableHeight);

        const score =
          heightDistance * 2 +
          weightDistance * 3 +
          tableHeightDistance * 0.01;

        return {
          ...item,
          score,
          heightDistance,
          weightDistance,
          tableHeightDistance
        };
      }).sort((a, b) => a.score - b.score);

      return {
        best: ranked[0],
        ranked
      };
    };

    const renderResult = (root) => {
      const values = getInputs(root);
      const result = calculateBestSize(values);

      const empty = root.querySelector("[data-sizebay-empty]");
      const box = root.querySelector("[data-sizebay-result]");
      const size = root.querySelector("[data-sizebay-result-size]");
      const text = root.querySelector("[data-sizebay-result-text]");
      const details = root.querySelector("[data-sizebay-result-details]");

      if (!empty || !box || !size || !text || !details) return;

      if (result.error) {
        empty.style.display = "flex";
        empty.textContent = result.error;
        box.style.display = "none";
        return;
      }

      const best = result.best;
      const sizeIndex = SIZE_CHART.findIndex((item) => item.size === best.size);
      const nextSize = SIZE_CHART[sizeIndex + 1];

      empty.style.display = "none";
      box.style.display = "block";
      size.textContent = best.size;

      text.textContent = nextSize
        ? `Recomendamos o tamanho ${best.size}. Para um caimento mais folgado, escolha o tamanho ${nextSize.size}.`
        : `Recomendamos o tamanho ${best.size}.`;

      details.innerHTML = `
        <li>
          <span>Altura informada</span>
          <strong>${formatNumber(values.height)} cm</strong>
        </li>
        <li>
          <span>Peso informado</span>
          <strong>${formatNumber(values.weight)} kg</strong>
        </li>
        <li>
          <span>Altura indicada</span>
          <strong>${best.heightMin} a ${best.heightMax} cm</strong>
        </li>
        <li>
          <span>Peso aproximado</span>
          <strong>${best.weightMin} a ${best.weightMax} kg</strong>
        </li>
      `;
    };

    const setActiveTab = (root, tabName) => {
      root.querySelectorAll("[data-sizebay-tab]").forEach((button) => {
        button.classList.toggle("is-active", button.dataset.sizebayTab === tabName);
      });

      root.querySelectorAll("[data-sizebay-panel]").forEach((panel) => {
        panel.classList.toggle("is-active", panel.dataset.sizebayPanel === tabName);
      });
    };

    const openDialog = (dialog, root) => {
      if (!dialog) return;

      updateProductImage(root);

      if (typeof dialog.showModal === "function") {
        dialog.showModal();
        return;
      }

      dialog.setAttribute("open", "");
    };

    const closeDialog = (dialog) => {
      if (!dialog) return;

      if (typeof dialog.close === "function") {
        dialog.close();
        return;
      }

      dialog.removeAttribute("open");
    };

    const injectSizeBayGuide = () => {
      if (document.getElementById(ROOT_ID)) return true;

      const target =
        document.querySelector(".area-derivacoes") ||
        document.querySelector(".derivacoes-produto") ||
        document.querySelector(".area-buy-product");

      if (!target) return false;

      target.insertAdjacentHTML("afterend", createMarkup());

      const root = document.getElementById(ROOT_ID);
      const dialog = root.querySelector("dialog");

      updateProductImage(root);

      root.addEventListener("click", (event) => {
        const openButton = event.target.closest("[data-sizebay-open]");
        const closeButton = event.target.closest("[data-sizebay-close]");
        const tabButton = event.target.closest("[data-sizebay-tab]");
        const calculateButton = event.target.closest("[data-sizebay-calculate]");

        if (openButton) {
          openDialog(dialog, root);
          return;
        }

        if (closeButton) {
          closeDialog(dialog);
          return;
        }

        if (tabButton) {
          setActiveTab(root, tabButton.dataset.sizebayTab);
          return;
        }

        if (calculateButton) {
          renderResult(root);
        }
      });

      root.addEventListener("keydown", (event) => {
        if (event.key !== "Enter") return;

        const input = event.target.closest("[data-sizebay-input]");

        if (input) renderResult(root);
      });

      dialog.addEventListener("click", (event) => {
        const rect = dialog.getBoundingClientRect();

        const clickedOutside =
          event.clientX < rect.left ||
          event.clientX > rect.right ||
          event.clientY < rect.top ||
          event.clientY > rect.bottom;

        if (clickedOutside) closeDialog(dialog);
      });

      const gallery = document.querySelector("#container-swiper");

      if (gallery) {
        const imageObserver = new MutationObserver(() => {
          updateProductImage(root);
        });

        imageObserver.observe(gallery, {
          childList: true,
          subtree: true,
          attributes: true,
          attributeFilter: ["src", "data-src", "class"]
        });
      }

      return true;
    };

    const boot = () => {
      if (injectSizeBayGuide()) return;

      let scheduled = false;

      const observer = new MutationObserver(() => {
        if (scheduled) return;

        scheduled = true;

        requestAnimationFrame(() => {
          scheduled = false;

          if (injectSizeBayGuide()) observer.disconnect();
        });
      });

      observer.observe(document.body, {
        childList: true,
        subtree: true
      });

      setTimeout(() => observer.disconnect(), 12000);
    };

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", boot, { once: true });
    } else {
      boot();
    }
  })();
</script>
