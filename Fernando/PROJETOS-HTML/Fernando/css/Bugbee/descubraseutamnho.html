        <dialog class="etc-medidas__dialog" id="etc-medidas-dialog" aria-labelledby="etc-medidas-title">
          <div class="etc-medidas__content">
            <button class="etc-medidas__close" type="button" data-medidas-close aria-label="Fechar">×</button>

            <div class="etc-medidas__main">
              <div class="etc-medidas__header">
                <span class="etc-medidas__title" id="etc-medidas-title">Guia de medidas</span>
                <span class="etc-medidas__subtitle">
                  Consulte a tabela infantil. Se ainda ficar em dúvida, use a calculadora como apoio.
                </span>
              </div>

              <div class="etc-medidas__tabs" role="tablist" aria-label="Guia de tamanho">
                <button class="etc-medidas__tab is-active" type="button" data-medidas-tab="table">Tabela</button>
                <button class="etc-medidas__tab" type="button" data-medidas-tab="finder">Calculadora</button>
                <button class="etc-medidas__tab" type="button" data-medidas-tab="models">Modelagem</button>
              </div>

              <div class="etc-medidas__panel is-active" data-medidas-panel="table">
                <div class="etc-medidas__table-wrap">
                  <table class="etc-medidas__table">
                    <thead>
                      <tr>
                        <th>Tam.</th>
                        <th>Altura base</th>
                        <th>Faixa</th>
                        <th>Peso aprox.</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${SIZE_CHART.map((item) => `
                        <tr>
                          <td>${item.size}</td>
                          <td>${item.tableHeight} cm</td>
                          <td>${item.heightMin} a ${item.heightMax} cm</td>
                          <td>${item.weightMin} a ${item.weightMax} kg</td>
                        </tr>
                      `).join("")}
                    </tbody>
                  </table>
                </div>

                <span class="etc-medidas__note">
                  Medidas aproximadas. Para caimento mais folgado, considere um tamanho acima.
                </span>

                <div class="etc-medidas__whatsapp">
                  <strong>Ainda ficou em dúvida?</strong>
                  Chama a gente no WhatsApp. <span>♥</span>
                </div>
              </div>

              <div class="etc-medidas__panel" data-medidas-panel="finder">
                <div class="etc-medidas__finder">
                  <div class="etc-medidas__card">
                    <span class="etc-medidas__card-title">Calculadora de apoio</span>

                    <div class="etc-medidas__fields">
                      <div class="etc-medidas__field">
                        <label for="etc-medidas-height">Altura</label>
                        <input id="etc-medidas-height" type="number" inputmode="decimal" min="40" max="190" placeholder="Ex: 126 cm" data-medidas-input="height">
                      </div>

                      <div class="etc-medidas__field">
                        <label for="etc-medidas-weight">Peso</label>
                        <input id="etc-medidas-weight" type="number" inputmode="decimal" min="3" max="90" placeholder="Ex: 27 kg" data-medidas-input="weight">
                      </div>
                    </div>

                    <span class="etc-medidas__helper">
                      Use apenas se a tabela não for suficiente para decidir.
                    </span>

                    <button class="etc-medidas__button" type="button" data-medidas-calculate>
                      Calcular tamanho
                    </button>
                  </div>

                  <div class="etc-medidas__card etc-medidas__result">
                    <span class="etc-medidas__card-title">Resultado</span>

                    <div class="etc-medidas__result-empty" data-medidas-empty>
                      Preencha altura e peso para ver uma sugestão.
                    </div>

                    <div class="etc-medidas__result-box" data-medidas-result>
                      <div class="etc-medidas__result-head">
                        <span class="etc-medidas__result-label">Tamanho sugerido</span>
                        <span class="etc-medidas__result-size" data-medidas-result-size>-</span>
                      </div>

                      <div class="etc-medidas__result-body">
                        <span class="etc-medidas__result-text" data-medidas-result-text></span>
                        <ul class="etc-medidas__score-list" data-medidas-result-details></ul>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="etc-medidas__panel" data-medidas-panel="models">
                <div class="etc-medidas__catalog">
                  <span class="etc-medidas__catalog-intro">
                    Consulte os formatos de modelagem. Quando a peça não tiver indicação, considere modelagem regular.
                  </span>

                  <div class="etc-medidas__modelagem-showcase">
                    <div class="etc-medidas__modelagem-head">
                      <h3 class="etc-medidas__modelagem-title">Modelagem</h3>
                      <span class="etc-medidas__modelagem-subtitle">Veja o tipo de caimento de cada peça.</span>
                    </div>

                    <div class="etc-medidas__modelagem-section">
                      <span class="etc-medidas__modelagem-section-label">Feminino</span>

                      <div class="etc-medidas__modelagem-grid">
                        <div class="etc-medidas__modelagem-item"><div class="etc-medidas__modelagem-figure">${modelIcon("femRegular")}</div><div class="etc-medidas__modelagem-copy"><strong>Blusa/Camiseta Regular</strong><span>Shape tradicional e corte reto.</span></div></div>
                        <div class="etc-medidas__modelagem-item"><div class="etc-medidas__modelagem-figure">${modelIcon("femSlim")}</div><div class="etc-medidas__modelagem-copy"><strong>Blusa/Camiseta Slim Fit</strong><span>Levemente ajustada ao corpo.</span></div></div>
                        <div class="etc-medidas__modelagem-item"><div class="etc-medidas__modelagem-figure">${modelIcon("femCamiseta")}</div><div class="etc-medidas__modelagem-copy"><strong>Blusa/Camiseta Oversized</strong><span>Caimento mais amplo que a regular.</span></div></div>
                        <div class="etc-medidas__modelagem-item"><div class="etc-medidas__modelagem-figure">${modelIcon("femBox")}</div><div class="etc-medidas__modelagem-copy"><strong>Blusa Box</strong><span>Corte reto e um pouco mais curto.</span></div></div>
                        <div class="etc-medidas__modelagem-item"><div class="etc-medidas__modelagem-figure">${modelIcon("femCiclistaCurta")}</div><div class="etc-medidas__modelagem-copy"><strong>Bermuda Ciclista Curta</strong><span>Ajustada, com comprimento menor.</span></div></div>
                        <div class="etc-medidas__modelagem-item"><div class="etc-medidas__modelagem-figure">${modelIcon("femCiclistaLonga")}</div><div class="etc-medidas__modelagem-copy"><strong>Bermuda Ciclista Longa</strong><span>Ajustada, com comprimento maior.</span></div></div>
                        <div class="etc-medidas__modelagem-item"><div class="etc-medidas__modelagem-figure">${modelIcon("femShortCinturaAlta")}</div><div class="etc-medidas__modelagem-copy"><strong>Shorts Cintura Alta</strong><span>Cintura alta e pernas soltinhas.</span></div></div>
                        <div class="etc-medidas__modelagem-item"><div class="etc-medidas__modelagem-figure">${modelIcon("femShortRegular")}</div><div class="etc-medidas__modelagem-copy"><strong>Shorts Regular</strong><span>Cintura tradicional e comprimento regular.</span></div></div>
                      </div>
                    </div>

                    <div class="etc-medidas__modelagem-section">
                      <span class="etc-medidas__modelagem-section-label">Masculino</span>

                      <div class="etc-medidas__modelagem-grid">
                        <div class="etc-medidas__modelagem-item"><div class="etc-medidas__modelagem-figure">${modelIcon("mascRegular")}</div><div class="etc-medidas__modelagem-copy"><strong>Camiseta Regular</strong><span>Shape tradicional e corte reto.</span></div></div>
                        <div class="etc-medidas__modelagem-item"><div class="etc-medidas__modelagem-figure">${modelIcon("mascSlim")}</div><div class="etc-medidas__modelagem-copy"><strong>Camiseta Slim Fit</strong><span>Levemente ajustada ao corpo.</span></div></div>
                        <div class="etc-medidas__modelagem-item"><div class="etc-medidas__modelagem-figure">${modelIcon("mascBermudaRegular")}</div><div class="etc-medidas__modelagem-copy"><strong>Bermuda Regular</strong><span>Modelagem reta, acima dos joelhos.</span></div></div>
                      </div>
                    </div>
                  </div>

                  <div class="etc-medidas__whatsapp">
                    <strong>Ainda ficou em dúvida?</strong>
                    Chama a gente no WhatsApp. <span>♥</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </dialog>
      </div>
    `;

    const normalizeNumber = (value) => {
      if (!value) return null;
      const number = Number(String(value).replace(",", "."));
      return Number.isFinite(number) && number > 0 ? number : null;
    };

    const formatNumber = (value) => {
      if (Number.isInteger(value)) return String(value);
      return String(value).replace(".", ",");
    };

    const getInputs = (root) => {
      const values = {};

      root.querySelectorAll("[data-medidas-input]").forEach((input) => {
        const key = input.dataset.medidasInput;
        const value = normalizeNumber(input.value);

        if (value !== null) values[key] = value;
      });

      return values;
    };

    const getDistanceFromRange = (value, min, max) => {
      if (value < min) return min - value;
      if (value > max) return value - max;
      return 0;
    };

    const calculateBestSize = (values) => {
      if (!values.height || !values.weight) {
        return {
          error: "Informe altura e peso para calcular uma sugestão."
        };
      }

      const ranked = SIZE_CHART.map((item) => {
        const heightDistance = getDistanceFromRange(values.height, item.heightMin, item.heightMax);
        const weightDistance = getDistanceFromRange(values.weight, item.weightMin, item.weightMax);
        const tableHeightDistance = Math.abs(values.height - item.tableHeight);

        const score =
          heightDistance * 2 +
          weightDistance * 3 +
          tableHeightDistance * 0.01;

        return {
          ...item,
          score
        };
      }).sort((a, b) => a.score - b.score);

      return {
        best: ranked[0],
        ranked
      };
    };

    const renderResult = (root) => {
      const values = getInputs(root);
      const result = calculateBestSize(values);

      const empty = root.querySelector("[data-medidas-empty]");
      const box = root.querySelector("[data-medidas-result]");
      const size = root.querySelector("[data-medidas-result-size]");
      const text = root.querySelector("[data-medidas-result-text]");
      const details = root.querySelector("[data-medidas-result-details]");

      if (!empty || !box || !size || !text || !details) return;

      if (result.error) {
        empty.style.display = "flex";
        empty.textContent = result.error;
        box.style.display = "none";
        return;
      }

      const best = result.best;
      const sizeIndex = SIZE_CHART.findIndex((item) => item.size === best.size);
      const nextSize = SIZE_CHART[sizeIndex + 1];

      empty.style.display = "none";
      box.style.display = "block";
      size.textContent = best.size;

      text.textContent = nextSize
        ? `Sugestão: tamanho ${best.size}. Para caimento mais folgado, considere o tamanho ${nextSize.size}.`
        : `Sugestão: tamanho ${best.size}.`;

      details.innerHTML = `
        <li><span>Altura informada</span><strong>${formatNumber(values.height)} cm</strong></li>
        <li><span>Peso informado</span><strong>${formatNumber(values.weight)} kg</strong></li>
        <li><span>Altura indicada</span><strong>${best.heightMin} a ${best.heightMax} cm</strong></li>
        <li><span>Peso aproximado</span><strong>${best.weightMin} a ${best.weightMax} kg</strong></li>
      `;
    };

    const setActiveTab = (root, tabName) => {
      root.querySelectorAll("[data-medidas-tab]").forEach((button) => {
        button.classList.toggle("is-active", button.dataset.medidasTab === tabName);
      });

      root.querySelectorAll("[data-medidas-panel]").forEach((panel) => {
        panel.classList.toggle("is-active", panel.dataset.medidasPanel === tabName);
      });
    };

    const openDialog = (dialog, root) => {
      if (!dialog) return;

      setActiveTab(root, "table");

      if (typeof dialog.showModal === "function") {
        dialog.showModal();
        return;
      }

      dialog.setAttribute("open", "");
    };

    const closeDialog = (dialog) => {
      if (!dialog) return;

      if (typeof dialog.close === "function") {
        dialog.close();
        return;
      }

      dialog.removeAttribute("open");
    };

    const getTargetElement = () => {
      return document.querySelector(TARGET_SELECTOR);
    };

    const getFallbackElement = () => {
      return document.querySelector(FALLBACK_SELECTOR);
    };

    const createGuideElement = () => {
      const temp = document.createElement("div");
      temp.innerHTML = createMarkup().trim();
      return temp.firstElementChild;
    };

    const bindGuideEvents = (root) => {
      if (!root || root.dataset.medidasBound === "true") return;

      root.dataset.medidasBound = "true";

      const dialog = root.querySelector("dialog");

      root.addEventListener("click", (event) => {
        const openButton = event.target.closest("[data-medidas-open]");
        const closeButton = event.target.closest("[data-medidas-close]");
        const tabButton = event.target.closest("[data-medidas-tab]");
        const calculateButton = event.target.closest("[data-medidas-calculate]");

        if (openButton) {
          openDialog(dialog, root);
          return;
        }

        if (closeButton) {
          closeDialog(dialog);
          return;
        }

        if (tabButton) {
          setActiveTab(root, tabButton.dataset.medidasTab);
          return;
        }

        if (calculateButton) {
          renderResult(root);
        }
      });

      root.addEventListener("keydown", (event) => {
        if (event.key !== "Enter") return;

        const input = event.target.closest("[data-medidas-input]");

        if (input) renderResult(root);
      });

      if (dialog) {
        dialog.addEventListener("click", (event) => {
          const rect = dialog.getBoundingClientRect();

          const clickedOutside =
            event.clientX < rect.left ||
            event.clientX > rect.right ||
            event.clientY < rect.top ||
            event.clientY > rect.bottom;

          if (clickedOutside) closeDialog(dialog);
        });
      }
    };

    const placeGuide = () => {
      const target = getTargetElement();

      if (!target) return false;

      let root = document.getElementById(ROOT_ID);

      if (!root) {
        root = createGuideElement();
        if (!root) return false;
        bindGuideEvents(root);
      }

      if (target.nextElementSibling !== root) {
        target.insertAdjacentElement("afterend", root);
      }

      return true;
    };

    const injectGuide = () => {
      if (placeGuide()) return true;

      const fallback = getFallbackElement();

      if (!fallback) return false;

      let root = document.getElementById(ROOT_ID);

      if (!root) {
        root = createGuideElement();
        if (!root) return false;
        bindGuideEvents(root);
      }

      if (fallback.nextElementSibling !== root) {
        fallback.insertAdjacentElement("afterend", root);
      }

      return true;
    };

    const boot = () => {
      injectGuide();

      let scheduled = false;

      const observer = new MutationObserver(() => {
        if (scheduled) return;

        scheduled = true;

        requestAnimationFrame(() => {
          scheduled = false;
          injectGuide();
        });
      });

      observer.observe(document.body, {
        childList: true,
        subtree: true
      });
    };

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", boot, { once: true });
    } else {
      boot();
    }
  })();
</script>
