        function escapeHTML(value) {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function shuffleReviews(array) {
            const shuffled = array.slice();

            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                const temp = shuffled[i];
                shuffled[i] = shuffled[j];
                shuffled[j] = temp;
            }

            return shuffled;
        }

        function renderReviewCards() {
            const selectedReviews = shuffleReviews(bbReviews).slice(0, 9);

            return selectedReviews.map(function (review) {
                return `
                    <article class="bb-card">
                        <div class="bb-stars">★★★★★</div>
                        <h3>${escapeHTML(review.title)}</h3>
                        <p>“${escapeHTML(review.text)}”</p>
                        <div class="bb-author">
                            <strong>${escapeHTML(review.author)}</strong>
                            ${escapeHTML(review.location)}
                            <span class="bb-date">${escapeHTML(review.date)}</span>
                        </div>
                    </article>
                `;
            }).join("");
        }

        function initBBReviewsCarousel() {
            const section = document.querySelector("#bb-reviews-simple");

            if (!section) return;

            const track = section.querySelector(".bb-track");
            const next = section.querySelector(".bb-next");
            const prev = section.querySelector(".bb-prev");

            if (!track || !next || !prev) return;

            function cardWidth() {
                const card = track.querySelector(".bb-card");
                const gap = window.innerWidth <= 768 ? 12 : 16;

                if (!card) return 0;

                return card.offsetWidth + gap;
            }

            function reviewsPerPage() {
                return window.innerWidth <= 768 ? 1 : 3;
            }

            function scrollAmount() {
                return cardWidth() * reviewsPerPage();
            }

            next.addEventListener("click", function () {
                if (track.scrollLeft + track.clientWidth >= track.scrollWidth - 10) {
                    track.scrollTo({
                        left: 0,
                        behavior: "smooth"
                    });
                } else {
                    track.scrollBy({
                        left: scrollAmount(),
                        behavior: "smooth"
                    });
                }
            });

            prev.addEventListener("click", function () {
                track.scrollBy({
                    left: -scrollAmount(),
                    behavior: "smooth"
                });
            });

            setInterval(function () {
                next.click();
            }, 5000);
        }

        function insertBBReviews() {
            const selector = document.querySelector("#descricao-produto");

            if (!selector) return false;

            if (document.querySelector("#bb-reviews-simple")) return true;

            const html = `
                <section id="bb-reviews-simple">
                    <div class="bb-wrap">
                        <div class="bb-top">
                            <div class="bb-title">
                                <h2>Avaliações que encantam</h2>

                            </div>

                            <div class="bb-score">
                                <strong><span class="bb-stars">★★★★★</span> 5.0</strong>
                                <span>avaliações</span>
                            </div>
                        </div>

                        <div class="bb-carousel">
                            <div class="bb-track">
                                ${renderReviewCards()}
                            </div>

                            <div class="bb-actions">
                                <button class="bb-btn bb-prev" type="button" aria-label="Avaliação anterior">‹</button>
                                <button class="bb-btn bb-next" type="button" aria-label="Próxima avaliação">›</button>
                            </div>
                        </div>

                        <div class="bb-link">
                            <a href="https://www.bugbee.com.br/avaliacoes-de-clientes">
                                Ver todas as avaliações
                            </a>
                        </div>
                    </div>
                </section>
            `;

            $(html).insertBefore(selector);
            initBBReviewsCarousel();

            return true;
        }

        insertBBReviews();

        const bbObserver = new MutationObserver(function () {
            if (insertBBReviews()) {
                bbObserver.disconnect();
            }
        });

        bbObserver.observe(document.body, {
            childList: true,
            subtree: true
        });
    });
