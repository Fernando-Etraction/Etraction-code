<style>
    #bb-reviews-simple {
        --bb-white: #FFFFFF;
        --bb-bg: #FBFBF7;
        --bb-black: #1D1D1B;
        --bb-green: #627B53;
        --bb-green-dark: #49663D;
        --bb-muted: #666666;
        --bb-border: #DDDDDD;
        --bb-yellow: #F5B700;

        padding: 32px 26px;
        background: var(--bb-bg);
        font-family: Roboto, sans-serif;
        box-sizing: border-box;
        margin: 40px auto;

    }

    #bb-reviews-simple * {
        box-sizing: border-box;
    }

    #bb-reviews-simple .bb-wrap {
        max-width: 1060px;
        margin: 40px auto;
    }

    #bb-reviews-simple .bb-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 20px;
    }

    #bb-reviews-simple .bb-title h2 {
        margin: 0 0 4px;
        font-size: 26px;
        line-height: 1.15;
        color: var(--bb-black);
        font-weight: 500;
    }

    #bb-reviews-simple .bb-title p {
        margin: 0;
        font-size: 14px;
        line-height: 1.35;
        color: var(--bb-muted);
        font-weight: 400;
    }

    #bb-reviews-simple .bb-score {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-width: 148px;
        min-height: 44px;
        padding: 8px 14px;
        background: var(--bb-white);
        border: 1px solid var(--bb-border);
        border-radius: 9px;
        color: var(--bb-black);
        white-space: nowrap;
        font-size: 14px;
    }

    #bb-reviews-simple .bb-score strong {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        color: var(--bb-green-dark);
        font-size: 15px;
        font-weight: 700;
    }

    #bb-reviews-simple .bb-stars {
        color: var(--bb-yellow);
        font-size: 16px;
        line-height: 1;
        letter-spacing: 1px;
    }

    #bb-reviews-simple .bb-score .bb-stars {
        font-size: 15px;
        letter-spacing: 0;
    }

    #bb-reviews-simple .bb-carousel {
        position: relative;
    }

    #bb-reviews-simple .bb-track {
        display: flex;
        gap: 16px;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        scroll-behavior: smooth;
        padding-bottom: 2px;
    }

    #bb-reviews-simple .bb-track::-webkit-scrollbar {
        display: none;
    }

    #bb-reviews-simple .bb-card {
        flex: 0 0 calc((100% - 32px) / 3);
        min-height: 190px;
        padding: 18px 16px;
        background: var(--bb-white);
        border: 1px solid var(--bb-border);
        border-radius: 8px;
        scroll-snap-align: start;
        display: flex;
        flex-direction: column;
    }

    #bb-reviews-simple .bb-card .bb-stars {
        margin-bottom: 13px;
        font-size: 15px;
    }

    #bb-reviews-simple .bb-card h3 {
        margin: 0 0 8px;
        font-size: 16px;
        line-height: 1.25;
        color: var(--bb-black);
        font-weight: 500;
    }

    #bb-reviews-simple .bb-card p {
        margin: 0 0 14px;
        font-size: 13px;
        line-height: 1.45;
        color: var(--bb-black);
        font-weight: 400;
    }

    #bb-reviews-simple .bb-author {
        margin-top: auto;
        padding-top: 13px;
        border-top: 1px solid var(--bb-border);
        font-size: 12px;
        line-height: 1.4;
        color: var(--bb-muted);
    }

    #bb-reviews-simple .bb-author strong {
        display: block;
        margin-bottom: 3px;
        color: var(--bb-green-dark);
        font-size: 12px;
        font-weight: 700;
    }

    #bb-reviews-simple .bb-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        margin-top: 18px;
    }

    #bb-reviews-simple .bb-btn {
        width: 32px;
        height: 32px;
        border: 1px solid var(--bb-border);
        border-radius: 50%;
        background: var(--bb-white);
        color: var(--bb-green-dark);
        font-size: 20px;
        line-height: 1;
        cursor: pointer;
        transition: 0.2s ease;
    }

    #bb-reviews-simple .bb-btn:hover {
        background: var(--bb-green-dark);
        border-color: var(--bb-green-dark);
        color: var(--bb-white);
    }

    #bb-reviews-simple .bb-link {
        display: flex;
        justify-content: center;
        margin-top: 14px;
    }

    #bb-reviews-simple .bb-link a {
        color: var(--bb-green-dark);
        font-size: 12px;
        font-weight: 700;
        text-decoration: underline;
        text-underline-offset: 3px;
    }

    @media (max-width: 768px) {
        #bb-reviews-simple {
            padding: 22px 12px !important;
            background: var(--bb-bg) !important;
        }

        #bb-reviews-simple .bb-top {
            display: block !important;
            margin-bottom: 14px !important;
        }

        #bb-reviews-simple .bb-title h2 {
            margin: 0 0 4px !important;
            font-size: 21px !important;
            line-height: 1.15 !important;
        }

        #bb-reviews-simple .bb-title p {
            margin: 0 0 10px !important;
            font-size: 12px !important;
            line-height: 1.35 !important;
        }

        #bb-reviews-simple .bb-score {
            width: 100% !important;
            min-height: 36px !important;
            padding: 7px 10px !important;
            border-radius: 8px !important;
            font-size: 12px !important;
        }

        #bb-reviews-simple .bb-score strong {
            font-size: 13px !important;
        }

        #bb-reviews-simple .bb-score .bb-stars {
            font-size: 13px !important;
        }

        #bb-reviews-simple .bb-track {
            gap: 12px !important;
        }

        #bb-reviews-simple .bb-card {
            flex-basis: 82% !important;
            min-height: 170px !important;
            padding: 14px !important;
            border-radius: 8px !important;
        }

        #bb-reviews-simple .bb-card .bb-stars {
            margin-bottom: 10px !important;
            font-size: 13px !important;
            letter-spacing: 0 !important;
        }

        #bb-reviews-simple .bb-card h3 {
            margin-bottom: 6px !important;
            font-size: 15px !important;
        }

        #bb-reviews-simple .bb-card p {
            margin-bottom: 12px !important;
            font-size: 12px !important;
            line-height: 1.4 !important;
        }

        #bb-reviews-simple .bb-author {
            padding-top: 10px !important;
            font-size: 11.5px !important;
        }

        #bb-reviews-simple .bb-author strong {
            font-size: 11.5px !important;
        }

        #bb-reviews-simple .bb-actions {
            margin-top: 12px !important;
        }

        #bb-reviews-simple .bb-btn {
            width: 30px !important;
            height: 30px !important;
            font-size: 18px !important;
        }
    }
</style>

<script>
    $(document).ready(function () {
        const selector = document.querySelector("#descricao-produto");

        if (!selector) return;

        $("#bb-reviews-simple").remove();

        const html = `
            <section id="bb-reviews-simple">

                            <article class="bb-card">

                                <div class="bb-author">
                                    <strong>Amanda Ribeiro</strong>
                                    São Miguel do Guamá - PA
                                </div>
                            </article>

                            <article class="bb-card">
                                <div class="bb-stars">★★★★★</div>
                                <h3>Qualidade impressionante</h3>
                                <p>“Entrega rápida, bem embalada e cheia de carinho. A qualidade da marca é impressionante.”</p>
                                <div class="bb-author">
                                    <strong>Isabelle Medeiros B Torres</strong>
                                    São Paulo - SP
                                </div>
                            </article>

                            <article class="bb-card">
                                <div class="bb-stars">★★★★★</div>
                                <h3>Grata surpresa</h3>
                                <p>“Qualidade excelente, roupas macias e gostosas de usar. Espero voltar em breve!”</p>
                                <div class="bb-author">
                                    <strong>Lidiane Veloso</strong>
                                    Goiânia - GO
                                </div>
                            </article>

                            <article class="bb-card">
                                <div class="bb-stars">★★★★★</div>
                                <h3>Cliente há anos</h3>
                                <p>“Sou cliente há anos e os produtos são ótimos, materiais inquestionáveis, de excelente qualidade.”</p>
                                <div class="bb-author">
                                    <strong>Camila Sarmento Duarte</strong>
                                    Vila Velha - ES
                                </div>
                            </article>

                            <article class="bb-card">
                                <div class="bb-stars">★★★★★</div>
                                <h3>Atendimento excelente</h3>
                                <p>“O pedido chegou no prazo. A equipe de vendas é ótima e muito atenciosa.”</p>
                                <div class="bb-author">
                                    <strong>Tatiana Azevedo</strong>

                                </div>
                            </article>

                            <article class="bb-card">
                                <div class="bb-stars">★★★★★</div>
                                <h3>Bem embalado</h3>
                                <p>“Amei as peças. Recebi tudo certinho, tudo muito bem embalado e ainda ganhei brinde!”</p>

                            <article class="bb-card">
                                <div class="bb-stars">★★★★★</div>

                            </article>

                            <article class="bb-card">
                                <div class="bb-stars">★★★★★</div>
                                <h3>Toque de amor</h3>
                                <p>“Me surpreendi com cada peça, cada detalhe um verdadeiro toque de amor.”</p>
                                <div class="bb-author">
                                    <strong>Magna Muniz</strong>
                                    Aracaju - SE
                                </div>
                            </article>

                            <article class="bb-card">
                                <div class="bb-stars">★★★★★</div>
                                <h3>Super macio</h3>
                                <p>“Estampa linda, qualidade maravilhosa, 100% algodão, super macio e chegou bem rápido!”</p>

                        </div>

                        <div class="bb-actions">
                            <button class="bb-btn bb-prev" type="button" aria-label="Avaliação anterior">‹</button>
                            <button class="bb-btn bb-next" type="button" aria-label="Próxima avaliação">›</button>
                        </div>
                    </div>

                    <div class="bb-link">

                    </div>
                </div>
            </section>
        `;

        $(html).insertBefore(selector);

        const section = document.querySelector("#bb-reviews-simple");
        const track = section.querySelector(".bb-track");
        const next = section.querySelector(".bb-next");
        const prev = section.querySelector(".bb-prev");

        function cardWidth() {
            const card = track.querySelector(".bb-card");
            const gap = window.innerWidth <= 768 ? 12 : 16;

            return card.offsetWidth + gap;
        }

        next.addEventListener("click", function () {
            if (track.scrollLeft + track.clientWidth >= track.scrollWidth - 10) {
                track.scrollTo({
                    left: 0,
                    behavior: "smooth"
                });
            } else {
                track.scrollBy({
                    left: cardWidth(),
                    behavior: "smooth"
                });
            }
        });

        prev.addEventListener("click", function () {
            track.scrollBy({
                left: -cardWidth(),
                behavior: "smooth"
            });
        });

        setInterval(function () {
            next.click();
        }, 5000);
    });
</script>
