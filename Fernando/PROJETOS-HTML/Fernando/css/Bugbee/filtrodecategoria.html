<script>
  // <![CDATA[
  (function () {
    const root = document.querySelector("#bbSizeFilter");
    if (!root) return;

    const baseUrl =
      root.getAttribute("data-base-url") || "https://www.bugbee.com.br/outlet";
    const currentUrl = new URL(window.location.href);
    const currentParams = currentUrl.searchParams;
    const filterLinks = root.querySelectorAll(
      "[data-filter-param][data-filter-value]",
    );

    function buildMergedUrl(paramName, paramValue) {
      const targetUrl = new URL(baseUrl);

      currentParams.forEach(function (value, key) {
        targetUrl.searchParams.set(key, value);
      });

      targetUrl.searchParams.set(paramName, paramValue);

      targetUrl.searchParams.delete("pagina");
      targetUrl.searchParams.delete("page");
      targetUrl.searchParams.delete("p");

      return targetUrl.toString();
    }

    function setActiveState(link) {
      const paramName = link.getAttribute("data-filter-param");
      const paramValue = link.getAttribute("data-filter-value");
      const currentValue = currentParams.get(paramName);

      if (currentValue === paramValue) {
        link.classList.add("is-active");
      } else {
        link.classList.remove("is-active");
      }
    }

    filterLinks.forEach(function (link) {
      const paramName = link.getAttribute("data-filter-param");
      const paramValue = link.getAttribute("data-filter-value");

      link.href = buildMergedUrl(paramName, paramValue);
      setActiveState(link);
    });
  })();
  // ]]>
</script>
