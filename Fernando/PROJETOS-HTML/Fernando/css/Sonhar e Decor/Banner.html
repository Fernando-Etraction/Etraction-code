<style>
    .componente-id-XjCRvyXQ0p {

    .benefits-bar {
        margin: auto !important;
        display: flex;
        --green: #10b981;
        --text: #1f2937;
        --muted: #6b7280;
        --border: #e5e7eb;
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 18px 22px;
        display: flex;
        gap: 22px;
        align-items: center;
        justify-content: space-around;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Arial, sans-serif;
        color: var(--text);
    }

    .benefit {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 0;
        position: relative;
    }

    .benefit+.benefit {
        padding-left: 22px;
    }

    .benefit+.benefit::before {
        content: "";
        position: absolute;
        left: 0;
        top: 8px;
        bottom: 8px;
        width: 1px;
        background: var(--border);
    }

    .benefit__icon {
        color: var(--green);
        flex: 0 0 auto;
        display: grid;
        place-items: center;
    }

    .benefit__text h4 {
        margin: 0 0 2px;
        font-size: 16px;
        font-weight: 700;
        line-height: 1.2;
        color: var(--text);
    }

    .benefit__text p {
        margin: 0;
        font-size: 13px;
        color: var(--muted);
        line-height: 1.3;
    }

    @media (max-width:768px) {
        .benefits-bar {
            flex-direction: column;
            gap: 14px;
            padding: 16px;
        }

        .benefit {
            width: 100%;
        }

        .benefit+.benefit {
            padding-left: 0;
        }

        .benefit+.benefit::before {
            display: none;
        }
    }
    .benefit__icon svg{

  height:36px;

}

</style>
