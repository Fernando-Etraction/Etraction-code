<style>
    .fe-benefits-container {
        max-width: 1240px;
        margin: 0 auto;
        padding: 20px 0;
    }

    .fe-benefits-carousel {
        width: 100%;
    }

    /* ajuda a centralizar no Owl */
    .fe-benefits-carousel .owl-wrapper,
    .fe-benefits-carousel .owl-item {
        text-align: center;
    }

    .fe-benefits-item {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        transition: transform 0.5s;
        -moz-transition: transform 0.5s;
        -webkit-transition: transform 0.5s;
        -o-transition: transform 0.5s;
        margin: 0 auto;
    }

    .fe-benefits-item:hover {
        transform: scale(0.97);
        -moz-transform: scale(0.97);
        -webkit-transform: scale(0.97);
        -o-transform: scale(0.97);
    }

    .fe-benefits-icon svg,
    .fe-benefits-icon img {
        max-width: 42px;
        height: 30px;
        display: block;
    }

    /* Produto usado: só contorno (sem fill) */
    .fe-benefits-item4 .fe-benefits-icon svg * {
        fill: none !important;
        stroke: black !important;
        stroke-width: 8 !important;
        stroke-linecap: round;
        stroke-linejoin: round;
    }


    .fe-benefits-text h3 {
        font-weight: 600;
        margin: 0;
        line-height: 1.1;
    }

    .fe-benefits-text p {
        margin: 0;
        text-align: left;
        color: #000;
        font-size: 13px;
        line-height: 16px;
    }

    @media(max-width: 800px) {
        .fe-benefits-container {
            padding: 15px 0;
        }

        .fe-benefits-icon svg,
        .fe-benefits-icon img {
            max-width: 35px;
            height: 28px;
        }

        .fe-benefits-text p {
            font-size: 12px;
        }
    }
</style>
