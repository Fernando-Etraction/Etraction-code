<style>
/* =========================================================
   Banner Promocional — Tema Azul #375694 + Swiper no mobile
   Organização:
   1) Variáveis
   2) Layout base
   3) Componentes (botões, timer, close)
   4) Estados (hover/active)
   5) Acessibilidade (reduced motion)
   6) Mobile + Swiper + Fallback
   ========================================================= */

/* 1) Variáveis de tema */
:root {
  --brand: #375694;        /* cor principal */
  --brand-800: #2b416e;    /* tom mais escuro para blocos */
  --brand-rgb: 55, 86, 148;

  --text-on-brand: #ffffff;
  --accent: #ffffff;       /* destaque/feedback */
  --base-radius: 6px;

  --shadow-1: 0 2px 6px rgba(var(--brand-rgb), 0.25);
  --shadow-2: 0 8px 24px rgba(var(--brand-rgb), 0.18);
  --shadow-inset: inset 0 1px 0 rgba(255, 255, 255, 0.12);
}

/* 2) Layout base */
.promo-banner-unico {
  background-color: var(--brand);
  color: var(--text-on-brand);
  padding: 12px 5%;
  width: 100%;
  z-index: 999;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 1em;
  text-align: center;
  box-sizing: border-box;
  position: relative;
  transition: transform 0.25s ease-in-out, opacity 0.25s ease-in-out;
  box-shadow: var(--shadow-1), var(--shadow-2);
}

.promo-banner-fixo {
  position: fixed !important;
  top: 0;
  left: 0;
  right: 0;
}

.promo-texto-unico {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  max-width: 1200px;
  width: 100%;
  text-align: center;
}

.promo-info {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
  font-weight: 600;
  font-size: 1em;
  justify-content: center;
}

/* 3) Componentes */
.promo-cupom{
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap; /* evita quebra entre texto e botão */
}

/* Unifica estilos de botões de cupom */
.coupon-data,
.coupon-code {
  cursor: pointer;
  padding: 6px 10px;
  background-color: var(--accent);
  color: #000;
  border-radius: var(--base-radius);
  font-size: 1em;
  font-weight: 700;
  border: 0;
  transition: background-color 0.2s ease-in-out, color 0.2s ease-in-out, transform 0.1s ease-in-out;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  box-shadow: var(--shadow-1);
}

.copy-feedback {
  color: var(--accent);
  font-weight: 700;
  font-size: 0.9em;
  display: none;
}

.timer-unico {
  display: flex;
  gap: 6px;
  align-items: stretch; /* dá mais presença aos blocos */
  flex-wrap: wrap;
  justify-content: center;
  font-size: 0.95em;
  font-variant-numeric: tabular-nums; /* dígitos com mesma largura */
}

/* Blocos do timer */
.timer-block {
  background-color: var(--brand-800);
  color: var(--text-on-brand);
  padding: 6px 8px;
  min-width: 30px;
  text-align: center;
  border-radius: var(--base-radius);
  font-weight: 700;
  font-size: 0.95em;
  line-height: 1.2;
  box-shadow: var(--shadow-1), var(--shadow-2), var(--shadow-inset);
}

/* Destaque hierárquico para DIAS (desktop) */
.timer-block--dias {
  padding: 8px 12px;
  min-width: 56px;
  font-size: 1.15em;
  border: 2px solid rgba(255,255,255,0.25);
  box-shadow:
    var(--shadow-1),
    0 12px 34px rgba(var(--brand-rgb), 0.25),
    var(--shadow-inset);
}

.timer-label {
  display: block;
  font-size: 0.55em;
  color: var(--accent);
  font-weight: 600;
  margin-top: 2px;
}

/* Botão fechar */
.close-btn {
  position: absolute;
  top: 6px;
  right: 10px;
  background-color: transparent;
  border: none;
  color: var(--text-on-brand);
  font-size: 1.2em;
  cursor: pointer;
  line-height: 1;
}
.close-btn:hover { color: var(--accent); }
.close-btn:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

/* 4) Estados */
.coupon-data:hover,
.coupon-code:hover {
  background-color: #ffe17a;
  color: #111;
  transform: translateY(-1px);
  box-shadow: 0 10px 30px rgba(var(--brand-rgb), 0.22);
}
.coupon-data:active,
.coupon-code:active { transform: translateY(0); }

/* 5) Acessibilidade: reduz animações se o usuário preferir */
@media (prefers-reduced-motion: reduce) {
  .promo-banner-unico { transition: none; }
  .coupon-data, .coupon-code { transition: none; }
}

/* 6) Mobile + Swiper + Fallback */
@media (max-width: 480px) {
  .promo-banner-unico {
    position: sticky;
    top: 0;
    font-size: 0.92em;
    padding: 8px 4%;
  }

  .promo-texto-unico {
    flex-direction: column;
    gap: 6px;
  }

  .promo-info {
    justify-content: center;
    font-size: 0.95em;
    gap: 4px;
  }

  .coupon-data,
  .coupon-code {
    padding: 3px 7px;
    font-size: 0.95em;
  }
  .coupon-data:hover,
  .coupon-code:hover {
    background-color: var(--accent);
    color: #111;
    transform: none;
    box-shadow: var(--shadow-1);
  }

  .timer-unico {
    gap: 4px;
    font-size: 0.9em; /* um pouco menor no mobile */
  }

  /* Mantém a hierarquia sem exagero no mobile */
  .timer-block--dias {
    min-width: 48px;
    font-size: 1.05em;
    padding: 7px 10px;
  }

  .timer-block {
    min-width: 28px;
    padding: 5px 6px;
    font-size: 0.95em;
  }

  .timer-label {
    font-size: 0.5em;
    margin-top: 1px;
  }
}

/* Controle de exibição desktop x mobile (carrossel) */
@media (max-width: 480px) {
  .promo-texto-unico--desktop { display: none !important; }
  .promo-texto-unico--mobile { display: block !important; padding: 10px; }

  .promo-info{
    font-size: 12px;
  }
}
@media (min-width: 481px) {
  .promo-texto-unico--desktop { display: flex !important; }
  .promo-texto-unico--mobile { display: none !important; }
}

/* ===== Swiper com prefixo DUNA (equivalente ao CSS do Swiper) ===== */
.DUNA-swiper { position: relative; overflow: hidden; width: 100%; }
.DUNA-swiper .DUNA-swiper-wrapper {
  display: flex;
  transition-property: transform;
  box-sizing: content-box;
}
.DUNA-swiper .DUNA-swiper-slide {
  flex-shrink: 0;
  width: 100%;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  box-sizing: border-box;
  padding: 0 4px;
  gap: 6px;
}

/* ===== Fallback: se Swiper não carregar no mobile, mostra layout desktop ===== */
@media (max-width: 480px) {
  .js-no-swiper .promo-texto-unico--desktop { display: flex !important; }
  .js-no-swiper .promo-texto-unico--mobile { display: none !important; }
}
</style>

<script>
// <![CDATA[
$(document).ready(function () {
  /* =================== MARCAÇÃO (desktop + mobile/carrossel) =================== */
  const $banner = $(`
    <div class="promo-banner-unico" role="region" aria-label="Promoção Black November"
         data-days="10" data-ls-key="promo_black_nov_end"><!-- data-end-date opcional -->
      <button class="close-btn" aria-label="Fechar aviso" type="button">×</button>

      <!-- DESKTOP: tudo junto -->
      <div class="promo-texto-unico promo-texto-unico--desktop">
        <div class="promo-info">
          <span style="font-weight:600">
            <strong>Black November</strong> - Site com Até 62% OFF
          </span>
          <span> - Expira em:</span>
        </div>

        <div class="timer-unico" aria-live="polite">
          <div class="timer-block">
            <span class="js-dias">10</span>
            <span class="timer-label">DIAS</span>
          </div>
          <div class="timer-block">
            <span class="js-horas">00</span>
            <span class="timer-label">HRS</span>
          </div>
          <div class="timer-block">
            <span class="js-minutos">00</span>
            <span class="timer-label">MIN</span>
          </div>
          <div class="timer-block">
            <span class="js-segundos">00</span>
            <span class="timer-label">SEG</span>
          </div>
        </div>

        <span class="copy-feedback" aria-hidden="true">Copiado!</span>
      </div>

      <!-- MOBILE: Swiper com 2 slides -->
      <div class="promo-texto-unico promo-texto-unico--mobile">
        <div class="DUNA-swiper">
          <div class="DUNA-swiper-wrapper">
            <!-- Slide 1: Texto + cupom -->
            <div class="DUNA-swiper-slide">
              <div class="promo-info">
                <span style="font-weight:600"><strong>Black November</strong> — Site com Até 62% OFF </span>
              </div>
            </div>
            <!-- Slide 2: Expira em + timer -->
            <div class="DUNA-swiper-slide">
              <div class="promo-info"><span>Expira em:</span></div>
              <div class="timer-unico" aria-live="polite" style="margin-left:6px;">
                <div class="timer-block timer-block--dias">
                  <span class="js-dias">10</span>
                  <span class="timer-label">DIAS</span>
                </div>
                <div class="timer-block">
                  <span class="js-horas">00</span>
                  <span class="timer-label">HRS</span>
                </div>
                <div class="timer-block">
                  <span class="js-minutos">00</span>
                  <span class="timer-label">MIN</span>
                </div>
                <div class="timer-block">
                  <span class="js-segundos">00</span>
                  <span class="timer-label">SEG</span>
                </div>
              </div>
            </div>
          </div>
        </div>
        <span class="copy-feedback" aria-hidden="true">Copiado!</span>
      </div>
    </div>
  `);

  // Insere antes do .header-middle
  const $hdr = $(".header-middle");
  if ($hdr.length) { $banner.insertBefore($hdr.first()); }
  else { $("body").prepend($banner); }

  /* =================== TIMER (10 dias OU data fixa) =================== */
  const LS_KEY = ($banner.data("lsKey") || "promo_black_nov_end");

  function resolveEndTimestamp() {
    const saved = localStorage.getItem(LS_KEY);
    const attr = $banner.data("endDate");
    const hasFixedDate = typeof attr !== "undefined" && String(attr).trim() !== "";

    // Se houver data fixa, prioriza; se mudar depois, limpe a chave no localStorage
    if (hasFixedDate) {
      const fixed = new Date(String(attr));
      return fixed.getTime();
    }

    // Caso contrário, usa o número de dias (padrão: 10), persistindo no localStorage
    if (saved && !isNaN(saved)) {
      return parseInt(saved, 10);
    }

    const days = parseInt($banner.data("days"), 10) || 10;
    const end = new Date();
    // fim do dia do N‑ésimo dia (incluindo hoje). Ex.: hoje + (days-1), 23:59:59.999
    end.setHours(23, 59, 59, 999);
    end.setDate(end.getDate() + (days - 1));

    const ts = end.getTime();
    try { localStorage.setItem(LS_KEY, String(ts)); } catch (e) {}
    return ts;
  }

  let endTs = resolveEndTimestamp();

  function atualizarCronometro() {
    const agora = Date.now();
    let restante = endTs - agora;

    if (restante <= 0) {
      $(".js-dias").text("00");
      $(".js-horas").text("00");
      $(".js-minutos").text("00");
      $(".js-segundos").text("00");
      clearInterval(intervalo);
      $banner.attr("aria-label", "Promoção encerrada");
      return;
    }

    const DIA = 24 * 60 * 60 * 1000;
    const HORA = 60 * 60 * 1000;
    const MIN = 60 * 1000;

    const dias = Math.floor(restante / DIA);           restante %= DIA;
    const horas = Math.floor(restante / HORA);         restante %= HORA;
    const minutos = Math.floor(restante / MIN);
    const segundos = Math.floor((restante % MIN) / 1000);

    const pad2 = (n) => String(n).padStart(2, "0");

    $(".js-dias").text(String(dias).padStart(2, "0"));
    $(".js-horas").text(pad2(horas));
    $(".js-minutos").text(pad2(minutos));
    $(".js-segundos").text(pad2(segundos));
  }

  const intervalo = setInterval(atualizarCronometro, 1000);
  atualizarCronometro();

  /* =================== FECHAR BANNER =================== */
  $banner.on("click", ".close-btn", function () {
    clearInterval(intervalo);
    if (window.__DUNA_swiper && typeof window.__DUNA_swiper.destroy === "function") {
      window.__DUNA_swiper.destroy(true, true);
      window.__DUNA_swiper = null;
    }
    $banner.css("opacity", 0);
    setTimeout(() => $banner.remove(), 250);
    $("body").css("padding-top", ""); // remove compensação, se houver
  });

  /* =================== FIXO APÓS SCROLL + COMPENSAÇÃO =================== */
  const FIX_OFFSET = 100; // px
  const ajustarPaddingTopo = () => {
    if ($banner.hasClass("promo-banner-fixo")) {
      const h = $banner.outerHeight();
      $("body").css("padding-top", h + "px");
    } else {
      $("body").css("padding-top", "");
    }
  };

  const onScroll = () => {
    if ($(window).scrollTop() > FIX_OFFSET) {
      if (!$banner.hasClass("promo-banner-fixo")) {
        $banner.addClass("promo-banner-fixo");
        ajustarPaddingTopo();
      }
    } else {
      if ($banner.hasClass("promo-banner-fixo")) {
        $banner.removeClass("promo-banner-fixo");
        ajustarPaddingTopo();
      }
    }
  };
  $(window).on("scroll", onScroll);
  onScroll();

  /* =================== COPIAR CUPOM (com fallback) =================== */
  $(document).on("click", ".coupon-data, .coupon-code", function () {
    const coupon = $(this).data("coupon") || $(this).text().trim();
    const $scope = $(this).closest(".promo-texto-unico");
    const showFeedback = () => {
      $scope.find(".copy-feedback").stop(true, true).fadeIn(150).delay(1200).fadeOut(150);
    };

    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(coupon).then(showFeedback).catch(function(){
        const tempInput = $("<input>");
        $("body").append(tempInput);
        tempInput.val(coupon).trigger("focus").select();
        try { document.execCommand("copy"); } catch(e) {}
        tempInput.remove();
        showFeedback();
      });
    } else {
      const tempInput = $("<input>");
      $("body").append(tempInput);
      tempInput.val(coupon).trigger("focus").select();
      try { document.execCommand("copy"); } catch(e) {}
      tempInput.remove();
      showFeedback();
    }
  });

  /* =================== SWIPER (carregado dinamicamente) =================== */
  function initDunaSwiper() {
    if (window.__DUNA_swiper) return; // já existe
    const el = document.querySelector(".DUNA-swiper");
    if (!el || typeof Swiper === "undefined") return;

    window.__DUNA_swiper = new Swiper(".DUNA-swiper", {
      wrapperClass: "DUNA-swiper-wrapper",
      slideClass: "DUNA-swiper-slide",
      containerModifierClass: "DUNA-swiper-",
      loop: true,
      speed: 300,
      allowTouchMove: true,
      autoplay: {
        delay: 2000, // 2s por slide
        disableOnInteraction: false,
        pauseOnMouseEnter: false,
      },
    });
  }

  function destroyDunaSwiper() {
    if (window.__DUNA_swiper && typeof window.__DUNA_swiper.destroy === "function") {
      window.__DUNA_swiper.destroy(true, true);
      window.__DUNA_swiper = null;
    }
  }

  function loadSwiperAssets(callback) {
    if (window.Swiper) { callback && callback(); return; }

    // CSS
    if (!document.getElementById("swiper-css")) {
      const link = document.createElement("link");
      link.id = "swiper-css";
      link.rel = "stylesheet";
      link.href = "https://unpkg.com/swiper@9/swiper-bundle.min.css";
      document.head.appendChild(link);
    }

    // JS
    if (!document.getElementById("swiper-js")) {
      const script = document.createElement("script");
      script.id = "swiper-js";
      script.src = "https://unpkg.com/swiper@9/swiper-bundle.min.js";
      script.onload = function(){ callback && callback(); };
      document.head.appendChild(script);
    } else {
      // Se já existir a tag, tenta inicializar após pequeno atraso
      setTimeout(function(){ if (window.Swiper) { callback && callback(); } }, 300);
    }
  }

  function ensureSwiperForViewport() {
    const isMobile = window.matchMedia("(max-width: 480px)").matches;

    if (isMobile) {
      if (window.Swiper) {
        initDunaSwiper();
        $banner.removeClass("js-no-swiper");
      } else {
        $banner.addClass("js-no-swiper"); // fallback: mostra layout desktop no mobile
        loadSwiperAssets(function(){
          // Tenta novamente se continuar em viewport mobile
          if (window.matchMedia("(max-width: 480px)").matches) {
            initDunaSwiper();
            $banner.removeClass("js-no-swiper");
          }
        });
      }
    } else {
      destroyDunaSwiper();
      $banner.removeClass("js-no-swiper");
    }
  }

  // Chama agora e no resize (com debounce)
  ensureSwiperForViewport();
  let resizeTO;
  $(window).on("resize", function () {
    clearTimeout(resizeTO);
    resizeTO = setTimeout(ensureSwiperForViewport, 120);
  });

  /* Evita “piscar” no iOS ao tocar no botão */
  document.addEventListener("touchstart", function(){}, {passive: true});
});
// ]]>
</script>
