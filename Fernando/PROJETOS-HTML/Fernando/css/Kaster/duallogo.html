    function replaceMainLogo() {
      const logoContainer = document.querySelector("#header-react-app .header-middle .logo");

      if (!logoContainer) return;

      if (logoContainer.querySelector(".kaster-dual-logo")) return;

      logoContainer.innerHTML = "";

      logoContainer.insertAdjacentHTML(
        "afterbegin",
        `
          <div class="kaster-dual-logo">
            <a
              class="kaster-dual-logo__item"
              href="${LINK_CASA}"
              title="Kaster Casa"
              aria-label="Kaster Casa"
            >
              <img
                src="${LOGO_KASTER_CASA}"
                alt="Kaster Casa"
                loading="eager"
              >
            </a>

            <a
              class="kaster-dual-logo__item"
              href="${LINK_LOGOS}"
              title="Kaster Construção"
              aria-label="Kaster Construção"
            >
              <img
                src="${LOGO_KASTER_CONSTRUCAO}"
                alt="Kaster Construção"
                loading="eager"
              >
            </a>
          </div>
        `
      );
    }

    replaceMainLogo();

    document.addEventListener("DOMContentLoaded", replaceMainLogo);

    const observer = new MutationObserver(function () {
      replaceMainLogo();
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true
    });
  })();
</script>
