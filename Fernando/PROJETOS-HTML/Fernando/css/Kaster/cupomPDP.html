    /* ====== OVERRIDES P/ CABER EM 386x70 E NÃO QUEBRAR TEXTO ====== */

<div class="content-cupom compacto-386 clearfix" id="cupom-bloco">
    <div class="descricao-desconto">
        <div>BLACK FRIDAY</div>
        <p class="obs">Aplique o cupom <strong>BLACK5</strong>&nbsp;no carrinho e ganhe <strong>5% OFF</strong> nas suas
            Compras!</p>
            </div>
            <div class="aplicar-desconto">
                <div class="area-desconto">
                    <input id="cupom" class="cupom" readonly="readonly" type="text" value="BLACK5" />
                    <div class="something">Clique e copie o cupom!</div>
                    <p>
                        <script>
                    // <![CDATA[
                    $(document).ready(function () {
                        // copiar com Zord.copy se existir; fallback manual
                        $('.area-desconto #cupom').on('click', function () {
                            let ok = false;
                            if (typeof Zord !== 'undefined' && Zord.copy && Zord.copy('#cupom')) ok = true;
                            if (!ok) {
                                try {
                                    const $tmp = $('<input>'); $('body').append($tmp);
                                    $tmp.val($('#cupom').val()).select(); document.execCommand('copy'); $tmp.remove(); ok = true;
                                } catch (e) { }
                            }
                            if (ok) {
                                // feedback rápido sem alterar cores
                                const $txt = $('#cupom-bloco .descricao-desconto p.obs').first();
                                const old = $txt.html();
                                $txt.html('Código copiado! Use <strong>BLACK5</strong> no carrinho.');
                                setTimeout(() => { $txt.html(old); fitAll(); }, 1800);
                            }
                        });

                        // inserir após .area-comprar
                        const $cupom = $("#cupom-bloco");
                        const place = () => { const $ref = $(".area-comprar").first(); if ($ref.length && !$ref.next().is("#cupom-bloco")) { $ref.after($cupom); } };
                        place();
                        new MutationObserver(place).observe(document.body, { childList: true, subtree: true });

                        // ====== AUTO-AJUSTE DE TEXTO (sem quebrar) ======
                        function fitLine(el, minPx) {
                            const $el = $(el);
                            const parent = $el.parent()[0];
                            if (!parent) return;
                            const maxW = parent.clientWidth - 160; // reserva ~150px p/ cupom + gap
                            let size = parseFloat(getComputedStyle(el).fontSize);
                            const original = size;
                            // reduz até caber na largura disponível
                            while (el.scrollWidth > maxW && size > minPx) {
                                size -= 0.5; el.style.fontSize = size + 'px';
                            }
                            // se sobrou espaço, tenta crescer até o limite original
                            while (el.scrollWidth <= maxW && size < original) {
                                size += 0.5; el.style.fontSize = size + 'px';
                                if (el.scrollWidth > maxW) { size -= 0.5; el.style.fontSize = size + 'px'; break; }
                            }
                        }
                        function fitAll() {
                            const title = document.querySelector('#cupom-bloco .descricao-desconto > div');
                            const line1 = document.querySelectorAll('#cupom-bloco .descricao-desconto p.obs')[0];
                            const line2 = document.querySelectorAll('#cupom-bloco .descricao-desconto p.obs')[1];
                            if (title) fitLine(title, 12);
                            if (line1) fitLine(line1, 10);
                            if (line2) fitLine(line2, 9);
                        }
                        fitAll();
                        window.addEventListener('resize', () => { fitAll(); });

                    });
                    // ]]>
                </script>
            </p>
        </div>
    </div>
</div>

<p>
    <script type="text/javascript">
        // <![CDATA[
        $(document).ready(function () {
            // garante que o bloco compacto fique após .area-comprar sempre
            const $cupom = $(".content-cupom.compacto-386");
            const place = () => { if ($(".area-comprar").length && !$(".area-comprar").next().is(".content-cupom.compacto-386")) { $(".area-comprar").after($cupom); } };
            place();
            const elem = document.querySelector("#main-cart-area") || document.querySelector("#cart-area") || document.body;
            new MutationObserver(place).observe(elem, { childList: true, subtree: true });
        });
        // ]]>
    </script>
</p>
