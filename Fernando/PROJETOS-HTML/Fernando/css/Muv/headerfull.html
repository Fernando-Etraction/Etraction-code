<script>
(function () {
  const HEADER_SELECTOR = "#header-react-app";
  const SCROLL_CLASS = "submenu-scroll-lock";
  let scrollTimer;

  function injectStyle() {
    if (document.getElementById("submenu-scroll-lock-style")) return;

    const style = document.createElement("style");
    style.id = "submenu-scroll-lock-style";
    style.textContent = `
      ${HEADER_SELECTOR}.${SCROLL_CLASS} #nav-root > li.menu-list-19.has-childs > .container-menu,
      ${HEADER_SELECTOR}.${SCROLL_CLASS} #nav-root > li.menu-list-21.has-childs > .container-menu,
      ${HEADER_SELECTOR}.${SCROLL_CLASS} #nav-root > li.menu-list-22.has-childs > .container-menu{
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }

      ${HEADER_SELECTOR}.${SCROLL_CLASS} #nav-root > li.menu-list-19.has-childs::after,
      ${HEADER_SELECTOR}.${SCROLL_CLASS} #nav-root > li.menu-list-21.has-childs::after,
      ${HEADER_SELECTOR}.${SCROLL_CLASS} #nav-root > li.menu-list-22.has-childs::after{
        pointer-events: none !important;
      }
    `;
    document.head.appendChild(style);
  }

  function lockMenus() {
    const header = document.querySelector(HEADER_SELECTOR);
    if (!header) return;
    header.classList.add(SCROLL_CLASS);
  }

  function unlockMenus() {
    const header = document.querySelector(HEADER_SELECTOR);
    if (!header) return;
    header.classList.remove(SCROLL_CLASS);
  }

  function onScroll() {
    lockMenus();
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(unlockMenus, 180);
  }

  injectStyle();
  window.addEventListener("scroll", onScroll, { passive: true });
})();
</script>
