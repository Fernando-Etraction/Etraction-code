<script>// <![CDATA[
(function () {
  const HEADER_SELECTOR = "#header-react-app";
  const SCROLL_CLASS = "submenu-scroll-lock";
  let scrollTimer;

  function injectStyle() {
    if (document.getElementById("submenu-scroll-lock-style")) return;

    const style = document.createElement("style");
    style.id = "submenu-scroll-lock-style";
    style.textContent = `
      ${HEADER_SELECTOR}.${SCROLL_CLASS} #nav-root > li.menu-list-18.has-childs > .container-menu,
      ${HEADER_SELECTOR}.${SCROLL_CLASS} #nav-root > li.menu-list-19.has-childs > .container-menu,
      ${HEADER_SELECTOR}.${SCROLL_CLASS} #nav-root > li.menu-list-20.has-childs > .container-menu,
      ${HEADER_SELECTOR}.${SCROLL_CLASS} #nav-root > li.menu-list-21.has-childs > .container-menu,
      ${HEADER_SELECTOR}.${SCROLL_CLASS} #nav-root > li.menu-list-22.has-childs > .container-menu{
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }

      ${HEADER_SELECTOR}.${SCROLL_CLASS} #nav-root > li.menu-list-18.has-childs::after,
      ${HEADER_SELECTOR}.${SCROLL_CLASS} #nav-root > li.menu-list-19.has-childs::after,
      ${HEADER_SELECTOR}.${SCROLL_CLASS} #nav-root > li.menu-list-20.has-childs::after,
      ${HEADER_SELECTOR}.${SCROLL_CLASS} #nav-root > li.menu-list-21.has-childs::after,
      ${HEADER_SELECTOR}.${SCROLL_CLASS} #nav-root > li.menu-list-22.has-childs::after{
        pointer-events: none !important;
      }
    `;
    document.head.appendChild(style);
  }

  function lockMenus() {
    const header = document.querySelector(HEADER_SELECTOR);
    if (!header) return;
    header.classList.add(SCROLL_CLASS);
  }

  function unlockMenus() {
    const header = document.querySelector(HEADER_SELECTOR);
    if (!header) return;
    header.classList.remove(SCROLL_CLASS);
  }

  function onScroll() {
    lockMenus();
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(unlockMenus, 180);
  }

  injectStyle();
  window.addEventListener("scroll", onScroll, { passive: true });
})();
// ]]></script>
<script>// <![CDATA[
(function () {
  var MENU_OPEN_SELECTOR = '#header-react-app .menu-mobile-ctn.menu-open.left-open';
  var INFO_USER_SELECTOR = '#header-react-app .menu-mobile-ctn.menu-open.left-open .info-user';
  var CUSTOM_BTN_CLASS = 'custom-close-inside-info-user';

  function getInfoUser() {
    return document.querySelector(INFO_USER_SELECTOR);
  }

  function getNativeCloseButton() {
    var scope = document.querySelector(MENU_OPEN_SELECTOR);
    if (!scope) return null;

    return scope.querySelector('.close-button') ||
           scope.querySelector('[class*="close-button"]') ||
           scope.querySelector('[class*="close"]') ||
           scope.querySelector('button[aria-label*="Fechar"]') ||
           scope.querySelector('button[aria-label*="fechar"]');
  }

  function forceCloseMenu() {
    var menu = document.querySelector(MENU_OPEN_SELECTOR);
    if (!menu) return;

    menu.classList.remove('menu-open');
    menu.classList.remove('left-open');

    document.body.classList.remove('overflow-hidden');
    document.documentElement.classList.remove('overflow-hidden');

    var overlays = document.querySelectorAll('#header-react-app .animate-overlayShow');
    overlays.forEach(function(el){
      el.style.display = 'none';
    });
  }

  function createButton(infoUser) {
    if (!infoUser) return;
    if (infoUser.querySelector('.' + CUSTOM_BTN_CLASS)) return;

    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = CUSTOM_BTN_CLASS;
    btn.setAttribute('aria-label', 'Fechar menu');
    btn.innerHTML = '&times;';

    btn.addEventListener('click', function (e) {
      e.preventDefault();
      e.stopPropagation();

      var nativeBtn = getNativeCloseButton();

      if (nativeBtn && nativeBtn !== btn) {
        nativeBtn.click();
      } else {
        forceCloseMenu();
      }
    });

    infoUser.appendChild(btn);
  }

  function init() {
    var infoUser = getInfoUser();
    if (!infoUser) return;
    createButton(infoUser);
  }

  var observer = new MutationObserver(function () {
    init();
  });

  observer.observe(document.body, {
    childList: true,
    subtree: true,
    attributes: true,
    attributeFilter: ['class']
  });

  window.addEventListener('load', init);
  setTimeout(init, 300);
  setTimeout(init, 800);
  setTimeout(init, 1500);
})();
// ]]></script>
