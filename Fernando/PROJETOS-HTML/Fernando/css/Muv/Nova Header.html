<script>
    const LOG = (...args) => console.log("[Nova Header]", ...args);

    const SEL = ".container-menu ul";

    function init(){
        const el = document.querySelector(SEL);
        if(!el) return LOG("❌ elemento não encontrado", SEL)
        else LOG("✅ elemento encontrado", el);{
            el.style.setProperty("visibility", "visible", "important");
        };
    }

    function removerHover(SEL){
        const el = document.querySelector(SEL);
        if(!el) return LOG("❌ elemento não encontrado", SEL)
        else LOG("✅ elemento encontrado", el);{
            el.style.setProperty("visibility", "visible", "important");
        };
    }
</script>
