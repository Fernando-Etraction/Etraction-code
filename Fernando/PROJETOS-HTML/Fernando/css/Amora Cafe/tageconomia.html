<style>
    .etc-economia-card {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin: 12px 0;
        padding: 11px 13px;
        font-family: inherit;
        color: #111;
        background: #fff;
        border: 1px solid #111;
        border-radius: 4px;
        box-sizing: border-box;
        line-height: 1.2;
        animation: etcEconomiaEntrada 0.22s ease forwards;
    }

    .etc-economia-texto {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
    }

    .etc-economia-title {
        font-size: 12px;
        font-weight: 600;
        color: #111;
        white-space: nowrap;
    }

    .etc-economia-separador {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: #111;
        flex-shrink: 0;
    }

    .etc-economia-subtitle {
        font-size: 11px;
        font-weight: 400;
        color: #111;
        white-space: nowrap;
    }

    .etc-economia-valor {
        font-size: 14px;
        font-weight: 800;
        color: #111;
        white-space: nowrap;
        letter-spacing: -0.02em;
    }

    @keyframes etcEconomiaEntrada {
        from {
            opacity: 0;
            transform: translateY(3px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @media (max-width: 768px) {
        .etc-economia-card {
            margin: 10px 0;
            padding: 10px 11px;
            gap: 8px;
        }

        .etc-economia-texto {
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
        }

        .etc-economia-separador {
            display: none;
        }

        .etc-economia-title {
            font-size: 11px;
        }

        .etc-economia-subtitle {
            font-size: 10px;
        }

        .etc-economia-valor {
            font-size: 13px;
        }
    }
</style>

<script>
(function () {
    function converterPreco(texto) {
        if (!texto) return 0;

        const textoLimpo = texto
            .toString()
            .replace(/\s/g, " ")
            .replace(/R\$/gi, "")
            .replace(/de/gi, "")
            .replace(/por/gi, "")
            .trim();

        const precoEncontrado = textoLimpo.match(/\d{1,3}(?:\.\d{3})*,\d{2}|\d+,\d{2}|\d+(?:\.\d{2})?/);

        if (!precoEncontrado) return 0;

        return parseFloat(
            precoEncontrado[0]
                .replace(/\./g, "")
                .replace(",", ".")
        ) || 0;
    }

    function formatarPreco(valor) {
        return valor.toLocaleString("pt-BR", {
            style: "currency",
            currency: "BRL"
        });
    }

    function inserirEconomia() {
        const precoDeElemento = document.querySelector("#content-price-product .preco-de span");

        const precoPixElemento = document.querySelector(
            "#content-price-product .values-area .price.pix span"
        );

        const ancoraPagamento = document.querySelector(".mais-formas-pagamento");

        if (!precoDeElemento || !precoPixElemento || !ancoraPagamento || !ancoraPagamento.parentNode) {
            return false;
        }

        const precoDe = converterPreco(precoDeElemento.textContent);
        const precoPix = converterPreco(precoPixElemento.textContent);
        const economia = precoDe - precoPix;

        if (!precoDe || !precoPix || economia <= 0) {
            return false;
        }

        const textoEconomia = formatarPreco(economia);
        const parent = ancoraPagamento.parentNode;

        let cardEconomia = parent.querySelector(".etc-economia-card");

        if (!cardEconomia) {
            cardEconomia = document.createElement("div");
            cardEconomia.className = "etc-economia-card";

            cardEconomia.innerHTML = `
                <div class="etc-economia-texto">
                    <span class="etc-economia-title">Economia no Pix</span>
                    <span class="etc-economia-separador"></span>
                    <span class="etc-economia-subtitle">pagamento à vista</span>
                </div>

                <strong class="etc-economia-valor">${textoEconomia}</strong>
            `;

            parent.insertBefore(cardEconomia, ancoraPagamento);
        } else {
            const valorEconomia = cardEconomia.querySelector(".etc-economia-valor");

            if (valorEconomia && valorEconomia.textContent.trim() !== textoEconomia) {
                valorEconomia.textContent = textoEconomia;
            }
        }

        return true;
    }

    function iniciar() {
        let tentativas = 0;
        const limiteTentativas = 25;

        const intervalo = setInterval(function () {
            tentativas++;

            const inseriu = inserirEconomia();

            if (inseriu || tentativas >= limiteTentativas) {
                clearInterval(intervalo);
            }
        }, 250);
    }

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", iniciar);
    } else {
        iniciar();
    }
})();
</script>
