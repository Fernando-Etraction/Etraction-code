<style>
  .cupom-lateral {
    max-width: 440px;
    width: 100%;
    margin: 16px 0;
    padding: 20px;
    background: linear-gradient(135deg, #ffffff 0%, #fafafa 100%);
    border: 2px solid #e5e5e5;
    border-radius: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,.08), inset 0 1px 0 rgba(255,255,255,.5);
    font-family: 'Montserrat', sans-serif;
    display: flex;
    justify-content: space-between;
    align-items: center;
    min-height: 100px;
    box-sizing: border-box;
    gap: 16px;
    position: relative;
    transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .cupom-lateral:hover {
    border-color: #d0d0d0;
    box-shadow: 0 12px 32px rgba(0,0,0,.12), inset 0 1px 0 rgba(255,255,255,.5);
  }

  .cupom-lateral .texto { flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .cupom-lateral .texto .kicker { font-size: 12px; color: #666; text-transform: uppercase; margin-bottom: 6px; letter-spacing: .3px; font-weight: 600; }
  .cupom-lateral .texto .kicker strong { color: #ff6b35; font-size: 1.1rem; font-weight: 900; }
  .cupom-lateral .texto .titulo { font-size: 14px; color: #444; line-height: 1.4; margin-bottom: 6px; }

  .cupom-lateral .aprox-pix {
    font-size: 12px;
    color: #666;
    line-height: 1.4;
    margin-top: 8px;
  }
  .cupom-lateral .aprox-pix strong { font-weight: 900; color: #000; }

  .cupom-lateral .acoes { display: flex; flex-direction: column; gap: 10px; align-items: center; flex-shrink: 0; }

  .cupom-lateral .codigo-area {
    position: relative;
    width: 160px;
    height: 50px;
    background: linear-gradient(135deg, #f8f8f8 0%, #f0f0f0 100%);
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: inset 0 2px 4px rgba(0,0,0,.03);
  }

  .cupom-lateral .codigo-area:hover {
    border-color: #d0d0d0;
    background: linear-gradient(135deg, #fafafa 0%, #f5f5f5 100%);
    box-shadow: inset 0 2px 4px rgba(0,0,0,.05);
  }

  .cupom-lateral .codigo-texto { font-weight: 900; font-size: 0.95rem; color: #222; user-select: none; z-index: 1; letter-spacing: .1px; }
  .cupom-lateral canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; touch-action: none; }

  .cupom-lateral .copiado {
    position: absolute;
    bottom: -28px;
    right: 16px;
    font-size: .75rem;
    color: #28a745;
    font-weight: 700;
    display: none;
    animation: slideIn .3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .cupom-lateral .btn-desconto {
    width: 160px;
    height: 40px;
    padding: 0 12px;
    border-radius: 12px;
    border: 0;
    cursor: pointer;
    font-weight: 900;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .3px;
    background: linear-gradient(135deg, #000 0%, #1a1a1a 100%);
    color: #fff;
    transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
    white-space: nowrap;
    box-shadow: 0 4px 12px rgba(0,0,0,.15);
  }
  .cupom-lateral .btn-desconto:hover { 
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,.2);
    background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
  }
  .cupom-lateral .btn-desconto:active {
    transform: translateY(0);
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }

  .cupom-lateral .erro-selecao {
    display: none;
    font-size: 11px;
    color: #dc2626;
    font-weight: 700;
    text-align: center;
    margin-top: 4px;
    animation: slideIn .3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .mz-highlight-required {
    outline: 2px solid #dc2626 !important;
    outline-offset: 2px !important;
    border-radius: 8px;
  }

  @media (max-width: 768px) {
    .cupom-lateral { 
      flex-direction: column; 
      align-items: stretch; 
      gap: 14px;
      padding: 16px;
    }
    .cupom-lateral .acoes { width: 100%; }
    .cupom-lateral .codigo-area, .cupom-lateral .btn-desconto { 
      width: 100%; 
      max-width: 340px; 
    }
    .cupom-lateral .texto .kicker { font-size: 11px; }
    .cupom-lateral .texto .kicker strong { font-size: 1rem; }
  }
</style>

<script>
  $(document).ready(function () {
    const TAG = "[AUTO-CUPOM]";
    const log  = (...a) => console.log(TAG, ...a);
    const warn = (...a) => console.warn(TAG, ...a);

    // ===== Config =====
    const CUPOM = "PRIMEIRACOMPRA";
    const CUPOM_PERCENT = 10.526; // ✅ percentual exato do seu cálculo

    // ===== LocalStorage Keys =====
    const LS_COUPON   = "mz_auto_coupon";
    const LS_APPLY_ON = "mz_apply_coupon_on_cart";
    const LS_TOKEN    = "mz_apply_coupon_token";

    function markApplyOnCart() {
      localStorage.setItem(LS_COUPON, CUPOM);
      localStorage.setItem(LS_APPLY_ON, "1");
      localStorage.setItem(LS_TOKEN, String(Date.now()));
      log("PDP: marcado para aplicar no carrinho.", {
        cupom: CUPOM,
        applyOn: localStorage.getItem(LS_APPLY_ON),
        token: localStorage.getItem(LS_TOKEN)
      });
    }

    function feedbackCopiado() {
      const msg = $("#copiado-msg");
      const wrapper = $("#codigo-wrapper");
      
      msg.fadeIn(200).delay(1800).fadeOut(200);
      wrapper.css("border-color", "#28a745");
      wrapper.css("background", "linear-gradient(135deg, #f0fdf4 0%, #e8faee 100%)");
      
      setTimeout(() => {
        wrapper.css("border-color", "#e0e0e0");
        wrapper.css("background", "linear-gradient(135deg, #f8f8f8 0%, #f0f0f0 100%)");
      }, 350);
    }

    function initRevealEffect() {
      const canvas = document.getElementById("canvasRevelacao");
      const wrapper = document.getElementById("codigo-wrapper");
      if (!canvas || !wrapper) return;

      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      canvas.width = wrapper.offsetWidth;
      canvas.height = wrapper.offsetHeight;

      ctx.fillStyle = "#ff6b35";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.font = "bold 13px sans-serif";
      ctx.fillStyle = "#fff";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("← RASPE AQUI →", canvas.width / 2, canvas.height / 2);

      ctx.globalCompositeOperation = "destination-out";

      function erase(x, y) {
        ctx.beginPath();
        ctx.arc(x, y, 25, 0, Math.PI * 2, false);
        ctx.fill();
      }

      const handleMove = (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        let x, y;

        if (e.touches && e.touches.length > 0) {
          x = e.touches[0].clientX - rect.left;
          y = e.touches[0].clientY - rect.top;
        } else {
          x = e.clientX - rect.left;
          y = e.clientY - rect.top;
        }
        erase(x, y);
      };

      canvas.addEventListener("mousemove", handleMove);
      canvas.addEventListener("touchmove", handleMove, { passive: false });
    }

    // ✅ Framework-friendly set value (React/Vue etc)
    function setNativeValue(el, value) {
      const proto = Object.getPrototypeOf(el);
      const desc = Object.getOwnPropertyDescriptor(proto, "value");
      if (desc && desc.set) desc.set.call(el, value);
      else el.value = value;
    }
    function fireInput(el) {
      el.dispatchEvent(new InputEvent("input", { bubbles: true, cancelable: true, inputType: "insertText" }));
      el.dispatchEvent(new Event("change", { bubbles: true, cancelable: true }));
    }
    function key(el, type, keyName) {
      el.dispatchEvent(new KeyboardEvent(type, {
        bubbles: true, cancelable: true,
        key: keyName, code: keyName === "Enter" ? "Enter" : "",
        which: keyName === "Enter" ? 13 : 0,
        keyCode: keyName === "Enter" ? 13 : 0
      }));
    }

    // ======================================================
    // ✅ "Pague aproximadamente ... no Pix com o cupom"
    // Cálculo EXATO (o seu):
    // el = document.getElementsByClassName('price-big')[1]
    // discounted = value * (1 - 10.526/100)
    // ======================================================
    function getPixEl() {
      const els = document.getElementsByClassName("price-big");
      // ✅ segue seu padrão: [1]; fallback: [0] se não existir
      return (els && els.length > 1) ? els[1] : ((els && els.length) ? els[0] : null);
    }

    function calcDiscountedFromPix() {
      const el = getPixEl();
      if (!el) return null;

      const raw = (el.textContent || "").trim();
      const value = Number(
        raw.replace(/\s/g, "")
           .replace("R$", "")
           .replace(/\./g, "")
           .replace(",", ".")
      );

      if (!Number.isFinite(value) || value <= 0) return null;

      const discounted = value * (1 - CUPOM_PERCENT / 100);

      const formatted = discounted.toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
      });

      return { raw, value, discounted, formatted };
    }

    function updateApproxWithCoupon() {
      const out = document.getElementById("cupom-aprox");
      if (!out) return;

      const r = calcDiscountedFromPix();
      const text = r ? r.formatted : "—";

      // ✅ evita loop/repintar sem necessidade
      if (out.textContent !== text) out.textContent = text;
    }

    let approxTimer = null;
    function scheduleApproxUpdate() {
      clearTimeout(approxTimer);
      approxTimer = setTimeout(updateApproxWithCoupon, 120);
    }

    function initApproxObserver() {
      // observa só a região onde o preço costuma mudar (bem mais leve)
      const priceRoot =
        document.querySelector(".values") ||
        document.querySelector(".product-buy") ||
        document.querySelector(".product-price") ||
        document.body;

      const obs = new MutationObserver(() => scheduleApproxUpdate());
      obs.observe(priceRoot, { childList: true, subtree: true, characterData: true });

      scheduleApproxUpdate();
      setTimeout(() => obs.disconnect(), 30000);
    }

    // =========================================
    // PDP — Widget + Comprar com desconto
    // =========================================
    function isPDP() {
      return !!document.querySelector(".values") || !!document.getElementsByClassName("price-big").length;
    }

    function getCouponMount() {
      const values = document.querySelector(".values");
      if (values) return values;

      const selectors = [
        ".product-buy",
        ".product-infos",
        ".product-info",
        ".product-content",
        ".product-details",
        ".product-page",
        "main"
      ];
      for (const sel of selectors) {
        const el = document.querySelector(sel);
        if (el) return el;
      }
      return null;
    }

    function insertCouponWidget() {
      if (document.getElementById("cupom-container")) return;
      if (!isPDP()) return;

      const mount = getCouponMount();
      if (!mount) return;

      const html = `
        <div id="cupom-container" class="cupom-lateral" role="region" aria-label="Cupom com desconto de primeira compra">
          <div class="texto">
            <div class="kicker" aria-label="Percentual de desconto">GANHE <strong>10% OFF</strong></div>
            <div class="titulo">Válido somente para a primeira compra*</div>

            <div class="aprox-pix">
              Pague aproximadamente <strong id="cupom-aprox">—</strong> no Pix com o cupom
            </div>
          </div>

          <div class="acoes">
            <div id="codigo-wrapper" class="codigo-area" title="Clique para copiar o cupom" role="button" tabindex="0" aria-label="Código do cupom. Clique para copiar">
              <span class="codigo-texto" aria-hidden="true">${CUPOM}</span>
              <canvas id="canvasRevelacao" aria-hidden="true"></canvas>
            </div>

            <button type="button" class="btn-desconto" id="btnComprarDesconto" aria-label="Comprar este produto com o desconto de 10%">Comprar com desconto</button>
            <div class="erro-selecao" id="erroSelecao" role="alert">Selecione a variação/tamanho antes de comprar.</div>
          </div>

          <div id="copiado-msg" class="copiado" role="status" aria-live="polite">✔ Copiado!</div>
        </div>
      `;$(html).insertAfter('.calculo-frete')

      // if (mount.classList && mount.classList.contains("calculo-frete")) {
      //   mount.insertAdjacentHTML("afterend", html);
      // } else {
      //   mount.insertAdjacentHTML("afterbegin", html);
      // }

      setTimeout(() => {
        initRevealEffect();
        updateApproxWithCoupon();
      }, 150);

      log("PDP: widget inserido.");
    }

    function findNativeBuyButton() {
      const selectors = [
        'button.button-buy',
        'button[name="adicionar"]',
        '.product-buy button',
        '.buy-button',
        '.button-add-cart',
        'form[action*="cart"] button[type="submit"]',
        'button[type="submit"]'
      ];
      for (const sel of selectors) {
        const el = document.querySelector(sel);
        if (el) return el;
      }
      return null;
    }

    function validatePDPSelections(buyBtn) {
      const $btn = $(buyBtn);
      const $form = $btn.closest("form");
      const $scope = $form.length ? $form : $(document);

      $scope.find(".mz-highlight-required").removeClass("mz-highlight-required");
      $("#erroSelecao").hide();

      const $required = $scope.find("select[required], input[required]").filter(function () {
        const $el = $(this);
        if ($el.is(":disabled")) return false;
        const v = ($el.val() || "").toString().trim();
        return v === "" || v === "0";
      });

      const $maybeVariation = $scope.find("select").filter(function () {
        const $el = $(this);
        if ($el.is(":disabled")) return false;
        const v = ($el.val() || "").toString().trim();
        const txt = ($el.find("option:selected").text() || "").toLowerCase();
        const hasPlaceholder = txt.includes("selecione") || txt.includes("escolha");
        return (v === "" || v === "0") && hasPlaceholder;
      });

      const $missing = $required.length ? $required : ($maybeVariation.length ? $maybeVariation : $());

      if ($missing.length) {
        const $first = $missing.first();
        $first.addClass("mz-highlight-required");
        try { $first[0].scrollIntoView({ behavior: "smooth", block: "center" }); } catch(e) {}
        $("#erroSelecao").fadeIn(150);
        warn("PDP: variação/tamanho não selecionado. Bloqueando.");
        return false;
      }
      return true;
    }

    $("body").on("click", "#codigo-wrapper", function () {
      localStorage.setItem(LS_COUPON, CUPOM);
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(CUPOM).then(feedbackCopiado).catch(() => feedbackCopiado());
      } else {
        feedbackCopiado();
      }
    });

    $("body").on("click", "#btnComprarDesconto", function () {
      markApplyOnCart();

      const buyBtn = findNativeBuyButton();
      if (!buyBtn) {
        warn("PDP: não achei botão nativo. Só marquei flag pro carrinho aplicar.");
        return;
      }

      if (!validatePDPSelections(buyBtn)) return;

      log("PDP: clicando no botão nativo:", buyBtn);
      buyBtn.click();
    });

    // =========================================
    // CARRINHO — aplica SOMENTE se veio do botão
    // =========================================
    function isCartPage() {
      return window.location.href.indexOf("/checkout/cart") > -1;
    }

    function openCouponArea() {
      const box = document.querySelector(".acao-button.cupom-desconto");
      const label = document.querySelector('label[for="cupom-desconto"]');
      if (box) { box.click(); return true; }
      if (label) { label.click(); return true; }
      return false;
    }

    function isApplied(coupon) {
      const upper = coupon.toUpperCase();

      const field =
        document.querySelector("#field-cupom") ||
        document.querySelector(".acao-button.cupom-desconto") ||
        null;

      const scopeText = field ? (field.innerText || "").toUpperCase() : "";
      if (scopeText.includes(upper)) return true;

      const input = document.querySelector("#cupom-desconto");
      const btn   = document.querySelector("button.aplica-desconto-buttons");

      if (input && btn) {
        const valOk = (input.value || "").trim().toUpperCase() === upper;
        const btnDisabled = !!btn.disabled || btn.getAttribute("aria-disabled") === "true";
        if (valOk && btnDisabled) return true;
      }

      return false;
    }

    function applyCouponFrameworkSafe(coupon) {
      const input = document.querySelector("#cupom-desconto");
      const btn   = document.querySelector("button.aplica-desconto-buttons");
      if (!input || !btn) return false;

      if (input.hasAttribute("readonly")) input.removeAttribute("readonly");

      input.focus();

      setNativeValue(input, "");
      fireInput(input);

      setNativeValue(input, coupon);
      fireInput(input);

      key(input, "keydown", "Enter");
      key(input, "keyup", "Enter");
      input.blur();

      btn.click();

      const form = btn.closest("form");
      if (form) {
        try { form.requestSubmit ? form.requestSubmit() : form.submit(); } catch(e) {}
      }

      return true;
    }

    function cartAutoApplyIfFlagged() {
      const applyOn = localStorage.getItem(LS_APPLY_ON) === "1";
      if (!applyOn) return;

      const coupon = (localStorage.getItem(LS_COUPON) || "").trim();
      const token = (localStorage.getItem(LS_TOKEN) || "").trim();
      const lastToken = sessionStorage.getItem("mz_last_apply_token") || "";

      if (!coupon || !token) return;

      if (token === lastToken) return;

      let tries = 0;
      const maxTries = 14;

      const interval = setInterval(() => {
        tries++;

        if (isApplied(coupon)) {
          sessionStorage.setItem("mz_last_apply_token", token);
          localStorage.removeItem(LS_APPLY_ON);
          clearInterval(interval);
          return;
        }

        openCouponArea();
        applyCouponFrameworkSafe(coupon);

        if (tries >= maxTries) {
          clearInterval(interval);
        }
      }, 700);
    }

    // ======================
    // START
    // ======================
    function bootCoupon() {
      insertCouponWidget();

      let tries = 0;
      const t = setInterval(() => {
        tries++;
        insertCouponWidget();
        if (document.getElementById("cupom-container") || tries >= 16) clearInterval(t);
      }, 500);

      const obs = new MutationObserver(() => {
        if (!document.getElementById("cupom-container")) insertCouponWidget();
      });
      obs.observe(document.body, { childList: true, subtree: true });
      setTimeout(() => obs.disconnect(), 12000);
    }

    bootCoupon();

    const waitAprox = setInterval(() => {
      if (document.getElementById("cupom-container")) {
        clearInterval(waitAprox);
        initApproxObserver();
      }
    }, 300);

    if (isCartPage()) {
      cartAutoApplyIfFlagged();
      const obs = new MutationObserver(() => cartAutoApplyIfFlagged());
      obs.observe(document.documentElement, { childList: true, subtree: true });
      setTimeout(() => obs.disconnect(), 30000);
    }
  });
</script>
