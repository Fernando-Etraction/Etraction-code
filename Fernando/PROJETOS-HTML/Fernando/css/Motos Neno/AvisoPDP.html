<style>
.tarja-atacado-motos {
    width: 100%;
    background: #2f3a63;
    color: #fff;
    font-family: Arial, sans-serif;
    padding: 14px 18px;
    box-sizing: border-box;
    border-radius: 10px;
}

.tarja-atacado-container {
    max-width: 1200px;
    margin: auto;
    display: flex;
    align-items: center;
    justify-content: space-around;
    gap: 20px;
    flex-wrap: wrap;
}

.tarja-atacado-texto {
    font-size: 15px;
    line-height: 1.4;
}

.tarja-atacado-texto strong {
    display: block;
    font-size: 16px;
}

.tarja-atacado-btn {
    background: #fff;
    color: #2f3a63;
    padding: 10px 18px;
    border-radius: 6px;
    font-weight: 600;
    text-decoration: none;
    transition: 0.2s;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.tarja-atacado-btn:hover {
    background: #e6e6e6;
}

.tarja-atacado-btn svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
}

.tarja-atacado-aviso {
    font-size: 12px;
    opacity: 0.8;
    margin-top: 6px;
    text-align: center;
}

@media (max-width: 768px) {
    .tarja-atacado-container {
        flex-direction: column;
        align-items: flex-start;
    }

    .tarja-atacado-btn {
        width: 100%;
        text-align: center;
    }

    .tarja-atacado-texto strong {
        font-size: 15px;
    }
}
</style>
