<script>// <![CDATA[
  (function () {
    const now = new Date();
    const endDate = new Date(now.getFullYear(), 2, 15, 23, 59, 59).getTime(); // Março = 2

    const elDays = document.getElementById("bx-days");
    const elHours = document.getElementById("bx-hours");
    const elMinutes = document.getElementById("bx-minutes");
    const elSeconds = document.getElementById("bx-seconds");
    const elCountdown = document.getElementById("bx-countdown");

    function pad(n) {
      return String(n).padStart(2, "0");
    }

    function tick() {
      let diff = endDate - Date.now();

      if (diff <= 0) {
        elDays.textContent = "00";
        elHours.textContent = "00";
        elMinutes.textContent = "00";
        elSeconds.textContent = "00";
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      diff -= days * (1000 * 60 * 60 * 24);

      const hours = Math.floor(diff / (1000 * 60 * 60));
      diff -= hours * (1000 * 60 * 60);

      const minutes = Math.floor(diff / (1000 * 60));
      diff -= minutes * (1000 * 60);

      const seconds = Math.floor(diff / 1000);

      elDays.textContent = pad(days);
      elHours.textContent = pad(hours);
      elMinutes.textContent = pad(minutes);
      elSeconds.textContent = pad(seconds);

      if (elCountdown) {
        elCountdown.setAttribute(
          "aria-label",
          `Faltam ${days} dias, ${hours} horas, ${minutes} minutos e ${seconds} segundos.`
        );
      }
    }

    tick();
    setInterval(tick, 1000);
  })();
// ]]></script>
