<style>
    @import url('https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap');

    :root {
        --ab-brand: #000F47;
        --ab-ink: #1b1b1b;
        --ab-muted: #667085;
        --ab-line: #e5e7eb;
        --ab-bg: #ffffff;
        --ab-pill: #f9fafb;
    }

    .produto-caracteristicas{
        display: none;
    }
    .descricao-produto {
        display: none;
    }


    .ab-wrap {
        font-family: "Rubik", sans-serif;
        color: var(--ab-ink);
        max-width: 1240px;
        margin: 0px auto;
    }

    .ab-card {
        background: var(--ab-bg);
        border: 1px solid var(--ab-line);
        border-radius: 16px;
        padding: 22px;
        margin-top: 20px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, .04)
    }

    .ab-title {
        color: var(--ab-brand);
        font-size: 24px;
        font-weight: 700;
        text-align: center;
        margin: 0 0 14px;
        letter-spacing: .2px
    }

    .ab-actions {
        display: flex;
        gap: 14px;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 18px
    }

    .ab-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 16px;
        border-radius: 999px;
        border: 1px solid var(--ab-brand);
        background: var(--ab-pill);
        font-weight: 600;
        text-decoration: none;
        color: var(--ab-brand);
        transition: .2s
    }

    .ab-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 22px rgba(0, 0, 0, .08)
    }

    .ab-section {
        margin-top: 22px
    }

    .ab-btn svg {
        width: 18px;
        height: 18px;
        display: block;
    }

    .ab-section>h3 {
        color: var(--ab-brand);
        font-size: 20px;
        font-weight: 600 !important;
        margin: 0 0 12px;
        display: flex;
        align-items: center;
        gap: 10px
    }

    .ab-section>h3::after {
        content: "";
        flex: 1;
        height: 2px;
        background: linear-gradient(90deg, var(--ab-brand), transparent);
        border-radius: 2px
    }

    .ab-video {
        position: relative;
        border: 1px solid var(--ab-line);
        border-radius: 12px;
        overflow: hidden;
        background: #000
    }

    .ab-video::before {
        content: "";
        display: block;
        padding-top: 56.25%
    }

    .ab-video iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0
    }

    .ab-desc {
        border: 1px solid var(--ab-line);
        border-radius: 12px;
        padding: 16px;
        line-height: 1.65
    }

    .ab-beneficios {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px
    }

    .ab-benef-col {
        border: 1px solid var(--ab-line);
        border-radius: 12px;
        padding: 16px;
        background: #fafafa
    }

    .ab-benef-col ul {
        margin: 0;
        padding-left: 18px;
        line-height: 1.55
    }

    .ab-specs {
        border: 1px solid var(--ab-line);
        border-radius: 12px;
        overflow: hidden
    }

    .ab-specs table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px
    }

    .ab-specs th,
    .ab-specs td {
        padding: 10px 12px;
        border-bottom: 1px solid var(--ab-line);
        vertical-align: top
    }

    .ab-specs th {
        width: 36%;
        background: #fafafa;
        text-align: left
    }

    .ab-callout {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        border: 1px solid var(--ab-line);
        border-left: 4px solid var(--ab-brand);
        background: #f8fafc;
        border-radius: 12px;
        padding: 14px 16px
    }

    .ab-btn--brand {
        background: var(--ab-brand);
        color: #fff;
        border-color: var(--ab-brand)
    }

    @media (max-width:820px) {
        .ab-beneficios {
            grid-template-columns: 1fr
        }

        .ab-specs th {
            width: 44%
        }
    }
</style>
