<style>
    :root {
        --fo-bg: #1f231e;
        --fo-accent: #d4dc23;
        --fo-text: #e5e7eb;
        --fo-muted: #b8bcc2;
        --fo-line: rgba(255, 255, 255, .12);
        --fo-card: #ffffff;
        --fo-social: #e5e7eb;
    }

    .fo-footer {
        background: var(--fo-bg);
        color: var(--fo-text);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    .fo-footer__inner {
        max-width: 1240px;
        margin: 0 auto;
        padding: 48px 24px 28px;

        display: grid;
        grid-template-columns: 1.7fr 1fr 1fr 1.1fr;
        column-gap: 50px;
        row-gap: 56px;
    }

    /* ===== Tipografia / blocos ===== */
    .fo-title {
        margin: 0 0 18px;
        color: var(--fo-accent);
        font-weight: 700;
        letter-spacing: .3px;
        font-size: 22px;
    }

    .fo-text {
        margin: 0;
        line-height: 1.6;
        font-size: 15px;
        color: var(--fo-text);

        display: -webkit-box;
        -webkit-line-clamp: 11;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    .fo-link {
        display: inline-block;
        margin-top: 14px;
        color: var(--fo-text);
        text-decoration: underline;
    }

    .fo-link:hover {
        color: var(--fo-accent);
    }

    .fo-menu {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .fo-menu a {
        color: var(--fo-text);
        text-decoration: none;
        font-size: 15px;
    }

    .fo-menu a::before {
        content: "›";
        margin-right: 10px;
        color: var(--fo-text);
    }

    .fo-menu a:hover {
        color: var(--fo-accent);
    }

    /* ===== Selos ===== */
    .fo-trust {
        display: flex;
        gap: 20px;
        align-items: flex-start;
    }

    .fo-selo {
        width: 110px;
        height: 95px;
        background: var(--fo-card);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        overflow: hidden;
    }

    .fo-selo img {
        width: 96px;
        height: 88px;
        object-fit: contain;
    }

    /* ===== Pagamentos ===== */
    .fo-pay {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 6px;
        max-width: 360px;
    }

    .fo-pay__item {
        width: 62px;
        height: 46px;
        background: #fff;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .fo-pay__item img {
        width: 40px;
        height: 28px;
        object-fit: contain;
    }

    /* ===== Social ===== */
    .fo-title--social {
        margin-top: 70px;
        margin-bottom: 12px;
    }

    .fo-social {
        display: flex;
        gap: 8px;
        align-items: center;
    }

    .fo-social__btn {
        width: 35px;
        height: 35px;
        border-radius: 50%;
        background: var(--fo-social);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform .2s ease, background .2s ease;
        text-decoration: none;
    }

    .fo-social__btn:hover {
        background: var(--fo-accent);
        transform: translateY(-2px);
    }

    .fo-social__btn svg {
        width: 28px;
        height: 28px;
        fill: #111;
    }

    /* ===== Barra inferior ===== */
    .fo-footer__bar {
        border-top: 1px solid var(--fo-line);
        border-bottom: 1px solid var(--fo-line);
        padding: 18px 0;
        margin-top: 24px;
    }

    .fo-footer__bar-inner {
        max-width: 1240px;
        margin: 0 auto;
        padding: 0 24px;
        display: flex;
        gap: 18px;
        align-items: center;
    }

    .fo-brand__logo {
        color: var(--fo-accent);
        font-weight: 800;
        min-width: 120px;
        display: flex;
        align-items: center;
    }

    .fo-brand__img {
        width: 120px;
        height: auto;
        display: block;
        object-fit: contain;
    }

    .fo-legal {
        color: var(--fo-muted);
        font-size: 13px;
        line-height: 1.5;
    }

    .fo-footer__mz {
        padding: 28px 0;
        text-align: center;
        color: var(--fo-muted);
        font-size: 13px;
    }

    /* =========================
   AJUSTES FINOS (DESKTOP)
========================= */
    .fo-title {
        font-size: 15px;
        margin-bottom: 20px;
    }

    .fo-menu a {
        font-size: 13px;
    }

    .fo-text {
        font-size: 13px;
        line-height: 1.65;
    }

    .fo-selo {
        width: 90px;
        height: 95px;
        border-radius: 12px;
    }

    .fo-pay__item {
        width: 44px;
        height: 42px;
        border-radius: 6px;
        /* menos curvado */
    }

    .fo-pay__item img {
        width: 38px;
        height: auto;
        object-fit: contain;
    }

    /* tamanhos por item (mantive seu ajuste) */
    .fo-pay__item:nth-child(1) img {
        width: 43px;
    }

    /* boleto */
    .fo-pay__item:nth-child(2) img {
        width: 38px;
    }

    .fo-pay__item:nth-child(3) img {
        width: 50px;
    }

    .fo-pay__item:nth-child(4) img {
        width: 43px;
    }

    .fo-pay__item:nth-child(5) img {
        width: 46px;
    }

    .fo-pay__item:nth-child(6) img {
        width: 54px;
    }

    .fo-pay__item:nth-child(7) img {
        width: 32px;
    }

    .fo-pay__item:nth-child(8) img {
        width: 37px;
    }

    .fo-pay__item:nth-child(9) img {
        width: 40px;
    }

    .fo-pay__item:nth-child(10) img {
        width: 46px;
    }

    /* =========================
   ACCORDION: Desktop vs Mobile
========================= */
    .fo-only-desktop {
        display: block;
    }

    .fo-only-mobile {
        display: none;
    }

    /* --- Desktop: tudo visível, sem accordion --- */
    @media (min-width: 901px) {
        .fo-only-desktop {
            display: block;
        }

        .fo-only-mobile {
            display: none;
        }
    }

    /* --- Mobile: vira accordion --- */
    @media (max-width: 900px) {

        .fo-only-desktop {
            display: none;
        }

        .fo-only-mobile {
            display: flex;
        }

        /* Grid vira 1 coluna */
        .fo-footer__inner {
            grid-template-columns: 1fr;
            column-gap: 0;
            padding: 28px 16px;

            /* IMPORTANTE: tira o row-gap do grid pra não criar “buracos” */
            row-gap: 0;
        }

        /* Espaçamento UNIFORME entre TODOS os blocos */
        .fo-footer__inner>.fo-col {
            margin-top: 12px;
        }

        .fo-footer__inner>.fo-col:first-child {
            margin-top: 0;
        }

        /* E espaçamento uniforme entre Pagamentos e Siga (que estão dentro da mesma coluna) */
        .fo-col--pay>.fo-acc-group {
            margin-top: 12px;
        }

        .fo-col--pay>.fo-acc-group:first-child {
            margin-top: 0;
        }

        /* barra do accordion */
        .fo-acc-title {
            width: 100%;
            border: 0;
            background: rgba(255, 255, 255, .14);
            color: #fff;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;

            /* SEM arredondar */
            border-radius: 0;
            margin: 0;
        }

        .fo-acc-icon {
            font-size: 22px;
            font-weight: 300;
            opacity: .9;
            line-height: 1;
        }

        /* painel */
        .fo-acc-panel {
            padding: 14px 16px 16px;
        }

        /* divisória */
        .fo-acc-group {
            border-top: 1px solid var(--fo-line);
        }

        /* estado aberto: amarelo + barrinha */
        .fo-acc-title[aria-expanded="true"] {
            color: var(--fo-accent);
            box-shadow: inset 4px 0 0 var(--fo-accent);
        }

        .fo-acc-title[aria-expanded="true"] .fo-acc-icon {
            color: var(--fo-accent);
        }

        /* Pagamentos no mobile: 5 por linha (5x2) */
        .fo-pay {
            grid-template-columns: repeat(5, 46px);
            gap: 6px;
            max-width: none;
            justify-content: start;
            justify-items: center;
        }

        .fo-pay__item {
            width: 46px;
            height: 42px;
            border-radius: 6px;
        }

        /* barra inferior */
        .fo-footer__bar-inner {
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 10px;
        }

        .fo-brand__img {
            width: 110px;
        }

        .fo-legal {
            font-size: 12px;
            line-height: 1.5;
        }
    }

    /* FIX – força Instagram preto igual aos outros */
    .fo-social__btn .fo-ic--instagram {
        color: #111;
    }


    .ra-footer {
        display: none !important;
    }

    .fo-footer__bar {
        display: none !important;

    }
    .fo-footer__mz {
    padding: 28px 0;
    text-align: center;
    color: var(--fo-muted);
    font-size: 13px;
    display: flex;
    justify-content: center;
}
</style>

  const sealInterval = setInterval(() => {

    const originalSeal = document.querySelector(
      '#footer-react-app a[href*="magazord"]'
    );

    // ainda não renderizou
    if (!originalSeal) return;

    // já resolvido
    if (document.querySelector('.fo-footer__mz')) {
      clearInterval(sealInterval);
      return;
    }

    /* ESCONDE O ORIGINAL (React pode renderizar à vontade) */
    originalSeal.style.display = 'none';

    /* CLONA */
    const clone = originalSeal.cloneNode(true);
    clone.style.display = 'inline-block';

    const wrapper = document.createElement('div');
    wrapper.className = 'fo-footer__mz';
    wrapper.appendChild(clone);

    /* INSERE APÓS O FOOTER */
    const foFooter = document.querySelector('.fo-footer');
    if (foFooter) {
      foFooter.insertAdjacentElement('afterend', wrapper);
      clearInterval(sealInterval);
    }

  }, 300);

  const groups = document.querySelectorAll(".fo-footer [data-acc]");

  groups.forEach(group => {
    const btn = group.querySelector(".fo-acc-title");
    const panel = group.querySelector(".fo-acc-panel");
    if (!btn || !panel) return;

    btn.onclick = null;

    if (!isMobile) {
      btn.setAttribute("aria-expanded", "true");
      panel.hidden = false;
      btn.querySelector(".fo-acc-icon").textContent = "−";
      return;
    }

    panel.hidden = true;
    btn.setAttribute("aria-expanded", "false");
    btn.querySelector(".fo-acc-icon").textContent = "+";

    btn.onclick = () => {
      const open = btn.getAttribute("aria-expanded") === "true";

      groups.forEach(g => {
        const b = g.querySelector(".fo-acc-title");
        const p = g.querySelector(".fo-acc-panel");
        if (b && p) {
          b.setAttribute("aria-expanded", "false");
          p.hidden = true;
          b.querySelector(".fo-acc-icon").textContent = "+";
        }
      });

      if (!open) {
        btn.setAttribute("aria-expanded", "true");
        panel.hidden = false;
        btn.querySelector(".fo-acc-icon").textContent = "−";
      }
    };
  });
}
</script>
