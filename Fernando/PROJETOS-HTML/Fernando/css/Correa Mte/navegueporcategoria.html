<style>
  .cc-section {
    width: 100%;
    max-width: 1240px;
    margin: 0 auto;
    padding: 0;
    background-color: transparent;
    font-family: "Segoe UI", sans-serif;
    box-sizing: border-box;
  }

  .cc-title {
    font-size: 18px;
    font-weight: 700;
    color: #222;
    margin-bottom: 16px;
  }

  .cc-container {
    width: 100%;
    padding: 10px 0 30px;
    position: relative;
    box-sizing: border-box;
  }

  .cc-swiper {
    width: 100%;
    padding: 0 20px -1px;
    box-sizing: border-box;
    overflow: hidden;
  }

  .cc-swiper .swiper-wrapper {
    align-items: stretch;
  }

  .cc-swiper .swiper-slide {
    height: 100%;
    min-height: 160px;
    display: flex;
    align-items: stretch;
  }

  .cc-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background-color: #fff;
    padding: 14px 10px 12px;
    border: 1px solid #e6e6e2;
    width: 100%;
    min-height: 140px;
    max-height: 170px;
    height: 100%;
    border-radius: 8px;
    cursor: pointer;
    transition:
      box-shadow 0.2s,
      border-color 0.2s,
      transform 0.15s;
    text-decoration: none;
    box-sizing: border-box;
  }

  .cc-item:hover {
    box-shadow: 0 4px 14px rgba(200, 16, 46, 0.1);
    border-color: #c8102e;
    transform: translateY(-2px);
  }

  .cc-icon-circle {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background-color: #fff0f2;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 10px;
    transition: background-color 0.2s;
    flex-shrink: 0;
  }

  .cc-item:hover .cc-icon-circle {
    background-color: #ffd6dc;
  }

  .cc-item svg {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
  }

  .cc-item-label {
    font-size: 13px;
    color: #333;
    font-weight: 600;
    margin: 0;
    text-align: center;
    line-height: 1.3;
  }

  .cc-button-prev,
  .cc-button-next {
    color: #99a3ad;
    background: rgb(232 234 237 / var(--tw-bg-opacity, 1));
    width: 40px;
    height: 40px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    position: absolute;
    top: 53%;
    transform: translateY(-50%);
    z-index: 10;
    font-size: 32px;
    font-weight: 500;
    transition: all 0.2s;
    border-radius: 4px;
    opacity: 0.5;
  }

  .cc-button-prev {
    left: 0;
  }

  .cc-button-next {
    right: 0;
  }

  .cc-button-prev::after,
  .cc-button-next::after {
    display: none;
  }

  .cc-pagination {
    display: flex;
    justify-content: center;
    margin-top: 12px;
  }

  .cc-pagination .swiper-pagination-bullet {
    width: 8px;
    height: 8px;
    background-color: #c8102e;
    opacity: 0.3;
    transition: opacity 0.2s;
  }

  .cc-pagination .swiper-pagination-bullet-active {
    opacity: 1;
  }

  @media (max-width: 1240px) {
    .cc-section {
      padding: 0 16px;
    }
  }

  @media (max-width: 767px) {
    .cc-swiper {
      padding: 0 16px 36px;
    }

    .cc-button-prev,
    .cc-button-next {
      width: 40px;
      height: 40px;
      font-size: 18px;
    }
  }

  @media (max-width: 479px) {
    .cc-item {
      min-height: 90px;
      max-height: 120px;
      padding: 12px 8px 10px;
    }

    .cc-swiper .swiper-slide {
      min-height: 100px;
    }

    .cc-item-label {
      font-size: 12px;
    }
  }
</style>

<script>
  (function () {
    function initCategoryCarousel() {
      const carousel = document.querySelector(".cc-swiper");
      if (!carousel || carousel.dataset.swiperInitialized === "true") return;

      carousel.dataset.swiperInitialized = "true";

      new Swiper(carousel, {
        slidesPerView: 7,
        spaceBetween: 12,
        loop: false,
        rewind: true,

        speed: 600,
        watchOverflow: true,
        observer: true,
        observeParents: true,
        navigation: {
          nextEl: ".cc-button-next",
          prevEl: ".cc-button-prev",
        },
        pagination: {
          el: ".cc-pagination",
          clickable: true,
        },
        breakpoints: {
          0: {
            slidesPerView: 2,
          },
          480: {
            slidesPerView: 2,
          },
          768: {
            slidesPerView: 3,
          },
          1024: {
            slidesPerView: 4,
          },
          1240: {
            slidesPerView: 6,
          },
          1440: {
            slidesPerView: 7,
          },
        },
      });
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", initCategoryCarousel);
    } else {
      initCategoryCarousel();
    }
  })();
</script>
