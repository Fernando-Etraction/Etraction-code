    function getProductKey() {
      return STORAGE_PREFIX + window.location.pathname.replace(/\W+/g, '_');
    }

    function getCachedSoldNumber() {
      const key = getProductKey();
      const cached = localStorage.getItem(key);

      if (cached && !isNaN(cached)) {
        return Number(cached);
      }

      const number = Math.floor(Math.random() * (120 - 40 + 1)) + 40;

      localStorage.setItem(key, String(number));

      return number;
    }

    function formatRating(value) {
      const number = parseFloat(String(value || '').replace(',', '.'));

      if (isNaN(number)) return '5,0';

      return number
        .toFixed(2)
        .replace('.', ',')
        .replace(',00', ',0')
        .replace(/,(\d)0$/, ',$1');
    }

    function setTextIfDifferent(element, text) {
      if (!element) return;

      if (element.textContent !== text) {
        element.textContent = text;
      }
    }

    function setAttributeIfDifferent(element, attr, value) {
      if (!element) return;

      if (element.getAttribute(attr) !== value) {
        element.setAttribute(attr, value);
      }
    }

    function normalizeCorreaText(text) {
      return String(text || '')
        .replace(/\s+/g, ' ')
        .trim()
        .toLowerCase();
    }

    function normalizeFreteText(text) {
      return String(text || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/\s+/g, ' ')
        .trim()
        .toLowerCase();
    }

    function insertTopTrustTags() {
      const title =
        document.querySelector('.informacoes-compra-produto h1') ||
        document.querySelector('.product-title') ||
        document.querySelector('h1');

      if (!title) return;

      const parent = title.parentElement;

      if (!parent) return;
      if (parent.classList.contains(TOP_TRUST_READY_CLASS)) return;
      if (parent.querySelector('.correa-top-trust-tags')) return;

      const trustTags = document.createElement('div');

      trustTags.className = 'correa-top-trust-tags';

      trustTags.innerHTML = `
      <span class="correa-top-trust-tag">
        ${getSmallCheckIcon()}
        Envio imediato
      </span>
    `;

      title.insertAdjacentElement('beforebegin', trustTags);
      parent.classList.add(TOP_TRUST_READY_CLASS);
    }

    function getRating(wrapper) {
      const ratingEl = wrapper.querySelector('.average-rating');

      if (!ratingEl) return '5,0';

      const dataValue = ratingEl.getAttribute('data-value');
      const titleValue = ratingEl.getAttribute('title');
      const rawValue = dataValue || titleValue || '5';
      const match = String(rawValue).match(/\d+([.,]\d+)?/);

      return formatRating(match ? match[0] : rawValue);
    }

    function getReviewCount(wrapper) {
      const reviewEl =
        wrapper.querySelector('.num-avaliacoes') ||
        wrapper.querySelector('.num-avaliacao') ||
        wrapper.querySelector('.avaliacoes-link');

      const text = reviewEl ? reviewEl.textContent : wrapper.textContent;
      const match = String(text || '').match(/\d+/);

      return match ? match[0] : '0';
    }

    function renderStars() {
      const star = `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 2.8l2.8 5.7 6.3.9-4.6 4.5 1.1 6.3L12 17.2 6.4 20.2l1.1-6.3-4.6-4.5 6.3-.9L12 2.8z"></path>
      </svg>
    `;

      return Array(5).fill(star).join('');
    }

    function findRatingWrapper() {
      return (
        document.querySelector('.avaliacoes.flex.items-center') ||
        document.querySelector('.avaliacao-holder.flex.items-center') ||
        document.querySelector('.avaliacao-holder') ||
        document.querySelector('.avaliacao-geral-topo')
      );
    }

    function moveRatingAfterTitle(wrapper) {
      const title =
        document.querySelector('.informacoes-compra-produto h1') ||
        document.querySelector('.product-title') ||
        document.querySelector('h1');

      if (!title || !wrapper) return;

      if (title.nextElementSibling !== wrapper) {
        title.insertAdjacentElement('afterend', wrapper);
      }
    }

    function applyRatingLayout() {
      const wrapper = findRatingWrapper();

      if (!wrapper) return;

      moveRatingAfterTitle(wrapper);

      if (wrapper.querySelector('.' + RATING_CUSTOM_CLASS)) return;

      const rating = getRating(wrapper);
      const reviews = getReviewCount(wrapper);
      const sold = getCachedSoldNumber();

      wrapper.classList.add(RATING_SOURCE_CLASS);

      const customContent = document.createElement('div');

      customContent.className = RATING_CUSTOM_CLASS;

      customContent.innerHTML = `
      <span class="produto-top-stars-red">
        ${renderStars()}
      </span>

      <span class="produto-top-meta">${rating}</span>
      <span class="produto-top-meta">(${reviews} avaliações)</span>
      <span class="produto-top-separator"></span>
      <span class="produto-top-sold">+${sold} vendidos</span>
    `;

      wrapper.appendChild(customContent);
    }

    function getCashbackValue(box) {
      const strong = box.querySelector('strong');

      if (!strong) return 'R$ 0,00';

      return strong.textContent
        .replace(/de cashback/gi, '')
        .replace(/cashback/gi, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function applyCashbackLayout() {
      const boxes = document.querySelectorAll(
        '.box-fidegg.cashback:not(.' + CASHBACK_CLASS + ')'

    function moveDePorToPriceCard() {
      const priceArea =
        document.querySelector('#content-price-product .values-area') ||
        document.querySelector('.values-area.forma-pagamento-4');

      if (!priceArea) return;

      const currentDePor = priceArea.querySelector('.preco-de');
      const nativeDePor =
        currentDePor ||
        document.querySelector('#content-price-product > .preco-de') ||
        document.querySelector('#content-price-product .preco-de') ||
        document.querySelector('.preco-de');

      if (!nativeDePor) return;

      nativeDePor.classList.add(PRICE_DE_READY_CLASS);
      priceArea.classList.add(PRICE_WITH_DEPOR_CLASS);

      if (nativeDePor.parentElement !== priceArea) {
        priceArea.insertBefore(nativeDePor, priceArea.firstChild);
      }
    }

    function moveCashbackToPriceCard() {
      const priceArea =
        document.querySelector('#content-price-product .values-area') ||
        document.querySelector('.values-area.forma-pagamento-4');

      const cashbackBox = document.querySelector('.box-fidegg.cashback');

      if (!priceArea || !cashbackBox) return;

      priceArea.classList.add(PRICE_WITH_CASHBACK_CLASS);

      if (cashbackBox.parentElement !== priceArea) {
        priceArea.appendChild(cashbackBox);
      }
    }

    function findPaymentMoreElement(priceArea) {
      const candidates = Array.from(
        document.querySelectorAll('a, button, span, div, [role="button"]')
      );

      for (const element of candidates) {
        if (!element || priceArea.contains(element)) continue;
        if (element.closest('.correa-payment-more-wrapper')) continue;

        const text = normalizeCorreaText(element.textContent);

        const isPaymentMore =
          text === '+ formas de pagamento' ||
          text === '+ forma de pagamento' ||
          text === 'formas de pagamento' ||
          text === 'forma de pagamento';

        if (!isPaymentMore) continue;

        const childHasSameText = Array.from(element.children || []).some(function (child) {
          return normalizeCorreaText(child.textContent).includes('formas de pagamento');
        });

        if (childHasSameText) continue;

        return element.closest('a, button, [role="button"]') || element;
      }

      return null;
    }

    function movePaymentMoreToPriceCard() {
      const priceArea =
        document.querySelector('#content-price-product .values-area') ||
        document.querySelector('.values-area.forma-pagamento-4');

      if (!priceArea) return;
      if (priceArea.querySelector('.correa-payment-more-wrapper')) return;

      const paymentMoreElement = findPaymentMoreElement(priceArea);

      if (!paymentMoreElement) return;

      const wrapper = document.createElement('div');

      wrapper.className = 'correa-payment-more-wrapper';

      paymentMoreElement.classList.add('correa-payment-more-link');

      wrapper.appendChild(paymentMoreElement);
      priceArea.appendChild(wrapper);

      priceArea.classList.add('correa-price-with-payment-more');
    }

      const priceAreas = document.querySelectorAll(
        '#content-price-product .values-area, .values-area.forma-pagamento-4'
      );

      priceAreas.forEach(function (area) {
        if (area.classList.contains(PRICE_READY_CLASS)) return;

        const pixBox = area.querySelector('.price.pix');
        const cardBox = area.querySelector('.price.card');

        if (pixBox) updatePixText(pixBox);
        if (cardBox) updateCardText(cardBox);

        area.classList.add(PRICE_READY_CLASS);
      });
    }

    function updatePixText(pixBox) {
      const pixType = pixBox.querySelector('.type-payment');
      const discountEl = pixBox.querySelector('.percentual-desconto');

      if (!pixType) return;

      let discount = '';

      if (discountEl) {
        discount = discountEl.textContent
          .replace('-', '')
          .replace(/\s+/g, '')
          .trim();
      }

      pixType.innerHTML = discount
        ? `no Pix <strong>(${discount} de desconto)</strong>`
        : `no Pix`;
    }

    function updateCardText(cardBox) {
      const cardType = cardBox.querySelector('.type-payment');

      if (!cardType) return;

      cardType.innerHTML = cardType.innerHTML
        .replace(/no cartão em\s*/i, 'em ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function applyBuyAreaLayout() {
      const buyArea = document.querySelector('.area-buy-product');

      if (!buyArea) return;

      buyArea.classList.add(BUY_READY_CLASS);

      updateBuyButton(buyArea);
      updateWhatsappButton(buyArea);

    function updateBuyButton(scope) {

      if (!buyButton) return;
      if (buyButton.classList.contains(BUY_BUTTON_READY_CLASS)) return;

      buyButton.innerHTML = `${getCartIcon()} <span>ADICIONAR AO CARRINHO</span>`;
      buyButton.classList.add(BUY_BUTTON_READY_CLASS);

    function updateWhatsappButton(scope) {
      const whatsappButton = scope.querySelector('.container-botao-whatsapp');

      if (!whatsappButton) return;
      if (whatsappButton.classList.contains(WHATSAPP_READY_CLASS)) return;

      whatsappButton.innerHTML = `

      whatsappButton.classList.add(WHATSAPP_READY_CLASS);
    }

    function updateShippingBox(scope) {
      const shippingBox = scope.querySelector('.calculo-frete');

      if (!shippingBox) return;

      const label = shippingBox.querySelector('.cep-label');
      const input = shippingBox.querySelector('#cep');
      const button = shippingBox.querySelector('.field-content button');
      const labelWrapper = shippingBox.querySelector('.label-frete');
      const contentFrete = shippingBox.querySelector('.content-frete');

      setTextIfDifferent(label, 'Calcule o frete e prazo de entrega');
      setAttributeIfDifferent(input, 'placeholder', 'Digite seu CEP');
      setTextIfDifferent(button, 'Calcular');

      if (labelWrapper && !labelWrapper.classList.contains(SHIPPING_HELPER_CLASS)) {
        const helper = document.createElement('span');

        helper.className = 'correa-frete-helper';
        helper.textContent = 'Informe seu CEP para consultar prazo e opções de entrega.';

        labelWrapper.appendChild(helper);
        labelWrapper.classList.add(SHIPPING_HELPER_CLASS);
      }

      if (contentFrete && !contentFrete.classList.contains(SHIPPING_READY_CLASS)) {
        const shippingInfo = document.createElement('div');

        shippingInfo.className = 'correa-envio-imediato';

        contentFrete.appendChild(shippingInfo);
        contentFrete.classList.add(SHIPPING_READY_CLASS);
      }

      if (contentFrete && !contentFrete.classList.contains(SHIPPING_TAGS_READY_CLASS)) {
        const shippingTags = document.createElement('div');

        shippingTags.className = 'correa-frete-tags';

        shippingTags.innerHTML = `
        <div class="correa-frete-tag">
          ${getSecurePurchaseIcon()}
          <span>Compra segura</span>
        </div>

        <div class="correa-frete-tag">
          ${getWarrantyIcon()}
          <span>Garantia de 1 ano</span>
        </div>

        <div class="correa-frete-tag">
          ${getSpecialistSupportIcon()}
          <span>Atendimento especializado</span>
        </div>
      `;

        contentFrete.appendChild(shippingTags);
        contentFrete.classList.add(SHIPPING_TAGS_READY_CLASS);
      }
    }

    function moveShippingResultAboveTags() {
      const buyArea = document.querySelector('.area-buy-product');

      if (!buyArea) return;

      const shippingBox = buyArea.querySelector('.box-frete');
      const contentFrete = buyArea.querySelector('.content-frete');
      const shippingTags = buyArea.querySelector('.correa-frete-tags');
      const resultBox = shippingBox ? shippingBox.querySelector('.box-result') : null;

      if (!shippingBox || !contentFrete || !resultBox) return;

      if (resultBox.parentElement !== contentFrete) {
        if (shippingTags && shippingTags.parentElement === contentFrete) {
          contentFrete.insertBefore(resultBox, shippingTags);
        } else {
          contentFrete.appendChild(resultBox);
        }

        return;
      }

      if (shippingTags && shippingTags.previousElementSibling !== resultBox) {
        contentFrete.insertBefore(resultBox, shippingTags);
      }
    }

    function parseFretePrice(priceElement) {
      if (!priceElement) return null;

      const text = String(priceElement.textContent || '')
        .replace(/\s+/g, ' ')
        .trim()
        .toLowerCase();

      if (!text) return null;

      if (text.includes('grátis') || text.includes('gratis')) {
        return 0;
      }

      const match = text.match(/(\d{1,3}(?:\.\d{3})*|\d+)(?:,\d{2})?/);

      if (!match) return null;

      const numberText = match[0]
        .replace(/\./g, '')
        .replace(',', '.');

      const value = parseFloat(numberText);

      return isNaN(value) ? null : value;
    }

    function parseFreteDays(timeElement) {
      if (!timeElement) {
        return {
          min: 9999,
          max: 9999
        };
      }

      const text = String(timeElement.textContent || '')
        .replace(/\s+/g, ' ')
        .trim();

      const numbers = text.match(/\d+/g);

      if (!numbers || !numbers.length) {
        return {
          min: 9999,
          max: 9999
        };
      }

      const parsedNumbers = numbers.map(function (number) {
        return Number(number);
      });

      return {
        min: parsedNumbers[0],
        max: parsedNumbers[parsedNumbers.length - 1]
      };
    }

    function getOriginalFreteName(nameElement) {
      if (!nameElement) return '';

      const savedName = nameElement.getAttribute('data-correa-original-name');

      if (savedName) return savedName;

      const currentName = String(nameElement.textContent || '').trim();

      nameElement.setAttribute('data-correa-original-name', currentName);

      return currentName;
    }

    function isAllowedFreteService(nameElement) {
      const serviceName = normalizeFreteText(
        nameElement
          ? nameElement.getAttribute('data-correa-original-name') || nameElement.textContent
          : ''
      );

      return (
        serviceName.includes('economico') ||
        serviceName.includes('normal')
      );
    }

    function setFreteServiceName(nameElement, newName) {
      if (!nameElement || !newName) return;

      if (nameElement.textContent.trim() !== newName) {
        nameElement.textContent = newName;
      }
    }

    function resetFreteServiceName(nameElement) {
      if (!nameElement) return;

      const originalName = getOriginalFreteName(nameElement);

      if (originalName && nameElement.textContent.trim() !== originalName) {
        nameElement.textContent = originalName;
      }
    }

    function getFreteOptionRows() {
      const resultBox = document.querySelector(
        '.area-buy-product.correa-buy-area-ready .content-frete > .box-result'
      );

      if (!resultBox) return [];

      resultBox
        .querySelectorAll('.correa-frete-opcao-tag')
        .forEach(function (tag) {
          tag.remove();
        });

      const rows = Array.from(resultBox.querySelectorAll('.flex.flex-col > div'));

      return rows
        .map(function (row) {
          const nameElement = row.querySelector('.nome-servico');
          const timeElement = row.querySelector('.tempo-entrega');
          const priceElement = row.querySelector('.descricao-valor, .frete-gratis');

          if (!nameElement || !timeElement || !priceElement) {
            return null;
          }

          getOriginalFreteName(nameElement);

          if (!isAllowedFreteService(nameElement)) {
            resetFreteServiceName(nameElement);
            return null;
          }

          const price = parseFretePrice(priceElement);
          const days = parseFreteDays(timeElement);

          if (price === null) {
            resetFreteServiceName(nameElement);
            return null;
          }

          return {
            row: row,
            nameElement: nameElement,
            price: price,
            minDays: days.min,
            maxDays: days.max
          };
        })
        .filter(Boolean);
    }

    function clearFreteRowStyles() {
      const resultBox = document.querySelector(
        '.area-buy-product.correa-buy-area-ready .content-frete > .box-result'
      );

      if (!resultBox) return;

      resultBox.querySelectorAll('.flex.flex-col > div').forEach(function (row) {
        row.classList.remove(
          'correa-frete-row-highlight-cheap',
          'correa-frete-row-highlight-fast',
          'correa-frete-row-highlight-best'
        );
      });
    }

    function applyFreteServiceNames() {
      const options = getFreteOptionRows();

      clearFreteRowStyles();

      if (!options.length) return;

      const minPrice = Math.min.apply(
        null,
        options.map(function (option) {
          return option.price;
        })
      );

      const minMaxDays = Math.min.apply(
        null,
        options.map(function (option) {
          return option.maxDays;
        })
      );

      const fastestCandidates = options.filter(function (option) {
        return option.maxDays === minMaxDays;
      });

      const minFastestStartDay = Math.min.apply(
        null,
        fastestCandidates.map(function (option) {
          return option.minDays;
        })
      );

      options.forEach(function (option) {
        const isCheapest = option.price === minPrice;
        const isFastest =
          option.maxDays === minMaxDays &&
          option.minDays === minFastestStartDay;

        let newName = getOriginalFreteName(option.nameElement);

        if (isCheapest && isFastest) {
          newName = 'Mais rápido e barato';
          option.row.classList.add('correa-frete-row-highlight-best');
        } else if (isCheapest) {
          newName = 'Mais barato';
          option.row.classList.add('correa-frete-row-highlight-cheap');
        } else if (isFastest) {
          newName = 'Mais rápido';
          option.row.classList.add('correa-frete-row-highlight-fast');
        }

        setFreteServiceName(option.nameElement, newName);
      });
    }

    function getCarouselHTML() {
      return `
      <div class="correa-image-info-carousel-header">
        <div class="correa-image-info-carousel-controls">
          <button class="correa-image-info-carousel-btn correa-image-info-prev" type="button" aria-label="Anterior">
            ${getArrowIcon('prev')}
          </button>

          <button class="correa-image-info-carousel-btn correa-image-info-next" type="button" aria-label="Próximo">
            ${getArrowIcon('next')}
          </button>
        </div>
      </div>

      <div class="correa-image-info-carousel-track">
        <div class="correa-image-info-card">
          <div class="correa-image-info-icon" aria-hidden="true">🎟️</div>

          <div class="correa-image-info-content">
            <span style="display:inline;">Use<strong> BEMVINDO</strong></span>
            <span><strong>Ganhe</strong> 5% de desconto</span>
          </div>
        </div>

        <div class="correa-image-info-card">
          <div class="correa-image-info-icon" aria-hidden="true">🏷️</div>

          <div class="correa-image-info-content">
            <strong>Desconto no PIX</strong>
            <span>Pagamento com preço especial</span>
          </div>
        </div>

        <div class="correa-image-info-card">
          <div class="correa-image-info-icon" aria-hidden="true">💳</div>

          <div class="correa-image-info-content">
            <strong>Parcelamento</strong>
            <span>Em até 8x sem juros</span>
          </div>
        </div>
      </div>
    `;
    }

    function createInfoCarousel() {
      const galleryBlock =
        document.querySelector('#block-imagem') ||
        document.querySelector('.block-imagem');

      const swiperContainer =
        document.querySelector('#container-swiper') ||
        document.querySelector('.container-swiper');

      if (!galleryBlock || !swiperContainer) return;

      const existingCarousel = galleryBlock.querySelector('.' + CAROUSEL_CLASS);

      if (existingCarousel) {
        if (existingCarousel.getAttribute('data-carousel-version') !== CAROUSEL_VERSION) {
          existingCarousel.innerHTML = getCarouselHTML();
          existingCarousel.setAttribute('data-carousel-version', CAROUSEL_VERSION);
          existingCarousel.classList.remove('correa-carousel-controls-ready');
          bindCarouselControls(existingCarousel);
        }

        galleryBlock.classList.add(CAROUSEL_READY_CLASS);
        return;
      }

      const carousel = document.createElement('div');

      carousel.className = CAROUSEL_CLASS;
      carousel.setAttribute('data-carousel-version', CAROUSEL_VERSION);
      carousel.innerHTML = getCarouselHTML();

      swiperContainer.insertAdjacentElement('afterend', carousel);
      galleryBlock.classList.add(CAROUSEL_READY_CLASS);

      bindCarouselControls(carousel);
    }

    function bindCarouselControls(carousel) {
      const track = carousel.querySelector('.correa-image-info-carousel-track');
      const prev = carousel.querySelector('.correa-image-info-prev');
      const next = carousel.querySelector('.correa-image-info-next');

      if (!track || !prev || !next) return;
      if (carousel.classList.contains('correa-carousel-controls-ready')) return;

      function getScrollAmount() {
        const firstCard = track.querySelector('.correa-image-info-card');

        if (!firstCard) return 240;

        return firstCard.offsetWidth + 10;
      }

      prev.addEventListener('click', function () {
        track.scrollBy({
          left: -getScrollAmount(),
          behavior: 'smooth'
        });
      });

      next.addEventListener('click', function () {
        track.scrollBy({
          left: getScrollAmount(),
          behavior: 'smooth'
        });
      });

      carousel.classList.add('correa-carousel-controls-ready');
    }

    function init() {
      insertTopTrustTags();
      applyRatingLayout();
      applyCashbackLayout();
      cleanPaymentTexts();
      moveDePorToPriceCard();
      moveCashbackToPriceCard();
      movePaymentMoreToPriceCard();
      applyBuyAreaLayout();
      moveShippingResultAboveTags();
      applyFreteServiceNames();
      createInfoCarousel();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

    let scheduled = false;

    const observer = new MutationObserver(function () {
      if (scheduled) return;

      scheduled = true;

      requestAnimationFrame(function () {
        scheduled = false;
        init();
      });
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true
    });

    let attempts = 0;

    const interval = setInterval(function () {
      attempts++;
      init();

      if (attempts >= 25) {
        clearInterval(interval);
      }
    }, 300);
  })();
</script>
