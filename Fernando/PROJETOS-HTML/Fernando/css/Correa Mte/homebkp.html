<!-- =========================================================

<style><!--

     ========================================================= */

     ======================================== */
  .container-row-vitrine-native {
    --correamte-promo-width: 220px;
    --correamte-vitrine-gap: 30px;
  }

  .container {
    padding: 5px !important;
  }

  .correamte-promo-left {
    flex: 0 0 var(--correamte-promo-width) !important;
    width: var(--correamte-promo-width) !important;
    max-width: var(--correamte-promo-width) !important;
    min-width: var(--correamte-promo-width) !important;
    display: flex !important;
    align-items: stretch !important;
    /* Esticar para igualar altura */
    overflow: hidden !important;
    max-height: none !important;
    margin: auto;
  }

  .correamte-vitrine-layout {
    display: grid !important;
    grid-template-columns: var(--correamte-promo-width) minmax(0, 1fr);
    gap: var(--correamte-vitrine-gap) !important;
    align-items: stretch !important;
    /* Esticar para igualar altura */
    width: 100% !important;
    height: 100% !important;
    margin: 20px 0;
  }

  #correamtePromoCard {
    width: 100% !important;
    height: 100% !important;
    display: flex !important;
    flex-direction: column !important;
    justify-content: flex-start !important;
    position: relative !important;
    overflow: hidden !important;
    overflow-x: hidden !important;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.10);
    background: #07090c;
    box-sizing: border-box !important;
    font-family: "Montserrat", Arial, sans-serif;
    isolation: isolate;
  }

  #correamtePromoCard::before {
    content: "";
    position: absolute;
    inset: -16px;
    background-image: url("https://correamateriais.cdn.magazord.com.br/img/2026/05/banner/15079/chatgpt-image-13-de-mai-de-2026-17-14-31.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    filter: blur(2px);
    transform: scale(1.08);
    opacity: 0.45;
    z-index: -2;
  }

  /* ========================================
     SLIDER SMARTHINT - LADO DIREITO (FLEXÍVEL)
     ======================================== */
  .correamte-slider-right {
    min-width: 0 !important;
    width: 100% !important;
    max-width: none !important;
    overflow: visible !important;
    padding-right: 0 !important;
    /* Sem padding - margens negativas do slick-list compensam */
    position: relative !important;
    display: flex !important;
    flex-direction: column !important;
  }

  /* Vitrine - resetar margins e preencher altura */
  .correamte-slider-right .smarthint {
    width: 100% !important;
    height: 100% !important;
    overflow: visible !important;
    margin: 0 !important;
    padding: 0 !important;
    display: flex !important;
    flex-direction: column !important;
  }

  .correamte-slider-right .smarthint.sh-home {
    margin: 0 !important;
    padding: 0 !important;
    margin-bottom: 0 !important;
    height: 100% !important;
  }

  /* Containers internos do SmartHint - ocupar toda a largura e altura */
  .correamte-slider-right .produtos-relacionados,
  .correamte-slider-right #ofertas-relacionadas,
  .correamte-slider-right #outras-ofertas-relacionadas,
  .correamte-slider-right .vitrine,
  .correamte-slider-right .ra-vitrine {
    width: 100% !important;
    height: 100% !important;
    padding: 0 !important;
    margin: 0 !important;
  }

  /* Modelo 4 - ocupar toda a largura e manter cards esticados */
  .correamte-slider-right .macro-vitrine-4-itens-black,
  .correamte-slider-right [class*="macro-vitrine-4"] {
    width: 100% !important;
    margin: 0 !important;
  }

  .correamte-slider-right .macro-vitrine-4-itens-black .swiper,
  .correamte-slider-right [class*="macro-vitrine-4"] .swiper {
    overflow: hidden !important;
  }

  .correamte-slider-right .macro-vitrine-4-itens-black .swiper-wrapper,
  .correamte-slider-right [class*="macro-vitrine-4"] .swiper-wrapper {
    align-items: stretch !important;
  }

  .correamte-slider-right .macro-vitrine-4-itens-black .swiper-slide,
  .correamte-slider-right [class*="macro-vitrine-4"] .swiper-slide,
  .correamte-slider-right .macro-vitrine-4-itens-black .product-card,
  .correamte-slider-right [class*="macro-vitrine-4"] .product-card {
    height: auto !important;
  }

  .macro-vitrine-4-itens-black .correamte-promo-slide,
  [class*="macro-vitrine-4"] .correamte-promo-slide {
    display: block !important;
    height: auto !important;
  }

  .macro-vitrine-4-itens-black .correamte-promo-slide #correamtePromoCard,
  [class*="macro-vitrine-4"] .correamte-promo-slide #correamtePromoCard {
    width: 100% !important;
    height: 100% !important;
    min-height: 100% !important;
    margin: 0 !important;
  }

  /* Slick slider - preencher altura */
  .correamte-slider-right .slick-slider {
    margin: 0 !important;
    padding: 0 !important;
    margin-bottom: 0 !important;
    height: 100% !important;
    display: flex !important;
    flex-direction: column !important;
  }

  /* Slick dots - ocultar */
  .correamte-slider-right .slick-dots {
    display: none !important;
  }

  /* Navegação do SmartHint - ocultar se não necessária ou resetar espaço */
  .correamte-slider-right .smarthint-nav,
  .correamte-slider-right .nav-buttons {
    margin: 0 !important;
    padding: 0 !important;
  }

  /* Slick-list - ajustar overflow e manter margens negativas como outras vitrines */
  .correamte-slider-right .slick-list {
    overflow: hidden !important;
    margin-right: -27px !important;
    margin-left: -27px !important;
    padding: 0 !important;
    height: 100% !important;
    flex: 1 !important;
  }

  /* Slick track - horizontal com altura uniforme */
  .correamte-slider-right .slick-track {
    display: flex !important;
    flex-direction: row !important;
    align-items: stretch !important;
    /* Cards com mesma altura */
    margin: 0 !important;
  }

  /* Slides - altura uniforme */
  .correamte-slider-right .slick-slide {
    float: left !important;
    height: auto !important;
    display: flex !important;
  }

  /* Cards - garantir altura 100% */
  .correamte-slider-right .slick-slide>div,
  .correamte-slider-right .slick-slide .apoio-sh {
    height: 100% !important;
    display: flex !important;
    flex-direction: column !important;
  }

  /* Seta DIREITA - visível e posicionada igual às outras vitrines SmartHint */
  .container-row-smarthint .correamte-slider-right .button-next-7tgknk,
  .container-row-smarthint .correamte-slider-right [class*="button-next"],
  .container-row-smarthint .correamte-slider-right .slick-next,
  .container-row-smarthint-1 .button-next-7tgknk,
  .container-row-smarthint-1 [class*="button-next"],
  .container-row-smarthint-1 .slick-next {
    display: flex !important;
    opacity: 1 !important;
    visibility: visible !important;
    z-index: 100 !important;
    right: -81px !important;
    /* Mesmo valor das outras vitrines SmartHint */
  }

  /* Seta ESQUERDA - OCULTA (fica sobre o bloco promo) - APENAS SmartHint */
  .container-row-smarthint .correamte-slider-right .button-prev-swomt,
  .container-row-smarthint .correamte-slider-right [class*="button-prev"],
  .container-row-smarthint .correamte-slider-right .slick-prev {
    display: none !important;
    visibility: hidden !important;
    opacity: 0 !important;
  }
--></style>
<!-- =========================================================
     BLOCO 02 - CSS BASE / AJUSTES INTERNOS DO CARD PROMOCIONAL
     ========================================================= -->
<style><!--
  /* ========================================
     BLOCO PROMOCIONAL - ESTILOS INTERNOS
     ======================================== */

  /* Animações */
  @keyframes correamteDotPulse {

    0%,
    100% {
      transform: scale(1);
      opacity: 1;
    }

    50% {
      transform: scale(1.3);
      opacity: 0.7;
    }
  }

  @keyframes correamteTimerPulse {

    0%,
    100% {
      transform: scale(1);
    }

    50% {
      transform: scale(1.03);
    }
  }

  #correamtePromoCard *,
  #correamtePromoCard *::before,
  #correamtePromoCard *::after {
    box-sizing: border-box !important;
    font-family: "Montserrat", Arial, sans-serif;
    max-width: 100%;
  }

  /* Título acima da vitrine */
  .correamte-titulo-position1 {
    width: 100%;
    margin-bottom: 8px;
  }


  /* Body do card */
  #correamtePromoCard .correamte-body {
    padding: 14px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 10px;
    flex: 1;
    position: relative;
    z-index: 1;
    overflow: hidden !important;
    max-width: 100% !important;
  }

  /* Selo "POR TEMPO LIMITADO" */
  #correamtePromoCard .correamte-kicker {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 5px 14px;
    border-radius: 999px;
    background: rgba(200, 16, 46, 0.12);
    border: 1px solid rgba(200, 16, 46, 0.25);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.8px;
    color: #C8102E;
    white-space: nowrap;
    text-transform: uppercase;
    max-width: 100% !important;
    overflow: hidden !important;
  }

  #correamtePromoCard .correamte-kicker .correamte-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #C8102E;
    animation: correamteDotPulse 1.5s ease-in-out infinite;
    flex-shrink: 0;
  }

  /* Título */
  #correamtePromoCard .correamte-title {
    margin: 0;
    font-size: 15px;
    line-height: 1.35;
    font-weight: 800;
    letter-spacing: -0.2px;
    color: rgba(255, 255, 255, 0.94);
    text-align: center;
    max-width: 100% !important;
    word-wrap: break-word !important;
  }

  /* Cronômetro */
  #correamtePromoCard .correamte-timer {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    width: 100%;
    max-width: 100%;
    animation: correamteTimerPulse 2s ease-in-out infinite;
  }

  #correamtePromoCard .correamte-timer-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.10);
    border-radius: 6px;
    padding: 6px 2px;
    min-width: 0;
    flex: 1 1 0;
    max-width: 25%;
  }

  #correamtePromoCard .correamte-timer-number {
    font-size: 18px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1;
    letter-spacing: -0.5px;
    font-variant-numeric: tabular-nums;
  }

  #correamtePromoCard .correamte-timer-label {
    font-size: 7px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.50);
    text-transform: uppercase;
    letter-spacing: 0.3px;
    margin-top: 2px;
  }

  #correamtePromoCard .correamte-timer-sep {
    font-size: 14px;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.30);
    line-height: 1;
    margin-bottom: 8px;
    flex-shrink: 0;
  }

  /* Subtexto */
  #correamtePromoCard .correamte-sub {
    margin: 0;
    text-align: center;
    font-size: 11px;
    line-height: 1.45;
    color: rgba(255, 255, 255, 0.60);
    max-width: 100% !important;
  }

  /* Benefícios - preencher espaço restante */
  #correamtePromoCard .correamte-benefits {
    margin-top: auto;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 0;
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    padding-top: 10px;
  }

  #correamtePromoCard .correamte-benefit-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 4px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
  }

  #correamtePromoCard .correamte-benefit-item:last-child {
    border-bottom: none;
  }

  #correamtePromoCard .correamte-benefit-icon {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    line-height: 1;
  }

  #correamtePromoCard .correamte-benefit-text {
    font-size: 9px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.55);
    line-height: 1.3;
    text-align: left;
  }

  /* Botão CTA */
  #correamtePromoCard .correamte-cta {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 100% !important;
    height: 42px;
    border-radius: 8px;
    background: #C8102E;
    border: none;
    color: #ffffff !important;
    font-size: 13px;
    font-weight: 700;

    box-sizing: border-box !important;
  }

  #correamtePromoCard .correamte-cta:hover {
    filter: brightness(1.1);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(200, 16, 46, 0.35);
  }

  #correamtePromoCard .correamte-cta:active {
    transform: translateY(0);
    filter: brightness(0.95);
    box-shadow: none;
  }


  #correamtePromoCard .correamte-benefits-vantagens {
    margin-top: auto;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 6px;
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    padding-top: 10px;
  }

  #correamtePromoCard .correamte-benefits-vantagens .correamte-benefit-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 6px;

    border: 1px solid rgba(255, 255, 255, 0.08);
  }

  #correamtePromoCard .correamte-benefits-vantagens .correamte-benefit-icon {
    width: 24px;
    height: 24px;
    flex: 0 0 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  #correamtePromoCard .correamte-benefits-vantagens .correamte-benefit-text {
    font-size: 9px;
    line-height: 1.25;
    color: rgba(255, 255, 255, 0.68);
    text-align: left;
  }

  #correamtePromoCard .correamte-benefits-vantagens .correamte-benefit-text strong {
    display: block;
    color: #ffffff;
    font-size: 10px;
    font-weight: 800;
  }

  /* Ajuste de espaçamento interno do card promocional */
  #correamtePromoCard .correamte-body {
    justify-content: center !important;
    gap: 8px !important;
    padding: 14px 10px !important;
  }

  /* Remove o empurrão que joga as vantagens para o final */
  #correamtePromoCard .correamte-benefits,
  #correamtePromoCard .correamte-benefits-vantagens {
    margin-top: 8px !important;
    padding-top: 0 !important;
    border-top: none !important;
  }

  /* Deixa as vantagens mais compactas */
  #correamtePromoCard .correamte-benefits-vantagens {
    gap: 5px !important;
  }

  /* Reduz altura dos cards de vantagem */
  #correamtePromoCard .correamte-benefits-vantagens .correamte-benefit-item {
    padding: 6px 8px !important;
    min-height: 44px !important;
  }

  /* Compacta texto */
  #correamtePromoCard .correamte-benefits-vantagens .correamte-benefit-text {
    font-size: 8px !important;
    line-height: 1.2 !important;
  }

  #correamtePromoCard .correamte-benefits-vantagens .correamte-benefit-text strong {
    font-size: 9px !important;
    margin-bottom: 2px !important;
  }

  /* Compacta o botão */
  #correamtePromoCard .correamte-cta {
    height: 38px !important;
    margin-top: 2px !important;
  }

  /* Compacta o timer */
  #correamtePromoCard .correamte-timer-block {
    padding: 5px 2px !important;
  }

  #correamtePromoCard .correamte-timer-number {
    font-size: 16px !important;
  }

  #correamtePromoCard .correamte-title {
    margin-bottom: 0 !important;

<script>// <![CDATA[

    function moverEEnvolver(vitrine, componente, positionNumber) {
      if (!vitrine) {
        console.log(
          "❌ Vitrine não encontrada para position-" + positionNumber,
        );
        return false;
      }

      if (vitrine.hasAttribute("data-movida")) {
        console.log("⚠️ Vitrine já foi movida");
        return false;
      }

      // Salvar posição original ANTES de mover (fallback se componente não existir)
      var originalParent = vitrine.parentNode;
      var originalNext = vitrine.nextSibling;

      if (!componente) {
        console.log(
          "⚠️ Componente de referência não encontrado para position-" +
            positionNumber +
            ", usando posição original da vitrine",
        );
      }

      vitrine.setAttribute("data-movida", "true");

      var containerRow = document.createElement("div");
      containerRow.className =
        "container-row container-row-type-3 container-row-smarthint container-row-smarthint-" +
        positionNumber;

      var container = document.createElement("div");
      container.className = "container";

      // Se for position-1, criar layout flexbox com bloco promo + vitrine
      if (positionNumber === 1) {
        // Criar wrapper flexbox
        var vitrineLayout = document.createElement("div");
        vitrineLayout.className = "correamte-vitrine-layout";

        // Criar container do bloco promocional (esquerda)
        var promoLeft = document.createElement("div");
        promoLeft.className = "correamte-promo-left";
        var promoCard = criarBlocoPromocional();
        promoLeft.appendChild(promoCard);
        vitrineLayout.appendChild(promoLeft);

        // Criar container do slider (direita)
        var sliderRight = document.createElement("div");
        sliderRight.className = "correamte-slider-right";

        // MOVER a vitrine (sem título) para dentro do slider
        sliderRight.appendChild(vitrine);

        vitrineLayout.appendChild(sliderRight);
        container.appendChild(vitrineLayout);
      } else {
        // Outras vitrines: mover normalmente
        container.appendChild(vitrine);
      }

      containerRow.appendChild(container);

      // Inserir após o componente de referência, ou na posição original como fallback
      if (componente) {
        componente.parentNode.insertBefore(
          containerRow,
          componente.nextSibling,
        );
      } else if (originalParent) {
        originalParent.insertBefore(containerRow, originalNext);
        console.log(
          "✅ Card inserido na posição original da vitrine (fallback)",
        );
      }

      return true;
    }

    // Função para igualar altura do promo com os cards (APENAS DESKTOP)
    function ajustarAlturaPosition1() {
      // Não executar no mobile - altura automática
      if (isMobile()) {
        console.log("📱 Mobile detectado - altura position-1 automática");
        return true;
      }

      console.log("🔧 Ajustando altura position-1...");

      try {
        var sliderRight = document.querySelector(".correamte-slider-right");
        var blocoPromo = document.getElementById("correamtePromoCard");
        var promoLeft = document.querySelector(".correamte-promo-left");

        if (!sliderRight || !blocoPromo || !promoLeft) {
          console.log("❌ Elementos não encontrados");
          return false;
        }

        // Encontrar um card para medir altura
        var card = sliderRight.querySelector(
          ".slick-slide:not(.slick-cloned) .apoio-sh",
        );
        if (!card) {
          card = sliderRight.querySelector(".apoio-sh");
        }
        if (!card) {
          console.log("❌ Nenhum card encontrado");
          return false;
        }

        var cardRect = card.getBoundingClientRect();
        var alturaCard = cardRect.height;

        console.log("📐 Card altura: " + alturaCard.toFixed(0) + "px");

        if (alturaCard < 100) {
          console.log("⏳ Altura muito baixa, aguardando...");
          return false;
        }

        // PROTEÇÃO: Altura máxima razoável (600px desktop)
        // Cards SmartHint normais têm ~400-500px. Acima de 600px indica
        // que o Slick ainda não reorganizou os cards em linha.
        if (alturaCard > 600) {
          console.log(
            "⚠️ Altura excessiva (" +
              alturaCard.toFixed(0) +
              "px), aguardando Slick reorganizar...",
          );
          return false;
        }

        // Aplicar altura ao bloco promo
        blocoPromo.style.height = alturaCard + "px";
        blocoPromo.style.minHeight = alturaCard + "px";
        promoLeft.style.height = alturaCard + "px";

        console.log("✅ Bloco promo altura: " + alturaCard.toFixed(0) + "px");
        return true;
      } catch (e) {
        console.log("❌ Erro:", e);
        return false;
      }
    }

    // PATCH: Forçar slidesToShow: 4 na position-1 (APENAS DESKTOP)
    function reconfigurarSlickPosition1() {
      // Não executar no mobile - CSS controla layout 2 por linha
      if (isMobile()) {
        console.log(
          "📱 Mobile detectado - Slick position-1 não será reconfigurado",
        );
        return true;
      }

      console.log("🎠 Reconfigurando Slick position-1 para 4 cards...");

      try {
        var sliderRight = document.querySelector(".correamte-slider-right");
        if (!sliderRight) {
          console.log("❌ .correamte-slider-right não encontrado");
          return false;
        }

        var slickElement = sliderRight.querySelector(".slick-slider");
        if (!slickElement) {
          console.log("❌ .slick-slider não encontrado");
          return false;
        }

        // Verificar se jQuery e Slick estão disponíveis
        if (
          typeof jQuery === "undefined" ||
          typeof jQuery.fn.slick === "undefined"
        ) {
          console.log("❌ jQuery ou Slick não disponível");
          return false;
        }

        var $slider = jQuery(slickElement);

        // Verificar se é um slider inicializado
        if (!$slider.hasClass("slick-initialized")) {
          console.log("❌ Slick não inicializado ainda");
          return false;
        }

        // Destruir e reinicializar com novas configurações
        console.log("🔄 Reinicializando Slick com slidesToShow: 4...");

        // Pegar configurações atuais
        var currentSettings = $slider.slick("getSlick").options;

        // Salvar referência aos arrows existentes
        var prevArrowHtml = currentSettings.prevArrow;
        var nextArrowHtml = currentSettings.nextArrow;

        // Se não encontrou, tentar pegar do DOM
        var existingPrev = sliderRight.querySelector('[class*="button-prev"]');
        var existingNext = sliderRight.querySelector('[class*="button-next"]');

        if (existingPrev && !prevArrowHtml) {
          prevArrowHtml = existingPrev.outerHTML;
        }
        if (existingNext && !nextArrowHtml) {
          nextArrowHtml = existingNext.outerHTML;
        }

        // Destruir slider
        $slider.slick("unslick");

        // Reinicializar com 4 slides
        $slider.slick({
          slidesToShow: 4,
          slidesToScroll: 1,
          infinite:
            currentSettings.infinite !== undefined
              ? currentSettings.infinite
              : true,
          arrows: true,
          dots: false,
          autoplay: false,
          prevArrow:
            prevArrowHtml ||
            '<button type="button" class="slick-prev button-prev-swomt">❮</button>',
          nextArrow:
            nextArrowHtml ||
            '<button type="button" class="slick-next button-next-7tgknk">❯</button>',
          responsive: [
            {
              breakpoint: 1200,
              settings: {
                slidesToShow: 3,
                slidesToScroll: 1,
              },
            },
            {
              breakpoint: 992,
              settings: {
                slidesToShow: 2,
                slidesToScroll: 1,
              },
            },
            {
              breakpoint: 768,
              settings: {
                slidesToShow: 1,
                slidesToScroll: 1,
                centerMode: true,
                centerPadding: "30px",
              },
            },
          ],
        });

        // Forçar recálculo do layout
        setTimeout(function () {
          $slider.slick("setPosition");
        }, 100);

        console.log("✅ Slick reconfigurado para 4 cards!");
        return true;
      } catch (e) {
        console.log("❌ Erro ao reconfigurar Slick:", e);
        return false;
      }
    }

    // Tentar ajustar múltiplas vezes
    function tentarAjustarVitrine(tentativa) {
      tentativa = tentativa || 1;
      if (tentativa > 10) {
        console.log("⚠️ Máximo de tentativas atingido");
        return;
      }

      var sucesso = ajustarAlturaPosition1();
      if (!sucesso) {
        setTimeout(function () {
          tentarAjustarVitrine(tentativa + 1);
        }, 500);

            card.querySelector(".smarthint-value") ||
            card.querySelector(".price-pix") ||
            card.querySelector(".value");

            precoPixTexto
              .replace("R$", "")
              .replace(/\s/g, "")
              .replace(/\./g, "")

          if (!matchParcelas || !matchValor) return;

          var numParcelas = parseInt(matchParcelas[1]);
          var valorParcela = parseFloat(
            matchValor[1].replace(/\./g, "").replace(",", "."),

          var totalParcelado = numParcelas * valorParcela;

<script>// <![CDATA[
(function () {
    "use strict";

    // Cronômetro: conta até o próximo domingo 23:59:59
    function getNextSunday() {
      var now = new Date();
      var day = now.getDay();
      var daysUntilSunday = (7 - day) % 7;
      if (daysUntilSunday === 0) daysUntilSunday = 7;
      var target = new Date(now);
      target.setDate(target.getDate() + daysUntilSunday);
      target.setHours(23, 59, 59, 0);
      return target;
    }

    function pad(n) {
      return n < 10 ? "0" + n : String(n);
    }

    function atualizarTimer() {
      var timers = document.querySelectorAll(".correamte-timer");
      if (timers.length === 0) return;

      var now = new Date();
      var target = getNextSunday();
      var diff = target - now;

      if (diff <= 0) {
        target = getNextSunday();
        diff = target - now;
      }

      var days = Math.floor(diff / (1000 * 60 * 60 * 24));
      var hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      var minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      var seconds = Math.floor((diff % (1000 * 60)) / 1000);

      timers.forEach(function (timer) {
        var dEl = timer.querySelector('[data-timer="days"]');
        var hEl = timer.querySelector('[data-timer="hours"]');
        var mEl = timer.querySelector('[data-timer="minutes"]');
        var sEl = timer.querySelector('[data-timer="seconds"]');

        if (dEl) dEl.textContent = pad(days);
        if (hEl) hEl.textContent = pad(hours);
        if (mEl) mEl.textContent = pad(minutes);
        if (sEl) sEl.textContent = pad(seconds);
      });
    }

    function iniciarTimer() {
      var timers = document.querySelectorAll(".correamte-timer");
      if (timers.length > 0) {
        atualizarTimer();
        setInterval(atualizarTimer, 1000);
        return;
      }
      setTimeout(iniciarTimer, 1000);
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", function () {
        setTimeout(iniciarTimer, 1500);
      });
    } else {
      setTimeout(iniciarTimer, 1500);
    }
  })();
// ]]></script>
