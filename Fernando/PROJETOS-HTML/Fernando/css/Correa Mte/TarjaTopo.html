<style>
  /* --- AJUSTES GERAIS / DESKTOP --- */
  #header-react-app>div.header-top.bg-cor-base.\!py-space-4.text-white {
    background-color: black;
  }

  .promo-banner-unico {
    background-color: #000;
    color: #fff;
    padding: 12px 5%;
    width: 100%;
    z-index: 999; /* acima do header */
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 1em;
    text-align: center;
    box-sizing: border-box;
    position: relative;
    transition: transform 0.25s ease-in-out, opacity 0.25s ease-in-out;
  }

  .promo-banner-fixo {
    position: fixed !important;
    top: 0;
    left: 0;
    right: 0;
  }

  .promo-texto-unico {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    max-width: 1200px;
    width: 100%;
    text-align: center;
  }

  .promo-info {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
    font-weight: 600;
    font-size: 1em;
    justify-content: center;
  }

  /* Unifica o botão de cupom (corrige cor e tipagem) */
  .coupon-data {
    cursor: pointer;
    padding: 6px 10px;
    background-color: #BC1A1B;
    color: #fff;
    border-radius: 6px;
    font-size: 1em;
    font-weight: 700;
    border: 0;
    transition: background-color 0.2s ease-in-out, color 0.2s ease-in-out, transform 0.1s ease-in-out;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .coupon-data:hover {
    background-color: #fff;
    color: #000;
    transform: translateY(-1px);
  }
  .coupon-data:active {
    transform: translateY(0);
  }

  .copy-feedback {
    color: #FFD54F;
    font-weight: 700;
    font-size: 0.9em;
    display: none;
  }

  .timer-unico {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    font-size: 0.95em;
  }

  .timer-block {
    background-color: #BC1A1B;
    color: #fff;
    padding: 6px 8px;
    min-width: 30px;
    text-align: center;
    border-radius: 6px;
    font-weight: 700;
    font-size: 0.95em;
    line-height: 1.2;
  }

  .timer-label {
    display: block;
    font-size: 0.55em;
    color: #FFD54F; /* melhora contraste */
    font-weight: 600;
    margin-top: 2px;
  }

  .timer-unico span {
    color: #fff;
  }

  .close-btn {
    position: absolute;
    top: 6px;
    right: 10px;
    background-color: transparent;
    border: none;
    color: #fff;
    font-size: 1.2em;
    cursor: pointer;
    line-height: 1;
  }
  .close-btn:hover { color: #FFD54F; }

  /* --- MOBILE --- */
  @media (max-width: 480px) {
    /* Usa sticky por padrão no mobile (mais suave), e troca pra fixed após rolar */
    .promo-banner-unico { 
      position: sticky; 
      top: 0; 
      font-size: 0.92em;
      padding: 8px 4%;
    }

    .promo-texto-unico {
      flex-direction: column;
      gap: 6px;
    }

    .promo-info {
      justify-content: center;
      font-size: 0.95em;
      gap: 4px;
    }

    .coupon-data {
      padding: 3px 7px; /* sem “jump” no hover no mobile */
      font-size: 0.95em;
    }
    .coupon-data:hover {
      /* desativa hover visual no mobile para evitar piscadas */
      background-color: #a71717;
      color: #fff;
      transform: none;
    }

    .timer-unico {
      gap: 4px;
      font-size: 0.85em;
    }

    .timer-block {
      min-width: 28px;
      padding: 3px 4px;
      font-size: 0.95em;
    }

    .timer-label {
      font-size: 0.5em;
      margin-top: 1px;
    }
  }

  /* Acessibilidade: reduz animações se o usuário preferir */
  @media (prefers-reduced-motion: reduce) {
    .promo-banner-unico { transition: none; }
    .coupon-data { transition: none; }
  }
</style>

<script>
  // <![CDATA[
  $(document).ready(function () {
    // Injeta o banner antes do header-middle
    const $banner = $(`
      <div class="promo-banner-unico" role="region" aria-label="Promoção Black November">
        <button class="close-btn" aria-label="Fechar aviso">×</button>
        <div class="promo-texto-unico">
          <div class="promo-info">
            <span style="font-weight:600">
              <strong>Black November 🔥</strong> — primeira compra? Aproveite o cupom
              <button class="coupon-data" type="button" aria-label="Copiar cupom BLACK5" data-coupon="BLACK5">
                <span>BLACK5</span>
              </button>
              | Expira em:
            </span>
          </div>

          <div class="timer-unico" aria-live="polite">
            <div class="timer-block">
              <span id="horas-unico">00</span>
              <span class="timer-label">HRS</span>
            </div>
            <div class="timer-block">
              <span id="minutos-unico">00</span>
              <span class="timer-label">MIN</span>
            </div>
            <div class="timer-block">
              <span id="segundos-unico">00</span>
              <span class="timer-label">SEC</span>
            </div>
          </div>

          <span class="copy-feedback" aria-hidden="true">Copiado!</span>
        </div>
      </div>
    `);

    $banner.insertBefore(".header-middle");

    /* --- TIMER (conta até 23:59:59 do dia) --- */
    function atualizarCronometro() {
      const horaFinal = new Date();
      horaFinal.setHours(23, 59, 59, 999);

      const agora = new Date();
      const restante = horaFinal - agora;

      if (restante <= 0) {
        $("#horas-unico").text("00");
        $("#minutos-unico").text("00");
        $("#segundos-unico").text("00");
        clearInterval(intervalo);
        return;
      }

      const horas = Math.floor((restante % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutos = Math.floor((restante % (1000 * 60 * 60)) / (1000 * 60));
      const segundos = Math.floor((restante % (1000 * 60)) / 1000);

      $("#horas-unico").text(String(horas).padStart(2, "0"));
      $("#minutos-unico").text(String(minutos).padStart(2, "0"));
      $("#segundos-unico").text(String(segundos).padStart(2, "0"));
    }
    const intervalo = setInterval(atualizarCronometro, 1000);
    atualizarCronometro();

    /* --- FECHAR BANNER --- */
    $banner.on("click", ".close-btn", function () {
      $banner.css("opacity", 0);
      setTimeout(() => $banner.remove(), 250);
      $("body").css("padding-top", ""); // remove compensação, se houver
    });

    /* --- FIXO APÓS SCROLL + COMPENSAÇÃO DO LAYOUT --- */
    const FIX_OFFSET = 100; // px
    const ajustarPaddingTopo = () => {
      if ($banner.hasClass("promo-banner-fixo")) {
        const h = $banner.outerHeight();
        $("body").css("padding-top", h + "px");
      } else {
        $("body").css("padding-top", "");
      }
    };

    const onScroll = () => {
      if ($(window).scrollTop() > FIX_OFFSET) {
        if (!$banner.hasClass("promo-banner-fixo")) {
          $banner.addClass("promo-banner-fixo");
          ajustarPaddingTopo();
        }
      } else {
        if ($banner.hasClass("promo-banner-fixo")) {
          $banner.removeClass("promo-banner-fixo");
          ajustarPaddingTopo();
        }
      }
    };
    $(window).on("scroll", onScroll);
    onScroll();

    /* --- COPIAR CUPOM (corrige seletor: .coupon-data) --- */
    $(document).on("click", ".coupon-data", function () {
      const coupon = $(this).data("coupon") || $(this).text().trim();
      const tempInput = $("<input>");
      $("body").append(tempInput);
      tempInput.val(coupon).select();
      document.execCommand("copy");
      tempInput.remove();
      $banner.find(".copy-feedback").stop(true, true).fadeIn(150).delay(1200).fadeOut(150);
    });

    /* Evita “piscar” no iOS ao tocar no botão */
    document.addEventListener("touchstart", function(){}, {passive: true});
  });
  // ]]>
</script>
