<script>
  // <![CDATA[
  (function () {
    "use strict";

    console.log("🚀 Correa MTE: Iniciando reordenação das vitrines SmartHint");

    let tentativas = 0;
    const maxTentativas = 20;

    function isMobile() {
      return window.innerWidth <= 768;
    }

    function moverEEnvolver(vitrine, componente, positionNumber) {
      if (!vitrine) {
        console.log("❌ Vitrine não encontrada para position-" + positionNumber);
        return false;
      }

      if (vitrine.hasAttribute("data-movida")) {
        console.log("⚠️ Vitrine já foi movida");
        return false;
      }

      // Salvar posição original ANTES de mover (fallback se componente não existir)
      var originalParent = vitrine.parentNode;
      var originalNext = vitrine.nextSibling;

      if (!componente) {
        console.log("⚠️ Componente de referência não encontrado para position-" + positionNumber + ", usando posição original da vitrine");
      }

      vitrine.setAttribute("data-movida", "true");

      var containerRow = document.createElement("div");
      containerRow.className =
        "container-row container-row-type-3 container-row-smarthint container-row-smarthint-" +
        positionNumber;

      var container = document.createElement("div");
      container.className = "container";

      // Se for position-1, criar layout flexbox com bloco promo + vitrine
      if (positionNumber === 1) {

        // Criar wrapper flexbox
        var vitrineLayout = document.createElement("div");
        vitrineLayout.className = "correamte-vitrine-layout";

        // Criar container do bloco promocional (esquerda)
        var promoLeft = document.createElement("div");
        promoLeft.className = "correamte-promo-left";
        var promoCard = criarBlocoPromocional();
        promoLeft.appendChild(promoCard);
        vitrineLayout.appendChild(promoLeft);

        // Criar container do slider (direita)
        var sliderRight = document.createElement("div");
        sliderRight.className = "correamte-slider-right";

        // MOVER a vitrine (sem título) para dentro do slider
        sliderRight.appendChild(vitrine);

        vitrineLayout.appendChild(sliderRight);
        container.appendChild(vitrineLayout);
      } else {
        // Outras vitrines: mover normalmente
        container.appendChild(vitrine);
      }

      containerRow.appendChild(container);

      // Inserir após o componente de referência, ou na posição original como fallback
      if (componente) {
        componente.parentNode.insertBefore(containerRow, componente.nextSibling);
      } else if (originalParent) {
        originalParent.insertBefore(containerRow, originalNext);
        console.log("✅ Card inserido na posição original da vitrine (fallback)");
      }

      return true;
    }

    // Função para criar o bloco promocional
    function criarBlocoPromocional() {
      var card = document.createElement("div");
      card.id = "correamtePromoCard";

      card.innerHTML = `
            <div class="correamte-body">
                <div class="correamte-kicker">
                    <span class="correamte-dot"></span>
                    Por tempo limitado
                </div>
                
                <h2 class="correamte-title">
                    Aproveite nossas principais ofertas
                </h2>

                <div class="correamte-timer" id="correamteTimer">
                    <div class="correamte-timer-block">
                        <span class="correamte-timer-number" data-timer="days">00</span>

      seletores.forEach(function (seletor) {
        var tags = document.querySelectorAll(seletor);
        tags.forEach(function (tag) {
          tag.style.setProperty("background", "#32bcad", "important");

    function calcularEconomiaHome() {
      console.log("💰 Calculando economia nas vitrines da home...");

      try {
        var cards = document.querySelectorAll(".smarthint.sh-home .apoio-sh");
        console.log("📦 Total de cards encontrados: " + cards.length);

        cards.forEach(function (card) {
          if (card.querySelector(".tag-economia")) {
            return;
          }

          var precoPixElement =
            card.querySelector(".smarthint-value") ||
            card.querySelector(".price-pix") ||
            card.querySelector(".value");
          if (!precoPixElement) return;

          var precoPixTexto = precoPixElement.textContent.trim();
          var precoPix = parseFloat(
            precoPixTexto
              .replace("R$", "")
              .replace(/\s/g, "")
              .replace(/\./g, "")
              .replace(",", "."),
          );

          var priceSecondary =
            card.querySelector(".price-secondary .price-text") ||
            card.querySelector(".price-secondary") ||
            card.querySelector('[class*="parcel"]');
          if (!priceSecondary) return;

          var parcelasTexto = priceSecondary.textContent;
          var matchParcelas = parcelasTexto.match(/(\d+)x/);
          var matchValor = parcelasTexto.match(/R\$\s*([\d.,]+)/);

          if (!matchParcelas || !matchValor) return;

          var numParcelas = parseInt(matchParcelas[1]);
          var valorParcela = parseFloat(
            matchValor[1].replace(/\./g, "").replace(",", "."),
          );

          var totalParcelado = numParcelas * valorParcela;
          var economia = totalParcelado - precoPix;

          if (economia <= 0) return;

          var productName =
            card.querySelector(".product-name") ||
            card.querySelector(".name") ||
            card.querySelector("h3") ||
            card.querySelector('[class*="title"]');
          if (!productName) return;

          var tagEconomia = document.createElement("div");
          tagEconomia.className = "tag-economia";

          var economiaFormatada = economia.toLocaleString("pt-BR", {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2,
          });

          tagEconomia.textContent = "Economize: R$ " + economiaFormatada;
          productName.parentNode.insertBefore(tagEconomia, productName);
        });

        console.log("✨ Cálculo de economia concluído");
      } catch (e) {
        console.log("❌ Erro no cálculo de economia:", e);
      }
    }

    function encontrarVitrine() {
      // Buscar a PRIMEIRA vitrine nativa Magazord (.macro_vitrine com vitrine-react-app e <li> renderizados)
      var macros = document.querySelectorAll(".macro_vitrine");
      log("  macro_vitrine encontradas: " + macros.length);

      // Prioridade: vitrine que contém "QUEIMA" ou "últimas unidades" no título
      var candidatas = [];
      for (var i = 0; i < macros.length; i++) {
        var m = macros[i];
        if (m.hasAttribute("data-vitrine-native-ok")) continue;
        if (m.closest("[data-vitrine-native-ok]")) continue;
        if (m.closest(".smarthint") || m.closest(".container-row-smarthint")) continue;

        var reactApp = m.querySelector('[id^="vitrine-react-app-"]');
        if (!reactApp) continue;

        var lis = reactApp.querySelectorAll("li");
        if (lis.length === 0) {
          log("  #" + reactApp.id + " sem <li> ainda");
          continue;
        }

        // Verificar se o container-row ou componente-id pai tem título "QUEIMA"
        var containerPai = m.closest('[id^="componente-id-"]') || m.closest(".container-row") || m.parentElement;
        var textoContainer = containerPai ? (containerPai.textContent || "").substring(0, 200).toUpperCase() : "";
        var ehQueima = textoContainer.indexOf("QUEIMA") !== -1 || textoContainer.indexOf("LTIMAS UNIDADES") !== -1;

        log("  #" + reactApp.id + ": " + lis.length + " produtos" + (ehQueima ? " [QUEIMA]" : ""));
        candidatas.push({ vitrine: reactApp, macroVitrine: m, ehQueima: ehQueima });
      }

      // Retornar a vitrine QUEIMA se encontrada, senão a primeira
      for (var q = 0; q < candidatas.length; q++) {
        if (candidatas[q].ehQueima) {
          log("  Selecionada: QUEIMA #" + candidatas[q].vitrine.id);
          return candidatas[q];
        }
      }
      if (candidatas.length > 0) {
        log("  Selecionada: primeira disponivel #" + candidatas[0].vitrine.id);
        return candidatas[0];
      }

      return null;
    }

    function marcar() {
      if (DONE) return;

      log("Tentando encontrar vitrine...");
      var resultado = encontrarVitrine();
      if (!resultado) {
        log("Nenhuma vitrine pronta ainda");
        return;
      }

      var app = resultado.vitrine;
      var macroContainer = resultado.macroVitrine;

      // Subir no DOM até encontrar container-row ou componente-id
      var alvo = macroContainer;
      var el = macroContainer;
      while (el && el !== document.body) {
        if (el.id && el.id.indexOf("componente-id") === 0) { alvo = el; break; }
        if (el.classList && el.classList.contains("container-row")) { alvo = el; break; }
        el = el.parentElement;
      }
      // Se não encontrou container-row nem componente-id, usar o macro_vitrine pai ou o proprio macroContainer
      if (alvo === macroContainer && macroContainer) {
        // tenta o pai do macroContainer
        var pai = macroContainer.parentElement;
        if (pai && pai !== document.body) {
          alvo = pai;
        }
      }
      if (!alvo) { alvo = macroContainer || app.parentElement; }
      if (!alvo) { log("Sem container pai"); return; }

      log("Container pai: tag=" + alvo.tagName + " id=" + (alvo.id || "none") + " class=" + (alvo.className || "none"));

      // Marcar
      alvo.setAttribute("data-vitrine-native-ok", "1");
      alvo.classList.add("container-row-vitrine-native");

      // Forçar visibilidade na cadeia toda
      alvo.style.cssText += ";display:block!important;visibility:visible!important;opacity:1!important;height:auto!important;overflow:visible!important;";
      app.style.cssText += ";display:block!important;visibility:visible!important;opacity:1!important;height:auto!important;overflow:visible!important;";
      if (macroContainer && macroContainer !== alvo) {
        macroContainer.style.cssText += ";display:block!important;visibility:visible!important;opacity:1!important;height:auto!important;overflow:visible!important;";
      }

      var ancestor = alvo.parentElement;
      while (ancestor && ancestor !== document.body) {
        try {
          var cs = window.getComputedStyle(ancestor);
          if (cs.display === "none" || cs.visibility === "hidden" || cs.opacity === "0") {
            log("Ancestral oculto: " + (ancestor.id || ancestor.className || ancestor.tagName));
            ancestor.style.cssText += ";display:block!important;visibility:visible!important;opacity:1!important;";
          }
        } catch(e) {}
        ancestor = ancestor.parentElement;
      }

      // Usar o alvo como container de conteúdo
      var box = alvo.querySelector(".container") || alvo;
      log("Box de conteudo: tag=" + box.tagName + " id=" + (box.id || "none") + " children=" + box.children.length);

      // Título custom
      var tOrig = box.querySelector("h2, .vitrine-titulo, .titulo-vitrine");
      if (tOrig) {
        log("Titulo original ocultado: " + tOrig.textContent.substring(0, 40));
        tOrig.style.display = "none";
      }



      // ===== LAYOUT FLEX: CARD PROMO (esquerda) + VITRINE (direita) =====
      log("Criando layout flex com card promo...");

      var vitrineLayout = document.createElement("div");
      vitrineLayout.className = "correamte-vitrine-layout";

      // Card promo (esquerda)
      var promoLeft = document.createElement("div");
      promoLeft.className = "correamte-promo-left";
      promoLeft.appendChild(criarBlocoPromocional());
      vitrineLayout.appendChild(promoLeft);

      // Wrapper da vitrine (direita)
      var sliderRight = document.createElement("div");
      sliderRight.className = "correamte-slider-right";

      // Mover todo o conteúdo existente (exceto título) para dentro do sliderRight
      var filhos = [];
      for (var k = 0; k < box.children.length; k++) {
        filhos.push(box.children[k]);
      }
      for (var m = 0; m < filhos.length; m++) {
        sliderRight.appendChild(filhos[m]);
      }

      vitrineLayout.appendChild(sliderRight);
      box.appendChild(vitrineLayout);

      log("Layout flex criado com sucesso!");

      // Forçar recálculo do Swiper após mover elementos no DOM
      setTimeout(function() {
        try {
          // Tentar encontrar a instância Swiper e atualizar
          var swiperEl = sliderRight.querySelector(".swiper, .swiper-container, [class*='swiper']");
          if (swiperEl && swiperEl.swiper) {
            swiperEl.swiper.update();
            swiperEl.swiper.navigation.update();
            log("Swiper atualizado via .swiper property");
          } else {
            // Fallback: tentar via window.Swiper ou disparar resize
            window.dispatchEvent(new Event("resize"));
            log("Disparado resize event para recalcular Swiper");
          }
        } catch(e) {
          log("Swiper update erro (nao critico): " + e);
          window.dispatchEvent(new Event("resize"));
        }
      }, 500);

      // Segunda tentativa de update
      setTimeout(function() {
        try {
          var swiperEl = sliderRight.querySelector(".swiper, .swiper-container, [class*='swiper']");
          if (swiperEl && swiperEl.swiper) {
            swiperEl.swiper.update();
            swiperEl.swiper.navigation.update();
          }
          window.dispatchEvent(new Event("resize"));
        } catch(e) {}
      }, 2000);

      // Ajustar altura do promo card (desktop)
      setTimeout(ajustarAlturaPromoNativa, 1500);
      setTimeout(ajustarAlturaPromoNativa, 3000);
      setTimeout(ajustarAlturaPromoNativa, 5000);

      DONE = true;
      log("✅ Vitrine nativa com card promo OK!");

      setTimeout(function() { economia(app); }, 2000);
      setTimeout(function() { economia(app); }, 5000);
    }

    function iniciar() {
      log("Deteccao iniciada...");

      // Tentar imediatamente
      marcar();
      if (DONE) return;

      // MutationObserver para detectar quando a vitrine renderizar
      var obs = new MutationObserver(function() {
        if (!DONE) marcar();
        if (DONE) obs.disconnect();
      });
      obs.observe(document.documentElement, { childList: true, subtree: true });

      // Polling como backup
      var tent = 0;
      (function loop() {
        if (DONE) { obs.disconnect(); return; }
        tent++;
        marcar();
        if (DONE) { obs.disconnect(); return; }
        if (tent >= 60) {
          obs.disconnect();
          log("TIMEOUT apos " + tent + " tentativas. Debug:");
          var macros = document.querySelectorAll(".macro_vitrine");
          log("  Total .macro_vitrine: " + macros.length);
          for (var i = 0; i < macros.length; i++) {
            var mm = macros[i];
            var ra = mm.querySelector('[id^="vitrine-react-app-"]');
            log("  macro[" + i + "] id=" + (mm.id || "none") + " class=" + mm.className + " reactApp=" + (ra ? "#" + ra.id + " lis=" + ra.querySelectorAll("li").length : "none") + " nativeOk=" + mm.hasAttribute("data-vitrine-native-ok"));
          }
          var apps = document.querySelectorAll('[id^="vitrine-react-app-"]');
          log("  Total vitrine-react-app: " + apps.length);
          for (var j = 0; j < apps.length; j++) {
            var a = apps[j];
            var sh = a.closest(".smarthint") || a.closest(".container-row-smarthint");
            var nok = a.closest("[data-vitrine-native-ok]");
            log("  #" + a.id + " lis=" + a.querySelectorAll("li").length + (sh ? " [SH]" : "") + (nok ? " [NATIVE-OK]" : "") + " parent=" + (a.parentElement ? a.parentElement.className.substring(0, 60) : "?"));
          }
          return;
        }
        setTimeout(loop, tent <= 20 ? 500 : 1000);
      })();
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", function() { setTimeout(iniciar, 500); });
    } else {
      setTimeout(iniciar, 500);
    }
  })();

</script>
