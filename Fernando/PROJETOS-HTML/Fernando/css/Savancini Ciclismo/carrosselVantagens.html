<style>
  .mini-beneficios-produto {
    width: 100%;
    max-width: 420px;
    margin: 10px 0 14px;
    position: relative;
    font-family: inherit;
  }

  .mini-beneficios-produto * {
    box-sizing: border-box;
  }

  .mini-beneficios-produto__viewport {
    width: 100%;
    overflow: hidden;
    border-radius: 12px;
    background: #f8f8f8;
    border: 1px solid #e8e8e8;
  }

  .mini-beneficios-produto__track {
    display: flex;
    transition: transform 0.35s ease;
    will-change: transform;
  }

  .mini-beneficios-produto__item {
    flex: 0 0 100%;
    min-width: 100%;
    padding: 11px 38px 11px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: #222;
    font-size: 13.5px;
    line-height: 1.35;
    font-weight: 500;
  }

  .mini-beneficios-produto__check {
    width: 18px;
    height: 18px;
    min-width: 18px;
    border-radius: 50%;
    background: #111;
    color: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
  }

  .mini-beneficios-produto__nav {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    gap: 4px;
    z-index: 2;
  }

  .mini-beneficios-produto__btn {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #fff;
    color: #111;
    border: 1px solid #ddd;
    cursor: pointer;
    font-size: 15px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: all 0.2s ease;
  }

  .mini-beneficios-produto__btn:hover {
    background: #111;
    color: #fff;
    border-color: #111;
  }

  .mini-beneficios-produto__dots {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 7px;
  }

  .mini-beneficios-produto__dot {
    width: 5px;
    height: 5px;
    border-radius: 999px;
    border: none;
    background: #d2d2d2;
    padding: 0;
    cursor: pointer;
    transition: all 0.25s ease;
  }

  .mini-beneficios-produto__dot.is-active {
    width: 16px;
    background: #111;
  }

  @media (max-width: 768px) {
    .mini-beneficios-produto {
      max-width: 100%;
      margin: 8px 0 12px;
    }

    .mini-beneficios-produto__item {
      font-size: 13px;
      padding: 10px 34px 10px 12px;
    }

    .mini-beneficios-produto__btn {
      width: 22px;
      height: 22px;
      font-size: 14px;
    }
  }
</style>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const seletorTituloProduto =
      "#produto-react-app > div.flex.topo-produto.mt-space-20.pt-space-10.relative.max-xl\\:px-2 > div.informacoes-compra-produto.relative.min-w-\\[450px\\].w-\\[450px\\] > h1";

    function inserirMiniBeneficios() {
      const tituloProduto = document.querySelector(seletorTituloProduto);

      if (!tituloProduto) return false;

      if (document.querySelector("#miniBeneficiosProduto")) return true;

      const htmlMiniBeneficios = `
        <div class="mini-beneficios-produto" id="miniBeneficiosProduto">
          <div class="mini-beneficios-produto__viewport">
            <div class="mini-beneficios-produto__track">
              <div class="mini-beneficios-produto__item">
                <span class="mini-beneficios-produto__check">✓</span>
                <span>Almofada densidade 100 para mais conforto no pedal</span>
              </div>

              <div class="mini-beneficios-produto__item">
                <span class="mini-beneficios-produto__check">✓</span>
                <span>Tecido opaco: não fica transparente</span>
              </div>

              <div class="mini-beneficios-produto__item">
                <span class="mini-beneficios-produto__check">✓</span>
                <span>Proteção UV50+</span>
              </div>

              <div class="mini-beneficios-produto__item">
                <span class="mini-beneficios-produto__check">✓</span>
                <span>Tecnologia antibacteriana contra odores</span>
              </div>

              <div class="mini-beneficios-produto__item">
                <span class="mini-beneficios-produto__check">✓</span>
                <span>Bolsos traseiros para levar o essencial</span>
              </div>

              <div class="mini-beneficios-produto__item">
                <span class="mini-beneficios-produto__check">✓</span>
                <span>Fácil cuidado: lavável e não precisa passar</span>
              </div>
            </div>
          </div>

          <div class="mini-beneficios-produto__nav">
            <button class="mini-beneficios-produto__btn mini-beneficios-produto__prev" type="button" aria-label="Benefício anterior">‹</button>
            <button class="mini-beneficios-produto__btn mini-beneficios-produto__next" type="button" aria-label="Próximo benefício">›</button>
          </div>

          <div class="mini-beneficios-produto__dots"></div>
        </div>
      `;

      tituloProduto.insertAdjacentHTML("afterend", htmlMiniBeneficios);

      iniciarMiniBeneficios();

      return true;
    }

    function iniciarMiniBeneficios() {
      const carousel = document.querySelector("#miniBeneficiosProduto");
      if (!carousel) return;

      const track = carousel.querySelector(".mini-beneficios-produto__track");
      const items = carousel.querySelectorAll(".mini-beneficios-produto__item");
      const prevBtn = carousel.querySelector(".mini-beneficios-produto__prev");
      const nextBtn = carousel.querySelector(".mini-beneficios-produto__next");
      const dotsWrapper = carousel.querySelector(".mini-beneficios-produto__dots");

      if (!track || !items.length || !prevBtn || !nextBtn || !dotsWrapper) return;

      let currentIndex = 0;
      let autoplayInterval = null;
      const totalItems = items.length;

      dotsWrapper.innerHTML = "";

      items.forEach(function (_, index) {
        const dot = document.createElement("button");
        dot.className = "mini-beneficios-produto__dot";
        dot.type = "button";
        dot.setAttribute("aria-label", "Ir para benefício " + (index + 1));

        dot.addEventListener("click", function () {
          goToSlide(index);
          restartAutoplay();
        });

        dotsWrapper.appendChild(dot);
      });

      const dots = carousel.querySelectorAll(".mini-beneficios-produto__dot");

      function updateCarousel() {
        track.style.transform = "translateX(-" + currentIndex * 100 + "%)";

        dots.forEach(function (dot, index) {
          dot.classList.toggle("is-active", index === currentIndex);
        });
      }

      function goToSlide(index) {
        currentIndex = index;

        if (currentIndex < 0) {
          currentIndex = totalItems - 1;
        }

        if (currentIndex >= totalItems) {
          currentIndex = 0;
        }

        updateCarousel();
      }

      function nextSlide() {
        goToSlide(currentIndex + 1);
      }

      function prevSlide() {
        goToSlide(currentIndex - 1);
      }

      function startAutoplay() {
        stopAutoplay();
        autoplayInterval = setInterval(nextSlide, 3500);
      }

      function stopAutoplay() {
        if (autoplayInterval) {
          clearInterval(autoplayInterval);
          autoplayInterval = null;
        }
      }

      function restartAutoplay() {
        stopAutoplay();
        startAutoplay();
      }

      nextBtn.addEventListener("click", function () {
        nextSlide();
        restartAutoplay();
      });

      prevBtn.addEventListener("click", function () {
        prevSlide();
        restartAutoplay();
      });

      carousel.addEventListener("mouseenter", stopAutoplay);
      carousel.addEventListener("mouseleave", startAutoplay);

      updateCarousel();
      startAutoplay();
    }

    if (!inserirMiniBeneficios()) {
      let tentativas = 0;

      const intervalo = setInterval(function () {
        tentativas++;

        if (inserirMiniBeneficios() || tentativas >= 20) {
          clearInterval(intervalo);
        }
      }, 500);
    }
  });
</script>
