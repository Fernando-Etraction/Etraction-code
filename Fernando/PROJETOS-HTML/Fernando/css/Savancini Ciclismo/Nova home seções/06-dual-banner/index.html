<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dual Banner — Savancini</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="section.css"/>
</head>
<body>
<!-- ═══════════════════════════════════════════════════════
     DUAL BANNER — Star + Impulse (Magazord: Banner Fixo 2 col)
     Foto editorial, copy sobreposta
═══════════════════════════════════════════════════════ -->
<section class="section">
  <div class="container">
    <div class="dual-banner">

      <a class="dual-card" href="/colecao-star">
        <div class="dual-bg"></div>
        <span class="dim-banner">Banner — 632 × 840 px</span>
        <div class="dual-content">
          <div class="dual-eyebrow">Coleção</div>
          <div class="dual-title">Black Star</div>
          <span class="dual-link">Ver coleção →</span>
        </div>
      </a>

      <a class="dual-card" href="/colecao-impulse">
        <div class="dual-bg"></div>
        <span class="dim-banner">Banner — 632 × 840 px</span>
        <div class="dual-content">
          <div class="dual-eyebrow">Coleção</div>
          <div class="dual-title">Impulse</div>
          <span class="dual-link">Ver coleção →</span>
        </div>
      </a>

    </div>
  </div>
</section>
<script src="section.js"></script>
</body>
</html>
