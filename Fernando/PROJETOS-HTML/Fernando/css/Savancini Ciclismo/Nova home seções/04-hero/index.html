<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hero — Savancini</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="section.css"/>
</head>
<body>
<!-- ═══════════════════════════════════════════════════════
     HERO — Banner Carrossel Full (Magazord)
     1280 × 640 px — foto editorial cheia, copy à esquerda
═══════════════════════════════════════════════════════ -->
<section class="hero">
  <div class="hero-img-placeholder"></div>
  <div class="hero-tag-area">
    <span class="dim-tag">Banner — 1280 × 640 px</span>
    <span class="dim-tag">Magazord: Banner Carrossel Full</span>
  </div>

  <div class="hero-content">
    <div class="hero-eyebrow">Nova coleção · Allure</div>
    <div class="hero-line"></div>
    <h1 class="hero-title">Tecnologia<br/>& sofisticação</h1>
    <p class="hero-sub">Em cada detalhe. A coleção que veste a performance com a elegância da pedalada feminina.</p>
    <div class="hero-cta-row">
      <a class="btn-p" href="#">Comprar agora <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></a>
      <a class="btn-o" href="#">Ver lookbook</a>
    </div>
  </div>

  <div class="hero-meta">
    <span class="hero-counter"><b>01</b> / 04</span>
    <div class="hero-arrows">
      <button class="hero-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>
      <button class="hero-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></button>
    </div>
  </div>
</section>
<script src="section.js"></script>
</body>
</html>
