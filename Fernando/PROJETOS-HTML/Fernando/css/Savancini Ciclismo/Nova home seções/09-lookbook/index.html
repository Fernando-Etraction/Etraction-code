<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lookbook — Savancini</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="section.css"/>
</head>
<body>
<!-- ═══════════════════════════════════════════════════════
     LOOKBOOK — Grade editorial assimétrica
     (Magazord: HTML customizado + Banner Fixo)
═══════════════════════════════════════════════════════ -->
<section class="section">
  <div class="container">
    <div class="sec-head">
      <span class="mzd-tag">Magazord · HTML + Banner Fixo</span>
      <div class="sec-eyebrow">— Lookbook —</div>
      <h2 class="sec-title">Coleções em movimento</h2>
      <p class="sec-sub">Clique em qualquer foto para ver a coleção completa.</p>
    </div>

    <div class="lookbook">
      <a class="look look-1" href="#">
        <div class="look-bg"></div>
        <span class="look-dim">580 × 528 px</span>
        <div class="look-tag">
          <div class="look-tag-eyebrow">Coleção</div>
          <div class="look-tag-title">Brasil</div>
        </div>
      </a>
      <a class="look look-2" href="#">
        <div class="look-bg"></div>
        <span class="look-dim">380 × 260 px</span>
        <div class="look-tag">
          <div class="look-tag-eyebrow">Linha</div>
          <div class="look-tag-title">Golden</div>
        </div>
      </a>
      <a class="look look-3" href="#">
        <div class="look-bg"></div>
        <span class="look-dim">180 × 260 px</span>
        <div class="look-tag">
          <div class="look-tag-eyebrow">Cat.</div>
          <div class="look-tag-title">Calças</div>
        </div>
      </a>
      <a class="look look-4" href="#">
        <div class="look-bg"></div>
        <span class="look-dim">180 × 260 px</span>
        <div class="look-tag">
          <div class="look-tag-eyebrow">Cat.</div>
          <div class="look-tag-title">Fit</div>
        </div>
      </a>
      <a class="look look-5" href="#">
        <div class="look-bg"></div>
        <span class="look-dim">380 × 528 px</span>
        <div class="look-tag">
          <div class="look-tag-eyebrow">Cápsula</div>
          <div class="look-tag-title">Star</div>
        </div>
      </a>
    </div>
  </div>
</section>
<script src="section.js"></script>
</body>
</html>
