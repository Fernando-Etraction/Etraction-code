  .sav-header-inner {

    height: 40px;
    padding: 0 16px;

    outline: none;
    border-radius: 2px 0 0 2px;

  .sav-search-input:focus {

  }

  .sav-search-btn {
    width: 44px;
    height: 40px;
    background: #0a0a0a;
    color: #fff;
    border: none;
    border-radius: 0 2px 2px 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .sav-search-btn svg {
    width: 15px;
    height: 15px;
  }

  .sav-header-actions {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .sav-h-action {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: .04em;

  .sav-h-action svg {

  .sav-h-cart {

  .sav-cart-badge {

    right: -8px;

    background: #e6007e;
    color: #fff;
    border-radius: 50%;

    font-weight: 600;

    align-items: center;

  .sav-cart-badge[hidden] {

  .sav-nav {

  .sav-nav-inner {

    align-items: center;
    justify-content: center;
    max-width: 1280px;

    padding: 0 24px;
  }

  .sav-nav-a {

    font-weight: 500;
    color: #333330;

  .sav-nav-a:hover,

  .sav-nav-a.active::after {

    position: absolute;
    bottom: -1px;
    left: 18px;

  <script>
    (function buildSavNav(){
    var whitelist = [
      /lan[\u00e7c]amentos/i,
      /cole[\u00e7c][\u00f5o]es|combos/i,
      /feminino/i,
      /masculino/i,
      /acess[\u00f3o]rios/i,
      /outlet/i
    ];
    function build(){
      var root = document.querySelector("#header-react-app");
      var nav  = document.querySelector(".sav-nav .sav-nav-inner");
      if(!root || !nav) return false;
      var lis = root.querySelectorAll("ul.menu-level-1 > li, ul.flex.items-center.justify-center > li");
      if(!lis.length) return false;
      var items = Array.prototype.map.call(lis, function(li){
        var a = li.querySelector(":scope > a");
        return a ? { text: a.textContent.trim(), href: a.getAttribute("href") } : null;
      }).filter(Boolean);
      var finalList = whitelist
        ? whitelist.map(function(rule){
            return items.find(function(i){
              return (rule instanceof RegExp) ? rule.test(i.text) : i.text === rule;
            });
          }).filter(Boolean)
        : items;
      if(!finalList.length) return false;
      nav.innerHTML = finalList.map(function(it, idx){
        var label = it.text.toLowerCase().replace(/(^|\s)\S/g, function(c){ return c.toUpperCase(); });
        return '<a class="sav-nav-a' + (idx===0?" active":"") + '" href="' + it.href + '">' + label + '</a>';
      }).join("");
      return true;
    }
    if(build()) return;
    var obs = new MutationObserver(function(){ if(build()) obs.disconnect(); });
    obs.observe(document.body, { childList: true, subtree: true });
    setTimeout(function(){ obs.disconnect(); }, 10000);
  })();
  </script>

  <script>
    (function syncSavCart(){
      function readCount(){
        var root = document.querySelector("#header-react-app");
        if(!root) return null;
        // Try common selectors used by the Magazord theme
        var el = root.querySelector(".link-cart, .carrinho-container .link-cart, [data-cart-count], .cart-count, .qtd-itens");
        if(el){
          var n = parseInt((el.textContent||"").replace(/\D/g,""),10);
          if(!isNaN(n)) return n;
        }
        // Fallback: count cart items elements
        var items = root.querySelectorAll(".carrinho-rapido .item-carrinho, .cart-item, [data-cart-item]");
        if(items && items.length) return items.length;
        return 0;
      }
      function apply(){
        var badge = document.querySelector(".sav-cart-badge[data-sav-cart-count]");
        if(!badge) return false;
        var n = readCount();
        if(n === null) return false;
        badge.textContent = n > 99 ? "99+" : String(n);
        if(n > 0){ badge.removeAttribute("hidden"); } else { badge.setAttribute("hidden",""); }
        return true;
      }
      if(apply()) {/* ok */}
      var obs = new MutationObserver(function(){ apply(); });
      var target = document.querySelector("#header-react-app") || document.body;
      obs.observe(target, { childList:true, subtree:true, characterData:true });
      document.addEventListener("DOMContentLoaded", apply);
      window.addEventListener("load", apply);
      // Re-check periodically for AJAX cart updates
      setInterval(apply, 2000);
    })();
  </script>
