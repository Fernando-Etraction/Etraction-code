<style>
    :root {
        --bf-bg: #000;
        /* preto */
        --bf-fg: #fff;
        /* branco */
        --bf-card: #0a0a0a;
        /* cards */
        --bf-soft: #111;
        /* borda/sombra leve */
        --radius: 14px;
    }

    .bf-trust-wrap {
        background: var(--bf-bg);
        padding: 16px clamp(12px, 2vw, 20px);
    }

    .bf-trust-strip {
        max-width: 1200px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(4, minmax(220px, 1fr));
        gap: clamp(10px, 2.4vw, 28px);
        align-items: center;
        font-family: "Poppins", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .bf-trust-item {
        color: var(--bf-fg);
        display: flex;
        align-items: center;
        gap: 14px;
        background: var(--bf-card);
        border-radius: var(--radius);
        padding: 14px 16px;
        outline: 1px solid rgba(255, 255, 255, .06);
        box-shadow: 0 1px 0 rgba(255, 255, 255, .04) inset, 0 8px 20px rgba(0, 0, 0, .35);
        transition: transform .18s ease, background-color .18s ease, color .18s ease, outline-color .18s ease;
    }

    .bf-trust-item:hover {
        transform: translateY(-2px);
        background: var(--bf-fg);
        /* inverte */
        color: var(--bf-bg);
        outline-color: rgba(0, 0, 0, .35);
    }

    .bf-icwrap {
        width: 40px;
        height: 40px;
        flex: 0 0 40px;
        border-radius: 50%;
        background: #fff;
        /* ícone sempre legível */
        display: grid;
        place-items: center;
        transition: background-color .18s ease;
    }

    .bf-trust-item:hover .bf-icwrap {
        background: #000;
    }

    .bf-ic {
        width: 22px;
        height: 22px;
        display: block;
    }

    .bf-ic,
    .bf-ic * {
        fill: #000 !important;
        transition: fill .18s ease;
    }

    /* padrão: preto no fundo branco do círculo */
    .bf-trust-item:hover .bf-ic,
    .bf-trust-item:hover .bf-ic * {
        fill: #fff !important;
    }

    /* invertido no hover */

    .bf-text {
        line-height: 1.05;
        display: flex;
        flex-direction: column;
    }

    .bf-text strong {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: .3px;
    }

    .bf-text span {
        font-size: 12px;
        opacity: .8;
        margin-top: 4px;
    }

    /* Responsivo */
    @media (max-width: 1024px) {
        .bf-trust-strip {
            grid-template-columns: repeat(2, minmax(240px, 1fr));
        }
    }

    @media (max-width: 560px) {
        .bf-trust-strip {
            grid-template-columns: 1fr;
        }

        .bf-trust-item {
            padding: 12px 14px;
        }
    }

    /* Menos movimento para acessibilidade */
    @media (prefers-reduced-motion: reduce) {
        .bf-trust-item {
            transition: none;
        }

        .bf-trust-item:hover {
            transform: none;
        }
    }
</style>
