<script>
    (function () {
    function moeda(valor) {
      return valor.toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
      });
    }

    function preencherPreco(widget, tipo, de, por) {
      var box = widget.querySelector('[data-field="' + tipo + '"]');
      if (!box) return;

      var deEl = box.querySelector(".kme-de");
      var porEl = box.querySelector(".kme-por");

      if (deEl) deEl.textContent = moeda(de);
      if (porEl) porEl.textContent = moeda(por);
    }

    function iniciarKitEconomia() {
      if (document.getElementById("kit-mini-economia")) return;

      var alvo = document.querySelector("#content-price-product");
      if (!alvo) return;

      var html =
        '<div' +
          ' id="kit-mini-economia"' +
          ' class="kme-box"' +
          ' data-kit="408.41"' +
          ' data-camiseta-de="149.90"' +
          ' data-camiseta-por="89.90"' +
          ' data-calca-de="419.90"' +
          ' data-calca-por="309.99"' +
        '>' +
          '<div class="kme-top">' +
            '<div class="kme-card">' +
              '<span class="kme-name">Camiseta Slim</span>' +
              '<div class="kme-prices" data-field="camiseta">' +
                '<span class="kme-line kme-line-de">' +
                  '<small>de</small>' +
                  '<span class="kme-de"></span>' +
                '</span>' +
                '<span class="kme-line kme-line-por">' +
                  '<small>por</small>' +
                  '<strong class="kme-por"></strong>' +
                '</span>' +
              '</div>' +
            '</div>' +

            '<div class="kme-card">' +
              '<span class="kme-name">Calça Jogger</span>' +
              '<div class="kme-prices" data-field="calca">' +
                '<span class="kme-line kme-line-de">' +
                  '<small>de</small>' +
                  '<span class="kme-de"></span>' +
                '</span>' +
                '<span class="kme-line kme-line-por">' +
                  '<small>por</small>' +
                  '<strong class="kme-por"></strong>' +
                '</span>' +
              '</div>' +
            '</div>' +
          '</div>' +

          '<div class="kme-bottom">' +
            '<span class="kme-kit-text"></span>' +
          '</div>' +
        '</div>';

      alvo.insertAdjacentHTML("afterend", html);

      var widget = document.getElementById("kit-mini-economia");
      if (!widget) return;

      var kit = Number(widget.getAttribute("data-kit"));

      var camisetaDe = Number(widget.getAttribute("data-camiseta-de"));
      var camisetaPor = Number(widget.getAttribute("data-camiseta-por"));

      var calcaDe = Number(widget.getAttribute("data-calca-de"));
      var calcaPor = Number(widget.getAttribute("data-calca-por"));

      var totalOriginal = camisetaDe + calcaDe;
      var economiaKit = totalOriginal - kit;

      preencherPreco(widget, "camiseta", camisetaDe, camisetaPor);
      preencherPreco(widget, "calca", calcaDe, calcaPor);

      var kitTextEl = widget.querySelector(".kme-kit-text");

      if (kitTextEl) {
        kitTextEl.textContent =
          "Economize " + moeda(economiaKit) + " comprando o kit";
      }
    }

    var tentativas = 0;
    var intervalo = setInterval(function () {
      tentativas++;
      iniciarKitEconomia();

      if (document.getElementById("kit-mini-economia") || tentativas >= 40) {
        clearInterval(intervalo);
      }
    }, 250);
  })();
</script>
