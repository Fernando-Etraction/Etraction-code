<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frete</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        :root {
            --laranja: #E87B3F;
            --laranja-2: #d86f36;
            --laranja-3: #c4632f;
            --texto: #ffffff;
        }

        .content-cupom {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            margin: auto 0;
            max-width: 680px;
            font-family: 'Poppins', sans-serif;
        }

        .step {
            height: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            color: var(--texto);
            padding: 18px 34px 18px 48px;
            text-transform: uppercase;
            flex: 1;
            clip-path: polygon(90% 0%, 100% 50%, 90% 100%, 0% 100%, 10% 50%, 0% 0%);
            position: relative;
            background: linear-gradient(135deg, var(--laranja) 0%, var(--laranja-2) 45%, var(--laranja-3) 100%);
        }

        .step:first-child {
            clip-path: polygon(90% 0%, 100% 50%, 90% 100%, 0% 100%, 0% 50%, 0% 0%);
            padding-left: 20px;
            background: linear-gradient(135deg, var(--laranja) 0%, #cf6a35 50%, #b85c2e 100%);
            border-radius: 7px 7px;
        }

        .step:nth-child(2) {
            background: linear-gradient(135deg, #f08a50 0%, var(--laranja-2) 50%, #b85c2e 100%);
            border-radius: 7px 0 7px 0;

        }

        .step:last-child {
            clip-path: polygon(100% 0%, 100% 50%, 100% 100%, 0% 100%, 10% 50%, 0% 0%);
            background: linear-gradient(135deg, #ff9a63 0%, var(--laranja) 45%, var(--laranja-3) 100%);
        }

        .step+.step {
            margin-left: -16px;
        }

        .step:nth-child(1) {
            z-index: 3
        }

        .step:nth-child(2) {
            z-index: 2
        }

        .step:nth-child(3) {
            z-index: 1
        }

        .step span {
            font-size: 12px;
            display: block;
            opacity: .95;
        }

        .step p {
            font-size: 22px;
            font-weight: 800;
            line-height: 1.1;
            color: #fff;
        }

        .content-title,
        .content-title-last {
            color: #fff;
        }

        .title-content {
            font-family: "Poppins", sans-serif;
            font-weight: 800;
            margin: 0 auto 10px;
            max-width: 680px;
            text-transform: uppercase;
            font-size: 16px;
            color: var(--laranja);
        }

        .frete-progressivo {
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            .title-content {
                font-size: 12px;
            }

            .content-cupom {
                font-size: 10px;
            }

            .step p {
                font-size: 14px;
            }

            .step:nth-child(2) {
                clip-path: polygon(89% -5%, 100% 50%, 88% 101%, 0% 100%, 9% 51%, 0% 0%);
            }

            .step:first-child {
                padding-left: 0;
            }

            .step {
                width: 100%;
                clip-path: none;
                padding: 12px 6px;
            }

            .step+.step {
                margin-left: -6px;
            }

            .frete-progressivo {
                margin: 10px 0;
            }

            .step span {
                font-size: 10px;
            }

            .step:last-child {
                clip-path: polygon(100% 0%, 100% 50%, 100% 100%, 0% 100%, 10% 50%, 0% 0%);
            }
        }

        .texto {
            font-size: 13px;
            color: #555;
            display: inline-block;
            margin-top: 6px;
            font-weight: 600;
            text-decoration: underline;
            cursor: pointer;
        }

        .texto:hover {
            color: #E87B3F;
        }
    </style>

    <script>
        $(function () {
            const $alvo = $(".calculo-frete").first();
            if (!$alvo.length) return;

            const html = `
        <div class="frete-progressivo">


          <div class="content-cupom">
            <div class="step">
              <span>Frete fixo</span>
              <p class="content-title">R$ 49,90</p>
              <span>para Sul / SP</span>
            </div>

            <div class="step">
              <span>Frete grátis acima de</span>
              <p class="content-title">R$ 1.449,90</p>
              <span>para RS, SC, PR e SP</span>
            </div>
            </div>
            
          <a 
            href="https://www.artfactorydesign.com.br/politica-de-frete-fixo"
            class="texto"
            target="_blank"
            rel="noopener noreferrer"
          >
            *Confira as demais regras para outras regiões
          </a>
      `;

            $alvo.after(html);
        });
    </script>
</head>

<body></body>

</html>
