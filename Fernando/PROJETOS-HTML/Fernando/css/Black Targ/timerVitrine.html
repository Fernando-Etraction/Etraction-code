<style>
  .product-list figure,
  .swiper-slide figure {
    position: relative;
  }

  .ra-vitrine .bottom-0 {
    bottom: 42px !important;
  }

  .timer-container-ectraction {
    position: absolute;
    left: 0;
    bottom: 0;
    z-index: 8;

    width: 100%;
    height: 38px;
    padding: 0 8px;

    color: #fff;
    background: rgba(0, 0, 0, 0.82);
    text-align: center;
    box-sizing: border-box;

    pointer-events: none;
    overflow: hidden;

    display: flex;
    align-items: center;
    justify-content: center;
  }

  .timer-slider-ectraction {
    width: 100%;
    height: 38px;
    overflow: hidden;
  }

  .timer-track-ectraction {
    display: flex;
    flex-direction: column;
    animation: timerSlideEctraction 5s infinite;
  }

  .timer-slide-ectraction {
    height: 38px;
    min-height: 38px;

    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;

    font-size: 12px;
    font-weight: 600;
    line-height: 1.2;
    letter-spacing: 0.2px;
    text-transform: uppercase;
  }

  .timer-slide-ectraction strong,
  .timer-slide-ectraction .cupom-ectraction {
    color: #ffdd75;
    font-weight: 800;
  }

  .timer-slide-ectraction .cupom-ectraction {
    background: rgba(255, 221, 117, 0.14);
    border: 1px solid rgba(255, 221, 117, 0.45);
    border-radius: 4px;
    padding: 2px 6px;
    color: #ffdd75;
  }

  @keyframes timerSlideEctraction {
    0%, 42% {
      transform: translateY(0);
    }

    50%, 92% {
      transform: translateY(-38px);
    }

    100% {
      transform: translateY(0);
    }
  }

  @media (max-width: 768px) {
    .ra-vitrine .bottom-0 {
      bottom: 38px !important;
    }

    .timer-container-ectraction {
      height: 34px;
      padding: 0 6px;
    }

    .timer-slider-ectraction,
    .timer-slide-ectraction {
      height: 34px;
      min-height: 34px;
    }

    .timer-slide-ectraction {
      font-size: 10px;
    }

    @keyframes timerSlideEctraction {
      0%, 42% {
        transform: translateY(0);
      }

      50%, 92% {
        transform: translateY(-34px);
      }

      100% {
        transform: translateY(0);
      }
    }
  }
</style>

<script>
  (function () {
    const CUPOM_ECTRACTION = "AMOLOJAZUS";

    function inserirTimersEctraction() {
      const imagens = document.querySelectorAll(".img-principal");

      imagens.forEach(function (imagem) {
        const figure = imagem.closest("figure");

        if (!figure) return;

        if (figure.querySelector(".timer-container-ectraction")) return;

        if (getComputedStyle(figure).position === "static") {
          figure.style.position = "relative";
        }

        const timer = document.createElement("div");
        timer.className = "timer-container-ectraction";

        timer.innerHTML = `
          <div class="timer-slider-ectraction">
            <div class="timer-track-ectraction">
              <div class="timer-slide-ectraction">
                Cupom: <span class="cupom-ectraction">${CUPOM_ECTRACTION}</span>
              </div>

              <div class="timer-slide-ectraction">
                Termina em <strong class="timer-ectraction">00:00:00</strong>
              </div>
            </div>
          </div>
        `;

        figure.appendChild(timer);
      });
    }

    function atualizarTimersEctraction() {
      const agora = new Date();

      const fimDia = new Date();
      fimDia.setHours(23, 59, 59, 999);

      const diferenca = Math.max(fimDia.getTime() - agora.getTime(), 0);

      const horas = String(Math.floor(diferenca / 1000 / 60 / 60)).padStart(2, "0");
      const minutos = String(Math.floor((diferenca / 1000 / 60) % 60)).padStart(2, "0");
      const segundos = String(Math.floor((diferenca / 1000) % 60)).padStart(2, "0");

      const tempo = `${horas}:${minutos}:${segundos}`;

      document.querySelectorAll(".timer-ectraction").forEach(function (timer) {
        timer.textContent = tempo;
      });
    }

    function iniciarTimerEctraction() {
      inserirTimersEctraction();
      atualizarTimersEctraction();

      setInterval(atualizarTimersEctraction, 1000);

      const observer = new MutationObserver(function () {
        inserirTimersEctraction();
      });

      observer.observe(document.body, {
        childList: true,
        subtree: true
      });
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", iniciarTimerEctraction);
    } else {
      iniciarTimerEctraction();
    }
  })();
</script>
