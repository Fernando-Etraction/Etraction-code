<!-- BLACKTARG - Notificação (4s) -> Bolinha -> Modal Promos (cards clicáveis) -->
<style>
  :root {
    /* >>> Estilo BlackTarg (dark / premium) <<< */
    --dlz-bg: #0b0b0b;
    --dlz-surface: #111;
    --dlz-surface-2: #161616;
    --dlz-text: #ffffff;
    --dlz-muted: rgba(255, 255, 255, 0.72);
    --dlz-border: rgba(255, 255, 255, 0.12);
    --dlz-shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
    --dlz-overlay: rgba(0, 0, 0, 0.72);
    --dlz-accent: #ffffff;
    /* botões e barra */
    --dlz-radius: 18px;
  }

  /* ================= NOTIFICAÇÃO ================= */
  .dlz-toast {
    position: fixed;
    z-index: 999999;
    left: 16px;
    right: 16px;
    top: 20px;
    background: linear-gradient(180deg, var(--dlz-surface), var(--dlz-bg));
    border: 1px solid var(--dlz-border);
    border-radius: 16px;
    box-shadow: var(--dlz-shadow);
    padding: 12px;
    display: grid;
    grid-template-columns: 44px 1fr auto;
    gap: 10px;
    align-items: center;
    cursor: pointer;
    user-select: none;
    transform: translateY(-10px);
    opacity: 0;
    transition: 0.22s ease;
  }

  .dlz-toast--show {
    transform: translateY(0);
    opacity: 1;
  }

  .dlz-toast__bar {
    position: absolute;
    inset: 0 0 auto 0;
    height: 3px;
    background: var(--dlz-accent);
    border-radius: 16px 16px 0 0;
    opacity: 0.9;
  }

  /* “Logo” BT (sem depender de imagem externa) */
  .dlz-toast__logo {
    width: 40px;
    height: 40px;
    display: grid;
    place-items: center;
  }

  .dlz-btmark {
    width: 40px;
    height: 40px;
    border-radius: 999px;
    border: 1px solid var(--dlz-border);
    background: #fff;
    display: grid;
    place-items: center;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    font-weight: 900;
    letter-spacing: 0.5px;
    color: #fff;
    font-size: 14px;
  }

  .dlz-toast__txt {
    min-width: 0;
    display: grid;
    gap: 2px;
  }

  .dlz-toast__title {
    font-size: 13px;
    font-weight: 900;
    color: var(--dlz-text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.2px;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    text-transform: uppercase;
  }

  .dlz-toast__msg {
    font-size: 13px;
    color: var(--dlz-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  }

  .dlz-toast__x {
    width: 34px;
    height: 34px;
    border-radius: 12px;
    border: 1px solid var(--dlz-border);
    background: rgba(255, 255, 255, 0.04);
    cursor: pointer;
    color: rgba(255, 255, 255, 0.75);
    display: grid;
    place-items: center;
  }

  .dlz-toast__x:hover {
    background: rgba(255, 255, 255, 0.08);
  }

  @media (min-width: 900px) {
    .dlz-toast {
      left: auto;
      right: 18px;
      width: 380px;
      top: 18px;
    }
  }

  /* ================= BOLINHA (FAB) ================= */
  .dlz-fab {
    position: fixed;
    z-index: 999999;
    bottom: 280px;
    left: 10px;
    width: 58px;
    height: 58px;
    border-radius: 999px;
    background: white;
    box-shadow: var(--dlz-shadow);
    display: grid;
    place-items: center;
    cursor: pointer;
    opacity: 0;
    transform: translateY(8px) scale(0.95);
    transition: 0.2s ease;
  }

  .dlz-fab--show {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  /* ================= MODAL / OVERLAY ================= */
  .dlz-overlay {
    position: fixed;
    inset: 0;
    z-index: 999998;
    background: var(--dlz-overlay);
    opacity: 0;
    pointer-events: none;
    transition: 0.2s ease;
  }

  .dlz-overlay--show {
    opacity: 1;
    pointer-events: auto;
  }

  .dlz-modal {
    position: fixed;
    z-index: 999999;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -48%) scale(0.985);
    width: min(860px, calc(100vw - 28px));
    background: linear-gradient(180deg, var(--dlz-surface), var(--dlz-bg));
    border: 1px solid var(--dlz-border);
    border-radius: var(--dlz-radius);
    box-shadow: var(--dlz-shadow);
    opacity: 0;
    pointer-events: none;
    transition: 0.22s ease;
    overflow: hidden;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  }

  .dlz-modal--show {
    opacity: 1;
    pointer-events: auto;
    transform: translate(-50%, -50%) scale(1);
  }

  .dlz-modal__head {
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--dlz-border);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: start;
    background: rgba(255, 255, 255, 0.02);
  }

  .dlz-modal__title {
    margin: 0;
    font-size: 16px;
    font-weight: 950;
    color: var(--dlz-text);
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  .dlz-modal__sub {
    margin: 6px 0 0;
    font-size: 13px;
    color: var(--dlz-muted);
    line-height: 1.35;
  }

  .dlz-modal__x {
    width: 40px;
    height: 40px;
    border-radius: 14px;
    border: 1px solid var(--dlz-border);
    cursor: pointer;
    background: rgba(255, 255, 255, 0.04);
    color: rgba(255, 255, 255, 0.85);
    display: grid;
    place-items: center;
  }

  .dlz-modal__x:hover {
    background: rgba(255, 255, 255, 0.08);
  }

  .dlz-modal__body {
    padding: 14px 16px 16px;
    display: grid;
    gap: 12px;
  }

  .dlz-products {
    display: grid;
    gap: 12px;
    grid-template-columns: 1fr;
  }

  /* Card clicável */
  .dlz-product {
    border: 1px solid var(--dlz-border);
    border-radius: 16px;
    overflow: hidden;
    background: linear-gradient(180deg, var(--dlz-surface-2), rgba(255, 255, 255, 0.02));
    display: grid;
    grid-template-columns: 96px 1fr;
    gap: 12px;
    padding: 10px;
    align-items: center;
    cursor: pointer;
    transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease;
  }

  .dlz-product:hover {
    transform: translateY(-1px);
    border-color: rgba(255, 255, 255, 0.22);
    background: linear-gradient(180deg, #1a1a1a, rgba(255, 255, 255, 0.03));
  }

  .dlz-product img {
    width: 96px;
    height: 96px;
    object-fit: cover;
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    background: #0f0f0f;
  }

  .dlz-product__name {
    font-weight: 950;
    color: var(--dlz-text);
    font-size: 13px;
    margin-bottom: 4px;
    line-height: 1.15;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .dlz-product__desc {
    font-size: 13px;
    color: var(--dlz-muted);
    line-height: 1.25;
  }

  .dlz-product__tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.85);
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.14);
    background: rgba(255, 255, 255, 0.04);
    width: fit-content;
  }

  .dlz-cta {
    border-top: 1px solid var(--dlz-border);
    padding: 12px 16px 16px;
    display: grid;
    gap: 10px;
    background: rgba(255, 255, 255, 0.02);
  }

  .dlz-btn {
    border: 0;
    cursor: pointer;
    border-radius: 14px;
    padding: 12px 14px;
    font-weight: 950;
    font-size: 14px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  .dlz-btn--primary {
    background: var(--dlz-accent);
    color: #000;
  }

  .dlz-btn--primary:hover {
    filter: brightness(0.95);
  }

  .dlz-btn--ghost {
    background: rgba(255, 255, 255, 0.06);
    color: rgba(255, 255, 255, 0.88);
    border: 1px solid var(--dlz-border);
  }

  .dlz-btn--ghost:hover {
    background: rgba(255, 255, 255, 0.09);
  }

  @media (min-width: 900px) {
    .dlz-products {
      grid-template-columns: 1fr 1fr;
    }

    .dlz-modal__title {
      font-size: 18px;
    }
  }

  @media (max-width: 899px) {
    .dlz-modal {
      left: 0;
      right: 0;
      top: auto;
      bottom: 0;
      transform: translate(0, 12px);
      width: 100%;
      border-radius: 18px 18px 0 0;
    }

    .dlz-fab {
      bottom: 130px;
      left: 10px;
    }

    .dlz-modal--show {
      transform: translate(0, 0);
    }
  }

  .btarg-notification-dot {
    position: absolute;
    top: -4px;
    right: -4px;
    width: 16px;
    height: 16px;
    background-color: red;
    color: white;
    font-size: 10px;
    font-weight: bold;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
    box-shadow: 0 0 4px rgba(0, 0, 0, 0.4);
  }
</style>

<!-- Toast -->
<div class="dlz-toast" id="dlzToast" role="button" aria-label="Notificação de promoções" tabindex="0">
  <div class="dlz-toast__bar"></div>

  <div class="dlz-toast__logo">
    <div class="dlz-btmark" aria-hidden="true" style="background-color: #000">
      <img src="https://magazord-public.s3.amazonaws.com/blacktarg/img/2026/01/produto/9162/design-sem-nome-11.png"
        alt="">

    </div>
  </div>

  <div class="dlz-toast__txt">
    <div class="dlz-toast__title">Kits promocionais</div>
    <div class="dlz-toast__msg">Toque para ver as ofertas disponíveis.</div>
  </div>

  <button class="dlz-toast__x" id="dlzToastClose" type="button" aria-label="Fechar">✕</button>
</div>

<!-- Bolinha -->
<button class="dlz-fab" id="dlzFab" type="button" aria-label="Abrir promoções" style="background-color: #000">
  <span class="btarg-notification-dot">!</span>
  <div class="dlz-btmark" aria-hidden="true" style="background-color: #000">
    <img src="https://magazord-public.s3.amazonaws.com/blacktarg/img/2026/01/produto/9162/design-sem-nome-11.png"
      alt="">
  </div>
</button>

<!-- Modal -->
<div class="dlz-overlay" id="dlzOverlay" aria-hidden="true"></div>

<div class="dlz-modal" id="dlzModal" role="dialog" aria-modal="true" aria-labelledby="dlzTitle" aria-hidden="true">
  <div class="dlz-modal__head">
    <div>
      <h3 class="dlz-modal__title" id="dlzTitle">Promoções Black Targ</h3>
      <p class="dlz-modal__sub">Clique em qualquer card para abrir a oferta em uma nova aba.</p>
    </div>
    <button class="dlz-modal__x" id="dlzClose" type="button" aria-label="Fechar">✕</button>
  </div>

  <div class="dlz-modal__body">
    <div class="dlz-products" id="dlzProducts"></div>
  </div>

  <div class="dlz-cta">
    <button class="dlz-btn dlz-btn--primary" type="button" id="dlzOk">Continuar comprando</button>
    <button class="dlz-btn dlz-btn--ghost" type="button" id="dlzClose2">Fechar</button>
  </div>
</div>

<script>
  (function () {
    const SHOW_TOAST_MS = 4000;

    /* ======= PROMOS (substituído com seus dados) ======= */
    const PROMOS = [
      {
        name: "4 Oversize por 259 + Frete Grátis",
        desc: "Aproveite o kit: 4 oversize por R$ 259 + frete grátis.",
        url: "https://www.blacktarg.com.br/promo-over",
        img: "https://blacktarg.cdn.magazord.com.br/img/2025/02/produto/7382/mockup-0000-preenchimento-de-cor-1-copiar-0001-cor-seletiva-1-copiar.jpg",
        tag: "Ver oferta"
      },
      {
        name: "3 Shorts Flex por 99",
        desc: "Combo 3 shorts Flex por R$ 99.",
        url: "https://www.blacktarg.com.br/short-elasti-fit-flex-mtion",
        img: "https://blacktarg.cdn.magazord.com.br/img/2025/09/produto/8812/motion-branco-7.png",
        tag: "Ver oferta"
      },
      {
        name: "2 Shorts de Compressão por 99",
        desc: "Leve 2 shorts de compressão por R$ 99.",
        url: "https://www.blacktarg.com.br/kit2shortcompressao",
        img: "https://blacktarg.cdn.magazord.com.br/img/2025/09/produto/8684/shorts-2-em-1-fotos-0005-remover-5.png",
        tag: "Ver oferta"
      }

    ];

    const toast = document.getElementById("dlzToast");
    const toastClose = document.getElementById("dlzToastClose");
    const fab = document.getElementById("dlzFab");

    const overlay = document.getElementById("dlzOverlay");
    const modal = document.getElementById("dlzModal");
    const closeBtn = document.getElementById("dlzClose");
    const closeBtn2 = document.getElementById("dlzClose2");
    const okBtn = document.getElementById("dlzOk");

    const productsRoot = document.getElementById("dlzProducts");

    function renderPromos() {
      productsRoot.innerHTML = PROMOS.map((p, idx) => {
        const safeName = String(p.name || "").replace(/"/g, "&quot;");
        const safeDesc = String(p.desc || "").replace(/"/g, "&quot;");
        const safeUrl = String(p.url || "#").replace(/"/g, "&quot;");
        const safeImg = String(p.img || "").replace(/"/g, "&quot;");
        const safeTag = String(p.tag || "Abrir").replace(/"/g, "&quot;");

        return `
          <div class="dlz-product" role="button" tabindex="0" data-url="${safeUrl}" aria-label="Abrir ${safeName}">
            <img alt="${safeName}" src="${safeImg}" loading="lazy">
            <div>
              <div class="dlz-product__name">${safeName}</div>
              <div class="dlz-product__desc">${safeDesc}</div>
              <div class="dlz-product__tag">⚡ ${safeTag}</div>
            </div>
          </div>
        `;
      }).join("");

      // click + teclado (Enter/Space)
      productsRoot.querySelectorAll(".dlz-product").forEach((card) => {
        const open = () => {
          const url = card.getAttribute("data-url");
          if (!url || url === "#") return;
          window.open(url, "_blank", "noopener,noreferrer");
        };
        card.addEventListener("click", open);
        card.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            open();
          }
        });
      });
    }

    function showToast() {
      toast.classList.add("dlz-toast--show");
    }

    function hideToast(showFabAfter = true) {
      toast.classList.remove("dlz-toast--show");
      if (showFabAfter) {
        setTimeout(() => fab.classList.add("dlz-fab--show"), 180);
      }
    }

    function openModal() {
      overlay.classList.add("dlz-overlay--show");
      modal.classList.add("dlz-modal--show");
      overlay.setAttribute("aria-hidden", "false");
      modal.setAttribute("aria-hidden", "false");
      setTimeout(() => closeBtn.focus(), 50);
    }

    function closeModal() {
      overlay.classList.remove("dlz-overlay--show");
      modal.classList.remove("dlz-modal--show");
      overlay.setAttribute("aria-hidden", "true");
      modal.setAttribute("aria-hidden", "true");
    }

    // Click na notificação abre modal (exceto no X)
    toast.addEventListener("click", (e) => {
      if (e.target === toastClose) return;
      openModal();
    });

    // X da notificação: fecha e vira bolinha
    toastClose.addEventListener("click", (e) => {
      e.stopPropagation();
      hideToast(true);
    });

    // Enter/Space na notificação abre modal
    toast.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        openModal();
      }
    });

    // Bolinha abre modal
    fab.addEventListener("click", openModal);

    // Fechamentos do modal
    overlay.addEventListener("click", closeModal);
    closeBtn.addEventListener("click", closeModal);
    closeBtn2.addEventListener("click", closeModal);
    okBtn.addEventListener("click", closeModal);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeModal();
    });

    // init
    renderPromos();

    // Fluxo: toast aparece -> 4s -> some -> vira bolinha
    showToast();
    setTimeout(() => hideToast(true), SHOW_TOAST_MS);
  })();
</script>
