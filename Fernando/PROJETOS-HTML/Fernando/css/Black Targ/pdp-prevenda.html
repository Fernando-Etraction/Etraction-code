<style id="btpv-pre-venda-original-css">
  /* =========================================================
     BLACK TARG — PRÉ-VENDA
     Mantém toda a estrutura original da PDP
     ========================================================= */

  #btpv-full-banner,
  #btpv-full-banner *,
  #btpv-gallery-label,
  #btpv-gallery-label *,
  #btpv-purchase-note,
  #btpv-purchase-note * {
    box-sizing: border-box !important;
  }

  /* =========================================================
     BANNER SUPERIOR
     ========================================================= */

  #btpv-full-banner {
    position: relative !important;

    display: grid !important;
    grid-template-columns: minmax(240px, 1fr) minmax(460px, 1.3fr) !important;
    align-items: center !important;
    gap: 24px !important;

    width: 100% !important;
    min-height: 70px !important;

    margin: 0 0 14px !important;
    padding: 13px 18px !important;

    overflow: hidden !important;

    color: #ffffff !important;
    background: #111111 !important;

    border: 0 !important;
    border-radius: 0 !important;
    box-shadow: none !important;
  }

  #btpv-full-banner::after {
    content: "PRÉ-VENDA" !important;

    position: absolute !important;
    top: 50% !important;
    right: -12px !important;

    color: rgba(255, 255, 255, 0.045) !important;

    font-size: 68px !important;
    font-weight: 700 !important;
    line-height: 1 !important;
    letter-spacing: -0.055em !important;

    transform: translateY(-50%) !important;

    pointer-events: none !important;
  }

  .btpv-full-banner__brand {
    position: relative !important;
    z-index: 2 !important;

    display: flex !important;
    align-items: center !important;
    gap: 14px !important;

    min-width: 0 !important;
  }

  .btpv-full-banner__logo {
    display: flex !important;
    align-items: center !important;
    min-width: 0 !important;
  }

  .btpv-full-banner__logo img,
  .btpv-full-banner__logo svg {
    display: block !important;

    width: auto !important;
    max-width: 145px !important;
    height: 25px !important;

    object-fit: contain !important;
  }

  .btpv-full-banner__logo-text {
    color: #ffffff !important;

    font-family: inherit !important;
    font-size: 18px !important;
    font-weight: 600 !important;
    line-height: 1 !important;
    letter-spacing: 0.08em !important;
    white-space: nowrap !important;
  }

  .btpv-full-banner__separator {
    display: block !important;

    width: 1px !important;
    height: 29px !important;
    flex: 0 0 1px !important;

    background: rgba(255, 255, 255, 0.2) !important;
  }

  .btpv-full-banner__title {
    display: flex !important;
    flex-direction: column !important;
    gap: 2px !important;
  }

  .btpv-full-banner__eyebrow {
    color: rgba(255, 255, 255, 0.57) !important;

    font-family: inherit !important;
    font-size: 8px !important;
    font-weight: 500 !important;
    line-height: 1.1 !important;
    letter-spacing: 0.16em !important;
    text-transform: uppercase !important;
  }

  .btpv-full-banner__heading {
    color: #ffffff !important;

    font-family: inherit !important;
    font-size: 18px !important;
    font-weight: 500 !important;
    line-height: 1.1 !important;
    letter-spacing: -0.01em !important;
    text-transform: uppercase !important;
  }

  .btpv-full-banner__details {
    position: relative !important;
    z-index: 2 !important;

    display: flex !important;
    align-items: center !important;
    justify-content: flex-end !important;
    gap: 17px !important;

    min-width: 0 !important;
  }

  .btpv-full-banner__shipping {
    display: flex !important;
    flex-direction: column !important;
    gap: 2px !important;

    white-space: nowrap !important;
  }

  .btpv-full-banner__shipping-label {
    color: rgba(255, 255, 255, 0.53) !important;

    font-family: inherit !important;
    font-size: 8px !important;
    font-weight: 400 !important;
    line-height: 1 !important;
    letter-spacing: 0.11em !important;
    text-transform: uppercase !important;
  }

  .btpv-full-banner__shipping-date {
    color: #ffffff !important;

    font-family: inherit !important;
    font-size: 12px !important;
    font-weight: 500 !important;
    line-height: 1.15 !important;
  }

  .btpv-full-banner__detail-line {
    display: block !important;

    width: 1px !important;
    height: 29px !important;
    flex: 0 0 1px !important;

    background: rgba(255, 255, 255, 0.18) !important;
  }

  .btpv-full-banner__timer {
    display: flex !important;
    align-items: center !important;
    justify-content: flex-end !important;
    gap: 8px !important;
  }

  .btpv-full-banner__time {
    display: flex !important;
    align-items: baseline !important;
    gap: 3px !important;
  }

  .btpv-full-banner__number {
    color: #ffffff !important;

    font-family: inherit !important;
    font-size: 20px !important;
    font-weight: 500 !important;
    line-height: 1 !important;
    letter-spacing: -0.025em !important;
    font-variant-numeric: tabular-nums !important;
  }

  .btpv-full-banner__unit {
    color: rgba(255, 255, 255, 0.53) !important;

    font-family: inherit !important;
    font-size: 7px !important;
    font-weight: 400 !important;
    line-height: 1 !important;
    text-transform: lowercase !important;
  }

  .btpv-full-banner__timer-separator {
    color: rgba(255, 255, 255, 0.28) !important;

    font-size: 12px !important;
    font-weight: 400 !important;
    line-height: 1 !important;
  }

  /* =========================================================
     TAG SOBRE A GALERIA
     Não altera largura, altura ou tamanho das imagens
     ========================================================= */

  #produto-react-app .block-imagem {
    position: relative !important;
  }

  #btpv-gallery-label {
    position: absolute !important;
    top: 14px !important;
    left: 108px !important;
    z-index: 30 !important;

    display: inline-flex !important;
    align-items: center !important;
    gap: 8px !important;

    min-height: 27px !important;
    padding: 6px 10px !important;

    color: #ffffff !important;
    background: #111111 !important;

    border: 0 !important;
    border-radius: 0 !important;
    box-shadow: none !important;

    pointer-events: none !important;
  }

  .btpv-gallery-label__main {
    color: #ffffff !important;

    font-family: inherit !important;
    font-size: 8px !important;
    font-weight: 600 !important;
    line-height: 1 !important;
    letter-spacing: 0.13em !important;
    text-transform: uppercase !important;
  }

  .btpv-gallery-label__date {
    padding-left: 8px !important;

    color: rgba(255, 255, 255, 0.62) !important;

    font-family: inherit !important;
    font-size: 7px !important;
    font-weight: 400 !important;
    line-height: 1 !important;
    letter-spacing: 0.07em !important;
    text-transform: uppercase !important;

    border-left: 1px solid rgba(255, 255, 255, 0.24) !important;
  }

  /* =========================================================
     AVISO ANTES DO BOTÃO
     ========================================================= */

  #btpv-purchase-note {
    display: flex !important;
    align-items: center !important;
    flex-wrap: wrap !important;
    gap: 5px !important;

    width: 100% !important;

    margin: 9px 0 7px !important;
    padding: 8px 10px !important;

    color: rgba(255, 255, 255, 0.7) !important;
    background: #111111 !important;

    border: 0 !important;
    border-radius: 0 !important;
    box-shadow: none !important;

    font-family: inherit !important;
    font-size: 9px !important;
    font-weight: 400 !important;
    line-height: 1.35 !important;
  }

  #btpv-purchase-note strong {
    color: #ffffff !important;
    font-weight: 600 !important;
  }

  .btpv-purchase-note__separator {
    margin: 0 2px !important;
    color: rgba(255, 255, 255, 0.3) !important;
  }

  /* =========================================================
     BOTÃO
     Mantém tamanho e estrutura original
     ========================================================= */

  #produto-react-app .quantidade-comprar .button-buy {
    color: #ffffff !important;
    background: #111111 !important;
    border-color: #111111 !important;

    box-shadow: none !important;
  }

  #produto-react-app .quantidade-comprar .button-buy:hover {
    color: #111111 !important;
    background: #ffffff !important;
    border-color: #111111 !important;
  }

  /* =========================================================
     MOBILE
     ========================================================= */

  @media screen and (max-width: 900px) {
    #btpv-full-banner {
      grid-template-columns: 1fr !important;
      gap: 9px !important;

      min-height: 0 !important;

      margin-bottom: 10px !important;
      padding: 12px !important;
    }

    #btpv-full-banner::after {
      right: -7px !important;
      font-size: 53px !important;
    }

    .btpv-full-banner__details {
      justify-content: space-between !important;
      gap: 10px !important;
    }
  }

  @media screen and (max-width: 600px) {
    .btpv-full-banner__brand {
      gap: 10px !important;
    }

    .btpv-full-banner__logo img,
    .btpv-full-banner__logo svg {
      max-width: 125px !important;
      height: 22px !important;
    }

    .btpv-full-banner__logo-text {
      font-size: 16px !important;
    }

    .btpv-full-banner__separator {
      height: 25px !important;
    }

    .btpv-full-banner__heading {
      font-size: 16px !important;
    }

    .btpv-full-banner__details {
      align-items: flex-start !important;
      flex-direction: column !important;
      gap: 7px !important;
    }

    .btpv-full-banner__detail-line {
      display: none !important;
    }

    .btpv-full-banner__timer {
      justify-content: space-between !important;
      width: 100% !important;
    }

    #btpv-gallery-label {
      top: 10px !important;
      left: 10px !important;
    }

    #btpv-purchase-note {
      padding: 8px 9px !important;
      font-size: 9px !important;
    }
  }

  @media screen and (max-width: 390px) {
    .btpv-full-banner__number {
      font-size: 17px !important;
    }

    .btpv-full-banner__timer {
      gap: 4px !important;
    }

    .btpv-full-banner__unit {
      font-size: 6px !important;
    }
  }
</style>

<script>
  (function () {
    "use strict";

    var CONFIGURACAO = {
      estoqueDisponivel: 20,
      dataEnvio: "01/08/2026",
      dataFimPreVenda: "2026-08-01T00:00:00-03:00",
      textoBotao: "Garantir na pré-venda",
      textoBotaoFinalizado: "Adicionar ao carrinho"
    };

    var instanciaAnterior =
      window.__blackTargPreVendaOriginal;

    if (instanciaAnterior) {
      if (instanciaAnterior.observer) {
        instanciaAnterior.observer.disconnect();
      }

      if (instanciaAnterior.timer) {
        window.clearInterval(
          instanciaAnterior.timer
        );
      }

      if (instanciaAnterior.retry) {
        window.clearInterval(
          instanciaAnterior.retry
        );
      }
    }

    var CONTROLE = {
      observer: null,
      timer: null,
      retry: null,
      scheduled: false
    };

    window.__blackTargPreVendaOriginal =
      CONTROLE;

    function pad(valor) {
      return String(valor).padStart(2, "0");
    }

    function getFinalDate() {
      return new Date(
        CONFIGURACAO.dataFimPreVenda
      ).getTime();
    }

    function isFinished() {
      var finalDate = getFinalDate();

      return (
        !Number.isNaN(finalDate) &&
        Date.now() >= finalDate
      );
    }

    function removeCodigosAnteriores() {
      var seletores = [
        "#etraction-pre-venda-black-targ",
        "#etraction-pre-venda",
        "#btpv-page-banner",
        "#btpv-order-note",
        "#btpv-gallery-tag",
        ".btpv-product-status"
      ];

      document
        .querySelectorAll(seletores.join(","))
        .forEach(function (elemento) {
          elemento.remove();
        });
    }

    function encontrarLogoHeader() {
      var seletores = [
        "header .logo img",
        "header .logo svg",
        ".navbar-brand img",
        ".navbar-brand svg",
        ".header-logo img",
        ".header-logo svg",
        "header img[alt*='Black']",
        "header img[title*='Black']"
      ];

      for (
        var i = 0;
        i < seletores.length;
        i++
      ) {
        var elemento =
          document.querySelector(
            seletores[i]
          );

        if (elemento) {
          return elemento;
        }
      }

      return null;
    }

    function criarLogoMarkup() {
      var logo =
        encontrarLogoHeader();

      if (logo) {
        return logo.outerHTML;
      }

      return (
        '<span class="btpv-full-banner__logo-text">' +
          "BLACK TARG" +
        "</span>"
      );
    }

    function criarBanner() {
      var bannerExistente =
        document.getElementById(
          "btpv-full-banner"
        );

      if (bannerExistente) {
        return bannerExistente;
      }

      var topoProduto =
        document.querySelector(
          "#produto-react-app .topo-produto"
        );

      if (
        !topoProduto ||
        !topoProduto.parentNode
      ) {
        return null;
      }

      var banner =
        document.createElement("section");

      banner.id = "btpv-full-banner";

      banner.innerHTML =
        '<div class="btpv-full-banner__brand">' +

          '<div class="btpv-full-banner__logo">' +
            criarLogoMarkup() +
          "</div>" +

          '<span class="btpv-full-banner__separator" aria-hidden="true"></span>' +

          '<div class="btpv-full-banner__title">' +
            '<span class="btpv-full-banner__eyebrow">' +
              "Lançamento exclusivo" +
            "</span>" +

            '<strong class="btpv-full-banner__heading">' +
              "Pré-venda" +
            "</strong>" +
          "</div>" +

        "</div>" +

        '<div class="btpv-full-banner__details">' +

          '<div class="btpv-full-banner__shipping">' +
            '<span class="btpv-full-banner__shipping-label">' +
              "Envios a partir de" +
            "</span>" +

            '<strong class="btpv-full-banner__shipping-date">' +
              CONFIGURACAO.dataEnvio +
            "</strong>" +
          "</div>" +

          '<span class="btpv-full-banner__detail-line" aria-hidden="true"></span>' +

          '<div class="btpv-full-banner__timer" aria-live="polite">' +

            '<div class="btpv-full-banner__time">' +
              '<span class="btpv-full-banner__number" data-btpv-days>00</span>' +
              '<span class="btpv-full-banner__unit">dias</span>' +
            "</div>" +

            '<span class="btpv-full-banner__timer-separator">/</span>' +

            '<div class="btpv-full-banner__time">' +
              '<span class="btpv-full-banner__number" data-btpv-hours>00</span>' +
              '<span class="btpv-full-banner__unit">horas</span>' +
            "</div>" +

            '<span class="btpv-full-banner__timer-separator">/</span>' +

            '<div class="btpv-full-banner__time">' +
              '<span class="btpv-full-banner__number" data-btpv-minutes>00</span>' +
              '<span class="btpv-full-banner__unit">min</span>' +
            "</div>" +

            '<span class="btpv-full-banner__timer-separator">/</span>' +

            '<div class="btpv-full-banner__time">' +
              '<span class="btpv-full-banner__number" data-btpv-seconds>00</span>' +
              '<span class="btpv-full-banner__unit">seg</span>' +
            "</div>" +

          "</div>" +

        "</div>";

      topoProduto.parentNode.insertBefore(
        banner,
        topoProduto
      );

      return banner;
    }

    function criarTagGaleria() {
      if (
        document.getElementById(
          "btpv-gallery-label"
        )
      ) {
        return;
      }

      var galeria =
        document.querySelector(
          "#produto-react-app .block-imagem"
        );

      if (!galeria) {
        return;
      }

      var tag =
        document.createElement("div");

      tag.id = "btpv-gallery-label";

      tag.innerHTML =
        '<span class="btpv-gallery-label__main">' +
          "Pré-venda" +
        "</span>" +

        '<span class="btpv-gallery-label__date">' +
          "Envio " +
          CONFIGURACAO.dataEnvio +
        "</span>";

      galeria.appendChild(tag);
    }

    function criarAvisoCompra() {
      var areaComprar =
        document.querySelector(
          "#produto-react-app .quantidade-comprar"
        );

      if (
        !areaComprar ||
        !areaComprar.parentNode
      ) {
        return;
      }

      var aviso =
        document.getElementById(
          "btpv-purchase-note"
        );

      if (!aviso) {
        aviso =
          document.createElement("div");

        aviso.id =
          "btpv-purchase-note";
      }

      aviso.innerHTML =
        "<span>" +
          "Restam " +
          "<strong>" +
            CONFIGURACAO.estoqueDisponivel +
            " unidades" +
          "</strong>" +
        "</span>" +

        '<span class="btpv-purchase-note__separator">•</span>' +

        "<span>" +
          "Envios a partir de " +
          "<strong>" +
            CONFIGURACAO.dataEnvio +
          "</strong>" +
        "</span>";

      if (
        areaComprar.previousElementSibling !==
        aviso
      ) {
        areaComprar.parentNode.insertBefore(
          aviso,
          areaComprar
        );
      }
    }

    function atualizarBotao() {
      var texto = isFinished()
        ? CONFIGURACAO.textoBotaoFinalizado
        : CONFIGURACAO.textoBotao;

      document
        .querySelectorAll(
          "#produto-react-app .quantidade-comprar .button-buy"
        )
        .forEach(function (botao) {
          if (
            botao.textContent.trim() !== texto
          ) {
            botao.textContent = texto;
          }

          botao.setAttribute(
            "title",
            texto
          );

          botao.setAttribute(
            "aria-label",
            texto
          );
        });
    }

    function atualizarValorTimer(
      seletor,
      valor
    ) {
      document
        .querySelectorAll(seletor)
        .forEach(function (elemento) {
          elemento.textContent =
            pad(valor);
        });
    }

    function atualizarTimer() {
      var dataFinal =
        getFinalDate();

      if (Number.isNaN(dataFinal)) {
        return;
      }

      var diferenca =
        dataFinal - Date.now();

      if (diferenca <= 0) {
        var titulo =
          document.querySelector(
            ".btpv-full-banner__heading"
          );

        var timer =
          document.querySelector(
            ".btpv-full-banner__timer"
          );

        if (titulo) {
          titulo.textContent =
            "Disponível agora";
        }

        if (timer) {
          timer.style.display =
            "none";
        }

        atualizarBotao();
        return;
      }

      var totalSegundos =
        Math.floor(
          diferenca / 1000
        );

      var dias =
        Math.floor(
          totalSegundos / 86400
        );

      var horas =
        Math.floor(
          (totalSegundos % 86400) /
            3600
        );

      var minutos =
        Math.floor(
          (totalSegundos % 3600) /
            60
        );

      var segundos =
        totalSegundos % 60;

      atualizarValorTimer(
        "[data-btpv-days]",
        dias
      );

      atualizarValorTimer(
        "[data-btpv-hours]",
        horas
      );

      atualizarValorTimer(
        "[data-btpv-minutes]",
        minutos
      );

      atualizarValorTimer(
        "[data-btpv-seconds]",
        segundos
      );
    }

    function aplicarPreVenda() {
      var produto =
        document.getElementById(
          "produto-react-app"
        );

      if (!produto) {
        return false;
      }

      criarBanner();
      criarTagGaleria();
      criarAvisoCompra();

      atualizarBotao();
      atualizarTimer();

      return true;
    }

    function agendarAplicacao() {
      if (CONTROLE.scheduled) {
        return;
      }

      CONTROLE.scheduled = true;

      window.requestAnimationFrame(
        function () {
          CONTROLE.scheduled = false;
          aplicarPreVenda();
        }
      );
    }

    function mutacaoPropria(registro) {
      var alvo = registro.target;

      if (
        !alvo ||
        !alvo.closest
      ) {
        return false;
      }

      return Boolean(
        alvo.closest(
          "#btpv-full-banner, " +
          "#btpv-gallery-label, " +
          "#btpv-purchase-note"
        )
      );
    }

    function iniciarObservador() {
      CONTROLE.observer =
        new MutationObserver(
          function (registros) {
            var alteracaoExterna =
              registros.some(
                function (registro) {
                  return !mutacaoPropria(
                    registro
                  );
                }
              );

            if (alteracaoExterna) {
              agendarAplicacao();
            }
          }
        );

      CONTROLE.observer.observe(
        document.documentElement,
        {
          childList: true,
          subtree: true
        }
      );
    }

    function iniciar() {
      removeCodigosAnteriores();

      var tentativas = 0;
      var limiteTentativas = 100;

      aplicarPreVenda();

      CONTROLE.retry =
        window.setInterval(
          function () {
            tentativas++;

            var aplicado =
              aplicarPreVenda();

            if (
              aplicado ||
              tentativas >=
                limiteTentativas
            ) {
              window.clearInterval(
                CONTROLE.retry
              );

              CONTROLE.retry = null;
            }
          },
          200
        );

      CONTROLE.timer =
        window.setInterval(
          atualizarTimer,
          1000
        );

      iniciarObservador();
    }

    if (
      document.readyState ===
      "loading"
    ) {
      document.addEventListener(
        "DOMContentLoaded",
        iniciar,
        {
          once: true
        }
      );
    } else {
      iniciar();
    }
  })();
</script>
