<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conceito Moderno Fundo Branco - Black Targ (Owl Carousel)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css" />

  <style>
    /* Ajuste para Fundo Branco */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Montserrat', sans-serif;
      background-color: #fff;
      color: #111111;
    }

    /* Container Principal */
    .etraction-modern-category-section {
      width: 100%;
      max-width: 100%;
      padding: 80px 0;
      box-sizing: border-box;
      overflow: hidden;
      background-color: #f2f2f2;
      position: relative; /* Necessário para a barra de progresso */
    }

    /* Título da Seção */
    .etraction-section-title {
      text-align: left;
      font-size: 1rem;
      font-weight: 400;
      text-transform: uppercase;
      margin: 0 0 20px 5%;
      color: #888;
      letter-spacing: 3px;
    }
    .etraction-section-title strong,
    .etraction-section-text strong {
      color: #111;
      font-weight: 800;
    }

    .etraction-section-text{
      text-align: left;
      font-size: 0.9rem;
      font-weight: 400;
      color: rgba(17, 0, 0, 0.603);
      margin: 0 0 10px 5%;
    }

    /* Container do Carrossel */
    .etraction-owl-carousel-wrapper {
      padding-bottom: 60px; /* Espaço para a barra de progresso */
      padding-left: 5%; /* Alinhamento com o título */
    }

    /* Estilo dos Cards Premium */
    .etraction-modern-category-card {
      display: flex;
      position: relative;
      width: 94%;
      aspect-ratio: 10 / 14;
      text-decoration: none;
      overflow: visible;
    }

    .etraction-card-image-wrapper {
      position: relative;
      width: 85%;
      height: 100%;
      border: 1px solid rgba(0,0,0,0.05);
      overflow: hidden;
      z-index: 1;
      background-color: #f9f9f9;
    }

    .etraction-modern-category-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    .etraction-modern-category-card:hover img {
      transform: scale(1.05);
    }

    .etraction-card-image-wrapper::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 30%;
      background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0) 100%);
    }

    /* Tipografia Vertical */
    .etraction-category-title-vertical {
      position: absolute;
      right: 25px;
      top: 50%;
      transform: translateY(-50%) rotate(-90deg);
      transform-origin: right center;
      white-space: nowrap;
      z-index: 2;
      pointer-events: none;
    }

    .etraction-category-title-vertical h3 {
      color: #111111;
      font-size: 1.2rem;
      font-weight: 800;
      text-transform: uppercase;
      margin: 0;
      letter-spacing: 5px;
      transition: letter-spacing 0.5s ease, color 0.5s ease;
      text-shadow: 1px 1px 2px rgba(255,255,255,0.8); 
    }

    .etraction-modern-category-card:hover .etraction-category-title-vertical h3 {
      letter-spacing: 8px;
      color: #ff0000;
    }

    /* Barra de Progresso Customizada para o Owl */
    .etraction-owl-progress {
      background: rgba(0,0,0,0.1);
      height: 2px;
      width: 90%;
      position: absolute;
      bottom: 40px;
      left: 5%;
    }

    .etraction-owl-progress-bar {
      background: #111111;
      height: 2px;
      width: 0%;
      transition: width 0.3s ease; /* Animação suave da barra */
    }

  </style>
</head>
<body>

  <section class="etraction-modern-category-section">
    <h2 class="etraction-section-title">Explore <strong>Coleções</strong></h2>
    <p class="etraction-section-text">Arraste para <strong>ver mais</strong></p>
    
    <div class="etraction-owl-carousel-wrapper">
      <div class="owl-carousel owl-theme etraction-owl-carousel">
        
        <div class="item">
          <a href="https://www.blacktarg.com.br/casacos-e-jaquetas" class="etraction-modern-category-card">
            <div class="etraction-card-image-wrapper">
              <img src="https://blacktarg.cdn.magazord.com.br/img/2025/06/produto/8013/nullcore-capa.png" alt="Jaquetas">
            </div>
            <div class="etraction-category-title-vertical">
              <h3>Jaquetas</h3>
            </div>
          </a>
        </div>

        <div class="item">
          <a href="https://www.blacktarg.com.br/corta-vento" class="etraction-modern-category-card">
            <div class="etraction-card-image-wrapper">
              <img src="https://blacktarg.cdn.magazord.com.br/img/2026/04/produto/9360/sem-titulo-1-0001-agrupar-6.png" alt="Corta Vento">
            </div>
            <div class="etraction-category-title-vertical">
              <h3>Corta Vento</h3>
            </div>
          </a>
        </div>

        <div class="item">
          <a href="https://www.blacktarg.com.br/calcas-masculinas" class="etraction-modern-category-card">
            <div class="etraction-card-image-wrapper">
              <img src="https://blacktarg.cdn.magazord.com.br/img/2025/07/produto/8327/flexmotion-0015-camada-1-copiar-6.png" alt="Calça">
            </div>
            <div class="etraction-category-title-vertical">
              <h3>Calça</h3>
            </div>
          </a>
        </div>

        <div class="item">
          <a href="https://www.blacktarg.com.br/camisetas-masculinas" class="etraction-modern-category-card">
            <div class="etraction-card-image-wrapper">
              <img src="https://blacktarg.cdn.magazord.com.br/img/2024/05/produto/5527/sessa-o-black-targ12.jpg" alt="Camisetas">
            </div>
            <div class="etraction-category-title-vertical">
              <h3>Camisetas</h3>
            </div>
          </a>
        </div>

        <div class="item">
          <a href="https://www.blacktarg.com.br/shorts-masculinos" class="etraction-modern-category-card">
            <div class="etraction-card-image-wrapper">
              <img src="https://blacktarg.cdn.magazord.com.br/img/2022/09/produto/2241/shorts-cargo-white-summer-1.png" alt="Shorts">
            </div>
            <div class="etraction-category-title-vertical">
              <h3>Shorts</h3>
            </div>
          </a>
        </div>

        <div class="item">
          <a href="https://www.blacktarg.com.br/feminino-fitness" class="etraction-modern-category-card">
            <div class="etraction-card-image-wrapper">
              <img src="https://blacktarg.cdn.magazord.com.br/img/2026/02/produto/9283/site-0001-objeto-inteligente-de-vetor.png" alt="Feminino">
            </div>
            <div class="etraction-category-title-vertical">
              <h3>Feminino</h3>
            </div>
          </a>
        </div>

      </div>
    </div>

    <div class="etraction-owl-progress">
      <div class="etraction-owl-progress-bar"></div>
    </div>

  </section>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>

  <script>
    $(document).ready(function(){
      var $owl = $('.etraction-owl-carousel');

      // Escuta os eventos de início e mudança do carrossel para atualizar a barra
      $owl.on('initialized.owl.carousel changed.owl.carousel', function(e) {
        if (!e.namespace) return;
        
        var items = e.item.count;     // Total de itens
        var item  = e.item.index;     // Índice atual
        var size  = e.page.size;      // Quantidade de itens visíveis
        
        // Calcula o índice máximo possível para rolar
        var max = items - size;
        if (max <= 0) { max = 1; } // Fallback de segurança
        
        // Calcula a porcentagem
        var progress = (item / max) * 100;
        
        // Limita entre 0 e 100%
        if (progress > 100) progress = 100;
        if (progress < 0) progress = 0;
        
        // Atualiza a largura do CSS da barra de progresso
        $('.etraction-owl-progress-bar').css('width', progress + '%');
      });

      // Configuração do Owl Carousel
      $owl.owlCarousel({
        loop: false, // Falso para a barra de progresso calcular o limite corretamente
        nav: false,  // Ocultar setas
        dots: false, // Ocultar os pontos padrão, usaremos a barra de progresso
        margin: 30,
        responsive: {
          0: {
            items: 1.9, // Permite aparecer 1 e um "pedaço" do próximo no mobile
            margin: 20
          },
          480: {
            items: 2.2,
            margin: 20
          },
          768: {
            items: 3.2,
            margin: 40
          },
          1024: {
            items: 4.3,
            margin: 50
          },
          1440: {
            items: 5.3,
            margin: 60
          }
        }
      });
    });
  </script>

</body>
</html>
