<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conceito Acordeão - Black Targ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;900&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Montserrat', sans-serif;
      background-color: #000; /* Fundo escuro conceitual */
    }

    /* Container Full Width / Altura de Tela */
    .accordion-section {
      width: 100%;
      height: 70vh; /* Ocupa 70% da altura da tela */
      min-height: 500px;
      display: flex;
      overflow: hidden;
      background: #111;
    }

    /* Cada fatia da categoria */
    .panel {
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100%;
      color: #fff;
      cursor: pointer;
      flex: 0.5; /* Tamanho inicial (comprimido) */
      position: relative;
      transition: flex 0.7s cubic-bezier(0.25, 1, 0.5, 1), filter 0.7s ease;
      filter: grayscale(100%) brightness(0.5); /* Escuro e sem cor por padrão */
      overflow: hidden;
      border-right: 1px solid rgba(255, 255, 255, 0.1);
    }

    .panel:last-child {
      border-right: none;
    }

    /* Título Vertical (Modo Comprimido) */
    .panel h3 {
      font-size: 1.5rem;
      font-weight: 300;
      position: absolute;
      bottom: 40px;
      left: 30px;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 5px;
      writing-mode: vertical-rl; /* Texto deitado */
      transform: rotate(180deg);
      transition: opacity 0.3s ease;
      white-space: nowrap;
    }

    /* Título Horizontal (Modo Expandido) */
    .panel .title-expanded {
      font-size: 3rem;
      font-weight: 900;
      position: absolute;
      bottom: 40px;
      left: 40px;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s ease 0.2s, transform 0.5s ease 0.2s;
      white-space: nowrap;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
    }

    /* O EFEITO MÁGICO: Quando ativado (hover ou clique) */
    .panel.active {
      flex: 4; /* Expande brutalmente */
      filter: grayscale(0%) brightness(1); /* Traz a cor e a luz */
      cursor: default;
    }

    .panel.active h3 {
      opacity: 0; /* Esconde o texto vertical */
    }

    .panel.active .title-expanded {
      opacity: 1; /* Revela o texto gigante */
      transform: translateY(0);
    }

    /* Responsividade para Celulares (Transforma em pilha vertical expansível) */
    @media (max-width: 768px) {
      .accordion-section {
        flex-direction: column;
        height: 85vh;
      }
      .panel {
        border-right: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .panel h3 {
        writing-mode: horizontal-tb;
        transform: rotate(0deg);
        bottom: auto;
        top: 50%;
        transform: translateY(-50%);
        font-size: 1.2rem;
      }
      .panel .title-expanded {
        font-size: 2rem;
        bottom: 20px;
        left: 20px;
      }
    }
  </style>
</head>
<body>

  <section class="accordion-section">
    
    <div class="panel active" style="background-image: url('https://images.unsplash.com/photo-1603251579431-8041402bdeda?q=80&w=1200&auto=format&fit=crop');">
      <h3>Calça</h3>
      <span class="title-expanded">Calça</span>
    </div>

    <div class="panel" style="background-image: url('https://images.unsplash.com/photo-1548624149-f4728f32267a?q=80&w=1200&auto=format&fit=crop');">
      <h3>Corta Vento</h3>
      <span class="title-expanded">Corta Vento</span>
    </div>

    <div class="panel" style="background-image: url('https://images.unsplash.com/photo-1576871333020-03310f8a846f?q=80&w=1200&auto=format&fit=crop');">
      <h3>Camisetas</h3>
      <span class="title-expanded">Camisetas</span>
    </div>

    <div class="panel" style="background-image: url('https://images.unsplash.com/photo-1551028719-00167b16eac5?q=80&w=1200&auto=format&fit=crop');">
      <h3>Jaquetas</h3>
      <span class="title-expanded">Jaquetas e Casacos</span>
    </div>

    <div class="panel" style="background-image: url('https://images.unsplash.com/photo-1591195853828-11db59a44f6b?q=80&w=1200&auto=format&fit=crop');">
      <h3>Bermudas</h3>
      <span class="title-expanded">Shorts e Bermudas</span>
    </div>

    <div class="panel" style="background-image: url('https://images.unsplash.com/photo-1509631179647-0177331693ae?q=80&w=1200&auto=format&fit=crop');">
      <h3>Feminino</h3>
      <span class="title-expanded">Feminino</span>
    </div>

  </section>

  <script>
    const panels = document.querySelectorAll('.panel');

    panels.forEach(panel => {
      // Evento de passar o mouse (para desktop)
      panel.addEventListener('mouseenter', () => {
        removeActiveClasses();
        panel.classList.add('active');
      });

      // Evento de clique (para funcionar bem em celulares)
      panel.addEventListener('click', () => {
        // Redireciona para o link da categoria APENAS se o painel já estiver expandido
        if (panel.classList.contains('active')) {
          const categoryName = panel.querySelector('h3').innerText.toLowerCase().replace(/ /g, '-');
          // Descomente a linha abaixo na sua loja para ativar os links:
          // window.location.href = '/' + categoryName;
          console.log('Navegando para: /' + categoryName);
        } else {
          removeActiveClasses();
          panel.classList.add('active');
        }
      });
    });

    function removeActiveClasses() {
      panels.forEach(panel => {
        panel.classList.remove('active');
      });
    }
  </script>

</body>
</html>
