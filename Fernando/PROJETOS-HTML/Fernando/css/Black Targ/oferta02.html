<section class="bt-combo-section">
  <style>
    .bt-combo-section {
      width: 100%;
      padding: 36px 16px;
      background: #f7f7f7;
      font-family: Arial, Helvetica, sans-serif;
      box-sizing: border-box;
    }

    .bt-combo-wrapper {
      max-width: 1180px;
      margin: 0 auto;
    }

    .bt-combo-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .bt-combo-header h2 {
      margin: 0;
      color: #111;
      font-size: 28px;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.8px;
      text-transform: uppercase;
    }

    .bt-combo-header p {
      margin: 7px 0 0;
      color: #333;
      font-size: 15px;
      font-weight: 500;
    }

    .bt-combo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .bt-combo-card {
      position: relative;
      min-height: 345px;
      overflow: hidden;
      border-radius: 3px;
      background: linear-gradient(135deg, #f1f1f1 0%, #ffffff 100%);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
      isolation: isolate;
    }

    .bt-combo-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 82% 42%, rgba(0, 0, 0, 0.06), transparent 34%),
        linear-gradient(90deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.72) 42%, rgba(255,255,255,0.12) 100%);
      z-index: 1;
      pointer-events: none;
    }

    .bt-combo-content {
      position: relative;
      z-index: 3;
      width: 48%;
      min-width: 150px;
      padding: 34px 0 30px 28px;
      box-sizing: border-box;
    }

    .bt-combo-title {
      margin: 0;
      color: #111;
      font-size: 22px;
      font-weight: 900;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: -0.6px;
    }

    .bt-combo-subtitle {
      margin: 4px 0 0;
      color: #222;
      font-size: 18px;
      font-weight: 400;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: -0.5px;
    }

    .bt-combo-line {
      width: 32px;
      height: 2px;
      display: block;
      margin: 22px 0 22px;
      background: #d92323;
    }

    .bt-combo-qtd {
      margin: 0;
      color: #202020;
      font-size: 15px;
      font-weight: 800;
      line-height: 1.1;
      text-transform: uppercase;
    }

    .bt-combo-price {
      margin: 4px 0 0;
      color: #111;
      font-size: 31px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -1.3px;
    }

    .bt-combo-each {
      margin: 3px 0 0;
      color: #111;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .bt-combo-save {
      margin: 18px 0 0;
      color: #202020;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.2;
    }

    .bt-combo-save strong {
      font-weight: 900;
    }

    .bt-combo-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      min-width: 142px;
      height: 43px;
      margin-top: 35px;
      padding: 0 18px;
      color: #fff;
      background: #000;
      border-radius: 3px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 900;
      line-height: 1;
      text-transform: uppercase;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.22);
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    }

    .bt-combo-btn:hover {
      transform: translateY(-2px);
      background: #d92323;
      box-shadow: 0 12px 20px rgba(217, 35, 35, 0.25);
    }

    .bt-combo-arrow {
      font-size: 17px;
      line-height: 1;
      transform: translateY(-1px);
    }

    .bt-combo-img {
      position: absolute;
      z-index: 2;
      right: -6px;
      bottom: 0;
      max-width: 62%;
      height: 96%;
      object-fit: contain;
      object-position: right bottom;
      transition: transform 0.35s ease;
      pointer-events: none;
    }

    .bt-combo-card:hover .bt-combo-img {
      transform: scale(1.035);
    }

    .bt-combo-card--shorts .bt-combo-img {
      right: 10px;
      max-width: 56%;
      height: 97%;
    }

    .bt-combo-card--corta .bt-combo-img {
      right: -12px;
      max-width: 64%;
      height: 98%;
    }

    @media (max-width: 1024px) {
      .bt-combo-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .bt-combo-card {
        min-height: 330px;
      }

      .bt-combo-content {
        width: 50%;
      }

      .bt-combo-img {
        max-width: 54%;
      }

      .bt-combo-card--corta .bt-combo-img {
        max-width: 57%;
      }
    }

    @media (max-width: 640px) {
      .bt-combo-section {
        padding: 30px 12px;
      }

      .bt-combo-header {
        margin-bottom: 22px;
      }

      .bt-combo-header h2 {
        font-size: 22px;
      }

      .bt-combo-header p {
        font-size: 13px;
      }

      .bt-combo-card {
        min-height: 300px;
      }

      .bt-combo-card::before {
        background:
          linear-gradient(90deg, rgba(255,255,255,0.98) 0%, rgba(255,255,255,0.82) 54%, rgba(255,255,255,0.24) 100%);
      }

      .bt-combo-content {
        width: 56%;
        min-width: 0;
        padding: 26px 0 24px 20px;
      }

      .bt-combo-title {
        font-size: 18px;
      }

      .bt-combo-subtitle {
        font-size: 15px;
      }

      .bt-combo-line {
        margin: 17px 0 17px;
      }

      .bt-combo-price {
        font-size: 26px;
      }

      .bt-combo-save {
        font-size: 11px;
        margin-top: 14px;
      }

      .bt-combo-btn {
        min-width: 120px;
        height: 39px;
        margin-top: 26px;
        font-size: 11px;
      }

      .bt-combo-img {
        right: -28px;
        max-width: 61%;
        height: 92%;
      }

      .bt-combo-card--shorts .bt-combo-img {
        right: -6px;
        max-width: 54%;
        height: 92%;
      }

      .bt-combo-card--corta .bt-combo-img {
        right: -35px;
        max-width: 66%;
        height: 94%;
      }
    }
  </style>

  <div class="bt-combo-wrapper">
    <div class="bt-combo-header">
      <h2>Leve mais. Pague menos.</h2>
      <p>Descontos automáticos no carrinho.</p>
    </div>

    <div class="bt-combo-grid">
      <article class="bt-combo-card bt-combo-card--calca">
        <div class="bt-combo-content">
          <h3 class="bt-combo-title">Calça</h3>
          <p class="bt-combo-subtitle">Flex Motion</p>

          <span class="bt-combo-line"></span>

          <p class="bt-combo-qtd">3 por</p>

          <p class="bt-combo-save">Economize <strong>R$ 37,00</strong></p>

          <a class="bt-combo-btn" href="https://www.blacktarg.com.br/calca-flex">
            Comprar
            <span class="bt-combo-arrow">→</span>
          </a>
        </div>

        <img
          class="bt-combo-img"
          src="https://blacktarg.cdn.magazord.com.br/img/2026/05/produto/9553/calca-flex.png"
          alt="Calça Flex Motion Black Targ"
          loading="lazy"
        >
      </article>

      <article class="bt-combo-card bt-combo-card--shorts">
        <div class="bt-combo-content">
          <h3 class="bt-combo-title">Shorts</h3>
          <p class="bt-combo-subtitle">Flex</p>

          <span class="bt-combo-line"></span>

          <p class="bt-combo-qtd">2 por</p>
          <p class="bt-combo-price">R$ 49,50</p>
          <p class="bt-combo-each">cada</p>

          <p class="bt-combo-save">Economize <strong>R$ 19,00</strong></p>

          <a class="bt-combo-btn" href="https://www.blacktarg.com.br/shorts-esportivos">
            Comprar
            <span class="bt-combo-arrow">→</span>
          </a>
        </div>

        <img
          class="bt-combo-img"
          src="https://blacktarg.cdn.magazord.com.br/img/2026/05/produto/9555/shorts.png"
          alt="Shorts Flex Black Targ"
          loading="lazy"
        >
      </article>

      <article class="bt-combo-card bt-combo-card--corta">
        <div class="bt-combo-content">
          <h3 class="bt-combo-title">Corta Vento</h3>
          <p class="bt-combo-subtitle">Ultra Leve</p>

          <span class="bt-combo-line"></span>

          <p class="bt-combo-qtd">2 por</p>
          <p class="bt-combo-price">R$ 74,50</p>
          <p class="bt-combo-each">cada</p>

          <p class="bt-combo-save">Economize <strong>R$ 69,00</strong></p>

          <a class="bt-combo-btn" href="https://www.blacktarg.com.br/jaqueta-corta-vento-sforro">
            Comprar
            <span class="bt-combo-arrow">→</span>
          </a>
        </div>

        <img
          class="bt-combo-img"
          src="https://blacktarg.cdn.magazord.com.br/img/2026/05/produto/9554/corta-vento.png"
          alt="Jaqueta Corta Vento Ultra Leve Black Targ"
          loading="lazy"
        >
      </article>
    </div>
  </div>
</section>
