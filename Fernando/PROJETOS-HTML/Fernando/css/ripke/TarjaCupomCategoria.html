<style>
    .promo-banner {
        /* background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); */
        background-color: #8C7C68;
        border-radius: 12px;
        padding: 20px 30px;
        box-shadow:
            0 10px 30px rgba(0, 0, 0, 0.15),
            0 0 0 1px rgba(255, 255, 255, 0.1) inset;
        position: relative;
        overflow: hidden;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .promo-banner::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
        animation: shine 3s infinite;
    }

    @keyframes shine {
        0% {
            left: -100%;
        }

        50%,
        100% {
            left: 100%;
        }
    }

    .promo-banner:hover {
        transform: translateY(-2px);
        box-shadow:
            0 15px 40px rgba(0, 0, 0, 0.2),
            0 0 0 1px rgba(255, 255, 255, 0.15) inset;
    }

    .banner-content {
        display: flex;
        align-items: center;
        justify-content: space-around;
        gap: 20px;
        flex-wrap: wrap;
        position: relative;
        z-index: 1;
        padding: 0 30px;
    }

    .promo-text {
        flex: 1;
        min-width: 250px;
    }

    .main-offer {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 10px;
        flex-wrap: wrap;
    }

    .discount-badge {
        /* background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); */
        background-color: #5B5B5B;
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
        font-weight: 700;
        font-size: 18px;
        letter-spacing: 0.5px;
        box-shadow: 0 4px 15px #5B5B5B;
        white-space: nowrap;
        animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

        0%,
        100% {
            transform: scale(1);
        }

        50% {
            transform: scale(1.05);
        }
    }

    .offer-title {
        color: #ffffff;
        font-size: 20px;
        font-weight: 600;
        line-height: 1.3;
    }

    .secondary-info {
        display: flex;
        align-items: center;
        gap: 25px;
        flex-wrap: wrap;
        margin-top: 8px;
    }

    .info-item {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #ecf0f1;
        font-size: 14px;
        font-weight: 500;
    }

    .info-icon {
        width: 20px;
        height: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .info-icon svg {
        width: 100%;
        height: 100%;
        fill: currentColor;
        opacity: 0.9;
    }

    .coupon-section {
        display: flex;
        align-items: center;
        gap: 12px;
        /* background: rgba(255, 255, 255, 0.1); */
        padding: 12px 26px;
        border-radius: 8px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        transition: all 0.3s ease;
        width: 360px;
        justify-content: center;
    }

    .coupon-section:hover {
        background: rgba(255, 255, 255, 0.15);
        border-color: rgba(255, 255, 255, 0.3);
    }

    .coupon-label {
        color: #ffffff;
        font-size: 12px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .coupon-code {
        color: #000;
        font-size: 24px;
        font-weight: 700;
        font-family: 'Courier New', monospace;
        letter-spacing: 2px;
        padding: 8px 16px;
        /* background: linear-gradient(135deg, #3498db 0%, #2980b9 100%); */
        background-color: #fff;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.3s ease;
        user-select: all;
        width: 280px;
        text-align: center;
    }

    .coupon-code:hover {
        background: linear-gradient(135deg, #5B5B5B 0%, #868686 100%);
        transform: scale(1.05);
        box-shadow: 0 5px 20px #5B5B5B;
    }

    .coupon-code:active {
        transform: scale(0.98);
    }

    .copy-hint {
        color: #ffffff;
        font-size: 11px;
        font-style: italic;
    }

    /* Responsivo Mobile */
    @media (max-width: 768px) {
        .promo-banner {
            padding: 18px 20px;
            border-radius: 8px;
        }

        .banner-content {
            flex-direction: column;
            align-items: stretch;
            gap: 15px;
            padding: 0 0;
        }

        .promo-text {
            min-width: 100%;
        }

        .main-offer {
            flex-direction: column;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
        }

        .discount-badge {
            font-size: 16px;
            padding: 8px 16px;
            align-self: flex-start;
        }

        .offer-title {
            font-size: 18px;
        }

        .secondary-info {
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            margin-top: 10px;
        }

        .info-item {
            font-size: 13px;
        }

        .coupon-section {
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 10px;
            width: auto;
        }

        .coupon-code {
            font-size: 20px;
            padding: 10px 14px;
            width: 100%;
            text-align: center;
        }

        .copy-hint {
            align-self: center;
        }
    }

    @media (max-width: 480px) {
        .promo-banner {
            padding: 15px;
        }

        .offer-title {
            font-size: 16px;
        }

        .discount-badge {
            font-size: 15px;
        }

        .coupon-code {
            font-size: 18px;
            letter-spacing: 1.5px;
        }
    }
</style>


<script>

    $(document).ready(function () {
        const html = `    <div class="promo-banner">
        <div class="banner-content">
            <div class="promo-text">
                <div class="main-offer">
                    <div class="discount-badge">5% OFF</div>
                    <div class="offer-title">Primeira compra com desconto especial</div>
                </div>
                <div class="secondary-info">
                    <div class="info-item">
                        <div class="info-icon">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm13.5-9l1.96 2.5H17V9.5h2.5zm-1.5 9c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z" />
                            </svg>
                        </div>
                        <span>Frete grátis acima de R$ 2.500</span>
                    </div>
                    <div class="info-item">
                        <div class="info-icon">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" />
                            </svg>
                        </div>
                        <span>Sul e Sudeste</span>
                    </div>
                </div>
            </div>
            <div class="coupon-section">
                <div>
                    <div class="coupon-label">aplique no carrinho:</div>
                    <div class="coupon-code" onclick="copyCode(this)" title="Clique para copiar">PRIMEIRA5</div>
                    <div class="copy-hint">Clique para copiar</div>
                </div>
            </div>
        </div>
    </div>`;
        $(html).insertAfter(".title-pesquisa");
    })
    function copyCode(element) {
        const code = element.textContent;

        // Tenta copiar usando a API moderna
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(code).then(() => {
                showCopyFeedback(element);
            }).catch(err => {
                fallbackCopy(code, element);
            });
        } else {
            fallbackCopy(code, element);
        }
    }

    function fallbackCopy(text, element) {
        // Método alternativo para navegadores mais antigos
        const textArea = document.createElement('textarea');
        textArea.value = text;
        textArea.style.position = 'fixed';
        textArea.style.left = '-999999px';
        document.body.appendChild(textArea);
        textArea.select();
        try {
            document.execCommand('copy');
            showCopyFeedback(element);
        } catch (err) {
            console.error('Erro ao copiar:', err);
        }
        document.body.removeChild(textArea);
    }

    function showCopyFeedback(element) {
        const originalText = element.textContent;
        element.textContent = '✓ COPIADO!';

        setTimeout(() => {
            element.textContent = originalText;
        }, 2000);
    }
</script>
