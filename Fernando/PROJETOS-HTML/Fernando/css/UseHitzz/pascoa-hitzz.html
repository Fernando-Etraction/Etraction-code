<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Páscoa da Hitzz | 48 Horas · 48 Produtos · até R$148</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #1a0a2e 0%, #2d1450 50%, #1a0a2e 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .hero-egg { font-size: 80px; margin-bottom: 20px; }
    h1 {
      font-size: 48px;
      font-weight: 900;
      color: #c9a84c;
      margin-bottom: 12px;
      line-height: 1.1;
    }
    h2 {
      font-size: 24px;
      font-weight: 600;
      color: #b8a0d2;
      margin-bottom: 8px;
    }
    .price {
      font-size: 56px;
      font-weight: 900;
      color: #c9a84c;
      margin: 20px 0;
    }
    .subtitle {
      font-size: 18px;
      color: #ddd;
      max-width: 500px;
      margin-bottom: 30px;
    }
    .dates {
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #b8a0d2;
      margin-bottom: 40px;
    }
    .divider {
      width: 120px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #c9a84c, transparent);
      margin: 30px auto;
    }
    .coming-soon {
      font-size: 20px;
      font-weight: 700;
      color: #c9a84c;
      padding: 16px 40px;
      border: 2px solid #c9a84c;
      border-radius: 50px;
      display: inline-block;
    }
    @media (max-width: 600px) {
      .hero-egg { font-size: 50px; }
      h1 { font-size: 32px; }
      h2 { font-size: 18px; }
      .price { font-size: 38px; }
      .subtitle { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="hero-egg">🥚🐣🥚</div>
  <h2>Páscoa da Hitzz</h2>
  <h1>48 Horas · 48 Produtos</h1>
  <div class="subtitle">por até</div>
  <div class="price">R$148</div>
  <div class="dates">04 e 05 de Abril</div>
  <div class="divider"></div>
  <div class="coming-soon">Em breve — Aguarde!</div>
</body>
</html>
