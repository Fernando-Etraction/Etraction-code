<script>
  const EtractionVitrineCarousel = (function () {
    const selectors = {
      root: "#etractionVitrineCarousel",
      track: ".etraction-vitrine-carousel__track",
      card: ".etraction-vitrine-carousel__card",
      prev: ".etraction-vitrine-carousel__arrow--prev",
      next: ".etraction-vitrine-carousel__arrow--next"
    };

    let root;
    let track;
    let prevButton;
    let nextButton;

    function init() {
      root = document.querySelector(selectors.root);

      if (!root || root.dataset.etractionInit === "true") return;

      track = root.querySelector(selectors.track);
      prevButton = root.querySelector(selectors.prev);
      nextButton = root.querySelector(selectors.next);

      if (!track || !prevButton || !nextButton) return;

      root.dataset.etractionInit = "true";

      bindEvents();
      updateButtons();
    }

    function bindEvents() {
      prevButton.addEventListener("click", function () {
        move(-1);
      });

      nextButton.addEventListener("click", function () {
        move(1);
      });

      track.addEventListener("scroll", debounce(updateButtons, 70));
      window.addEventListener("resize", debounce(updateButtons, 120));
    }

    function move(direction) {
      const card = track.querySelector(selectors.card);

      if (!card) return;

      track.scrollBy({
        left: (card.offsetWidth + getGap()) * direction,
        behavior: "smooth"
      });
    }

    function getGap() {
      const style = window.getComputedStyle(track);
      return parseInt(style.columnGap || style.gap || 0, 10) || 0;
    }

    function updateButtons() {
      const maxScroll = track.scrollWidth - track.clientWidth;
      const currentScroll = track.scrollLeft;

      prevButton.classList.toggle("is-disabled", currentScroll <= 3);
      nextButton.classList.toggle("is-disabled", currentScroll >= maxScroll - 3);
    }

    function debounce(callback, delay) {
      let timer;

      return function () {
        clearTimeout(timer);
        timer = setTimeout(callback, delay);
      };
    }

    return {
      init: init
    };
  })();

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", EtractionVitrineCarousel.init);
  } else {
    EtractionVitrineCarousel.init();
  }
</script>
