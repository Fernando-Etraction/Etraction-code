<section class="etraction-video-area">

  <div class="title-ctn">
    <h2 class="bg-title">
      <span>
        Conheça a Chapa Moto Parts
      </span>
    </h2>
  </div>

  <div class="etraction-video-grid">

    <div class="etraction-video-card">
      <button
        class="etraction-video-thumb"
        type="button"
        data-video-id="xi7miMTjaxE"
        aria-label="Reproduzir vídeo Chapa Moto Parts 18 anos"
        style="background-image: url('https://img.youtube.com/vi/xi7miMTjaxE/hqdefault.jpg');">
        <span class="etraction-video-play"></span>
      </button>
    </div>

    <div class="etraction-video-card">
      <button
        class="etraction-video-thumb"
        type="button"
        data-video-id="0qKoAPgMMG8"
        aria-label="Reproduzir vídeo"
        style="background-image: url('https://img.youtube.com/vi/0qKoAPgMMG8/hqdefault.jpg');">
        <span class="etraction-video-play"></span>
      </button>
    </div>

    <div class="etraction-video-card">
      <button
        class="etraction-video-thumb"
        type="button"
        data-video-id="XRxoteoF3GI"
        aria-label="Reproduzir vídeo"
        style="background-image: url('https://img.youtube.com/vi/XRxoteoF3GI/hqdefault.jpg');">
        <span class="etraction-video-play"></span>
      </button>
    </div>

  </div>
</section>

<style>
  .etraction-video-area {
    width: 100%;
    background: #fff;
    padding: 24px 12px;
    margin: 0 auto;
    box-sizing: border-box;
  }

  .etraction-video-area *,
  .etraction-video-area *::before,
  .etraction-video-area *::after {
    box-sizing: border-box;
  }

  .etraction-video-grid {
    width: 100%;
    max-width: 1250px;
    margin: 0 auto;
    display: flex;
    justify-content: center;
    align-items: stretch;
    gap: 40px;
  }

  .etraction-video-card {
    width: 100%;
    max-width: 250px;
    aspect-ratio: 250 / 470;
    background: #000;
    overflow: hidden;
    border-radius: 10px;
    position: relative;
  }

  .etraction-video-thumb {
    width: 100%;
    height: 100%;
    display: block;
    border: 0;
    padding: 0;
    cursor: pointer;
    background-color: #111;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    position: relative;
  }

  .etraction-video-thumb::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.22);
    transition: background 0.2s ease;
  }

  .etraction-video-thumb:hover::before {
    background: rgba(0, 0, 0, 0.34);
  }

  .etraction-video-play {
    width: 58px;
    height: 58px;
    background: rgba(255, 255, 255, 0.92);
    border-radius: 50%;
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
  }

  .etraction-video-play::after {
    content: "";
    position: absolute;
    left: 23px;
    top: 18px;
    width: 0;
    height: 0;
    border-top: 11px solid transparent;
    border-bottom: 11px solid transparent;
    border-left: 17px solid #111;
  }

  .etraction-video-card iframe {
    width: 100%;
    height: 100%;
    display: block;
    border: 0;
  }

  @media (max-width: 900px) {
    .etraction-video-grid {
      gap: 14px;
    }

    .etraction-video-card {
      max-width: 220px;
    }
  }

  @media (max-width: 720px) {
    .etraction-video-grid {
      flex-direction: column;
      align-items: center;
    }

    .etraction-video-card {
      width: 100%;
      max-width: 280px;
    }
  }
</style>

<script>
  (function () {
    var videoButtons = document.querySelectorAll(".etraction-video-thumb");

    videoButtons.forEach(function (button) {
      button.addEventListener("click", function () {
        var videoId = button.getAttribute("data-video-id");

        if (!videoId) return;

        var iframe = document.createElement("iframe");

        iframe.setAttribute("src", "https://www.youtube.com/embed/" + videoId + "?autoplay=1&rel=0");
        iframe.setAttribute("title", button.getAttribute("aria-label") || "YouTube video player");
        iframe.setAttribute("frameborder", "0");
        iframe.setAttribute("allow", "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share");
        iframe.setAttribute("referrerpolicy", "strict-origin-when-cross-origin");
        iframe.setAttribute("allowfullscreen", "");

        button.parentNode.replaceChild(iframe, button);
      });
    });
  })();
</script>
