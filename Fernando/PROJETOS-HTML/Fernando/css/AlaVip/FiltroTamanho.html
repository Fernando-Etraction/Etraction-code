<style>
.size-filter {
  text-align: center;
  font-family: "Inter", Arial, sans-serif;
  margin: 40px auto;
  max-width: 900px;
  border-top: 1px solid #ddd;
  border-bottom: 1px solid #ddd;
  padding: 20px 0;
}

.size-filter h3 {
  font-size: 0.9rem;
  font-weight: 700;
  margin-bottom: 20px;
  letter-spacing: 0.3px;
  color: #000;
}

.size-options {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 30px;
  flex-wrap: wrap;
}

.size-options button {
  background: none;
  border: none;
  font-size: 1rem;
  font-weight: 400;
  color: #444;
  cursor: pointer;
  transition: color 0.2s ease, transform 0.2s ease;
}

.size-options button:hover {
  color: #000;
  transform: scale(1.05);
}

.size-options .divider {
  height: 24px;
  width: 1px;
  background-color: #ccc;
}

@media (max-width: 600px) {
  .size-options {
    gap: 20px;
  }

  .size-options .divider {
    display: none;
  }
}

</style>

<script>
  document.querySelectorAll(".size-options button").forEach((btn) => {
    btn.addEventListener("click", () => {
      const link = btn.getAttribute("data-link");
      window.location.href = link;
    });
  });
</script>
