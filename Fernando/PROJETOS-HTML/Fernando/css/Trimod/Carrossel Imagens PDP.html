<style>
  @import url("https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&display=swap");


  .stories-wrap {
    display: flex;
    gap: 16px;
    padding: 16px 8px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .story-thumb {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
    cursor: pointer;
    flex: 0 0 auto;
  }

  .story-ring {
    padding: 3px;
    border-radius: 50%;
    background: linear-gradient(135deg, #002f69 0%, #4a90d9 100%);
    transition: transform 0.2s;
  }

  .story-ring:hover {
    transform: scale(1.07);
  }

  .story-ring img {
    width: 120px;
    height: 120px !important;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    border: 2.5px solid #fff;
  }

  .story-label {
    font-family: "Barlow", sans-serif;
    font-size: 14px;
    color: var(--color-text-secondary);
    text-align: center;
    max-width: 90px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Modal */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.88);
    z-index: 9999;
    align-items: center;
    justify-content: center;
  }

  .modal-bg.open {
    display: flex;
  }

  .story-modal {
    position: relative;
    width: 400px;
    max-width: 96vw;
    height: min(650px, 92vh);
    border-radius: 14px;
    overflow: hidden;
    background: #000;
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.7);
  }

  .modal-img {
    width: 100%;
    height: 100% !important;
    object-fit: cover;
    display: block;
    transition: opacity 0.25s;
  }
    .modal-img img {
    width: 100%;
    height: 100% !important;
    }

  /* Progress bars */
  .bars {
    position: absolute;
    top: 12px;
    left: 12px;
    right: 12px;
    display: flex;
    gap: 5px;
    z-index: 10;
  }

  .bar-wrap {
    flex: 1;
    height: 3px;
    background: rgba(255, 255, 255, 0.28);
    border-radius: 2px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: #fff;
    width: 0%;
    border-radius: 2px;
  }

  .bar-fill.done {
    width: 100%;
    transition: none;
  }

  .bar-fill.active {
    transition: width linear;
  }

  /* Header info */
  .modal-header {
    position: absolute;
    top: 26px;
    left: 14px;
    right: 50px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 10;
    border-bottom: none;
  }

  .modal-avatar {
    width: 34px !important;
    height: 34px !important;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #fff;
    flex-shrink: 0;
  }
    .modal-avatar img {
    width: 34px !important;
    height: 34px !important;
    }


  .modal-name {
    font-family: "Barlow", sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
  }

  .modal-time {
    font-family: "Barlow", sans-serif;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.6);
  }

  /* Close */
  .modal-close {
    position: absolute;
    top: 28px;
    right: 14px;
    z-index: 10;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
  }

  .modal-close svg {
    width: 22px;
    height: 22px;
    stroke: #fff;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    filter: drop-shadow(0 1px 3px rgba(0, 0, 0, 0.5));
  }

  /* Tap zones */
  .tap-prev,
  .tap-next {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 40%;
    z-index: 5;
    cursor: pointer;
  }

  .tap-prev {
    left: 0;
  }

  .tap-next {
    right: 0;
  }

  /* Caption */
  .modal-caption {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 48px 18px 22px;
    background: linear-gradient(transparent, rgba(0, 0, 0, 0.65));
    font-family: "Bebas Neue", sans-serif;
    font-size: 22px;
    letter-spacing: 0.06em;
    color: #fff;
    z-index: 10;
  }

  .modal-caption small {
    display: block;
    font-family: "Barlow", sans-serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.55);
    font-weight: 300;
    margin-bottom: 4px;
  }

  .stories-title {
    text-align: center;
    margin-top: 32px;
    font-family: "Roboto", sans-serif;
    font-size: 22px;
    color: var(--color-text-secondary);
  }

  .stories-title span {
    display: block;
    font-size: 14px;
    color: var(--color-primary);
  }
  

  /* CARROSSEL MOBILE */
  @media (max-width: 768px) {
    .stories-wrap {
      justify-content: flex-start;
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 16px 12px;
      gap: 12px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .stories-wrap::-webkit-scrollbar {
      display: none;
    }

    .story-thumb {
      min-width: 88px;
      scroll-snap-align: start;
    }

    .story-ring img {
      width: 82px;
      height: 82px !important;
    }

    .story-label {
      max-width: 78px;
      font-size: 10px;
      white-space: normal;
      line-height: 1.2;
    }

    .story-modal {
      width: 100%;
      max-width: 100vw;
      height: 100vh;
      border-radius: 0;
    }
    
  .modal-avatar {
    width: 34px !important;
    height: 34px !important;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #fff;
    flex-shrink: 0;
  }

    .modal-caption {
      font-size: 20px;
    }
  }
</style>

<div class="stories-title">
  <p>Pessoas que usaram Trimod</p>
  <span>Clique e confira os stories</span>
</div>

<div class="stories-wrap" id="stories-wrap"></div>

<div class="modal-bg" id="modal-bg">
  <div class="story-modal" id="story-modal">
    <div class="bars" id="bars"></div>

    <div class="modal-header">
      <img  style="height: 34px !important;" class="modal-avatar" id="modal-avatar" src="" alt="" />
      <div>
        <div class="modal-name">trimodmeias</div>
        <div class="modal-time" id="modal-time">agora</div>
      </div>
    </div>

    <button class="modal-close" id="modal-close">
      <svg viewBox="0 0 24 24">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>

    <div class="tap-prev" id="tap-prev"></div>
    <div class="tap-next" id="tap-next"></div>

    <img class="modal-img" style="height: 100% !important;" id="modal-img" src="" alt="" />

    <div class="modal-caption">
      <small id="cap-tag"></small>
      <span id="cap-text"></span>
    </div>
  </div>
</div>

<script>
  const STORY_MS = 5000;

  const slides = [
    {
      img: "https://trimodmeias.bwimg.com.br/trimodmeias/descricoes/951-01-1774635710.516.jpeg",
      thumb:
        "https://trimodmeias.bwimg.com.br/trimodmeias/descricoes/951-01-1774635710.516.jpeg",
      label: "Corrida Pro",
      tag: "Alta Performance · Corrida",
      caption: "SUPERE SEUS LIMITES",
    },
    {
      img: "https://trimodmeias.bwimg.com.br/trimodmeias/descricoes/951-02-1774635714.9761.jpeg",
      thumb:
        "https://trimodmeias.bwimg.com.br/trimodmeias/descricoes/951-02-1774635714.9761.jpeg",
      label: "Treino Urbano",
      tag: "Conforto · Dia a Dia",
      caption: "CONFORTO EM QUALQUER TERRENO",
    },
    {
      img: "https://trimodmeias.bwimg.com.br/trimodmeias/descricoes/951-03-1774635719.2458.jpeg",
      thumb:
        "https://trimodmeias.bwimg.com.br/trimodmeias/descricoes/951-03-1774635719.2458.jpeg",
      label: "Dupla Performance",
      tag: "Treino · Resistência",
      caption: "MAIS DISTÂNCIA, MENOS CANSAÇO",
    },
    {
      img: "https://trimodmeias.bwimg.com.br/trimodmeias/descricoes/951-04-1774635784.2874.jpg",
      thumb:
        "https://trimodmeias.bwimg.com.br/trimodmeias/descricoes/951-04-1774635784.2874.jpg",
      label: "Velocidade",
      tag: "Corrida · Performance",
      caption: "FOCO NA PERFORMANCE",
    },
    {
      img: "https://trimodmeias.bwimg.com.br/trimodmeias/descricoes/951-05-1774635797.9986.jpeg",
      thumb:
        "https://trimodmeias.bwimg.com.br/trimodmeias/descricoes/951-05-1774635797.9986.jpeg",
      label: "Lifestyle",
      tag: "Esporte · Estilo",
      caption: "ESTILO QUE ACOMPANHA SEU RITMO",
    },
    {
      img: "https://trimodmeias.bwimg.com.br/trimodmeias/descricoes/951-06-1774635803.5606.jpeg",
      thumb:
        "https://trimodmeias.bwimg.com.br/trimodmeias/descricoes/951-06-1774635803.5606.jpeg",
      label: "Treino Livre",
      tag: "Leveza · Movimento",
      caption: "LIBERDADE PARA TREINAR",
    },
    {
      img: "https://trimodmeias.bwimg.com.br/trimodmeias/descricoes/951-07-1774635809.4097.jpeg",
      thumb:
        "https://trimodmeias.bwimg.com.br/trimodmeias/descricoes/951-07-1774635809.4097.jpeg",
      label: "Praia Run",
      tag: "Resistência · Outdoor",
      caption: "ENCARA QUALQUER DESAFIO",
    },
    {
      img: "https://trimodmeias.bwimg.com.br/trimodmeias/descricoes/951-08-1774635814.9179.jpeg",
      thumb:
        "https://trimodmeias.bwimg.com.br/trimodmeias/descricoes/951-08-1774635814.9179.jpeg",
      label: "Superação",
      tag: "Performance · Energia",
      caption: "SEMPRE UM PASSO A MAIS",
    },
    {
      img: "https://trimodmeias.bwimg.com.br/trimodmeias/descricoes/951-09-1774635824.2795.jpeg",
      thumb:
        "https://trimodmeias.bwimg.com.br/trimodmeias/descricoes/951-09-1774635824.2795.jpeg",
      label: "Bike + Run",
      tag: "Multiesporte · Resistência",
      caption: "VERSATILIDADE TOTAL",
    },
    {
      img: "https://trimodmeias.bwimg.com.br/trimodmeias/descricoes/951-10-1774635829.2813.jpeg",
      thumb:
        "https://trimodmeias.bwimg.com.br/trimodmeias/descricoes/951-10-1774635829.2813.jpeg",
      label: "Equipe",
      tag: "Treino · Performance",
      caption: "JUNTOS VAMOS MAIS LONGE",
    },
  ];
  const wrap = document.getElementById("stories-wrap");
  const modalBg = document.getElementById("modal-bg");
  const modalImg = document.getElementById("modal-img");
  const modalAvatar = document.getElementById("modal-avatar");
  const barsWrap = document.getElementById("bars");
  const capTag = document.getElementById("cap-tag");
  const capText = document.getElementById("cap-text");

  let cur = 0;
  let timer = null;
  let touchX = 0;

  slides.forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "story-thumb";
    div.innerHTML = `
      <div class="story-ring">
        <img src="${s.thumb}" alt="${s.label}">
      </div>
      <span class="story-label">${s.label}</span>
    `;
    div.addEventListener("click", () => openModal(i));
    wrap.appendChild(div);
  });

  function buildBars() {
    barsWrap.innerHTML = "";
    slides.forEach(() => {
      const w = document.createElement("div");
      w.className = "bar-wrap";

      const f = document.createElement("div");
      f.className = "bar-fill";

      w.appendChild(f);
      barsWrap.appendChild(w);
    });
  }

  function getFills() {
    return barsWrap.querySelectorAll(".bar-fill");
  }

  function showSlide(index, startFrom = 0) {
    cur = index;
    const s = slides[cur];

    modalImg.style.opacity = 0;
    modalImg.src = s.img;
    modalImg.onload = () => {
      modalImg.style.opacity = 1;
    };

    modalAvatar.src = s.thumb;
    capTag.textContent = s.tag;
    capText.textContent = s.caption;

    const fills = getFills();
    fills.forEach((f, i) => {
      f.style.transition = "none";
      f.className = "bar-fill";
      f.style.width = "0%";

      if (i < cur) {
        f.classList.add("done");
        f.style.width = "100%";
      } else if (i === cur) {
        const remain = STORY_MS - startFrom;
        const pct = (startFrom / STORY_MS) * 100;

        f.style.width = pct + "%";

        requestAnimationFrame(() => {
          f.style.transition = `width ${remain}ms linear`;
          f.style.width = "100%";
        });
      }
    });

    clearTimeout(timer);
    timer = setTimeout(advance, STORY_MS - startFrom);
  }

  function advance() {
    if (cur < slides.length - 1) {
      showSlide(cur + 1);
    } else {
      closeModal();
    }
  }

  function openModal(index) {
    buildBars();
    modalBg.classList.add("open");
    document.body.style.overflow = "hidden";
    showSlide(index);
  }

  function closeModal() {
    clearTimeout(timer);
    modalBg.classList.remove("open");
    document.body.style.overflow = "";
  }

  document.getElementById("modal-close").addEventListener("click", closeModal);

  modalBg.addEventListener("click", (e) => {
    if (e.target === modalBg) closeModal();
  });

  document.getElementById("tap-prev").addEventListener("click", () => {
    if (cur > 0) showSlide(cur - 1);
  });

  document.getElementById("tap-next").addEventListener("click", () => {
    if (cur < slides.length - 1) showSlide(cur + 1);
    else closeModal();
  });

  document.addEventListener("keydown", (e) => {
    if (!modalBg.classList.contains("open")) return;

    if (e.key === "ArrowLeft" && cur > 0) showSlide(cur - 1);
    if (e.key === "ArrowRight") {
      if (cur < slides.length - 1) showSlide(cur + 1);
      else closeModal();
    }
    if (e.key === "Escape") closeModal();
  });

  document.getElementById("story-modal").addEventListener(
    "touchstart",
    (e) => {
      touchX = e.touches[0].clientX;
    },
    { passive: true },
  );

  document.getElementById("story-modal").addEventListener(
    "touchend",
    (e) => {
      const dx = touchX - e.changedTouches[0].clientX;

      if (Math.abs(dx) > 40) {
        if (dx > 0) {
          if (cur < slides.length - 1) showSlide(cur + 1);
          else closeModal();
        } else {
          if (cur > 0) showSlide(cur - 1);
        }
      }
    },
    { passive: true },
  );
</script>
