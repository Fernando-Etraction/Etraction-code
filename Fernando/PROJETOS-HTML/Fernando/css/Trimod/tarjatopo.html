<section class="alerta-topo alerta-topo-campanha">
  <div class="container">
    <div class="row">
      <div class="col-xs-12">
        <div class="campanha-primeira-compra">
          <!-- Elementos decorativos de fundo -->
          <div class="campanha-decoracao campanha-decoracao-1"></div>
          <div class="campanha-decoracao campanha-decoracao-2"></div>
          <div class="campanha-decoracao campanha-decoracao-3"></div>

          <div class="campanha-primeira-compra__left">
            <div class="campanha-badge">OFERTA ESPECIAL</div>
            <h2 class="campanha-titulo">6 POR R$186</h2>
            <p class="campanha-descricao">
              Leve 6 pares por apenas
              <span class="campanha-destaque">R$186,00</span>.<br />
              Use o cupom <strong>6POR186</strong> e aproveite também
              <span class="campanha-bonus">frete grátis</span> para a região
              Sul e Sudeste.
            </p>
            <small>*Aplique o cupom diretamente no</small>
          </div>

          <div class="campanha-primeira-compra__right">
            <div class="campanha-cupom-container">
              <p class="campanha-cupom-label">*Utilize no carrinho</p>
              <button
                class="campanha-cupom-btn"
                type="button"
                data-coupon="6POR186"
              >
                6POR186
              </button>
              <span class="campanha-cupom-texto">Clique para copiar</span>
              <span class="campanha-cupom-feedback" aria-live="polite"></span>

              <div class="campanha-check-mark"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    var buttons = document.querySelectorAll(".campanha-cupom-btn[data-coupon]");

    buttons.forEach(function (button) {
      button.addEventListener("click", function () {
        var coupon = this.getAttribute("data-coupon");
        var feedback = this.parentElement.querySelector(
          ".campanha-cupom-feedback",
        );
        var checkMark = this.parentElement.querySelector(
          ".campanha-check-mark",
        );

        function showFeedback(message) {
          if (!feedback) return;
          feedback.textContent = message;
          feedback.classList.add("ativo");

          if (checkMark) {
            checkMark.classList.add("ativo");
          }

          clearTimeout(feedback._timer);
          feedback._timer = setTimeout(function () {
            feedback.textContent = "";
            feedback.classList.remove("ativo");
            if (checkMark) {
              checkMark.classList.remove("ativo");
            }
          }, 2500);
        }

        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard
            .writeText(coupon)
            .then(function () {
              showFeedback("Cupom copiado!");
            })
            .catch(function () {
              fallbackCopy(coupon, showFeedback);
            });
        } else {
          fallbackCopy(coupon, showFeedback);
        }
      });
    });

    function fallbackCopy(text, callback) {
      var input = document.createElement("input");
      input.value = text;
      document.body.appendChild(input);
      input.select();
      document.execCommand("copy");
      document.body.removeChild(input);
      callback("Cupom copiado!");
    }
  });
</script>
