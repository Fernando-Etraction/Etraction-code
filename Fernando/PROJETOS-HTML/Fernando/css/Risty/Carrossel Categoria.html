<script>// <![CDATA[
    function updateTimer() {
        const now = new Date();
        // Define a meia-noite do dia atual 
        const midnight = new Date(now);
        midnight.setHours(23, 59, 59, 999);
        // Calcula a diferença em milissegundos 
        let diff = midnight - now; if (diff < 0) diff = 0;
        // Evita valores negativos (no caso de ultrapassar meia-noite)
        const h = Math.floor((diff / 1000 / 60 / 60) % 24);
        const m = Math.floor((diff / 1000 / 60) % 60);
        const s = Math.floor((diff / 1000) % 60);
        // Atualiza os números no timer 
        document.querySelector('[data-unit="hours"]').textContent = String(h).padStart(2, '0');
        document.querySelector('[data-unit="minutes"]').textContent = String(m).padStart(2, '0');
        document.querySelector('[data-unit="seconds"]').textContent = String(s).padStart(2, '0');
    }
    // Inicializa o timer imediatamente 
    updateTimer();
    // Atualiza a cada segundo
    setInterval(updateTimer, 1000);
    // ]]></script>

<script>// <![CDATA[
    (function () {
        const root = document.querySelector('.risty-carousel');
        if (!root) return;
        const viewport = root.querySelector('.risty-viewport');
        const track = root.querySelector('.risty-track');
        const prevBtn = root.querySelector('.risty-prev');
        const nextBtn = root.querySelector('.risty-next');
        const items = Array.from(track.children);
        let current = 0;
        function getVisibles() {
            const styles = getComputedStyle(document.documentElement);
            const v = parseFloat(styles.getPropertyValue('--visibles')) || 4; return Math.max(1, Math.floor(v));
        }
        function scrollToIndex(idx) {
            const target = items[idx];
            if (!target) return;
            const left = target.offsetLeft - parseFloat(getComputedStyle(track).gap || 0);
            viewport.scrollTo({ left, behavior: 'smooth' }); current = idx; updateArrows();
        }
        function maxIndex() {
            const v = getVisibles(); return Math.max(0, items.length - v);
        }
        function move(dir) {
            const v = getVisibles();
            const step = v; let next = current + (dir * step);
            next = Math.max(0, Math.min(next, maxIndex())); scrollToIndex(next);
        } function updateArrows() {
            const m = maxIndex();
            prevBtn.toggleAttribute('disabled', current <= 0);
            nextBtn.toggleAttribute('disabled', current >= m);
        }
        prevBtn.addEventListener('click', () => move(-1));
        nextBtn.addEventListener('click', () => move(1));
        window.addEventListener('resize', () => {
            current = Math.min(current, maxIndex());
            scrollToIndex(current);
        }); updateArrows();
        scrollToIndex(0);
    })();
    // ]]></script>
