<div class="content-diorelle clearfix">
  <div class="descricao-desconto">
    <div>oferta exclusiva</div>
    <div><span style="font-size: 14pt">2 conjuntos por R$ 299</span></div>
    <p class="obs">
      Aplique o cupom <strong>2POR299</strong> no carrinho de compras para
      garantir o desconto!
    </p>
    <p class="obs">Exclusivo para itens dessa p&aacute;gina</p>
  </div>
  <div class="aplicar-desconto">
    <span class="title-desconto">Use o cupom na p&aacute;gina de checkout</span>
    <div class="area-desconto">
      <input class="cupom" readonly="readonly" type="text" value="2POR299" />
      <div id="msg-cupom" class="something">Clique para copiar o cupom</div>
    </div>
  </div>
</div>
  <script>
    //função para copiar cupom
    document.querySelector(".cupom").addEventListener("click", function () {
      const cupom = this.value;
      navigator.clipboard.writeText(cupom).then(function () {
        const msg = document.getElementById("msg-cupom");
        msg.textContent = "Cupom copiado!";
        setTimeout(() => {
          msg.textContent = "Clique para copiar o cupom";
        }, 2000);
      });
    });
  </script>
