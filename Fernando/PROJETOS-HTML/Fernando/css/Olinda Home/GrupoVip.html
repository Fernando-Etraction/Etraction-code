<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo VIP - Olinda Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            margin: 0;
        }

        .container {
            background: #ffffff;
            border-radius: 0;
            box-shadow: none;
            max-width: 100%;
            width: 100%;
            min-height: 100vh;
            padding: 80px 40px;
            text-align: center;
            animation: fadeInUp 0.8s ease-out;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .container {
                padding: 60px 30px;
                min-height: auto;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 40px 20px;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            margin-bottom: 20px;
            display:flex;
            align-items:center;
                justify-content: center;

        }

        .logo img {
            max-width: 280px;
            height: auto;
        }

        @media (max-width: 768px) {
            .logo img {
                max-width: 220px;
            }
        }

        @media (max-width: 480px) {
            .logo img {
                max-width: 150px;
            }
        }

        .subtitle {
            font-size: 16px;
            color: #666666;
            font-weight: 600;
            margin-bottom: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @media (max-width: 768px) {
            .subtitle {
                font-size: 14px;
                margin-bottom: 40px;
                letter-spacing: 1.5px;
            }
        }

        @media (max-width: 480px) {
            .subtitle {
                font-size: 12px;
                margin-bottom: 30px;
                letter-spacing: 1px;
            }
        }

        h1 {
            font-size: 42px;
            color: #000000;
            margin-bottom: 30px;
            line-height: 1.2;
            font-weight: 800;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 32px;
                margin-bottom: 25px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 24px;
                margin-bottom: 20px;
            }
        }

        .highlight {
            color: #000000;
            border-bottom: 4px solid #000000;
        }

        p {
            font-size: 20px;
            color: #333333;
            margin-bottom: 60px;
            line-height: 1.6;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        @media (max-width: 768px) {
            p {
                font-size: 18px;
                margin-bottom: 50px;
            }
        }

        @media (max-width: 480px) {
            p {
                font-size: 16px;
                margin-bottom: 40px;
            }
        }

        .whatsapp-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 50px;
            background: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(37, 211, 102, 0.3);
            animation: pulse 2s infinite;
        }

        @media (max-width: 768px) {
            .whatsapp-icon {
                width: 80px;
                height: 80px;
                margin: 0 auto 40px;
            }
        }

        @media (max-width: 480px) {
            .whatsapp-icon {
                width: 70px;
                height: 70px;
                margin: 0 auto 30px;
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .whatsapp-icon svg {
            width: 50px;
            height: 50px;
            fill: white;
        }

        @media (max-width: 768px) {
            .whatsapp-icon svg {
                width: 40px;
                height: 40px;
            }
        }

        @media (max-width: 480px) {
            .whatsapp-icon svg {
                width: 35px;
                height: 35px;
            }
        }

        .cta-button {
            background: #25D366;
            color: white;
            border: none;
            padding: 22px 60px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 0;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .cta-button {
                padding: 18px 50px;
                font-size: 16px;
                margin-bottom: 35px;
                letter-spacing: 1.5px;
            }
        }

        @media (max-width: 480px) {
            .cta-button {
                padding: 16px 40px;
                font-size: 14px;
                margin-bottom: 30px;
                letter-spacing: 1px;
                width: 100%;
                max-width: 300px;
            }
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            background: #1a1a1a;
        }

        .cta-button:active {
            transform: translateY(-1px);
        }

        .benefits {
            margin-top: 80px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            text-align: left;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        @media (max-width: 768px) {
            .benefits {
                margin-top: 60px;
                grid-template-columns: 1fr;
                gap: 25px;
            }
        }

        @media (max-width: 480px) {
            .benefits {
                margin-top: 50px;
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        .benefit-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 0;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        @media (max-width: 768px) {
            .benefit-item {
                padding: 18px;
                gap: 12px;
            }
        }

        @media (max-width: 480px) {
            .benefit-item {
                padding: 16px;
                gap: 12px;
            }
        }

        .benefit-item:hover {
            background: #000000;
            border-color: #000000;
        }

        .benefit-item:hover .benefit-text {
            color: #ffffff;
        }

        .benefit-item:hover .benefit-icon svg {
            fill: #ffffff;
        }

        .benefit-icon {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }

        .benefit-icon svg {
            fill: #000000;
            transition: fill 0.3s ease;
        }

        .benefit-text {
            color: #000000;
            font-size: 16px;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        @media (max-width: 768px) {
            .benefit-text {
                font-size: 15px;
            }
        }

        @media (max-width: 480px) {
            .benefit-text {
                font-size: 14px;
            }
        }

        .footer-link {
            margin-top: 80px;
            padding-top: 40px;
            border-top: 2px solid #000000;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        @media (max-width: 768px) {
            .footer-link {
                margin-top: 60px;
                padding-top: 30px;
            }
        }

        @media (max-width: 480px) {
            .footer-link {
                margin-top: 50px;
                padding-top: 25px;
            }
        }

        .footer-link a {
            color: #000000;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .footer-link a {
                font-size: 14px;
                letter-spacing: 0.5px;
            }
        }

        @media (max-width: 480px) {
            .footer-link a {
                font-size: 12px;
                letter-spacing: 0.5px;
            }
        }

        .footer-link a:hover {
            color: #666666;
            text-decoration: none;
        }


    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="https://olindahome.cdn.magazord.com.br/resources/logo1.svg" alt="Olinda Home">
            </div>
        <div class="subtitle">Grupo VIP Exclusivo</div>
        
        <div class="whatsapp-icon">

        </div>

        <h1>Entre para o nosso <span class="highlight">Grupo VIP</span> no WhatsApp!</h1>
        
        <p>Fique por dentro de <strong>ofertas exclusivas</strong> e <strong>cupons imperdíveis</strong> antes de todo mundo!</p>

        <button class="cta-button" onclick="joinWhatsApp()">
            ACESSAR GRUPO VIP

        <div class="benefits">
            <div class="benefit-item">
                <div class="benefit-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>

                <div class="benefit-text">Ofertas exclusivas do grupo</div>

            <div class="benefit-item">
                <div class="benefit-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
                    </svg>
                </div>
                <div class="benefit-text">Cupons de desconto imperdíveis</div>
            </div>
            
            <div class="benefit-item">
                <div class="benefit-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>

        </div>

        <div class="footer-link">
            <a href="https://www.olindahome.com.br/" target="_blank">Visite nosso site →</a>
        </div>
    </div>

    </script>
</body>
</html>
