<p>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>// <![CDATA[
        document.addEventListener('DOMContentLoaded', function () {

            function initSwiper() {
                // ✅ só usa swiper abaixo de 980px (mobile/tablet)
                if (window.innerWidth < 980) {
                    if (!window.pfSwiperInstance) {
                        window.pfSwiperInstance = new Swiper("#pf-cat-swiper", {
                            slidesPerView: 3,
                            spaceBetween: 10,
                            grabCursor: true,
                            watchOverflow: true,
                            navigation: {
                                nextEl: ".pf-swiper-next",
                                prevEl: ".pf-swiper-prev"
                            },
                            breakpoints: {
                                0: { slidesPerView: 3, spaceBetween: 10 },
                                480: { slidesPerView: 3, spaceBetween: 10 },
                                768: { slidesPerView: 5, spaceBetween: 10 }
                            }
                        });
                    }
                } else {
                    // ✅ desktop: destrói swiper pra ficar 1 linha sem carrossel
                    if (window.pfSwiperInstance) {
                        window.pfSwiperInstance.destroy(true, true);
                        window.pfSwiperInstance = null;
                    }
                }
            }

            initSwiper();
            window.addEventListener("resize", initSwiper);
        });
        // ]]></script>
</p>
