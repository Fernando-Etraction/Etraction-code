    <script>// <![CDATA[
        function showTabelaMedidasMeasurements(category) {
            var data = {
                'legging': {
                    'Tamanho': ['<strong>PP</strong>', '<strong>P</strong>', '<strong>M</strong>', '<strong>G</strong>', '<strong>GG</strong>'],
                    'Cintura': ['66–72 cm', '70–76 cm', '74–84 cm', '83–90 cm', '88–95 cm'],
                    'Quadril': ['92–97 cm', '98–102 cm', '102–106 cm', '106–110 cm', '111–116 cm']
                },
                'macaquinhos': {
                    'Tamanho': ['<strong>PP</strong>', '<strong>P</strong>', '<strong>M</strong>', '<strong>G</strong>', '<strong>GG</strong>'],
                    'Cintura': ['66–72 cm', '70–76 cm', '74–84 cm', '83–90 cm', '88–95 cm'],
                    'Quadril': ['92–97 cm', '98–102 cm', '102–106 cm', '106–110 cm', '111–116 cm']
                },
                'top': {
                    'Tamanho': ['<strong>PP</strong>', '<strong>P</strong>', '<strong>M</strong>', '<strong>G</strong>', '<strong>GG</strong>'],
                    'Peito': ['83–87 cm', '88–92 cm', '93–97 cm', '96–100 cm', '100–106 cm']
                },
                'shorts': {
                    'Tamanho': ['<strong>PP</strong>', '<strong>P</strong>', '<strong>M</strong>', '<strong>G</strong>', '<strong>GG</strong>'],
                    'Cintura': ['66–72 cm', '70–76 cm', '74–84 cm', '83–90 cm', '88–95 cm'],
                    'Quadril': ['92–97 cm', '98–102 cm', '102–106 cm', '106–110 cm', '111–116 cm']
                }
            };


            var table = '<thead><tr>';
            for (var key in data[category]) {
                table += '<th>' + key + '</th>';
            }
            table += '</tr></thead><tbody>';

            for (var i = 0; i < data[category]['Tamanho'].length; i++) {
                table += '<tr>';
                for (var key in data[category]) {
                    table += '<td>' + data[category][key][i] + '</td>';
                }
                table += '</tr>';
            }
            table += '</tbody>';

            document.getElementById('tabelaMedidasMeasurementsTable').innerHTML = table;

            var buttons = document.getElementsByClassName('category-btn');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            event.currentTarget.classList.add('active');

        }

        $(document).ready(function () {


            $('.area-derivacoes').after(`

  <path d="M12.375 5.625L15.375 8.625" stroke="#000000" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"></path>
  <path d="M9 9L12 12" stroke="#000000" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"></path>

</svg><p>Tabela de Medidas<p></button>
<dialog id="dialogstyle">
<button id="buttonFechar">X</button>
<div class="tabela-medidas">
<div class="title">Guia de Tamanhos</div>
<div>
    <button class="category-btn" onclick="showTabelaMedidasMeasurements('legging')">Legging</button>
    <button class="category-btn" onclick="showTabelaMedidasMeasurements('top')">Top</button>
    <button class="category-btn" onclick="showTabelaMedidasMeasurements('shorts')">Shorts</button>
    <button class="category-btn" onclick="showTabelaMedidasMeasurements('macaquinhos')">Macaquinhos</button>
</div>

<table class="measurements-table" id="tabelaMedidasMeasurementsTable">
    <!-- Table content will be inserted here -->
</table>
</div>
</dialog>
`)
            const button = document.getElementById("buttonAbrir")
            const modal = document.querySelector("dialog")
            const buttonFechar = document.getElementById("buttonFechar")

            button.onclick = function () {
                modal.showModal()
            }
            buttonFechar.onclick = function () {
                modal.close()


            }
        });
