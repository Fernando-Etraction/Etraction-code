<script>
(function () {
  const LOG = (...a) => console.log("[derivacoes-fixo]", ...a);

  const SEL = ".derivacoes-hover"; // seu container
  const FORCE_CLASS = "derivacoes-force-on";

  function injectCSS() {
    if (document.getElementById("derivacoes-force-css")) return;

    const style = document.createElement("style");
    style.id = "derivacoes-force-css";
    style.textContent = `
      /* ✅ força SEM depender de hover */
      body.${FORCE_CLASS} ${SEL}{
        display: block !important;
        opacity: 1 !important;
        visibility: visible !important;
        pointer-events: auto !important;
        transform: none !important;
        filter: none !important;
        transition: none !important;
      }

      /* ✅ se o pai usa group-hover (muito comum no tailwind) */
      body.${FORCE_CLASS} .group ${SEL},
      body.${FORCE_CLASS} [class*="group"] ${SEL}{
        opacity: 1 !important;
        visibility: visible !important;
        pointer-events: auto !important;
        transform: none !important;
      }
    `;
    document.head.appendChild(style);
    LOG("✅ CSS injetado");
  }

  function force() {
    const el = document.querySelector(SEL);
    if (!el) return;

    document.body.classList.add(FORCE_CLASS);

    // remove hidden e outros que podem atrapalhar
    el.classList.remove("hidden", "opacity-0", "invisible", "pointer-events-none");

    // força inline também
    el.style.setProperty("display", "block", "important");
    el.style.setProperty("opacity", "1", "important");
    el.style.setProperty("visibility", "visible", "important");
    el.style.setProperty("pointer-events", "auto", "important");
    el.style.setProperty("transform", "none", "important");

    LOG("✅ aplicado no elemento", el);
  }

  function boot() {
    injectCSS();
    force();

    // observa DOM + mudanças de classe/atributos (quando sai hover, alguns temas recolocam classes)
    const obs = new MutationObserver(() => force());
    obs.observe(document.documentElement, { childList: true, subtree: true, attributes: true, attributeFilter: ["class", "style"] });
    LOG("👀 observer ativo");
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", boot);
  } else {
    boot();
  }
})();
</script>
